<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cavern Quest — Wizzed Arcade</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:#0f0f1a;color:#ddd6fe;
    font-family:'Courier New',ui-monospace,monospace;
    display:flex;align-items:center;justify-content:center;
    height:100vh;overflow:hidden;
  }
  a.back{
    position:fixed;top:10px;left:12px;z-index:40;
    color:#8888aa;text-decoration:none;font-size:13px;
    padding:4px 9px;border:1px solid #33334d;background:rgba(15,15,26,.85);
  }
  a.back:hover{color:#a78bfa;border-color:#a78bfa;text-shadow:0 0 6px #a78bfa}
  #app{
    width:780px;max-width:98vw;height:480px;max-height:98vh;
    border:2px solid #4c1d95;background:#10101c;position:relative;overflow:hidden;
    box-shadow:0 0 24px rgba(167,139,250,.35),0 0 80px rgba(167,139,250,.12);
    display:flex;
  }
  #mainCol{flex:1;display:flex;flex-direction:column;min-width:0}
  #art{
    height:86px;display:flex;align-items:center;justify-content:center;
    font-size:34px;letter-spacing:6px;white-space:pre;line-height:1.15;
    background:radial-gradient(ellipse at 50% 130%,rgba(167,139,250,.14),transparent 65%),#12121f;
    border-bottom:1px solid #2e1065;text-align:center;
  }
  #stats{
    display:flex;gap:12px;align-items:center;padding:5px 12px;font-size:12px;
    background:#131322;border-bottom:1px solid #2e1065;flex-wrap:wrap;
  }
  #stats .hp{color:#f87171}#stats .gold{color:#fde047}#stats .cor{color:#fb923c}
  #inv{color:#a5b4fc;font-size:13px;margin-left:auto}
  #story{
    flex:1;padding:12px 16px;font-size:14px;line-height:1.55;overflow-y:auto;
    color:#e9e4ff;cursor:pointer;
  }
  #story .cur::after{content:'▌';color:#a78bfa;animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:0}}
  #choices{padding:6px 12px 12px;display:flex;flex-direction:column;gap:5px}
  #choices button{
    font-family:inherit;text-align:left;font-size:13px;padding:6px 10px;cursor:pointer;
    background:#191927;color:#c4b5fd;border:1px solid #3b0764;
  }
  #choices button:hover{background:#2e1065;color:#ede9fe;box-shadow:0 0 8px rgba(167,139,250,.5)}
  #choices button .dc{color:#fbbf24;font-size:11px}
  #choices button .req{color:#4ade80;font-size:11px}
  #side{
    width:184px;border-left:1px solid #2e1065;background:#0d0d18;
    display:flex;flex-direction:column;
  }
  #side h4{
    font-size:11px;color:#8b5cf6;padding:7px 10px 5px;letter-spacing:2px;
    border-bottom:1px solid #2e1065;text-shadow:0 0 6px rgba(139,92,246,.6);
  }
  #hist{flex:1;overflow-y:auto;padding:6px 10px;font-size:10.5px;line-height:1.5;color:#8f8fb3}
  #hist .chk-s{color:#4ade80}#hist .chk-f{color:#f87171}#hist div{margin-bottom:4px}
  #dieWrap{
    position:absolute;inset:0;background:rgba(10,10,20,.75);z-index:30;display:none;
    align-items:center;justify-content:center;flex-direction:column;
  }
  #dieWrap canvas{filter:drop-shadow(0 0 16px rgba(167,139,250,.7))}
  #dieRes{font-size:16px;font-weight:bold;margin-top:10px;height:22px;text-shadow:0 0 8px currentColor}
  #title{
    position:absolute;inset:0;z-index:35;cursor:pointer;
    background:radial-gradient(ellipse at 50% 30%,rgba(167,139,250,.16),transparent 55%),rgba(15,15,26,.96);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  }
  #title .cave{font-size:44px;letter-spacing:6px;margin-bottom:6px}
  #title h1{
    font-size:42px;color:#a78bfa;letter-spacing:5px;
    text-shadow:0 0 18px #8b5cf6,0 0 60px rgba(139,92,246,.5);
  }
  #title .sub{color:#c4b5fd;font-size:13px;margin:10px 0 2px;line-height:1.7}
  #title .cont{color:#4ade80;font-size:14px;margin-top:14px;font-weight:bold}
  #title .newg{color:#666687;font-size:11px;margin-top:4px}
  #title .go{color:#a78bfa;font-size:16px;font-weight:bold;margin-top:16px;animation:blink2 1.1s steps(2) infinite}
  @keyframes blink2{50%{opacity:.2}}
</style>
</head>
<body>
<a class="back" href="../index.html">&larr; Arcade</a>
<div id="app">
  <div id="mainCol">
    <div id="art">🌲 🕳️ 🌲</div>
    <div id="stats">
      <span class="hp">♥ <span id="hpTxt"></span></span>
      <span class="gold">💰 <span id="goldTxt"></span></span>
      <span class="cor">🔥 courage <span id="corTxt"></span></span>
      <span id="inv"></span>
    </div>
    <div id="story"></div>
    <div id="choices"></div>
  </div>
  <div id="side">
    <h4>YOUR PATH</h4>
    <div id="hist"></div>
  </div>
  <div id="dieWrap">
    <canvas id="dieCv" width="130" height="130"></canvas>
    <div id="dieRes"></div>
  </div>
  <div id="title">
    <div class="cave">🌲 🗿 🕳️ 💎 🐲</div>
    <h1>CAVERN QUEST</h1>
    <div class="sub">a torch, twelve coins, and a hole in the mountain that eats adventurers.<br>
    branching paths · d20 skill checks · 4+ endings · your choices are remembered</div>
    <div class="cont" id="contTxt"></div>
    <div class="newg" id="newgTxt"></div>
    <div class="go">▶ CLICK or press ENTER to light your torch ◀</div>
  </div>
</div>
<script>
'use strict';
const SAVEKEY='wizzed-cavern-quest';
const $=id=>document.getElementById(id);

/* ---------- audio ---------- */
let AC=null;
function initAudio(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(AC&&AC.state==='suspended')AC.resume();}
function beep(f,d,type,v){
  if(!AC)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type||'square';o.frequency.value=f;
    g.gain.value=v||0.03;g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+d);
    o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d);
  }catch(e){}
}
const sfxType=()=>beep(700+Math.random()*300,0.015,'square',0.008);
const sfxPick=()=>beep(440,0.06,'square',0.03);
const sfxGood=()=>[523,659,784].forEach((f,i)=>setTimeout(()=>beep(f,0.1,'square',0.04),i*70));
const sfxBad=()=>[330,247,185].forEach((f,i)=>setTimeout(()=>beep(f,0.14,'triangle',0.05),i*90));
const sfxRoll=()=>beep(180+Math.random()*400,0.03,'square',0.02);
const sfxHit=()=>beep(160,0.1,'sawtooth',0.05);
const sfxWin=()=>[392,523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.13,'square',0.05),i*90));

/* ---------- state ---------- */
let G=null;
function freshState(){
  return {
    scene:'start',hp:20,maxHp:20,gold:12,courage:0,
    torch:true,rope:false,sword:false,flameSword:false,potions:0,gems:0,
    amulet:false,emberKey:false,blessing:false,crown:false,dragonSlain:false,
    leverPulled:false,deathReason:'',history:[],done:false,endings:[]
  };
}
function atkMod(){return (G.flameSword?5:G.sword?3:0)+(G.blessing?1:0);}
function atkDmg(){return (G.flameSword?7:G.sword?5:3)+Math.floor(Math.random()*3);}
function corMod(){return Math.floor(G.courage/2)+(G.blessing?1:0);}
function wealth(){return G.gold+G.gems*12;}
function heal(n){G.hp=Math.min(G.maxHp,G.hp+n);}
function hurt(n,reason){
  G.hp-=n;
  if(G.hp<=0){G.hp=0;G.deathReason=reason||'The dark claimed you.';return true;}
  return false;
}

/* ---------- save ---------- */
let savedMeta=null;
function save(){try{localStorage.setItem(SAVEKEY,JSON.stringify(G));}catch(e){}}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(SAVEKEY)||'null');
    if(d&&d.scene)savedMeta=d;
  }catch(e){}
}
load();

/* ---------- scenes ---------- */
const SC={
start:{art:'🌲 🌲 🕳️ 🌲 🌲',
 text:()=>`Dusk. The cavern mouth yawns in the hillside like a missing tooth. Cold air breathes out of it, smelling of wet stone and old secrets. Legends say a dragon hoards a kingdom's ransom below — and that nobody who laughed at the legends ever came back to laugh again. A stooped hermit tends a kettle by a small fire nearby. You carry a torch and ${G.gold} gold.`,
 ch:[
  {t:'Enter the cavern boldly',fx:g=>{g.courage++;},go:'enter',note:'+1 courage'},
  {t:'Talk to the hermit first',go:'hermit'},
 ]},
hermit:{art:'🔥 🧙‍♂️ ⛺',
 text:()=>`"Going down, are ye?" The hermit doesn't look up from his kettle. "Then ye'll be wanting supplies. I sell to everyone. I buy back from no one — never had a customer return." He spreads a blanket: a coil of rope, a short sword, bottles of red liquid. You have ${G.gold} gold.`,
 ch:[
  {t:'Buy rope — 5g',if:g=>!g.rope&&g.gold>=5,fx:g=>{g.gold-=5;g.rope=true;},go:'hermit',note:'bought rope'},
  {t:'Buy short sword — 8g',if:g=>!g.sword&&g.gold>=8,fx:g=>{g.gold-=8;g.sword=true;},go:'hermit',note:'bought sword'},
  {t:'Buy healing potion — 6g',if:g=>g.gold>=6,fx:g=>{g.gold-=6;g.potions++;},go:'hermit',note:'bought potion'},
  {t:'Ask about the dragon',go:'hermitTale'},
  {t:'Head into the cavern',go:'enter'},
 ]},
hermitTale:{art:'🔥 🧙‍♂️ 🐲',
 text:()=>`The hermit finally looks up. His eyes are the color of deep water. "Vorstrag the Golden sleeps on his hoard at the mountain's root. Flame won't bite him — unless it's his own kind of flame. There's a dwarf-forge down there could kindle such a fire, if ye had steel worth burning." He sips his tea. "And mind the ghost. Answer her brave and true."`,
 ch:[
  {t:'Thank him and browse his wares',go:'hermit'},
  {t:'Enough talk — into the dark',fx:g=>{g.courage++;},go:'enter',note:'+1 courage'},
 ]},
enter:{art:'🦇 🦇 🕳️ 🦇',
 text:()=>`Your torchlight pushes back the black. The entry hall is vast, its ceiling lost in shadow — until the shadow MOVES. Hundreds of bats hang overhead, and dozens of eyes turn toward your flame. The passage continues between two fallen pillars.`,
 ch:[
  {t:'Sneak beneath them, slow and silent',check:{dc:9,label:'Stealth'},goS:'fork',goF:'batFight',
   fxS:g=>{},noteS:'slipped past the bats',noteF:'the bats descended!'},
  {t:'Wave the torch and stride through',fx:g=>{g.courage++;},go:'batScare',note:'+1 courage'},
  {t:'Charge through screaming',check:{dc:12,cor:true,label:'Courage'},goS:'batBrave',goF:'batFight',
   fx:g=>{g.courage++;},note:'+1 courage'},
 ]},
batScare:{art:'🔥 🦇 💨',
 text:()=>`You sweep the torch overhead in slow arcs. The bats shriek and boil away from the flame, funneling out the cave mouth in a leathery river. A few claws rake your scalp in passing — stinging but shallow. The hall falls silent.`,
 fx:g=>{hurt(2,'Pecked apart by bats.');},
 ch:[{t:'Continue to the fork',go:'fork'}]},
batBrave:{art:'🗣️ 🦇 🦇 💨',
 text:()=>`Your war cry cracks off the stone like thunder. The entire colony detonates upward in fright and vanishes into cracks in the ceiling. Silence. You grin in the torchlight. Somewhere ahead, water drips into the dark.`,
 ch:[{t:'Swagger onward',fx:g=>{g.courage++;},go:'fork',note:'+1 courage'}]},
batFight:{art:'🦇 ⚔️ 🦇',
 text:()=>`The swarm falls on you — a screeching whirlwind of wings and needle teeth!`,
 combat:{name:'Bat Swarm',emoji:'🦇',hp:8,ac:8,dmg:2,win:'batWin',flee:'start',fleeDc:8}},
batWin:{art:'🦇 💀 ✨',
 text:()=>`The last of the swarm scatters. Among the guano and bones of less lucky travelers, something glints: 4 gold coins and a stoppered bottle of red liquid, still sealed.`,
 fx:g=>{g.gold+=4;g.potions++;},
 ch:[{t:'Pocket it all and move on',go:'fork'}]},
fork:{art:'⬅️ 🕳️ ➡️',
 text:()=>`The hall narrows to a junction of three tunnels. LEFT: the sound of rushing water echoes up, and pale blue light glimmers. AHEAD: the air blows warm, tinged with sulphur and cinders. RIGHT: a cold draft carries whispers you can almost understand.`,
 ch:[
  {t:'Left — toward the water and blue light',go:'river'},
  {t:'Ahead — into the warm, smoky air',go:'warm'},
  {t:'Right — down the cold, whispering tunnel',go:'cold'},
 ]},
/* ===== RIVER BRANCH ===== */
river:{art:'🌊 💠 🌊',
 text:()=>`An underground river roars through a gorge, lit from beneath by veins of glowing blue crystal. Downstream, a rope-and-plank bridge sags over the water. Upstream, a still pool glows like a bowl of moonlight. On the far bank you can just make out an island... and a waterfall.`,
 ch:[
  {t:'Cross the old bridge',go:'bridge'},
  {t:'Examine the glowing pool',go:'pool'},
  {t:'Back to the fork',go:'fork'},
 ]},
bridge:{art:'🌉 🌊 😬',
 text:()=>`The bridge is older than kingdoms. Two planks are missing, three more are lying about their strength. Below, the river grinds stones together like teeth.`,
 ch:[
  {t:'Secure yourself with your rope and cross',if:g=>g.rope,req:'rope',go:'boatman',note:'crossed safely with rope'},
  {t:'Cross carefully, plank by plank',check:{dc:10,label:'Balance'},goS:'boatman',goF:'bridgeFall'},
  {t:'Not worth it — back to the river',go:'river'},
 ]},
bridgeFall:{art:'💥 🌊 🫧',
 text:()=>`A plank snaps like a dry biscuit. You drop, catch a cable, slam into the gorge wall, and haul yourself onto the far bank — soaked, bleeding, and 5 HP poorer. Your torch, miraculously, survives.`,
 fx:g=>{hurt(5,'The river bridge claimed you.');},
 ch:[{t:'Cough up river water and continue',go:'boatman'}]},
pool:{art:'💠 🌕 💠',
 text:()=>`The pool is perfectly still, glowing softly from below. The water smells clean — almost sweet. Deep down, past your reflection, something small glitters on the bottom.`,
 ch:[
  {t:'Drink from the pool',fx:g=>{heal(5);},go:'poolDrink',note:'+5 HP'},
  {t:'Dive for the glitter',check:{dc:10,label:'Swim'},goS:'poolGem',goF:'poolCold'},
  {t:'Leave it be — back to the river',go:'river'},
 ]},
poolDrink:{art:'💠 😌 ✨',
 text:()=>`The water tastes of starlight and winter mornings. Warmth spreads from your belly to your fingertips, knitting scrapes closed as it goes. (+5 HP)`,
 ch:[{t:'Back to the river',go:'river'}]},
poolGem:{art:'🤿 💎 ✨',
 text:()=>`You knife down through the cold glow and pry the glitter loose — a rough gem the size of a walnut, humming faintly with the crystal's light. Worth a fortune to the right buyer.`,
 fx:g=>{g.gems++;},
 ch:[{t:'Surface, triumphant',go:'river',note:'+1 gem'}]},
poolCold:{art:'🥶 💠 🫧',
 text:()=>`The cold hits like a hammer. Your hands cramp, your lungs scream, and you claw back to the surface empty-handed, shivering so hard your teeth chip the silence. (-2 HP)`,
 fx:g=>{hurt(2,'Drowned in a glowing pool.');},
 ch:[{t:'Warm up by the torch and move on',go:'river'}]},
boatman:{art:'💀 🛶 🌊',
 text:()=>`On the far bank, a skeleton in a rotted ferryman's cloak stands beside a coracle, holding out a bone hand, palm up. It says nothing. It doesn't need to. Beyond it, the island and the waterfall wait.`,
 ch:[
  {t:'Pay the ferryman — 5g',if:g=>g.gold>=5,fx:g=>{g.gold-=5;},go:'island',note:'paid the ferryman'},
  {t:'Swim to the island',check:{dc:12,label:'Swim'},goS:'island',goF:'swimFail'},
  {t:'Walk behind the waterfall instead',go:'waterfall'},
  {t:'Return over the bridge',go:'river'},
 ]},
swimFail:{art:'🌊 😵 🌊',
 text:()=>`The current is a living thing, and it does not like you. It slams you into rocks, steals your breath, and finally spits you back onto the bank at the ferryman's feet. You'd swear the skeleton looks smug. (-4 HP)`,
 fx:g=>{hurt(4,'The river took its toll.');},
 ch:[{t:'Pick yourself up',go:'boatman'}]},
island:{art:'🏝️ 📦 ❗',
 text:()=>`The island is a hump of crystal-crusted rock, and squatting in its center is a wooden chest bound in black iron. It is suspiciously pristine. Suspiciously chest-shaped. In your experience, the deep places of the world rarely leave treasure lying around unattended.`,
 ch:[
  {t:'Pry it open carefully from behind',check:{dc:11,label:'Cunning'},goS:'chestGood',goF:'mimicFight'},
  {t:'Kick it open — fortune favors the bold',fx:g=>{g.courage++;},go:'mimicFight',note:'+1 courage'},
  {t:'Leave it. Check the waterfall',go:'waterfall'},
 ]},
chestGood:{art:'📦 💰 💎',
 text:()=>`You wedge your blade under the back hinge — and the "chest" shudders, snaps at empty air with a mouth full of splinter-teeth, then slumps dead. Inside its gullet: 10 gold and a gem, the last meals of less careful looters.`,
 fx:g=>{g.gold+=10;g.gems++;},
 ch:[{t:'Rob the robber. Check the waterfall',go:'waterfall',note:'+10g, +1 gem'}]},
mimicFight:{art:'📦 👄 ⚔️',
 text:()=>`The chest sprouts teeth, a tongue like a whip, and a very bad attitude. MIMIC!`,
 combat:{name:'Mimic',emoji:'📦',hp:12,ac:11,dmg:4,win:'mimicWin',flee:'boatman',fleeDc:10}},
mimicWin:{art:'📦 💀 💰',
 text:()=>`The mimic gurgles and collapses into ordinary planks. Scattered in the wreckage: 12 gold and a gem. Chewy on the outside, crunchy treasure within.`,
 fx:g=>{g.gold+=12;g.gems++;},
 ch:[{t:'Loot it and check the waterfall',go:'waterfall',note:'+12g, +1 gem'}]},
waterfall:{art:'🌊 🚪 📿',
 text:()=>`The waterfall hides a shallow grotto behind its silver curtain. On a stone shelf, left as if someone meant to come back for it, lies an amulet of black crystal on a chain. When you touch it, the whispers of the cave sharpen into almost-words — and you feel the walls confess their secrets.`,
 ch:[
  {t:'Wear the Amulet of Echoes',fx:g=>{g.amulet=true;g.courage++;},go:'riverDeep',note:'AMULET found, +1 courage'},
  {t:'Leave it — it feels haunted',go:'riverDeep'},
 ]},
riverDeep:{art:'⬇️ 🕳️ ⬇️',
 text:()=>`Behind the grotto, the amulet's whisper — or just the draft — leads you to a spiral stair cut into living rock, corkscrewing down into deeper dark. All roads in this mountain, it seems, lead down.`,
 ch:[
  {t:'Descend the deep stair',go:'deep'},
  {t:'Go back to the river first',go:'river'},
 ]},
/* ===== FORGE BRANCH ===== */
warm:{art:'🔥 🌋 🔥',
 text:()=>`The tunnel breathes like a sleeping furnace. Red light pulses from ahead, and the walls are carved with dwarvish runes — mile-markers of a civilization that dug too deep and then simply stopped. A small figure hunches at a bend in the passage, poking at a fire that burns green.`,
 ch:[
  {t:'Approach the figure',go:'imp'},
  {t:'Back to the fork',go:'fork'},
 ]},
imp:{art:'👺 🔥 ❓',
 text:()=>`It's an imp — knee-high, coal-skinned, grinning like a cracked kettle. "A visitor! How rare. How edible. Tell you what: answer my riddle and I'll gift you the key to the door of flame. Fail, and I get to bite you. Ready? — I have no legs, yet I dance. I have no lungs, yet I breathe. Feed me, I live; water me, I die. What am I?"`,
 ch:[
  {t:'"A shadow"',go:'impWrong'},
  {t:'"Fire"',go:'impRight'},
  {t:'"A fish"',go:'impWrong'},
 ]},
impRight:{art:'👺 🗝️ 🎉',
 text:()=>`The imp's grin sours into respect. "Fire. Yes. Booo." It flicks a key of black iron at you — its bow shaped like a flame. "Opens the sigil-door in the cold tunnel, that does. The dead keep better treasure than the living, you know." It vanishes in a huff of green smoke.`,
 fx:g=>{g.emberKey=true;},
 ch:[{t:'Take the Ember Key and continue',go:'forge',note:'EMBER KEY gained'}]},
impWrong:{art:'👺 😡 ⚔️',
 text:()=>`"WRONG!" The imp's grin unhinges past its ears. "Biting time!" It comes at you like a flaming cannonball.`,
 combat:{name:'Imp',emoji:'👺',hp:10,ac:12,dmg:3,win:'impWin',flee:'fork',fleeDc:9}},
impWin:{art:'👺 💨 🗝️',
 text:()=>`The imp bursts like a firework, leaving a smell of sulphur and a small iron key with a flame-shaped bow, clinking on the stone. It seems the riddle was rigged — it was always going to bite you.`,
 fx:g=>{g.emberKey=true;},
 ch:[{t:'Take the Ember Key and continue',go:'forge',note:'EMBER KEY gained'}]},
forge:{art:'⚒️ 🔥 🛠️',
 text:()=>`The tunnel opens into a dwarven forge-hall, silent for a thousand years yet still warm. A river of lava crawls beneath iron grates. The great anvil is intact, and the forge-fire burns low but eternal, the color of a dying star. Runes above it read: STEEL REMEMBERS.`,
 ch:[
  {t:'Reforge your sword in the eternal flame',if:g=>g.sword&&!g.flameSword,req:'sword',
   fx:g=>{g.flameSword=true;},go:'forgeSword',note:'FLAME SWORD forged!'},
  {t:'Pull the great lever by the anvil',if:g=>!g.leverPulled,fx:g=>{g.leverPulled=true;},go:'lever'},
  {t:'Cross the lava channel deeper in',go:'lava'},
  {t:'Back to the fork',go:'fork'},
 ]},
forgeSword:{art:'🗡️ ➡️ ⚔️🔥',
 text:()=>`You lay your plain blade in the eternal fire. The steel drinks the light, turns white, then gold — and when you draw it out, flames run along the edge like eager hounds. The hermit's words come back to you: flame won't bite a dragon... unless it's his own kind of flame.`,
 ch:[{t:'Sheathe the Flame Sword',go:'forge'}]},
lever:{art:'🎚️ ⚙️ 🌫️',
 text:()=>`The lever grinds down. Deep in the mountain, gears the size of houses turn, and somewhere far away you hear stone doors rumble open and a gust of hot air sigh through distant halls. Whatever you unlocked, the mountain now feels... more connected.`,
 ch:[{t:'Interesting. Back to the forge',go:'forge'}]},
lava:{art:'🟥 🪨 🟥',
 text:()=>`Beyond the forge, the grates end and raw lava blocks the way — crossable only by a line of basalt stepping stones, each one sweating heat. The far side descends toward the mountain's root.`,
 ch:[
  {t:'Leap the stones',check:{dc:11,cor:true,label:'Daring'},goS:'salamander',goF:'lavaBurn'},
  {t:'Rig a rope line from the old cranes',if:g=>g.rope,req:'rope',go:'salamander',note:'crossed with rope'},
  {t:'Retreat to the forge',go:'forge'},
 ]},
lavaBurn:{art:'🦶 🔥 😱',
 text:()=>`The fourth stone tilts. Your boot dips into liquid rock for half a heartbeat — half a heartbeat too long. You howl, lunge, and land on the far bank with a boot that will never be the same, and neither will the foot inside it. (-6 HP)`,
 fx:g=>{hurt(6,'The lava was patient. Your footing was not.');},
 ch:[{t:'Limp onward, smoking slightly',go:'salamander'}]},
salamander:{art:'🦎 🔥 🚧',
 text:()=>`A salamander the size of a warhorse coils across the passage, its skin cracked lava, its eyes twin embers. It regards you with ancient boredom. It does not move. This is its corridor, and both of you know it.`,
 ch:[
  {t:'Offer it a gem',if:g=>g.gems>0,req:'gem',fx:g=>{g.gems--;},go:'salGem',note:'gave a gem'},
  {t:'Fight it',go:'salFight'},
  {t:'Sneak along the ceiling cracks',check:{dc:12,label:'Stealth'},goS:'forgeDeep',goF:'salFight'},
 ]},
salGem:{art:'🦎 💎 😋',
 text:()=>`You roll the gem across the floor. The salamander's tongue flickers — then snaps it up like a sweet. It sighs a plume of smoke that smells almost like gratitude and pours itself aside, leaving the passage clear.`,
 ch:[{t:'Walk past, respectfully',go:'forgeDeep'}]},
salFight:{art:'🦎 ⚔️ 🔥',
 text:()=>`The salamander uncoils, jaws glowing like an opened furnace!`,
 combat:{name:'Salamander',emoji:'🦎',hp:16,ac:13,dmg:5,win:'salWin',flee:'forge',fleeDc:11}},
salWin:{art:'🦎 💀 💰',
 text:()=>`The great beast shudders and stills, its inner fire dimming to coals. Fused into its cooling hide you find 12 gold pieces — the pocket change of previous challengers — and pry them loose.`,
 fx:g=>{g.gold+=12;},
 ch:[{t:'Continue down',go:'forgeDeep',note:'+12g'}]},
forgeDeep:{art:'⬇️ 🕳️ ⬇️',
 text:()=>`Past the salamander's corridor, the dwarven road slopes ever downward, its rune-lamps long dead. The heat fades behind you; ahead is only depth. A final stair spirals toward the mountain's root.`,
 ch:[
  {t:'Descend the deep stair',go:'deep'},
  {t:'Back up to the forge',go:'forge'},
 ]},
/* ===== CRYPT BRANCH ===== */
cold:{art:'❄️ 🕳️ 🌬️',
 text:()=>`The whispering tunnel drinks the heat from your torch. Frost furs the walls. The whispers aren't wind — they're voices, dozens of them, murmuring names. When you pass, they murmur yours.`,
 ch:[
  {t:'Press on to the iron door',go:'cryptDoor'},
  {t:'Back to the fork',go:'fork'},
 ]},
cryptDoor:{art:'🚪 🔥 🔒',
 text:()=>`A door of black iron seals the tunnel, embossed with a sigil shaped like a flame. There is no handle — only a keyhole with a flame-shaped bore. The metal is cold enough to burn skin.`,
 ch:[
  {t:'Unlock it with the Ember Key',if:g=>g.emberKey,req:'ember key',go:'tombs',note:'opened the sigil door'},
  {t:'Force it open',check:{dc:13,label:'Strength'},goS:'tombs',goF:'doorHurt'},
  {t:'Leave it sealed — back to the fork',go:'fork'},
 ]},
doorHurt:{art:'🚪 💢 🤕',
 text:()=>`You slam your shoulder into the iron. The door does not care. The frost on it bites through your clothes like teeth, and you stagger back with a dead arm and a bruised ego. (-3 HP)`,
 fx:g=>{hurt(3,'Frozen iron and stubbornness.');},
 ch:[
  {t:'Try again',check:{dc:13,label:'Strength'},goS:'tombs',goF:'doorHurt'},
  {t:'Give up on the door',go:'fork'},
 ]},
tombs:{art:'⚰️ ⚰️ ⚰️',
 text:()=>`Beyond the door: a crypt-hall of kings, or at least of people rich enough to be buried like them. Stone sarcophagi rank the walls, dusted with frost. The whispering is loudest here — and at the hall's end, a pale light waits like a held breath.`,
 ch:[
  {t:'Loot a sarcophagus',check:{dc:10,label:'Grave-robbing'},goS:'tombGold',goF:'skelFight'},
  {t:'Bow your head and pay respects',fx:g=>{g.courage++;},go:'tombPray',note:'+1 courage'},
  {t:'Approach the pale light',go:'ghost'},
 ]},
tombGold:{art:'⚰️ 💰 🤫',
 text:()=>`You ease a lid aside without waking whatever sleeps beneath. The occupant was buried with 8 gold coins on his eyes and chest — an extravagant fare for the ferryman. You relieve him of the burden. The whispers hiss, but nothing stirs.`,
 fx:g=>{g.gold+=8;},
 ch:[
  {t:'Try another one',check:{dc:12,label:'Grave-robbing'},goS:'tombGold2',goF:'skelFight'},
  {t:'Quit while ahead — the pale light',go:'ghost'},
 ]},
tombGold2:{art:'⚰️ 💰 💎',
 text:()=>`The second sarcophagus holds a noblewoman with a gem set in her breastplate and 5 gold besides. As you lift the gem, every whisper in the hall stops at once. You decide, wisely, that this was the last one.`,
 fx:g=>{g.gold+=5;g.gems++;},
 ch:[{t:'Slowly back away to the pale light',go:'ghost',note:'+5g, +1 gem'}]},
skelFight:{art:'⚰️ 💀 ⚔️',
 text:()=>`A sarcophagus lid EXPLODES off its base. The thing that sits up wears a rusted crown and a fleshless grin, and it is very interested in the hands that disturbed it.`,
 combat:{name:'Crypt Skeleton',emoji:'💀',hp:14,ac:12,dmg:4,win:'skelWin',flee:'cold',fleeDc:10}},
skelWin:{art:'💀 💥 👑',
 text:()=>`The skeleton comes apart like a dropped puzzle. Its rusted crown rolls to your feet — worthless iron — but the grave-goods beneath it are honest gold: 10 pieces.`,
 fx:g=>{g.gold+=10;},
 ch:[{t:'Gather it up and seek the pale light',go:'ghost',note:'+10g'}]},
tombPray:{art:'⚰️ 🙏 ✨',
 text:()=>`You stand a moment in silence for the dead of the deep. The whispering softens, gentles — and for a heartbeat, a hundred voices murmur thanks. The frost seems less cruel after that.`,
 ch:[{t:'Approach the pale light',go:'ghost'}]},
ghost:{art:'👻 💠 ❄️',
 text:()=>`The pale light is a woman — or the memory of one — hovering above a plain stone altar. Her eyes are holes into winter. "Living thing," she says, in a voice like a struck bell, "why do you walk among my dead?"`,
 ch:[
  {t:'"To face the dragon and make my legend."',check:{dc:10,cor:true,label:'Courage'},goS:'ghostBless',goF:'ghostFail'},
  {t:'"Honestly? For the gold."',go:'ghostHonest'},
  {t:'Turn and run',fx:g=>{if(g.courage>0)g.courage--;hurt(2,'Died of fright in the crypt.');},go:'cold',note:'-1 courage, -2 HP'},
 ]},
ghostBless:{art:'👻 ✨ 🙇',
 text:()=>`You say it without your voice shaking, and the ghost studies you for a long, cold moment. "So did my husband speak, once." She reaches out and touches your brow with a fingertip of moonlight. "Carry his luck. He has no use for it now." Warmth blooms behind your eyes. (BLESSING: +1 to all rolls)`,
 fx:g=>{g.blessing=true;g.courage++;},
 ch:[{t:'Bow, and descend the stair behind the altar',go:'deep',note:'BLESSED, +1 courage'}]},
ghostFail:{art:'👻 😔 ❄️',
 text:()=>`Your voice cracks on the word "dragon," and the ghost's gaze goes through you like a lance of ice. "Then you will die as he died — loudly." She fades, unimpressed. The cold she leaves behind takes something from you. (-3 HP)`,
 fx:g=>{hurt(3,'A ghost\'s disappointment is heavy.');},
 ch:[{t:'Shiver, and take the stair behind the altar',go:'deep'}]},
ghostHonest:{art:'👻 🪙 🤷',
 text:()=>`To your surprise, the ghost laughs — a sound like icicles chiming. "Honest, at least. The greedy dead down here were all liars first." She drifts aside from the altar. "A tip, then, from one fortune-seeker to another: the dragon counts his hoard in his sleep. Step only where he has already counted." She gestures to a stair behind the altar.`,
 ch:[
  {t:'Offer 10 gold on her altar',if:g=>g.gold>=10,req:'10g',fx:g=>{g.gold-=10;g.blessing=true;heal(20);},go:'altarBless',note:'BLESSED, healed'},
  {t:'Take the stair down',go:'deep'},
 ]},
altarBless:{art:'🪙 ✨ 💖',
 text:()=>`The coins sink into the stone like rain into sand. Light wells up in their place, pouring over you — every wound closes, every fear quiets. The ghost's voice, warmer now: "Luck to you, honest thief." (Fully healed, BLESSING: +1 to all rolls)`,
 ch:[{t:'Descend the stair, glowing faintly',go:'deep'}]},
/* ===== THE DEEP ===== */
deep:{art:'🕳️ ⬇️ 🌑',
 text:()=>{
  const gear=[G.flameSword?'a sword wreathed in flame':G.sword?'a good sword':'nothing but a torch',
   G.blessing?'a ghost\'s blessing':null,G.amulet?'a whispering amulet':null,G.emberKey?'the ember key':null]
   .filter(Boolean).join(', ');
  return `The deep stair ends in a cathedral of darkness — the mountain's root. Every path has led here. The air is warm and moves slowly, in and out, in and out... like breath. You carry ${gear}, ${G.gold} gold, and ${G.gems} gem${G.gems===1?'':'s'}. Ahead, a chasm crosses the path; beyond it, a faint golden glow.`;
 },
 ch:[
  {t:'Approach the chasm',go:'chasm'},
  {t:'Climb all the way back to daylight and quit',go:'escapeEarly'},
 ]},
chasm:{art:'🪨 🕳️ 🪨',
 text:()=>`The chasm is five strides of empty black — no bottom that your torchlight can find. The far ledge is level with yours. A rusted anchor-ring juts from the rock on this side, left by some ancient engineer.${G.amulet?' The amulet whispers: left, three paces — and you notice a hidden shelf of rock skirting the chasm wall, invisible from straight on.':''}`,
 ch:[
  {t:'Follow the amulet\'s hidden ledge',if:g=>g.amulet,req:'amulet',go:'guardian',note:'the amulet guided you'},
  {t:'Tie your rope to the ring and swing across',if:g=>g.rope,req:'rope',go:'guardian',note:'swung across'},
  {t:'Take a running leap',check:{dc:13,cor:true,label:'Leap'},goS:'guardian',goF:'ledge'},
  {t:'Turn back from the whole mad venture',go:'escapeEarly'},
 ]},
ledge:{art:'🧗 😰 🕳️',
 text:()=>`Your foot leaves the edge... and the edge takes most of your jump with it. You drop, slam onto a ledge ten feet down, and feel something in your ribs disagree with the arrangement. (-6 HP) Above, handholds lead back up to the far side.`,
 fx:g=>{hurt(6,'The chasm at the mountain\'s root.');},
 ch:[
  {t:'Climb up to the far side',check:{dc:9,label:'Climb'},goS:'guardian',goF:'ledgeSlip'},
 ]},
ledgeSlip:{art:'🧗 💢 🩸',
 text:()=>`A handhold crumbles and you kiss the rock face hard. (-3 HP) On the second try, bleeding and swearing in three languages, you haul yourself over the far lip of the chasm.`,
 fx:g=>{hurt(3,'The chasm was hungry.');},
 ch:[{t:'Lie there a moment, then stand',go:'guardian'}]},
guardian:{art:'🗿 🚪 ✨',
 text:()=>`Before the golden glow stands a door of stone, and before the door stands its Guardian: a golem of black basalt, twelve feet of patience. Runes burn faintly in its chest. "NONE PASS," it grinds, "SAVE THE WORTHY."${G.blessing?' Its rune-eyes flicker over you — and pause at the ghost-light on your brow.':''}`,
 ch:[
  {t:'Show the ghost\'s blessing',if:g=>g.blessing,req:'blessing',go:'golemKneel',note:'the golem knelt'},
  {t:'Fight the Guardian',go:'golemFight'},
  {t:'Dart between its legs',check:{dc:12,label:'Agility'},goS:'hoard',goF:'golemFight'},
 ]},
golemKneel:{art:'🗿 🙇 🚪',
 text:()=>`The golem's rune-eyes flare white. "HER MARK." Stone grinds against stone as the giant lowers itself to one knee, head bowed. "PASS, WORTHY ONE. THE HOARD LIES BEYOND. THE OWNER SLEEPS. LIGHTLY." The stone door swings wide of its own accord.`,
 ch:[{t:'Walk through, spine tingling',go:'hoard'}]},
golemFight:{art:'🗿 ⚔️ 💥',
 text:()=>`The golem raises fists like falling boulders. "THEN BE PROVEN."`,
 combat:{name:'Basalt Guardian',emoji:'🗿',hp:20,ac:14,dmg:6,win:'golemWin',flee:'chasm',fleeDc:11}},
golemWin:{art:'🗿 💥 🚪',
 text:()=>`Your final blow finds the rune at its heart. The Guardian freezes mid-swing — then bows its head. "PROVEN," it grinds, and crumbles into a kneeling cairn of rubble. The stone door swings open. In the rubble glitters a gem that was its eye.`,
 fx:g=>{g.gems++;heal(3);},
 ch:[{t:'Take the gem-eye and enter',go:'hoard',note:'+1 gem, +3 HP'}]},
hoard:{art:'💰 🐲 💰',
 text:()=>`You will tell this moment to your grandchildren, if you live to have any: a cavern like an inverted sky, and beneath it GOLD — dunes of it, reefs of it, a sea of coins and crowns and gem-crusted goblets. And rising from its center like a golden island: Vorstrag the dragon, asleep, each breath a slow furnace-roar. One eyelid is not quite closed.`,
 ch:[
  {t:'Quietly fill your pack',check:{dc:12,amu:true,label:'Stealth'},goS:'sneakGold',goF:'wake'},
  {t:'Wake the dragon and speak',if:g=>g.courage>=5,req:'courage 5+',go:'dragonTalk'},
  {t:'Attack the sleeping dragon',go:'dragonFight'},
  {t:'Back away slowly and leave the mountain',go:'escape'},
 ]},
sneakGold:{art:'🤫 💰 💰',
 text:()=>`Step only where he has already counted. You move through the hoard like a rumor, lifting 25 gold and two fat gems without a single coin-clink. The dragon's breath never changes. Your pack is heavy. Your heart says: more. Your brain says: OUT.`,
 fx:g=>{g.gold+=25;g.gems+=2;},
 ch:[
  {t:'Grab one more armload',check:{dc:14,amu:true,label:'Greed'},goS:'sneakGreed',goF:'wake'},
  {t:'Listen to your brain — slip away',go:'escape',note:'+25g, +2 gems'},
 ]},
sneakGreed:{art:'🤑 💰 💎',
 text:()=>`One more armload becomes two. 20 more gold, another gem — and your hand closes on a goblet a half-second before you notice it's resting against the dragon's tail. You set it down with the delicacy of a bomb-defuser and tiptoe for the exit, rich beyond argument.`,
 fx:g=>{g.gold+=20;g.gems++;},
 ch:[{t:'OUT. NOW.',go:'escape',note:'+20g, +1 gem'}]},
dragonTalk:{art:'🐲 👁️ 🗣️',
 text:()=>`You clear your throat. LOUDLY. The eye opens — a furnace door swinging wide — and Vorstrag's head rises on a neck like a siege tower. "A mouse," he rumbles, "that RINGS ITS OWN DINNER BELL." He studies you, and something like amusement kindles. "Brave mouse. I eat the crawling kind and sport with the bold. A riddle, then, for your life and a prize: The more of me you take, the more you leave behind. What am I?"`,
 ch:[
  {t:'"Gold."',go:'dragonWrath'},
  {t:'"Footsteps."',go:'dragonGift'},
  {t:'"Time."',go:'dragonWrath'},
 ]},
dragonGift:{art:'🐲 👑 ✨',
 text:()=>`"Footsteps." The dragon's laugh starts avalanches somewhere above. "CORRECT, mouse. Four hundred years, and only you and one dwarf ever got it." He hooks one claw into the hoard and flicks something at your feet: a crown of white gold, dragon-marked. "The crown of the last king who bored me. Wear it home. Tell them Vorstrag honors courage — and eats everything else. GO."`,
 fx:g=>{g.crown=true;g.courage+=2;},
 ch:[{t:'Take the Dragon\'s Crown and walk out tall',go:'eLegend',note:'CROWN OF VORSTRAG!'}]},
dragonWrath:{art:'🐲 🔥 😱',
 text:()=>`The silence stretches. "Wrong," Vorstrag says, almost sadly, "and I so rarely get to sport." Heat builds in his throat like a rising sun.`,
 ch:[
  {t:'Fight the dragon!',go:'dragonFight'},
  {t:'Dive behind the hoard and flee!',check:{dc:11,cor:true,label:'Escape'},goS:'fleeFire',goF:'deathFire'},
 ]},
wake:{art:'🐲 ‼️ 🔥',
 text:()=>`A single coin slides from your pack and rings against a shield like a struck bell. The furnace-breath STOPS. When you turn, the eye is open, and the pupil is a slit of black in a lake of molten gold. "Thief," says Vorstrag, in a voice that makes the hoard vibrate, "you are standing in my counting."`,
 ch:[
  {t:'Fight!',go:'dragonFight'},
  {t:'Run for the door!',check:{dc:11,cor:true,label:'Escape'},goS:'fleeFire',goF:'deathFire'},
  {t:'Drop all your gems as tribute',if:g=>g.gems>0,req:'gems',fx:g=>{g.gems=0;},go:'tribute',note:'gave up all gems'},
 ]},
tribute:{art:'💎 🐲 😮‍💨',
 text:()=>`You upend your pouch and the gems scatter across the hoard like dew. Vorstrag's eye follows each one. "Hm. Taste," he allows. "The mouse pays rent." The great head settles back down. "Keep the coins. Gems soothe me. Leave before I reconsider the arithmetic."`,
 ch:[{t:'Leave. Briskly.',go:'escape'}]},
fleeFire:{art:'🏃 🔥 💨',
 text:()=>`You run as flame turns the world orange behind you. The heat shaves the hair off the back of your neck and the door's stone frame glows cherry-red as you dive through. (-4 HP) Behind you, a voice like a landslide: "FASTER THAN THE LAST ONE. HMPH."`,
 fx:g=>{hurt(4,'Almost outran a dragon. Almost.');},
 ch:[{t:'Keep running until you see stars — the real ones',go:'escape'}]},
deathFire:{art:'🔥 🔥 🔥',
 text:()=>`You are fast. Dragonfire is faster.`,
 fx:g=>{hurt(999,'Vorstrag\'s fire. It was quick.');},
 ch:[{t:'...',go:'eDeath'}]},
dragonFight:{art:'🐲 ⚔️ 🔥',
 text:()=>{
  return G.flameSword?
   `Vorstrag rears, wings scraping the cavern roof — then sees your blade, and its fire, HIS kind of fire. For the first time in four centuries, the dragon hesitates. "...The forge," he breathes. "Clever mouse." BATTLE!`:
   `Vorstrag rears to his full, impossible height. Your ${G.sword?'plain steel':'torch'} suddenly feels like a toothpick. The hermit's warning rings in your skull: flame won't bite him — unless it's his own kind of flame. Too late now. BATTLE!`;
 },
 combat:{name:'Vorstrag the Golden',emoji:'🐲',hp:30,ac:15,dmg:7,win:'dragonWin',flee:'fleeFire',fleeDc:12,dragon:true}},
dragonWin:{art:'🐲 💀 👑',
 text:()=>`The flame-blade slides between two golden scales, and the mountain's root SHAKES as Vorstrag falls. The furnace-eyes dim to embers, and — impossibly — the dragon chuckles. "The forge... always knew... it would be the forge." The light goes out. You stand alone atop the greatest hoard in the world. All of it. Yours.`,
 fx:g=>{g.dragonSlain=true;g.gold+=100;g.gems+=5;g.crown=true;},
 ch:[{t:'Claim the hoard and the crown',go:'eLegend',note:'DRAGONSLAYER'}]},
/* ===== ENDINGS ===== */
escapeEarly:{art:'🕳️ ⬆️ 🌙',
 text:()=>`Some treasures aren't worth the teeth guarding them. You climb back through the whispering dark, past your own footprints, and out into a night that smells of pine and woodsmoke. The hermit raises an eyebrow. "Back already? And breathing? That's rarer than gold, that is."`,
 ch:[{t:'Count your takings',go:'escape'}]},
escape:{art:'🌙 ⛰️ 🌲',
 text:()=>{
  const w=wealth();
  return `The climb out takes half the night. When you finally stumble into the open, dawn is bleeding over the eastern peaks and the pines smell like a second chance. You empty your pack by the hermit's fire: ${G.gold} gold, ${G.gems} gem${G.gems===1?'':'s'} — ${w} gold in all. The hermit whistles${w>=60?' long and low':''}.`;
 },
 ch:[{t:'So ends the delve',go:()=>wealth()>=60?'eRich':'ePoor'}]},
ePoor:{art:'🌅 🚶 🪙',
 text:()=>`ENDING: THE SURVIVOR. You walk into town with ${wealth()} gold's worth of loot, a dozen new scars, and a story nobody quite believes. It's not wealth. But every night for the rest of your long, ordinary, WONDERFUL life, you'll sit by the fire and remember: the pool that glowed, the ghost's cold eyes, the breathing dark. You went down. You came back. Most don't.`,
 ending:'survivor',
 ch:[{t:'▶ Delve again',go:'RESTART'}]},
eRich:{art:'💰 🏡 🎉',
 text:()=>`ENDING: THE FORTUNE. ${wealth()} gold buys a farmhouse, an orchard, a seat at the merchants' table, and the loudest round of drinks the village has ever seen. They call you "Coinpurse" now, and ask about the dragon. You always smile and say the same thing: "He can keep the rest. We had an understanding." Sometimes, on cold nights, you'd swear you hear counting.`,
 ending:'rich',
 ch:[{t:'▶ Delve again',go:'RESTART'}]},
eLegend:{art:'👑 🐲 ⭐',
 text:()=>G.dragonSlain?
  `ENDING: THE DRAGONSLAYER. You walk out of the mountain at dawn wearing a dead king's crown, dragging a king's ransom, with dragonfire dancing on your blade. Bards will fight duels over who gets to sing this. Kings will pretend they knew you when. And in four hundred years, when the next brave fool climbs down into the dark, it will be YOUR name the whispers murmur. LEGENDARY.`:
  `ENDING: FRIEND OF DRAGONS. You return wearing the Crown of Vorstrag — given, not taken, which the wise agree is infinitely harder. No army will ever march on your town; no thief will ever touch your door. Once a year you climb down with a sack of gems and a harder riddle, and the mountain's root rumbles with laughter that starts avalanches. LEGENDARY.`,
 ending:'legendary',
 ch:[{t:'▶ Delve again',go:'RESTART'}]},
eDeath:{art:'💀 🕯️ 🕳️',
 text:()=>`ENDING: DEATH. ${G.deathReason} The cavern adds your name to its whispers, your gold to its floor, and your warning to its silence. The hermit, come spring, will sell your ghost a cup of tea and ask how it went. Every delver dies somewhere. You died HERE, ${wealth()} gold from the sunlight, and the mountain remembers you fondly.`,
 ending:'death',
 ch:[{t:'▶ Rise again (new delve)',go:'RESTART'}]},
};

/* ---------- engine ---------- */
let typing=false,typeTimer=null,fullText='',curCombat=null,busy=false;
const storyEl=$('story'),choicesEl=$('choices'),artEl=$('art'),histEl=$('hist');

function refreshStats(){
  $('hpTxt').textContent=G.hp+'/'+G.maxHp;
  $('goldTxt').textContent=G.gold;
  $('corTxt').textContent=G.courage;
  const inv=[];
  if(G.torch)inv.push('🔥');
  if(G.rope)inv.push('🪢');
  if(G.flameSword)inv.push('⚔️🔥');else if(G.sword)inv.push('🗡️');
  if(G.potions)inv.push('🧪×'+G.potions);
  if(G.gems)inv.push('💎×'+G.gems);
  if(G.amulet)inv.push('📿');
  if(G.emberKey)inv.push('🗝️');
  if(G.blessing)inv.push('✨');
  if(G.crown)inv.push('👑');
  $('inv').textContent=inv.join(' ');
}
function addHist(html){
  const d=document.createElement('div');
  d.innerHTML=html;
  histEl.appendChild(d);
  while(histEl.children.length>80)histEl.removeChild(histEl.firstChild);
  histEl.scrollTop=histEl.scrollHeight;
  if(G){G.history.push(d.textContent);if(G.history.length>80)G.history.shift();}
}
function restoreHist(){
  histEl.innerHTML='';
  (G.history||[]).forEach(h=>{
    const d=document.createElement('div');d.textContent=h;histEl.appendChild(d);
  });
  histEl.scrollTop=histEl.scrollHeight;
}
function typeText(txt,done){
  clearInterval(typeTimer);
  typing=true;fullText=txt;
  storyEl.innerHTML='<span class="cur"></span>';
  const span=storyEl.querySelector('.cur');
  let i=0;
  typeTimer=setInterval(()=>{
    if(i>=txt.length){finishType(done);return;}
    span.textContent=txt.slice(0,++i);
    if(i%3===0)sfxType();
    storyEl.scrollTop=storyEl.scrollHeight;
  },16);
  storyEl._done=done;
}
function finishType(done){
  clearInterval(typeTimer);typing=false;
  storyEl.innerHTML='<span>'+escapeHtml(fullText)+'</span>';
  (done||storyEl._done||function(){})();
}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;');}
storyEl.addEventListener('click',()=>{if(typing)finishType();});

function goto(id){
  if(id==='RESTART'){
    const endings=G.endings;
    G=freshState();G.endings=endings;
    save();showScene('start');
    return;
  }
  showScene(id);
}
function showScene(id){
  if(G.hp<=0&&id!=='eDeath'&&!SC[id].ending){id='eDeath';}
  G.scene=id;
  const sc=SC[id];
  if(!sc){storyEl.textContent='The path crumbles... (missing scene '+id+')';return;}
  if(sc.ending&&!G.endings.includes(sc.ending)){G.endings.push(sc.ending);}
  if(sc.ending){G.done=true;}
  save();
  curCombat=null;
  artEl.textContent=sc.art;
  choicesEl.innerHTML='';
  if(sc.fx)sc.fx(G);
  refreshStats();
  if(G.hp<=0&&!sc.ending){showScene('eDeath');return;}
  const txt=typeof sc.text==='function'?sc.text():sc.text;
  if(sc.combat){
    typeText(txt,()=>startCombat(sc.combat));
  }else{
    typeText(txt,()=>renderChoices(sc));
  }
  save();
}
function renderChoices(sc){
  choicesEl.innerHTML='';
  let n=0;
  sc.ch.forEach(c=>{
    if(c.if&&!c.if(G))return;
    n++;
    const b=document.createElement('button');
    let label='<b>'+n+'.</b> '+escapeHtml(c.t);
    if(c.req)label+=' <span class="req">['+c.req+']</span>';
    if(c.check)label+=' <span class="dc">🎲 '+c.check.label+' DC'+c.check.dc+(c.check.cor?' (+courage)':'')+(c.check.amu&&G.amulet?' (+amulet)':'')+'</span>';
    b.innerHTML=label;
    b.addEventListener('click',()=>pickChoice(c));
    choicesEl.appendChild(b);
  });
}
function pickChoice(c){
  if(busy||typing)return;
  sfxPick();
  addHist('→ '+c.t);
  if(c.fx)c.fx(G);
  if(c.note)addHist('<span class="chk-s">'+c.note+'</span>');
  refreshStats();
  if(G.hp<=0){showScene('eDeath');return;}
  if(c.check){
    let mod=(c.check.cor?corMod():(G.blessing?1:0))+((c.check.amu&&G.amulet)?2:0);
    rollDie(mod,c.check.dc,ok=>{
      if(ok){
        if(c.fxS)c.fxS(G);
        if(c.noteS)addHist('<span class="chk-s">'+c.noteS+'</span>');
        goCh(c.goS);
      }else{
        if(c.fxF)c.fxF(G);
        if(c.noteF)addHist('<span class="chk-f">'+c.noteF+'</span>');
        goCh(c.goF);
      }
    });
  }else{
    goCh(c.go);
  }
}
function goCh(g){
  if(typeof g==='function')g=g();
  goto(g);
}

/* ---------- d20 ---------- */
const dieCv=$('dieCv'),dieCx=dieCv.getContext('2d');
function drawDie(num,rot,col){
  dieCx.clearRect(0,0,130,130);
  dieCx.save();
  dieCx.translate(65,65);dieCx.rotate(rot);
  dieCx.fillStyle='#1e1b4b';
  dieCx.strokeStyle=col||'#a78bfa';dieCx.lineWidth=3;
  // d20-ish: draw hexagon w/ inner triangle
  dieCx.beginPath();
  for(let i=0;i<6;i++){
    const a=i*Math.PI/3-Math.PI/2;
    dieCx[i?'lineTo':'moveTo'](Math.cos(a)*52,Math.sin(a)*52);
  }
  dieCx.closePath();dieCx.fill();dieCx.stroke();
  dieCx.beginPath();
  for(let i=0;i<3;i++){
    const a=i*2*Math.PI/3-Math.PI/2;
    dieCx[i?'lineTo':'moveTo'](Math.cos(a)*52,Math.sin(a)*52);
  }
  dieCx.closePath();dieCx.stroke();
  dieCx.restore();
  dieCx.fillStyle=col||'#ede9fe';
  dieCx.font='bold 34px "Courier New",monospace';
  dieCx.textAlign='center';dieCx.textBaseline='middle';
  dieCx.fillText(num,65,68);
}
function rollDie(mod,dc,cb){
  busy=true;
  $('dieWrap').style.display='flex';
  $('dieRes').textContent='';
  $('dieRes').style.color='#a78bfa';
  const final=1+Math.floor(Math.random()*20);
  let t0=performance.now();
  function spin(ts){
    const el=ts-t0;
    if(el<1000){
      drawDie(1+Math.floor(Math.random()*20),el/120+Math.sin(el/60),'#a78bfa');
      if(Math.random()<0.5)sfxRoll();
      requestAnimationFrame(spin);
    }else{
      const total=final+mod,ok=total>=dc;
      drawDie(final,0,ok?'#4ade80':'#f87171');
      $('dieRes').style.color=ok?'#4ade80':'#f87171';
      $('dieRes').textContent=final+(mod?(mod>0?' + '+mod:' − '+(-mod)):'')+' = '+total+' vs DC '+dc+(ok?'  ✓ SUCCESS':'  ✗ FAIL');
      addHist('🎲 <span class="'+(ok?'chk-s':'chk-f')+'">'+final+(mod?'+'+mod:'')+' vs DC'+dc+(ok?' ✓':' ✗')+'</span>');
      if(ok)sfxGood();else sfxBad();
      setTimeout(()=>{
        $('dieWrap').style.display='none';
        busy=false;cb(ok);
      },1100);
    }
  }
  requestAnimationFrame(spin);
}

/* ---------- combat ---------- */
function startCombat(def){
  curCombat={name:def.name,emoji:def.emoji,hp:def.hp,maxHp:def.hp,ac:def.ac,dmg:def.dmg,
    win:def.win,flee:def.flee,fleeDc:def.fleeDc,dragon:def.dragon};
  renderCombat('');
}
function renderCombat(msg){
  const c=curCombat;
  artEl.textContent='🧑 ⚔️ '+c.emoji;
  const hpBar='█'.repeat(Math.max(0,Math.ceil(c.hp/c.maxHp*10)))+'░'.repeat(10-Math.max(0,Math.ceil(c.hp/c.maxHp*10)));
  storyEl.innerHTML='<span><b style="color:#f87171">'+c.name+'</b> — '+hpBar+' '+Math.max(0,c.hp)+'/'+c.maxHp+' HP<br>'+
    (msg?escapeHtml(msg):'It watches for an opening...')+'<br><span style="color:#8f8fb3;font-size:12px">your attack: d20+'+atkMod()+' vs AC '+c.ac+' · your HP: '+G.hp+'</span></span>';
  choicesEl.innerHTML='';
  const mk=(label,fn)=>{
    const b=document.createElement('button');b.innerHTML=label;
    b.addEventListener('click',fn);choicesEl.appendChild(b);
  };
  mk('<b>1.</b> ⚔️ Attack! <span class="dc">🎲 d20+'+atkMod()+' vs AC'+c.ac+'</span>',()=>combatAttack());
  if(G.potions>0)mk('<b>2.</b> 🧪 Drink potion (+8 HP, '+G.potions+' left)',()=>combatPotion());
  if(c.flee)mk('<b>3.</b> 🏃 Flee <span class="dc">🎲 DC'+c.fleeDc+'</span>',()=>combatFlee());
}
function enemyHits(){
  const c=curCombat;
  const dmg=c.dmg+Math.floor(Math.random()*3);
  sfxHit();
  if(hurt(dmg,c.dragon?'Vorstrag\'s claws and fire.':('Slain by the '+c.name.toLowerCase()+'.'))){
    refreshStats();showScene('eDeath');return true;
  }
  refreshStats();
  return dmg;
}
function combatAttack(){
  if(busy)return;
  const c=curCombat;
  addHist('→ attack the '+c.name);
  rollDie(atkMod(),c.ac,ok=>{
    if(!curCombat)return;
    if(ok){
      const dmg=atkDmg();
      c.hp-=dmg;
      if(c.hp<=0){
        addHist('<span class="chk-s">'+c.name+' defeated!</span>');
        sfxWin();curCombat=null;showScene(c.win);return;
      }
      const back=enemyHits();
      if(back===true)return;
      renderCombat('Your blow lands for '+dmg+'! It rakes you back for '+back+'.');
    }else{
      const back=enemyHits();
      if(back===true)return;
      renderCombat('You miss — and pay for it: -'+back+' HP.');
    }
  });
}
function combatPotion(){
  if(busy)return;
  G.potions--;heal(8);sfxGood();
  addHist('→ drank a potion (+8 HP)');
  refreshStats();
  const back=enemyHits();
  if(back===true)return;
  renderCombat('The potion knits your wounds (+8) but the beast strikes: -'+back+' HP.');
}
function combatFlee(){
  if(busy)return;
  const c=curCombat;
  addHist('→ flee from the '+c.name);
  rollDie(corMod(),c.fleeDc,ok=>{
    if(ok){
      addHist('<span class="chk-s">escaped!</span>');
      curCombat=null;showScene(c.flee);
    }else{
      const back=enemyHits();
      if(back===true)return;
      renderCombat('It cuts off your escape! -'+back+' HP.');
    }
  });
}

/* ---------- keyboard ---------- */
addEventListener('keydown',e=>{
  if($('title').style.display!=='none'){
    if(e.key==='Enter'||e.key===' '){e.preventDefault();startGame(false);}
    if(e.key==='n'||e.key==='N'){startGame(true);}
    return;
  }
  if(e.key==='Enter'||e.key===' '){
    e.preventDefault();
    if(typing){finishType();return;}
  }
  const n=parseInt(e.key,10);
  if(n>=1&&n<=9&&!typing&&!busy){
    const btns=choicesEl.querySelectorAll('button');
    if(btns[n-1])btns[n-1].click();
  }
});

/* ---------- title / boot ---------- */
function startGame(forceNew){
  initAudio();
  $('title').style.display='none';
  if(!forceNew&&savedMeta&&!savedMeta.done){
    G=savedMeta;
    if(!Array.isArray(G.history))G.history=[];
    if(!Array.isArray(G.endings))G.endings=[];
    restoreHist();
    addHist('— resumed the delve —');
    showScene(G.scene&&SC[G.scene]?G.scene:'start');
  }else{
    const endings=(savedMeta&&savedMeta.endings)||[];
    G=freshState();G.endings=endings;
    save();
    showScene('start');
  }
}
(function initTitle(){
  if(savedMeta&&!savedMeta.done){
    const sc=SC[savedMeta.scene];
    $('contTxt').textContent='CONTINUE — ♥'+savedMeta.hp+' · 💰'+savedMeta.gold+' · deep in the cavern';
    $('newgTxt').textContent='press N for a fresh delve';
  }else if(savedMeta&&savedMeta.endings&&savedMeta.endings.length){
    $('contTxt').textContent='endings found: '+savedMeta.endings.join(', ')+' ('+savedMeta.endings.length+'/4)';
  }
  $('title').addEventListener('click',()=>startGame(false));
})();
// pre-render something rich behind title
G=freshState();
refreshStats();
storyEl.innerHTML='<span>'+escapeHtml('The cavern waits...')+'</span>';
</script>
