<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codebreaker — Wizzed Arcade</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    background: #0f0f1a;
    color: #efe0ff;
    font-family: 'Courier New', ui-monospace, monospace;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 6px 10px 14px; overflow-x: hidden;
  }
  a.back {
    position: fixed; top: 10px; left: 12px; z-index: 60;
    color: #7f7fa8; text-decoration: none; font-size: 12px; letter-spacing: 1px;
    padding: 4px 9px; border: 1px solid #26264a; border-radius: 6px;
    background: rgba(15,15,26,.85);
  }
  a.back:hover { color: #b44dff; border-color: #b44dff; box-shadow: 0 0 8px rgba(180,77,255,.4); }
  h1 {
    margin-top: 2px; font-size: clamp(16px, 3.4vmin, 24px); letter-spacing: 4px;
    color: #f6ecff; text-shadow: 0 0 8px #b44dff, 0 0 24px rgba(180,77,255,.55);
  }
  .controls { display: flex; gap: 6px; margin: 5px 0 4px; flex-wrap: wrap; justify-content: center; align-items: center; }
  .controls .lab { font-size: 10px; color: #6f6f9a; letter-spacing: 1px; }
  .controls button {
    font-family: inherit; font-size: 10px; letter-spacing: 1px; cursor: pointer;
    background: #16162e; color: #9a9ac8; border: 1px solid #2c2c55;
    padding: 4px 9px; border-radius: 6px;
  }
  .controls button.on {
    color: #b44dff; border-color: #b44dff;
    box-shadow: 0 0 8px rgba(180,77,255,.5), inset 0 0 6px rgba(180,77,255,.15);
    text-shadow: 0 0 5px #b44dff;
  }
  .status { font-size: clamp(11px, 2.2vmin, 14px); letter-spacing: 1px; margin: 2px 0 4px; min-height: 17px; color: #dcc3ff; text-shadow: 0 0 6px rgba(180,77,255,.45); text-align: center; }
  .panel {
    position: relative;
    background: #12122400; display: flex; flex-direction: column; align-items: center;
  }
  .secret {
    display: flex; gap: 6px; padding: 5px 10px; margin-bottom: 5px;
    border: 1px dashed #4d2a73; border-radius: 8px; background: #151529;
    box-shadow: 0 0 12px rgba(180,77,255,.2);
  }
  .stile {
    width: clamp(20px, 4.6vh, 34px); height: clamp(20px, 4.6vh, 34px);
    border-radius: 50%; background: #241a3a; border: 2px solid #4d2a73;
    display: flex; align-items: center; justify-content: center;
    color: #b44dff; font-weight: bold; font-size: clamp(11px, 2.6vh, 18px);
    transition: transform .15s linear;
  }
  .stile.mid { transform: rotateY(90deg); }
  #rows { display: flex; flex-direction: column-reverse; gap: 3px; }
  .grow {
    display: flex; align-items: center; gap: 8px;
    padding: 2px 8px; border-radius: 7px; border: 1px solid #22224200;
  }
  .grow.active { border-color: #b44dff; background: rgba(180,77,255,.07); box-shadow: 0 0 10px rgba(180,77,255,.25); }
  .grow .num { width: 18px; font-size: 10px; color: #55557a; text-align: right; }
  .grow .slots { display: flex; gap: 6px; }
  .slot {
    width: clamp(16px, 3.6vh, 28px); height: clamp(16px, 3.6vh, 28px);
    border-radius: 50%; background: #1b1b33; border: 2px solid #2e2e55; cursor: default;
  }
  .grow.active .slot { cursor: pointer; border-color: #4d4d85; }
  .slot.filled { border-color: rgba(255,255,255,.6); box-shadow: 0 0 7px rgba(255,255,255,.25), inset 0 -2px 3px rgba(0,0,0,.4); }
  .fb { display: grid; grid-template-columns: repeat(2, 1fr); gap: 3px; width: 26px; }
  .peg {
    width: clamp(7px, 1.5vh, 11px); height: clamp(7px, 1.5vh, 11px);
    border-radius: 50%; background: #1b1b33; border: 1px solid #2e2e55;
  }
  .peg.exact { background: #ff2d78; border-color: #ff2d78; box-shadow: 0 0 6px #ff2d78; }
  .peg.partial { background: transparent; border-color: #f0f0ff; box-shadow: 0 0 5px rgba(240,240,255,.6); }
  .palette { display: flex; gap: 7px; margin-top: 7px; flex-wrap: wrap; justify-content: center; }
  .pal {
    width: clamp(24px, 5vh, 38px); height: clamp(24px, 5vh, 38px);
    border-radius: 50%; border: 2px solid rgba(255,255,255,.35); cursor: pointer;
    box-shadow: 0 0 8px rgba(255,255,255,.15), inset 0 -3px 5px rgba(0,0,0,.4);
    transition: transform .1s ease;
  }
  .pal:hover { transform: scale(1.12); }
  .pal:active { transform: scale(.94); }
  .actbtn {
    font-family: inherit; font-size: 12px; letter-spacing: 1px; cursor: pointer;
    background: #16162e; color: #dcc3ff; border: 2px solid #4d2a73; border-radius: 8px;
    padding: 0 12px; height: clamp(24px, 5vh, 38px);
  }
  .actbtn:hover { border-color: #b44dff; box-shadow: 0 0 8px rgba(180,77,255,.4); }
  .actbtn:disabled { opacity: .35; cursor: default; box-shadow: none; }
  .hint-line { margin-top: 7px; font-size: 10px; color: #6f6f9a; letter-spacing: 1px; text-align: center; }
  .hint-line .ex { color: #ff2d78; }
  .hint-line .pa { color: #f0f0ff; }
  .hint-line span.w { color: #b44dff; }
  .overlay {
    position: absolute; inset: -6px; z-index: 40; border-radius: 12px;
    background: rgba(12,8,20,.92);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    animation: fadein .3s ease;
  }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  .overlay.hidden { display: none; }
  .overlay .msg {
    font-size: clamp(19px, 4.6vmin, 30px); letter-spacing: 4px; color: #f6ecff; text-align: center; padding: 0 8px;
    text-shadow: 0 0 10px #b44dff, 0 0 30px rgba(180,77,255,.7);
  }
  .overlay .sub { font-size: 12px; color: #9a8ac8; letter-spacing: 2px; text-align: center; }
  .overlay .codeShow { display: flex; gap: 8px; }
  .overlay .codeShow .stile { transform: none; }
  .overlay button {
    font-family: inherit; font-size: 14px; letter-spacing: 3px; cursor: pointer;
    background: #2a0e3d; color: #d9a8ff; border: 2px solid #b44dff; border-radius: 8px;
    padding: 10px 22px; text-shadow: 0 0 6px #b44dff;
    box-shadow: 0 0 14px rgba(180,77,255,.5);
  }
  .overlay button:hover { background: #3d1457; }
</style>
</head>
<body>
<a class="back" href="../index.html">← Arcade</a>
<h1>CODEBREAKER</h1>
<div class="controls">
  <span class="lab">COLORS</span>
  <button id="c6" class="on">6</button>
  <button id="c8">8</button>
  <span class="lab">REPEATS</span>
  <button id="repOn" class="on">ON</button>
  <button id="repOff">OFF</button>
  <button id="newBtn">NEW CODE</button>
</div>
<div class="status" id="status">Crack the hidden 4-color code — 10 tries</div>
<div class="panel">
  <div class="secret" id="secret"></div>
  <div id="rows"></div>
  <div class="palette" id="palette"></div>
  <div id="overlay" class="overlay hidden">
    <div class="msg" id="ovMsg">CRACKED!</div>
    <div class="codeShow" id="codeShow"></div>
    <div class="sub" id="ovSub"></div>
    <button id="again">PLAY AGAIN</button>
  </div>
</div>
<div class="hint-line"><span class="ex">●</span> right color, right spot · <span class="pa">○</span> right color, wrong spot · keys 1–8, ⌫, enter · lifetime wins: <span class="w" id="tot">0</span></div>
<script>
(function () {
  'use strict';
  var $ = function (id) { return document.getElementById(id); };

  /* ---------- audio ---------- */
  var AC = null;
  function initAudio() {
    if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { AC = null; } }
    if (AC && AC.state === 'suspended') { AC.resume(); }
  }
  function sfx(freq, dur, type, vol, when) {
    if (!AC) return;
    try {
      var t = AC.currentTime + (when || 0);
      var o = AC.createOscillator(), g = AC.createGain();
      o.type = type || 'square'; o.frequency.value = freq;
      g.gain.setValueAtTime(vol || 0.04, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + (dur || 0.08));
      o.connect(g); g.connect(AC.destination);
      o.start(t); o.stop(t + (dur || 0.08) + 0.05);
    } catch (e) { /* noop */ }
  }
  document.addEventListener('pointerdown', initAudio, true);
  document.addEventListener('keydown', initAudio, true);

  var LSKEY = 'wizzed-codebreaker';
  function getWins() { try { return parseInt(localStorage.getItem(LSKEY), 10) || 0; } catch (e) { return 0; } }
  function addWin() { try { localStorage.setItem(LSKEY, String(getWins() + 1)); } catch (e) { /* noop */ } }

  /* ---------- config + state ---------- */
  var COLORS = ['#ff4757', '#ff9f1a', '#ffe74c', '#2ed573', '#3742fa', '#00e5ff', '#a55eea', '#ff6ec7'];
  var NAMES = ['red', 'orange', 'yellow', 'green', 'blue', 'cyan', 'purple', 'pink'];
  var MAX_TRIES = 10, CODE_LEN = 4;
  var numColors = 6, repeats = true;
  var code, attempt, current, over, revealTimers = [];

  var rowsEl = $('rows'), secretEl = $('secret'), paletteEl = $('palette');
  var rowEls = [];

  function later(fn, ms) { revealTimers.push(setTimeout(fn, ms)); }
  function clearTimers() {
    for (var i = 0; i < revealTimers.length; i++) clearTimeout(revealTimers[i]);
    revealTimers = [];
  }

  /* ---------- build UI ---------- */
  function buildSecret() {
    secretEl.innerHTML = '';
    for (var i = 0; i < CODE_LEN; i++) {
      var t = document.createElement('div');
      t.className = 'stile';
      t.textContent = '?';
      secretEl.appendChild(t);
    }
  }

  function buildRows() {
    rowsEl.innerHTML = '';
    rowEls = [];
    for (var r = 0; r < MAX_TRIES; r++) {
      var row = document.createElement('div');
      row.className = 'grow';
      var num = document.createElement('div');
      num.className = 'num';
      num.textContent = String(r + 1);
      row.appendChild(num);
      var slots = document.createElement('div');
      slots.className = 'slots';
      var slotEls = [];
      for (var s = 0; s < CODE_LEN; s++) {
        var sl = document.createElement('div');
        sl.className = 'slot';
        sl.setAttribute('data-s', String(s));
        (function (rr, ss) {
          sl.addEventListener('click', function () { onSlotClick(rr, ss); });
        })(r, s);
        slots.appendChild(sl);
        slotEls.push(sl);
      }
      row.appendChild(slots);
      var fb = document.createElement('div');
      fb.className = 'fb';
      var pegEls = [];
      for (var p = 0; p < CODE_LEN; p++) {
        var pe = document.createElement('div');
        pe.className = 'peg';
        fb.appendChild(pe);
        pegEls.push(pe);
      }
      row.appendChild(fb);
      rowsEl.appendChild(row);
      rowEls.push({ row: row, slots: slotEls, pegs: pegEls });
    }
  }

  function buildPalette() {
    paletteEl.innerHTML = '';
    for (var i = 0; i < numColors; i++) {
      var b = document.createElement('button');
      b.className = 'pal';
      b.style.background = 'radial-gradient(circle at 34% 30%, rgba(255,255,255,.75), ' + COLORS[i] + ' 55%)';
      b.style.boxShadow = '0 0 10px ' + COLORS[i] + '66, inset 0 -3px 5px rgba(0,0,0,.4)';
      b.title = NAMES[i] + ' (' + (i + 1) + ')';
      b.setAttribute('aria-label', NAMES[i]);
      (function (idx) {
        b.addEventListener('click', function () { pickColor(idx); });
      })(i);
      paletteEl.appendChild(b);
    }
    var del = document.createElement('button');
    del.className = 'actbtn';
    del.textContent = '⌫';
    del.addEventListener('click', delColor);
    paletteEl.appendChild(del);
    var ok = document.createElement('button');
    ok.className = 'actbtn';
    ok.id = 'okBtn';
    ok.textContent = 'OK';
    ok.addEventListener('click', submitGuess);
    paletteEl.appendChild(ok);
  }

  /* ---------- game flow ---------- */
  function genCode() {
    var out = [];
    if (repeats) {
      for (var i = 0; i < CODE_LEN; i++) out.push(Math.floor(Math.random() * numColors));
    } else {
      var pool = [];
      for (i = 0; i < numColors; i++) pool.push(i);
      for (i = pool.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
      }
      out = pool.slice(0, CODE_LEN);
    }
    return out;
  }

  function newGame() {
    clearTimers();
    code = genCode();
    attempt = 0;
    current = [];
    over = false;
    buildSecret();
    buildRows();
    buildPalette();
    $('overlay').classList.add('hidden');
    setActive();
    updateStatus();
    $('tot').textContent = String(getWins());
  }

  function updateStatus(msg) {
    if (msg) { $('status').textContent = msg; return; }
    $('status').textContent = 'Try ' + (attempt + 1) + ' of ' + MAX_TRIES +
      ' — ' + numColors + ' colors, repeats ' + (repeats ? 'ON' : 'OFF');
  }

  function setActive() {
    for (var r = 0; r < MAX_TRIES; r++) rowEls[r].row.classList.toggle('active', r === attempt && !over);
    var ok = $('okBtn');
    if (ok) ok.disabled = over || current.length !== CODE_LEN;
  }

  function renderCurrent() {
    var re = rowEls[attempt];
    if (!re) return;
    for (var s = 0; s < CODE_LEN; s++) {
      var sl = re.slots[s];
      if (s < current.length) {
        sl.classList.add('filled');
        sl.style.background = 'radial-gradient(circle at 34% 30%, rgba(255,255,255,.7), ' + COLORS[current[s]] + ' 55%)';
      } else {
        sl.classList.remove('filled');
        sl.style.background = '';
      }
    }
    var ok = $('okBtn');
    if (ok) ok.disabled = over || current.length !== CODE_LEN;
  }

  function pickColor(i) {
    if (over || current.length >= CODE_LEN || i >= numColors) return;
    current.push(i);
    sfx(420 + i * 60, 0.05, 'square', 0.04);
    renderCurrent();
  }

  function delColor() {
    if (over || !current.length) return;
    current.pop();
    sfx(240, 0.05, 'square', 0.035);
    renderCurrent();
  }

  function onSlotClick(r, s) {
    if (over || r !== attempt) return;
    if (s < current.length) {
      current.splice(s, 1);
      sfx(240, 0.05, 'square', 0.035);
      renderCurrent();
    }
  }

  function feedback(guess) {
    var exact = 0, i;
    var codeCnt = new Array(COLORS.length).fill(0);
    var guessCnt = new Array(COLORS.length).fill(0);
    for (i = 0; i < CODE_LEN; i++) {
      if (guess[i] === code[i]) exact++;
      codeCnt[code[i]]++;
      guessCnt[guess[i]]++;
    }
    var common = 0;
    for (i = 0; i < COLORS.length; i++) common += Math.min(codeCnt[i], guessCnt[i]);
    return { exact: exact, partial: common - exact };
  }

  function submitGuess() {
    if (over || current.length !== CODE_LEN) return;
    var fb = feedback(current);
    var re = rowEls[attempt];
    var k = 0, i;
    for (i = 0; i < fb.exact; i++, k++) re.pegs[k].classList.add('exact');
    for (i = 0; i < fb.partial; i++, k++) re.pegs[k].classList.add('partial');
    sfx(500, 0.05, 'square', 0.04, 0);
    sfx(650, 0.05, 'square', 0.04, 0.07);
    if (fb.exact === CODE_LEN) { finish(true); return; }
    attempt++;
    current = [];
    if (attempt >= MAX_TRIES) { finish(false); return; }
    setActive();
    updateStatus();
  }

  function finish(won) {
    over = true;
    setActive();
    updateStatus(won ? 'CODE CRACKED!' : 'Out of tries!');
    /* reveal animation */
    var tiles = secretEl.children;
    for (var i = 0; i < CODE_LEN; i++) {
      (function (idx) {
        later(function () {
          var t = tiles[idx];
          t.classList.add('mid');
          sfx(600 + idx * 90, 0.06, 'triangle', 0.04);
          later(function () {
            t.textContent = '';
            t.style.background = 'radial-gradient(circle at 34% 30%, rgba(255,255,255,.7), ' + COLORS[code[idx]] + ' 55%)';
            t.style.borderColor = 'rgba(255,255,255,.5)';
            t.classList.remove('mid');
          }, 150);
        }, 250 + idx * 220);
      })(i);
    }
    if (won) {
      addWin();
      sfx(523, 0.1, 'square', 0.05, 1.2); sfx(659, 0.1, 'square', 0.05, 1.3); sfx(784, 0.2, 'square', 0.05, 1.4);
    } else {
      sfx(300, 0.12, 'sawtooth', 0.05, 1.2); sfx(210, 0.24, 'sawtooth', 0.05, 1.34);
    }
    later(function () {
      $('ovMsg').textContent = won ? 'CRACKED IT!' : 'OUT OF TRIES';
      $('ovSub').textContent = won ? ('Solved in ' + (attempt + 1) + ' ' + (attempt === 0 ? 'try' : 'tries')) : 'The code was:';
      var cs = $('codeShow');
      cs.innerHTML = '';
      for (var j = 0; j < CODE_LEN; j++) {
        var t = document.createElement('div');
        t.className = 'stile';
        t.style.background = 'radial-gradient(circle at 34% 30%, rgba(255,255,255,.7), ' + COLORS[code[j]] + ' 55%)';
        t.style.borderColor = 'rgba(255,255,255,.5)';
        cs.appendChild(t);
      }
      $('overlay').classList.remove('hidden');
      $('tot').textContent = String(getWins());
    }, 1500);
  }

  /* ---------- controls ---------- */
  function setColors(n) {
    numColors = n;
    $('c6').classList.toggle('on', n === 6);
    $('c8').classList.toggle('on', n === 8);
    sfx(600, 0.05, 'square', 0.04);
    newGame();
  }
  function setRepeats(v) {
    repeats = v;
    $('repOn').classList.toggle('on', v);
    $('repOff').classList.toggle('on', !v);
    sfx(600, 0.05, 'square', 0.04);
    newGame();
  }
  $('c6').addEventListener('click', function () { setColors(6); });
  $('c8').addEventListener('click', function () { setColors(8); });
  $('repOn').addEventListener('click', function () { setRepeats(true); });
  $('repOff').addEventListener('click', function () { setRepeats(false); });
  $('newBtn').addEventListener('click', function () { sfx(620, 0.05, 'square', 0.04); newGame(); });
  $('again').addEventListener('click', function () { sfx(660, 0.06, 'square', 0.04); newGame(); });

  document.addEventListener('keydown', function (e) {
    if (!$('overlay').classList.contains('hidden')) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); newGame(); }
      return;
    }
    if (e.key >= '1' && e.key <= '8') pickColor(parseInt(e.key, 10) - 1);
    else if (e.key === 'Backspace') { e.preventDefault(); delColor(); }
    else if (e.key === 'Enter') submitGuess();
  });
  window.addEventListener('resize', function () { /* fluid CSS layout */ });

  newGame();
})();
</script>
</body>
</html>
