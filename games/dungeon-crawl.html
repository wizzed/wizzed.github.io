<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dungeon Crawler — Wizzed Arcade</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:#0f0f1a;color:#a7f3c9;
    font-family:'Courier New',ui-monospace,monospace;
    overflow:hidden;display:flex;align-items:center;justify-content:center;
    touch-action:none;
  }
  canvas{
    display:block;image-rendering:pixelated;background:#0f0f1a;touch-action:none;
    box-shadow:0 0 30px rgba(74,222,128,.25), 0 0 90px rgba(74,222,128,.08);
    border:2px solid #1d3a26;
  }
  a.back{
    position:fixed;top:10px;left:12px;z-index:10;
    color:#5e8a6c;text-decoration:none;font-size:13px;letter-spacing:1px;
    text-shadow:0 0 8px rgba(74,222,128,.5);
  }
  a.back:hover{color:#4ade80}
  .hint{
    position:fixed;bottom:6px;left:50%;transform:translateX(-50%);
    font-size:11px;color:#4d6b57;letter-spacing:1px;z-index:5;white-space:nowrap;
    text-shadow:0 0 6px rgba(74,222,128,.3);
  }
</style>
</head>
<body>
<a class="back" href="../index.html">&larr; Arcade</a>
<canvas id="g" width="800" height="500"></canvas>
<div class="hint">ARROWS / WASD move &middot; bump = attack &middot; Q potion &middot; SPACE wait &middot; tap beside hero to move</div>
<script>
'use strict';
const cvs=document.getElementById('g'),ctx=cvs.getContext('2d');
const W=800,H=500,TS=20,MW=46,MH=34,VW=28,VH=23;
const PANX=562,SKEY='wizzed-dungeon-crawl';
const ri=n=>Math.floor(Math.random()*n);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;

function fit(){
  const s=Math.min(window.innerWidth/(W+8),window.innerHeight/(H+8),1);
  cvs.style.width=Math.floor(W*s)+'px';cvs.style.height=Math.floor(H*s)+'px';
}
window.addEventListener('resize',fit);fit();

/* ---------- audio ---------- */
let AC=null;
function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC;}
function beep(f,d,type,v,slide){
  const c=ac();if(!c)return;
  try{
    const o=c.createOscillator(),g=c.createGain();
    o.type=type||'square';o.frequency.setValueAtTime(f,c.currentTime);
    if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),c.currentTime+d);
    g.gain.setValueAtTime(v||0.05,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d);
    o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d);
  }catch(e){}
}

/* ---------- data ---------- */
const WEP=[{n:'Fists',b:0},{n:'Dagger',b:1},{n:'Short Sword',b:3},{n:'War Axe',b:5},{n:'Warhammer',b:7},{n:'Doom Blade',b:10}];
const ARM=[{n:'Rags',b:0},{n:'Leather',b:1},{n:'Chainmail',b:2},{n:'Half Plate',b:4},{n:'Full Plate',b:6},{n:'Dragon Scale',b:8}];
const MDEF=[
 {n:'Rat',c:'#b8a090',c2:'#ff5555',hp:5,atk:2,def:0,xp:2,f:1,pat:[
  '........','.1....1.','.11..11.','.111111.','12111121','.111111.','.1.11.1.','1......1']},
 {n:'Bat',c:'#c77dff',c2:'#ffe066',hp:4,atk:2,def:0,xp:2,f:1,pat:[
  '........','1..11..1','11111111','.122221.','.111111.','..1..1..','........','........']},
 {n:'Slime',c:'#6ee86e',c2:'#0f3d0f',hp:9,atk:3,def:1,xp:4,f:2,pat:[
  '........','..1111..','.111111.','.121121.','11111111','11111111','.111111.','........']},
 {n:'Skeleton',c:'#e8e8d8',c2:'#111122',hp:13,atk:5,def:1,xp:6,f:3,pat:[
  '..1111..','..1111..','.122221.','..1111..','.111111.','1.1111.1','..1..1..','..1..1..']},
 {n:'Orc',c:'#7fae4f',c2:'#ff5555',hp:18,atk:7,def:2,xp:9,f:4,pat:[
  '.111111.','11111111','12111121','11111111','1.1111.1','.111111.','..1..1..','.11..11.']},
 {n:'Wraith',c:'#7de8e8',c2:'#0b2a3a',hp:16,atk:8,def:1,xp:11,f:5,pat:[
  '..1111..','.111111.','.122221.','.111111.','.111111.','.111111.','.1.11.1.','........']},
 {n:'Ogre',c:'#c9955c',c2:'#5a2a10',hp:28,atk:10,def:3,xp:16,f:7,pat:[
  '.111111.','11111111','12111121','11111111','11111111','11111111','.11..11.','.11..11.']},
 {n:'Demon',c:'#ff5555',c2:'#ffe066',hp:36,atk:13,def:4,xp:24,f:9,pat:[
  '1..11..1','.111111.','12111121','.111111.','11111111','1.1111.1','..1..1..','.1....1.']}
];
const HERO_PAT=['..1111..','..1221..','..1111..','.111111.','1.1111.1','..1111..','..1..1..','..1..1..'];

/* ---------- state ---------- */
let state='title';
let depth=1,grid=[],seen=[],monsters=[],items=[],stairs={x:0,y:0};
let player=null,visible=new Set(),camX=0,camY=0;
let logMsgs=[],floaters=[],flashT=0,shake=0,animT=0,lastT=0;
let best={score:0,depth:0},savedRun=null,newBest=false;
const potBtn={x:572,y:318,w:218,h:26};

function defaultPlayer(){
  return {x:2,y:2,hp:30,mhp:30,atk:3,def:0,lvl:1,xp:0,gold:0,kills:0,pots:1,wep:0,arm:0};
}
function score(){return depth*100+player.gold+player.kills*10;}
function msg(t,c){logMsgs.push({t,c:c||'#a7f3c9'});if(logMsgs.length>40)logMsgs.shift();}

/* ---------- persistence ---------- */
function loadAll(){
  try{
    const d=JSON.parse(localStorage.getItem(SKEY));
    if(d){if(d.best)best=d.best;if(d.run)savedRun=d.run;}
  }catch(e){}
}
function saveAll(){
  try{
    const run=(state==='play')?{
      depth,stairs,monsters,items,
      grid:grid.map(r=>r.join('')),
      seen:seen.map(r=>r.join('')),
      player
    }:null;
    localStorage.setItem(SKEY,JSON.stringify({best,run}));
  }catch(e){}
}
function loadRun(r){
  depth=r.depth;stairs=r.stairs;monsters=r.monsters;items=r.items;
  grid=r.grid.map(s=>s.split(''));
  seen=r.seen.map(s=>s.split('').map(Number));
  player=r.player;
}

/* ---------- map gen ---------- */
function monAt(x,y){return monsters.find(m=>m.x===x&&m.y===y)||null;}
function itemAt(x,y){return items.find(i=>i.x===x&&i.y===y)||null;}
function carveH(x1,x2,y){for(let x=Math.min(x1,x2);x<=Math.max(x1,x2);x++)grid[y][x]='.';}
function carveV(y1,y2,x){for(let y=Math.min(y1,y2);y<=Math.max(y1,y2);y++)grid[y][x]='.';}

function genFloor(){
  grid=[];seen=[];
  for(let y=0;y<MH;y++){grid.push(Array(MW).fill('#'));seen.push(Array(MW).fill(0));}
  const rooms=[];
  for(let t=0;t<220&&rooms.length<12;t++){
    const w=4+ri(6),h=3+ri(4),x=1+ri(MW-w-2),y=1+ri(MH-h-2);
    let ok=true;
    for(const r of rooms){if(x<r.x+r.w+1&&r.x<x+w+1&&y<r.y+r.h+1&&r.y<y+h+1){ok=false;break;}}
    if(!ok)continue;
    rooms.push({x,y,w,h,cx:x+(w>>1),cy:y+(h>>1)});
    for(let yy=y;yy<y+h;yy++)for(let xx=x;xx<x+w;xx++)grid[yy][xx]='.';
  }
  for(let i=1;i<rooms.length;i++){
    const a=rooms[i-1],b=rooms[i];
    if(Math.random()<0.5){carveH(a.cx,b.cx,a.cy);carveV(a.cy,b.cy,b.cx);}
    else{carveV(a.cy,b.cy,a.cx);carveH(a.cx,b.cx,b.cy);}
  }
  const p0=rooms[0];
  player.x=p0.cx;player.y=p0.cy;
  let far=rooms[0],fd=-1;
  for(const r of rooms){const d=Math.abs(r.cx-p0.cx)+Math.abs(r.cy-p0.cy);if(d>fd){fd=d;far=r;}}
  stairs={x:far.cx,y:far.cy};
  monsters=[];items=[];
  let pool=MDEF.map((m,i)=>({m,i})).filter(o=>o.m.f<=depth&&o.m.f>=depth-4);
  if(!pool.length)pool=MDEF.map((m,i)=>({m,i})).slice(-3);
  const nm=Math.min(6+depth,18);
  for(let k=0;k<nm*3&&monsters.length<nm;k++){
    const r=rooms[1+ri(rooms.length-1)];
    const x=r.x+ri(r.w),y=r.y+ri(r.h);
    if((x===player.x&&y===player.y)||monAt(x,y)||(x===stairs.x&&y===stairs.y))continue;
    if(Math.abs(x-player.x)+Math.abs(y-player.y)<8)continue;
    const o=pool[ri(pool.length)],m=o.m,dd=Math.max(0,depth-m.f);
    monsters.push({ti:o.i,x,y,hp:m.hp+dd*3,mhp:m.hp+dd*3,atk:m.atk+(dd>>1),def:m.def+(dd>>2),xp:m.xp+dd});
  }
  function spot(){
    for(let t=0;t<90;t++){
      const r=rooms[ri(rooms.length)];
      const x=r.x+ri(r.w),y=r.y+ri(r.h);
      if((x===player.x&&y===player.y)||(x===stairs.x&&y===stairs.y)||itemAt(x,y))continue;
      return {x,y};
    }
    return null;
  }
  for(let i=0;i<5;i++){const s=spot();if(s)items.push({t:'g',x:s.x,y:s.y,v:4+ri(8)+depth*2});}
  const np=2+(depth>3?1:0);
  for(let i=0;i<np;i++){const s=spot();if(s)items.push({t:'p',x:s.x,y:s.y,v:0});}
  const tier=()=>clamp(1+((depth-1)>>1)+(Math.random()<0.3?1:0),1,5);
  if(Math.random()<0.55){const s=spot();if(s)items.push({t:'w',x:s.x,y:s.y,v:tier()});}
  if(Math.random()<0.55){const s=spot();if(s)items.push({t:'a',x:s.x,y:s.y,v:tier()});}
}

/* ---------- fov ---------- */
function los(x0,y0,x1,y1){
  let dx=Math.abs(x1-x0),dy=Math.abs(y1-y0),sx=x0<x1?1:-1,sy=y0<y1?1:-1,err=dx-dy,x=x0,y=y0;
  while(!(x===x1&&y===y1)){
    if(!(x===x0&&y===y0)&&grid[y][x]==='#')return false;
    const e2=2*err;
    if(e2>-dy){err-=dy;x+=sx;}
    if(e2<dx){err+=dx;y+=sy;}
  }
  return true;
}
function fov(){
  visible=new Set();
  const R=7;
  for(let y=Math.max(0,player.y-R);y<=Math.min(MH-1,player.y+R);y++)
    for(let x=Math.max(0,player.x-R);x<=Math.min(MW-1,player.x+R);x++){
      const dx=x-player.x,dy=y-player.y;
      if(dx*dx+dy*dy<=R*R&&los(player.x,player.y,x,y)){visible.add(y*MW+x);seen[y][x]=1;}
    }
}

/* ---------- game flow ---------- */
function start(mode){
  ac();
  newBest=false;
  if(mode==='continue'&&savedRun){
    loadRun(savedRun);
    state='play';
    logMsgs=[];msg('Welcome back. Floor '+depth+'.','#4ade80');
  }else{
    depth=1;player=defaultPlayer();genFloor();
    state='play';
    logMsgs=[];msg('You descend into the dungeon...','#4ade80');
    msg('Find the stairs. Survive.','#5e8a6c');
  }
  floaters=[];
  fov();saveAll();
  beep(220,0.12,'square',0.05,120);
}
function addFloat(x,y,txt,c){floaters.push({x,y,txt,c,t:1});}

function attackMon(m){
  const patk=player.atk+WEP[player.wep].b;
  const dmg=Math.max(1,patk-m.def+ri(3));
  m.hp-=dmg;
  addFloat(m.x,m.y,'-'+dmg,'#ffe066');
  beep(300,0.06,'square',0.05,-120);
  const md=MDEF[m.ti];
  if(m.hp<=0){
    monsters.splice(monsters.indexOf(m),1);
    player.kills++;
    msg('You slay the '+md.n+'! (+'+m.xp+' xp)','#4ade80');
    beep(520,0.1,'square',0.05,200);
    player.xp+=m.xp;
    if(Math.random()<0.3)items.push({t:'g',x:m.x,y:m.y,v:3+ri(6)+depth});
    while(player.xp>=player.lvl*10){
      player.xp-=player.lvl*10;player.lvl++;
      player.mhp+=6;player.hp=Math.min(player.mhp,player.hp+6);player.atk++;
      if(player.lvl%2===0)player.def++;
      msg('LEVEL UP! You are now level '+player.lvl+'.','#ffe066');
      beep(440,0.1,'square',0.06);setTimeout(()=>beep(660,0.12,'square',0.06),90);setTimeout(()=>beep(880,0.16,'square',0.06),190);
    }
  }else{
    msg('You hit the '+md.n+' for '+dmg+'.');
  }
}
function hitPlayer(m){
  const dmg=Math.max(1,m.atk-(player.def+ARM[player.arm].b)+ri(3));
  player.hp-=dmg;
  flashT=0.35;shake=5;
  addFloat(player.x,player.y,'-'+dmg,'#ff5555');
  msg('The '+MDEF[m.ti].n+' hits you for '+dmg+'!','#ff8888');
  beep(120,0.12,'sawtooth',0.06,-60);
}
function pickup(){
  const it=itemAt(player.x,player.y);
  if(!it)return;
  items.splice(items.indexOf(it),1);
  if(it.t==='g'){player.gold+=it.v;msg('You pick up '+it.v+' gold.','#ffe066');beep(700,0.07,'square',0.045,300);}
  else if(it.t==='p'){player.pots++;msg('You find a healing potion.','#ff8fb3');beep(500,0.08,'square',0.045,200);}
  else if(it.t==='w'){
    if(it.v>player.wep){player.wep=it.v;msg('You equip the '+WEP[it.v].n+'! (ATK +'+WEP[it.v].b+')','#4ade80');beep(400,0.12,'square',0.05,200);}
    else{const g=5+it.v*4;player.gold+=g;msg('Old '+WEP[it.v].n+' sold for '+g+'g.','#5e8a6c');beep(700,0.06,'square',0.04);}
  }
  else if(it.t==='a'){
    if(it.v>player.arm){player.arm=it.v;msg('You don the '+ARM[it.v].n+'! (DEF +'+ARM[it.v].b+')','#4ade80');beep(350,0.12,'square',0.05,150);}
    else{const g=5+it.v*4;player.gold+=g;msg('Old '+ARM[it.v].n+' sold for '+g+'g.','#5e8a6c');beep(700,0.06,'square',0.04);}
  }
}
function descend(){
  depth++;
  const heal=Math.ceil(player.mhp*0.15);
  player.hp=Math.min(player.mhp,player.hp+heal);
  genFloor();fov();
  msg('You descend to floor '+depth+'. (+'+heal+' hp)','#4ade80');
  beep(200,0.25,'square',0.06,-120);
  saveAll();
}
function quaff(){
  if(state!=='play')return;
  if(player.pots<=0){msg('No potions left!','#ff8888');beep(150,0.08,'square',0.04);return;}
  if(player.hp>=player.mhp){msg('You are at full health.','#5e8a6c');return;}
  player.pots--;
  const heal=Math.ceil(player.mhp*0.4);
  player.hp=Math.min(player.mhp,player.hp+heal);
  addFloat(player.x,player.y,'+'+heal,'#4ade80');
  msg('You quaff a potion. (+'+heal+' hp)','#ff8fb3');
  beep(600,0.15,'sine',0.06,300);
  endTurn();
}
function monstersAct(){
  for(const m of monsters){
    const dx=player.x-m.x,dy=player.y-m.y;
    if(Math.abs(dx)+Math.abs(dy)===1){hitPlayer(m);continue;}
    const md=MDEF[m.ti];
    let move=null;
    const sees=(dx*dx+dy*dy<=100)&&los(m.x,m.y,player.x,player.y);
    if(sees&&!(md.n==='Bat'&&Math.random()<0.5)){
      const opts=[];
      if(Math.abs(dx)>=Math.abs(dy)){opts.push([Math.sign(dx),0]);if(dy!==0)opts.push([0,Math.sign(dy)]);}
      else{opts.push([0,Math.sign(dy)]);if(dx!==0)opts.push([Math.sign(dx),0]);}
      for(const o of opts){
        const tx=m.x+o[0],ty=m.y+o[1];
        if(grid[ty][tx]!=='#'&&!monAt(tx,ty)&&!(tx===player.x&&ty===player.y)){move=o;break;}
      }
    }else if(Math.random()<0.3){
      const o=[[1,0],[-1,0],[0,1],[0,-1]][ri(4)];
      const tx=m.x+o[0],ty=m.y+o[1];
      if(tx>=0&&ty>=0&&tx<MW&&ty<MH&&grid[ty][tx]!=='#'&&!monAt(tx,ty)&&!(tx===player.x&&ty===player.y))move=o;
    }
    if(move){m.x+=move[0];m.y+=move[1];}
  }
}
function die(){
  state='dead';
  const sc=score();
  if(sc>best.score){best={score:sc,depth};newBest=true;}
  saveAll();savedRun=null;
  msg('You have died...','#ff5555');
  beep(200,0.5,'sawtooth',0.07,-160);
}
function endTurn(){
  monstersAct();
  if(player.hp<=0){die();return;}
  fov();saveAll();
}
function tryMove(dx,dy){
  if(state!=='play')return;
  const nx=player.x+dx,ny=player.y+dy;
  if(nx<0||ny<0||nx>=MW||ny>=MH||grid[ny][nx]==='#')return;
  const m=monAt(nx,ny);
  if(m){attackMon(m);}
  else{
    player.x=nx;player.y=ny;
    pickup();
    if(nx===stairs.x&&ny===stairs.y){descend();return;}
  }
  endTurn();
}

/* ---------- rendering ---------- */
function hash01(x,y){
  let h=(x*374761393+y*668265263)|0;
  h=((h^(h>>>13))*1274126177)|0;
  return ((h^(h>>>16))>>>0)%1000/1000;
}
function drawPat(pat,x,y,c1,c2){
  const s=TS/8;
  for(let r=0;r<8;r++)for(let q=0;q<8;q++){
    const ch=pat[r][q];
    if(ch==='.')continue;
    ctx.fillStyle=ch==='1'?c1:c2;
    ctx.fillRect(x+q*s,y+r*s,s+0.4,s+0.4);
  }
}
function drawTile(x,y,sx,sy,lit){
  const t=grid[y][x];
  if(t==='#'){
    ctx.fillStyle=lit?'#2b2b47':'#1b1b2e';
    ctx.fillRect(sx,sy,TS,TS);
    ctx.fillStyle=lit?'#3a3a5e':'#232338';
    const off=(y%2)?TS/2:0;
    ctx.fillRect(sx,sy,TS,2);
    ctx.fillRect(sx+((off+4)%TS),sy+4,1.5,6);
    ctx.fillRect(sx,sy+10,TS,2);
    ctx.fillRect(sx+((off+12)%TS),sy+14,1.5,6);
  }else{
    ctx.fillStyle=lit?'#181826':'#111119';
    ctx.fillRect(sx,sy,TS,TS);
    const h=hash01(x,y);
    if(h<0.25){ctx.fillStyle=lit?'#20202f':'#15151f';ctx.fillRect(sx+4+h*40,sy+6+h*30,2,2);}
    if(lit){ctx.fillStyle='rgba(74,222,128,0.03)';ctx.fillRect(sx,sy,TS,TS);}
  }
}
function drawItem(it,sx,sy){
  if(it.t==='g'){
    ctx.fillStyle='#b8860b';ctx.fillRect(sx+5,sy+13,10,3);
    ctx.fillStyle='#ffd700';ctx.fillRect(sx+6,sy+10,8,3);ctx.fillRect(sx+8,sy+8,4,2);
  }else if(it.t==='p'){
    ctx.fillStyle='#c53a5e';ctx.fillRect(sx+7,sy+8,6,8);
    ctx.fillStyle='#ff8fb3';ctx.fillRect(sx+8,sy+9,2,3);
    ctx.fillStyle='#888';ctx.fillRect(sx+9,sy+5,2,3);
  }else if(it.t==='w'){
    ctx.fillStyle='#cfd8e3';
    ctx.fillRect(sx+9,sy+3,2,10);
    ctx.fillStyle='#8a6d3b';ctx.fillRect(sx+6,sy+13,8,2);ctx.fillRect(sx+9,sy+15,2,3);
  }else if(it.t==='a'){
    ctx.fillStyle='#7d8aa0';ctx.fillRect(sx+5,sy+4,10,9);
    ctx.fillStyle='#aebdd4';ctx.fillRect(sx+7,sy+6,6,5);
    ctx.fillStyle='#7d8aa0';ctx.fillRect(sx+7,sy+13,6,3);
  }
}
function drawStairs(sx,sy){
  ctx.fillStyle='#0a0a12';ctx.fillRect(sx+2,sy+2,16,16);
  ctx.fillStyle='#4ade80';
  ctx.fillRect(sx+4,sy+4,12,3);ctx.fillRect(sx+7,sy+9,9,3);ctx.fillRect(sx+10,sy+14,6,3);
}
function bar(x,y,w,h,frac,c,bg){
  ctx.fillStyle=bg||'#1a1a2c';ctx.fillRect(x,y,w,h);
  ctx.fillStyle=c;ctx.fillRect(x,y,Math.max(0,w*clamp(frac,0,1)),h);
  ctx.strokeStyle='#2e4a38';ctx.lineWidth=1;ctx.strokeRect(x+0.5,y+0.5,w-1,h-1);
}
function renderMap(){
  camX=clamp(player.x-(VW>>1),0,MW-VW);
  camY=clamp(player.y-(VH>>1),0,MH-VH);
  let ox=0,oy=0;
  if(shake>0){ox=(Math.random()-0.5)*shake;oy=(Math.random()-0.5)*shake;}
  ctx.save();ctx.translate(ox,oy);
  for(let y=camY;y<camY+VH;y++)for(let x=camX;x<camX+VW;x++){
    if(!seen[y][x])continue;
    const lit=visible.has(y*MW+x);
    drawTile(x,y,(x-camX)*TS,(y-camY)*TS,lit);
  }
  if(seen[stairs.y][stairs.x]&&stairs.x>=camX&&stairs.x<camX+VW&&stairs.y>=camY&&stairs.y<camY+VH)
    drawStairs((stairs.x-camX)*TS,(stairs.y-camY)*TS);
  for(const it of items){
    if(!visible.has(it.y*MW+it.x))continue;
    if(it.x<camX||it.x>=camX+VW||it.y<camY||it.y>=camY+VH)continue;
    drawItem(it,(it.x-camX)*TS,(it.y-camY)*TS);
  }
  for(const m of monsters){
    if(!visible.has(m.y*MW+m.x))continue;
    if(m.x<camX||m.x>=camX+VW||m.y<camY||m.y>=camY+VH)continue;
    const md=MDEF[m.ti];
    const sx=(m.x-camX)*TS,sy=(m.y-camY)*TS+Math.sin(animT*4+m.x)*1.2;
    drawPat(md.pat,sx,sy,md.c,md.c2);
    if(m.hp<m.mhp)bar(sx+2,sy-3,16,3,m.hp/m.mhp,'#ff5555','#3a1a1a');
  }
  const hx=(player.x-camX)*TS,hy=(player.y-camY)*TS;
  ctx.shadowColor='#4ade80';ctx.shadowBlur=8;
  drawPat(HERO_PAT,hx,hy,flashT>0?'#ff8888':'#ffe066','#4ade80');
  ctx.shadowBlur=0;
  for(const f of floaters){
    if(f.x<camX||f.x>=camX+VW||f.y<camY||f.y>=camY+VH)continue;
    ctx.globalAlpha=clamp(f.t,0,1);
    ctx.fillStyle=f.c;ctx.font='bold 13px "Courier New",monospace';ctx.textAlign='center';
    ctx.fillText(f.txt,(f.x-camX)*TS+TS/2,(f.y-camY)*TS-4-(1-f.t)*14);
    ctx.globalAlpha=1;
  }
  ctx.restore();
  // bottom strip under map
  ctx.fillStyle='#0c0c16';ctx.fillRect(0,VH*TS,PANX,H-VH*TS);
  ctx.fillStyle='#4d6b57';ctx.font='11px "Courier New",monospace';ctx.textAlign='left';
  ctx.fillText('FLOOR '+depth+'  ·  find the glowing stairs to descend',10,VH*TS+24);
}
function renderPanel(){
  ctx.fillStyle='#12121f';ctx.fillRect(PANX,0,W-PANX,H);
  ctx.strokeStyle='#2e4a38';ctx.beginPath();ctx.moveTo(PANX+0.5,0);ctx.lineTo(PANX+0.5,H);ctx.stroke();
  const x=PANX+12;
  ctx.textAlign='left';
  ctx.fillStyle='#4ade80';ctx.font='bold 16px "Courier New",monospace';
  ctx.shadowColor='#4ade80';ctx.shadowBlur=8;
  ctx.fillText('DUNGEON',x,26);ctx.fillText('CRAWLER',x,44);
  ctx.shadowBlur=0;
  ctx.fillStyle='#ffe066';ctx.font='bold 13px "Courier New",monospace';
  ctx.fillText('FLOOR '+depth,x+110,26);
  ctx.fillText('Lv '+player.lvl,x+110,44);
  ctx.font='12px "Courier New",monospace';
  ctx.fillStyle='#a7f3c9';ctx.fillText('HP '+player.hp+'/'+player.mhp,x,72);
  bar(x,78,200,10,player.hp/player.mhp,player.hp/player.mhp<0.3?'#ff5555':'#4ade80');
  ctx.fillStyle='#a7f3c9';ctx.fillText('XP '+player.xp+'/'+(player.lvl*10),x,106);
  bar(x,112,200,7,player.xp/(player.lvl*10),'#7de8e8');
  ctx.fillStyle='#a7f3c9';
  ctx.fillText('ATK '+(player.atk+WEP[player.wep].b)+'  ('+player.atk+'+'+WEP[player.wep].b+')',x,142);
  ctx.fillText('DEF '+(player.def+ARM[player.arm].b)+'  ('+player.def+'+'+ARM[player.arm].b+')',x,160);
  ctx.fillStyle='#ffe066';ctx.fillText('GOLD '+player.gold,x,186);
  ctx.fillStyle='#ff8888';ctx.fillText('KILLS '+player.kills,x+110,186);
  ctx.fillStyle='#5e8a6c';ctx.fillText('── GEAR ─────────────',x,214);
  ctx.fillStyle='#cfd8e3';ctx.fillText('⚔ '+WEP[player.wep].n,x,234);
  ctx.fillText('🛡 '+ARM[player.arm].n,x,252);
  ctx.fillStyle='#5e8a6c';ctx.fillText('── ITEMS ────────────',x,280);
  ctx.fillStyle='#ff8fb3';ctx.fillText('Potions ×'+player.pots+'  (heal 40%)',x,300);
  // potion button
  ctx.fillStyle=player.pots>0?'#20302a':'#181822';
  ctx.fillRect(potBtn.x,potBtn.y,potBtn.w,potBtn.h);
  ctx.strokeStyle=player.pots>0?'#4ade80':'#333344';ctx.strokeRect(potBtn.x+0.5,potBtn.y+0.5,potBtn.w,potBtn.h);
  ctx.fillStyle=player.pots>0?'#4ade80':'#555566';ctx.textAlign='center';
  ctx.fillText('[Q] DRINK POTION',potBtn.x+potBtn.w/2,potBtn.y+17);
  ctx.textAlign='left';
  ctx.fillStyle='#5e8a6c';ctx.fillText('BEST '+best.score+' (floor '+best.depth+')',x,368);
  ctx.fillStyle='#4d6b57';ctx.fillText('SCORE '+score(),x+130,368);
  // log
  ctx.fillStyle='#5e8a6c';ctx.fillText('── LOG ──────────────',x,388);
  ctx.font='11px "Courier New",monospace';
  const show=logMsgs.slice(-7);
  for(let i=0;i<show.length;i++){
    ctx.globalAlpha=0.45+0.55*(i+1)/show.length;
    ctx.fillStyle=show[i].c;
    ctx.fillText(show[i].t.slice(0,34),x,404+i*13);
  }
  ctx.globalAlpha=1;
}
function renderTitle(){
  // dungeon backdrop
  ctx.globalAlpha=0.5;
  for(let y=0;y<Math.min(MH,25);y++)for(let x=0;x<Math.min(MW,40);x++){
    drawTile(x,y,x*TS,y*TS,hash01(x,y+depth)<0.5);
  }
  ctx.globalAlpha=1;
  ctx.fillStyle='rgba(15,15,26,0.75)';ctx.fillRect(0,0,W,H);
  const pulse=0.7+0.3*Math.sin(animT*2.4);
  ctx.textAlign='center';
  ctx.shadowColor='#4ade80';ctx.shadowBlur=24*pulse;
  ctx.fillStyle='#4ade80';ctx.font='bold 52px "Courier New",monospace';
  ctx.fillText('DUNGEON CRAWLER',W/2,120);
  ctx.shadowBlur=0;
  ctx.fillStyle='#ffe066';ctx.font='14px "Courier New",monospace';
  ctx.fillText('a turn-based roguelike of greed and doom',W/2,152);
  // monster parade
  for(let i=0;i<MDEF.length;i++){
    const mx=W/2-MDEF.length*28/2+i*28;
    ctx.save();ctx.translate(mx,205+Math.sin(animT*3+i)*4);ctx.scale(1.4,1.4);
    drawPat(MDEF[i].pat,-10,-10,MDEF[i].c,MDEF[i].c2);
    ctx.restore();
  }
  ctx.save();ctx.translate(W/2,282+Math.sin(animT*3)*3);ctx.scale(2,2);
  ctx.shadowColor='#4ade80';ctx.shadowBlur=10;
  drawPat(HERO_PAT,-10,-10,'#ffe066','#4ade80');
  ctx.restore();ctx.shadowBlur=0;
  ctx.fillStyle='#a7f3c9';ctx.font='13px "Courier New",monospace';
  ctx.fillText('WASD / arrows to move · bump into monsters to fight',W/2,340);
  ctx.fillText('grab gold, potions and gear · stairs go ever deeper',W/2,360);
  ctx.fillStyle='#4ade80';ctx.font='bold 18px "Courier New",monospace';
  if(Math.sin(animT*5)>-0.3){
    ctx.fillText(savedRun?'CLICK / ENTER — CONTINUE RUN (floor '+savedRun.depth+')':'CLICK / ENTER — DESCEND',W/2,412);
  }
  if(savedRun){ctx.fillStyle='#5e8a6c';ctx.font='13px "Courier New",monospace';ctx.fillText('[N] abandon & start a new run',W/2,438);}
  if(best.score>0){ctx.fillStyle='#ffe066';ctx.font='13px "Courier New",monospace';ctx.fillText('BEST SCORE '+best.score+'  ·  DEEPEST FLOOR '+best.depth,W/2,468);}
}
function renderDead(){
  ctx.fillStyle='rgba(15,15,26,0.82)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.shadowColor='#ff5555';ctx.shadowBlur=20;
  ctx.fillStyle='#ff5555';ctx.font='bold 46px "Courier New",monospace';
  ctx.fillText('YOU DIED',W/2,150);
  ctx.shadowBlur=0;
  ctx.fillStyle='#a7f3c9';ctx.font='16px "Courier New",monospace';
  ctx.fillText('Floor '+depth+' · '+player.gold+' gold · '+player.kills+' kills',W/2,200);
  ctx.fillStyle='#ffe066';ctx.font='bold 22px "Courier New",monospace';
  ctx.fillText('SCORE  '+score(),W/2,240);
  if(newBest){
    ctx.fillStyle=Math.sin(animT*6)>0?'#4ade80':'#ffe066';
    ctx.font='bold 18px "Courier New",monospace';
    ctx.fillText('★ NEW BEST! ★',W/2,272);
  }else{
    ctx.fillStyle='#5e8a6c';ctx.font='14px "Courier New",monospace';
    ctx.fillText('best: '+best.score,W/2,272);
  }
  ctx.fillStyle='#4ade80';ctx.font='bold 16px "Courier New",monospace';
  if(Math.sin(animT*5)>-0.3)ctx.fillText('CLICK / ENTER — DELVE AGAIN',W/2,330);
}
function loop(t){
  const dt=Math.min(0.05,(t-lastT)/1000||0);lastT=t;animT=t/1000;
  if(flashT>0)flashT-=dt;
  if(shake>0)shake=Math.max(0,shake-dt*25);
  for(let i=floaters.length-1;i>=0;i--){floaters[i].t-=dt*1.4;if(floaters[i].t<=0)floaters.splice(i,1);}
  ctx.fillStyle='#0f0f1a';ctx.fillRect(0,0,W,H);
  if(state==='title'){renderTitle();}
  else{
    renderMap();renderPanel();
    if(state==='dead')renderDead();
  }
  requestAnimationFrame(loop);
}

/* ---------- input ---------- */
window.addEventListener('keydown',e=>{
  const k=e.key;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(k))e.preventDefault();
  if(state==='title'){
    if(k==='Enter'||k===' ')start(savedRun?'continue':'new');
    else if(k==='n'||k==='N')start('new');
    return;
  }
  if(state==='dead'){
    if(k==='Enter'||k===' ')start('new');
    return;
  }
  if(k==='ArrowUp'||k==='w'||k==='W')tryMove(0,-1);
  else if(k==='ArrowDown'||k==='s'||k==='S')tryMove(0,1);
  else if(k==='ArrowLeft'||k==='a'||k==='A')tryMove(-1,0);
  else if(k==='ArrowRight'||k==='d'||k==='D')tryMove(1,0);
  else if(k==='q'||k==='Q')quaff();
  else if(k===' '||k==='.')endTurn();
});
cvs.addEventListener('pointerdown',e=>{
  e.preventDefault();
  const r=cvs.getBoundingClientRect();
  const x=(e.clientX-r.left)*W/r.width,y=(e.clientY-r.top)*H/r.height;
  if(state==='title'){start(savedRun?'continue':'new');return;}
  if(state==='dead'){start('new');return;}
  if(x>=potBtn.x&&x<=potBtn.x+potBtn.w&&y>=potBtn.y&&y<=potBtn.y+potBtn.h){quaff();return;}
  if(x>=PANX)return;
  const psx=(player.x-camX)*TS+TS/2,psy=(player.y-camY)*TS+TS/2;
  const ddx=x-psx,ddy=y-psy;
  if(Math.abs(ddx)<8&&Math.abs(ddy)<8){endTurn();return;}
  if(Math.abs(ddx)>Math.abs(ddy))tryMove(ddx>0?1:-1,0);
  else tryMove(0,ddy>0?1:-1);
});

/* ---------- boot ---------- */
loadAll();
player=defaultPlayer();depth=1;genFloor();fov();
requestAnimationFrame(loop);
</script>
