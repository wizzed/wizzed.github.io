<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fruit Slicer — Wizzed Arcade</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:#0f0f1a;color:#d9f99d;
    font-family:'Courier New',ui-monospace,monospace;
    display:flex;align-items:center;justify-content:center;
    height:100vh;overflow:hidden;
  }
  canvas{
    display:block;background:#0f0f1a;
    cursor:crosshair;touch-action:none;
    border:2px solid #3f6212;
    box-shadow:0 0 24px rgba(163,230,53,.35),0 0 80px rgba(163,230,53,.12);
  }
  a.back{
    position:fixed;top:10px;left:12px;z-index:10;
    color:#8888aa;text-decoration:none;font-size:13px;
    padding:4px 9px;border:1px solid #33334d;background:rgba(15,15,26,.85);
  }
  a.back:hover{color:#a3e635;border-color:#a3e635;text-shadow:0 0 6px #a3e635}
</style>
</head>
<body>
<a class="back" href="../index.html">&larr; Arcade</a>
<canvas id="g" width="800" height="500"></canvas>
<script>
'use strict';
const cv=document.getElementById('g');
const cx=cv.getContext('2d');
const W=800,H=500,GRAV=760;
const ACC='#a3e635';
const FRUITS=[
  {e:'\u{1F349}',col:'#fb7185',r:30},
  {e:'\u{1F34A}',col:'#fb923c',r:25},
  {e:'\u{1F34B}',col:'#fde047',r:25},
  {e:'\u{1F353}',col:'#f43f5e',r:23},
  {e:'\u{1F95D}',col:'#a3e635',r:23}
];
const BOMB='\u{1F4A3}';

let state='title';    // title | play | over
let score=0,misses=0,t=0,timePlayed=0,overT=0,flash=0,overReason='';
let best=+(localStorage.getItem('wizzed-fruit-slice')||0);
let combo=0,comboT=0;
let fruits=[],halves=[],parts=[],floaters=[];
let launchT=0.6;
let blade=[],bladeDown=false;
const stars=[];
for(let i=0;i<70;i++)stars.push({x:Math.random()*W,y:Math.random()*H,b:0.2+Math.random()*0.7});

/* ---------- sound ---------- */
let AC=null;
function sfx(f,d,type,vol,slide){
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended')AC.resume();
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type||'square';
    o.frequency.setValueAtTime(f,AC.currentTime);
    if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),AC.currentTime+d);
    g.gain.setValueAtTime(vol||0.06,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+d);
    o.connect(g);g.connect(AC.destination);
    o.start();o.stop(AC.currentTime+d);
  }catch(err){}
}

/* ---------- helpers ---------- */
function floatText(x,y,txt,col,size){
  floaters.push({x,y,txt,col,size:size||16,life:1});
}
function juice(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,v=60+Math.random()*180;
    parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-60,life:0.5+Math.random()*0.5,col,r:2+Math.random()*4});
  }
}
function launchVolley(allowBombs){
  const n=1+((Math.random()*Math.min(3,1+timePlayed/20))|0);
  for(let i=0;i<n;i++){
    const x=120+Math.random()*(W-240);
    const isBomb=allowBombs&&timePlayed>6&&Math.random()<Math.min(0.2,0.1+timePlayed*0.002);
    const f=FRUITS[(Math.random()*FRUITS.length)|0];
    fruits.push({
      x,y:H+30,
      vx:(W/2-x)*0.35+(Math.random()-0.5)*70,
      vy:-(690+Math.random()*130),
      rot:Math.random()*6,vr:(Math.random()-0.5)*5,
      type:f,r:isBomb?24:f.r,bomb:isBomb
    });
  }
}
function seedTitleFruits(){
  fruits=[];
  for(let i=0;i<6;i++){
    const f=FRUITS[i%FRUITS.length];
    fruits.push({
      x:100+i*120,y:120+((i*97)%220),
      vx:(Math.random()-0.5)*60,vy:-100-Math.random()*180,
      rot:Math.random()*6,vr:(Math.random()-0.5)*4,
      type:f,r:f.r,bomb:false
    });
  }
}
function startGame(){
  score=0;misses=0;timePlayed=0;combo=0;comboT=0;flash=0;
  fruits=[];halves=[];parts=[];floaters=[];
  launchT=0.5;blade=[];
  state='play';
}
function saveBest(){
  if(score>best){best=score;localStorage.setItem('wizzed-fruit-slice',best);}
}
function gameOver(reason){
  overReason=reason;
  saveBest();
  state='over';overT=1;
  if(reason==='bomb'){flash=1;sfx(55,1.2,'sawtooth',0.14,-25);}
  else sfx(150,0.7,'sawtooth',0.1,-90);
}

/* ---------- slicing ---------- */
function segCircle(x1,y1,x2,y2,cxp,cyp,r){
  const dx=x2-x1,dy=y2-y1;
  const l2=dx*dx+dy*dy;
  let u=l2?((cxp-x1)*dx+(cyp-y1)*dy)/l2:0;
  u=Math.max(0,Math.min(1,u));
  const px=x1+u*dx,py=y1+u*dy;
  return Math.hypot(cxp-px,cyp-py)<r;
}
function sliceFruit(i,ang){
  const f=fruits[i];
  fruits.splice(i,1);
  if(f.bomb){
    juice(f.x,f.y,'#f8fafc',30);
    juice(f.x,f.y,'#fb923c',20);
    gameOver('bomb');
    return;
  }
  combo++;comboT=0.55;
  const pts=10+(combo-1)*5;
  score+=pts;
  saveBest();
  floatText(f.x,f.y-20,'+'+pts,'#fef08a',16);
  if(combo>=3)floatText(f.x,f.y-46,'COMBO x'+combo+'!',ACC,20);
  juice(f.x,f.y,f.type.col,14);
  const push=110;
  for(const side of[-1,1]){
    halves.push({
      x:f.x,y:f.y,
      vx:f.vx*0.5+Math.cos(ang+Math.PI/2)*push*side,
      vy:f.vy*0.4+Math.sin(ang+Math.PI/2)*push*side-40,
      rot:f.rot,vr:f.vr+side*3,e:f.type.e,r:f.r,side,ang
    });
  }
  sfx(500+combo*60,0.09,'square',0.05,-250);
}
function bladeCut(x1,y1,x2,y2){
  if(state!=='play')return;
  if(Math.hypot(x2-x1,y2-y1)<5)return;
  const ang=Math.atan2(y2-y1,x2-x1);
  for(let i=fruits.length-1;i>=0;i--){
    const f=fruits[i];
    if(segCircle(x1,y1,x2,y2,f.x,f.y,f.r+6))sliceFruit(i,ang);
  }
}

/* ---------- update ---------- */
function update(dt){
  t+=dt;
  if(flash>0)flash-=dt*1.6;
  if(comboT>0){comboT-=dt;if(comboT<=0)combo=0;}
  // blade decay
  const now=performance.now();
  while(blade.length&&now-blade[0].tm>140)blade.shift();

  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=GRAV*0.6*dt;p.life-=dt;
    if(p.life<=0)parts.splice(i,1);
  }
  for(let i=floaters.length-1;i>=0;i--){
    const f=floaters[i];
    f.y-=45*dt;f.life-=dt;
    if(f.life<=0)floaters.splice(i,1);
  }
  for(let i=halves.length-1;i>=0;i--){
    const h=halves[i];
    h.x+=h.vx*dt;h.y+=h.vy*dt;h.vy+=GRAV*dt;h.rot+=h.vr*dt;
    if(h.y>H+80)halves.splice(i,1);
  }
  for(let i=fruits.length-1;i>=0;i--){
    const f=fruits[i];
    f.x+=f.vx*dt;f.y+=f.vy*dt;f.vy+=GRAV*dt;f.rot+=f.vr*dt;
    if(f.y>H+60&&f.vy>0){
      fruits.splice(i,1);
      if(state==='play'&&!f.bomb){
        misses++;
        floatText(f.x,H-40,'MISS','#f43f5e',20);
        sfx(180,0.25,'sawtooth',0.07,-80);
        if(misses>=3)gameOver('drops');
      }
    }
  }
  if(state==='over')  {overT-=dt;return;}
  timePlayed+=state==='play'?dt:0;
  launchT-=dt;
  if(launchT<=0){
    if(state==='play'){
      launchT=Math.max(0.75,1.5-timePlayed*0.012)*(0.7+Math.random()*0.6);
      launchVolley(true);
    }else{
      launchT=1.7;
      launchVolley(false);
    }
  }
}

/* ---------- draw ---------- */
function drawFruit(f){
  cx.save();
  cx.translate(f.x,f.y);
  if(f.bomb){
    cx.strokeStyle='rgba(244,63,94,'+(0.4+0.3*Math.sin(t*10)).toFixed(3)+')';
    cx.lineWidth=3;
    cx.beginPath();cx.arc(0,0,f.r+8,0,Math.PI*2);cx.stroke();
  }
  cx.rotate(f.rot*0.3);
  cx.font=(f.r*2)+'px serif';
  cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(f.bomb?BOMB:f.type.e,0,0);
  cx.restore();
}
function drawHalf(h){
  cx.save();
  cx.translate(h.x,h.y);
  cx.rotate(h.ang);
  cx.beginPath();
  cx.rect(-h.r*1.6,h.side<0?-h.r*1.6:1.5,h.r*3.2,h.r*1.6);
  cx.clip();
  cx.rotate(h.rot*0.3-h.ang);
  cx.font=(h.r*2)+'px serif';
  cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(h.e,0,0);
  cx.restore();
}
function draw(){
  cx.fillStyle='#0f0f1a';cx.fillRect(0,0,W,H);
  for(const s of stars){
    cx.globalAlpha=s.b*(0.5+0.5*Math.sin(t*1.5+s.x));
    cx.fillStyle='#818cf8';cx.fillRect(s.x,s.y,2,2);
  }
  cx.globalAlpha=1;

  for(const h of halves)drawHalf(h);
  for(const f of fruits)drawFruit(f);
  for(const p of parts){
    cx.globalAlpha=Math.max(0,p.life*1.6);
    cx.fillStyle=p.col;
    cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();
  }
  cx.globalAlpha=1;

  // blade trail
  if(blade.length>1){
    cx.lineCap='round';cx.lineJoin='round';
    cx.strokeStyle='rgba(163,230,53,0.35)';cx.lineWidth=10;
    cx.shadowColor=ACC;cx.shadowBlur=16;
    cx.beginPath();
    cx.moveTo(blade[0].x,blade[0].y);
    for(let i=1;i<blade.length;i++)cx.lineTo(blade[i].x,blade[i].y);
    cx.stroke();
    cx.strokeStyle='#f8fafc';cx.lineWidth=3;
    cx.stroke();
    cx.shadowBlur=0;
  }

  for(const f of floaters){
    cx.globalAlpha=Math.max(0,f.life);
    cx.fillStyle=f.col;
    cx.font='bold '+f.size+'px "Courier New",monospace';
    cx.textAlign='center';cx.textBaseline='alphabetic';
    cx.fillText(f.txt,f.x,f.y);
  }
  cx.globalAlpha=1;

  // HUD
  cx.textBaseline='alphabetic';
  cx.textAlign='left';cx.font='bold 20px "Courier New",monospace';
  cx.fillStyle=ACC;cx.fillText('SCORE '+score,14,30);
  cx.textAlign='right';cx.fillStyle='#a5b4fc';cx.fillText('BEST '+best,W-14,30);
  if(state==='play'){
    cx.textAlign='center';cx.font='18px "Courier New",monospace';
    let xs='';
    for(let i=0;i<3;i++)xs+=i<misses?'✖ ':'○ ';
    cx.fillStyle='#f43f5e';
    cx.fillText(xs.trim(),W/2,30);
    if(combo>=2){
      cx.fillStyle=ACC;cx.font='bold 22px "Courier New",monospace';
      cx.fillText('COMBO x'+combo,W/2,58);
    }
  }

  if(flash>0){
    cx.fillStyle='rgba(255,255,255,'+Math.max(0,flash*0.8).toFixed(3)+')';
    cx.fillRect(0,0,W,H);
  }

  if(state==='title'){
    cx.fillStyle='rgba(15,15,26,0.45)';cx.fillRect(0,0,W,H);
    cx.textAlign='center';
    cx.shadowColor=ACC;cx.shadowBlur=26;
    cx.fillStyle=ACC;cx.font='bold 62px "Courier New",monospace';
    cx.fillText('FRUIT SLICER',W/2,170);
    cx.shadowBlur=0;
    cx.font='44px serif';cx.textBaseline='middle';
    cx.fillText('\u{1F349} \u{1F34A} \u{1F34B} \u{1F353} \u{1F95D}',W/2,225);
    cx.textBaseline='alphabetic';
    cx.fillStyle='#c7d2fe';cx.font='16px "Courier New",monospace';
    cx.fillText('Swipe to slice flying fruit — never slice a '+ '\u{1F4A3}' +' !',W/2,278);
    cx.fillText('3 dropped fruit or 1 bomb ends the run. Chain combos!',W/2,300);
    cx.globalAlpha=0.6+0.4*Math.sin(t*4);
    cx.fillStyle='#fef08a';cx.font='bold 20px "Courier New",monospace';
    cx.fillText('CLICK / TAP  or press  SPACE  to start',W/2,352);
    cx.globalAlpha=1;
    cx.fillStyle='#8888aa';cx.font='14px "Courier New",monospace';
    cx.fillText('HOLD + DRAG mouse or finger to swing the blade',W/2,384);
    cx.fillText('BEST SCORE: '+best,W/2,408);
  }
  if(state==='over'){
    cx.fillStyle='rgba(15,15,26,0.78)';cx.fillRect(0,0,W,H);
    cx.textAlign='center';
    cx.shadowColor='#f43f5e';cx.shadowBlur=26;
    cx.fillStyle='#f43f5e';cx.font='bold 56px "Courier New",monospace';
    cx.fillText(overReason==='bomb'?'KA-BOOM!':'TOO MANY DROPS',W/2,190);
    cx.shadowBlur=0;
    cx.fillStyle='#c7d2fe';cx.font='18px "Courier New",monospace';
    cx.fillText(overReason==='bomb'?'You sliced a bomb. The blade is toast.':'Three fruit hit the floor unsliced.',W/2,232);
    cx.fillStyle=ACC;cx.font='bold 26px "Courier New",monospace';
    cx.fillText('SCORE '+score+(score>=best&&score>0?'   NEW BEST!':'   BEST '+best),W/2,280);
    cx.globalAlpha=0.6+0.4*Math.sin(t*4);
    cx.fillStyle='#fef08a';cx.font='bold 18px "Courier New",monospace';
    cx.fillText('press R or CLICK to slice again',W/2,330);
    cx.globalAlpha=1;
  }
}

/* ---------- input ---------- */
function toXY(e){
  const r=cv.getBoundingClientRect();
  return{x:(e.clientX-r.left)*W/r.width,y:(e.clientY-r.top)*H/r.height};
}
cv.addEventListener('pointerdown',function(e){
  e.preventDefault();
  const p=toXY(e);
  if(state==='title'){startGame();return;}
  if(state==='over'){if(overT<=0)startGame();return;}
  bladeDown=true;
  blade=[{x:p.x,y:p.y,tm:performance.now()}];
});
cv.addEventListener('pointermove',function(e){
  if(!bladeDown)return;
  const p=toXY(e);
  const prev=blade[blade.length-1];
  blade.push({x:p.x,y:p.y,tm:performance.now()});
  if(blade.length>40)blade.shift();
  if(prev)bladeCut(prev.x,prev.y,p.x,p.y);
});
addEventListener('pointerup',function(){bladeDown=false;});
addEventListener('keydown',function(e){
  const k=e.key.length===1?e.key.toLowerCase():e.key;
  if(e.key===' ')e.preventDefault();
  if(e.key==='Enter'||e.key===' '){
    if(state==='title')startGame();
    else if(state==='over'&&overT<=0)startGame();
  }
  if(k==='r'&&state!=='title')startGame();
});

/* ---------- boot ---------- */
seedTitleFruits();
function fit(){
  const s=Math.min((innerWidth-16)/W,(innerHeight-16)/H);
  cv.style.width=(W*s)+'px';cv.style.height=(H*s)+'px';
}
addEventListener('resize',fit);
fit();
let last=0;
function loop(ts){
  const dt=Math.min(0.033,last?(ts-last)/1000:0.016);
  last=ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
