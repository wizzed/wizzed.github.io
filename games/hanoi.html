<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tower of Hanoi — Wizzed Arcade</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f1a;
    --accent: #ff9f1c;
    --accent-dim: rgba(255,159,28,.35);
    --good: #00ff9d;
    --bad: #ff4060;
    --panel: #191930;
  }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: #e8e8ff;
    font-family: 'Courier New', ui-monospace, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 8px 12px 16px;
    overflow-x: hidden;
  }
  a.back {
    position: fixed; top: 10px; left: 12px;
    color: #8888c0; text-decoration: none; font-size: 13px; letter-spacing: 1px;
    padding: 4px 8px; border: 1px solid #2a2a4a; border-radius: 6px;
    background: rgba(15,15,26,.8); z-index: 50;
  }
  a.back:hover { color: var(--accent); border-color: var(--accent); text-shadow: 0 0 8px var(--accent); }
  h1 {
    margin-top: 2px;
    font-size: clamp(20px, 4.5vmin, 34px);
    letter-spacing: 5px;
    color: var(--accent);
    text-shadow: 0 0 8px var(--accent), 0 0 26px var(--accent-dim);
    text-transform: uppercase;
  }
  #hud { display: flex; gap: 8px; margin: 5px 0 6px; flex-wrap: wrap; justify-content: center; align-items: center; }
  .hudbox {
    background: var(--panel); border: 1px solid #2a2a4a; border-radius: 8px;
    padding: 3px 12px; font-size: 10px; letter-spacing: 1px; color: #9a9ac8; text-align: center; min-width: 74px;
  }
  .hudbox b { display: block; color: var(--accent); font-size: 17px; text-shadow: 0 0 8px var(--accent); }
  #controls { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; justify-content: center; align-items: center; }
  #controls .lbl { font-size: 10px; letter-spacing: 2px; color: #8888c0; margin-right: 2px; }
  .nbtn {
    background: #23233d; border: 1px solid #34345a; color: #d8d8f8;
    font-family: inherit; font-weight: bold; font-size: 13px;
    width: 34px; height: 30px; border-radius: 6px; cursor: pointer;
    touch-action: manipulation;
  }
  .nbtn.active { background: var(--accent); color: #241300; border-color: var(--accent); box-shadow: 0 0 12px var(--accent-dim); }
  .nbtn.reset { width: auto; padding: 0 12px; font-size: 11px; letter-spacing: 1px; }
  .nbtn:hover { border-color: var(--accent); }
  #board {
    position: relative;
    width: min(96vw, 760px);
    height: clamp(220px, 44vh, 340px);
    background: var(--panel);
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    box-shadow: 0 0 18px rgba(255,159,28,.1);
    overflow: hidden;
    touch-action: none;
  }
  .rod {
    position: absolute;
    width: 8px;
    background: linear-gradient(180deg, #4a4a7a, #34345a);
    border-radius: 4px 4px 0 0;
    box-shadow: 0 0 8px rgba(90,90,223,.5);
    pointer-events: none;
  }
  #baseBar {
    position: absolute;
    height: 12px;
    left: 3%; right: 3%; bottom: 12px;
    background: linear-gradient(180deg, #4a4a7a, #2a2a4a);
    border-radius: 6px;
    box-shadow: 0 0 10px rgba(90,90,223,.5);
    pointer-events: none;
  }
  .zone { position: absolute; top: 0; bottom: 0; width: 33.333%; cursor: pointer; }
  .zone:hover { background: rgba(255,159,28,.04); }
  .zone .pegnum {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    font-size: 9px; color: #55557a; letter-spacing: 1px;
  }
  .disc {
    position: absolute;
    height: 24px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,.25);
    cursor: grab;
    transition: left .22s ease, top .22s ease;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: bold; color: rgba(0,0,0,.55);
    user-select: none; -webkit-user-select: none;
  }
  .disc.drag { transition: none; cursor: grabbing; z-index: 20; }
  .disc.sel { filter: brightness(1.3); }
  .disc.shake { animation: shake .4s; }
  @keyframes shake {
    20%,60% { transform: translateX(-8px); }
    40%,80% { transform: translateX(8px); }
  }
  #status { min-height: 18px; font-size: 12px; letter-spacing: 1px; margin-top: 8px; color: #9a9ac8; text-align: center; }
  #status.good { color: var(--good); text-shadow: 0 0 8px var(--good); }
  #status.bad { color: var(--bad); text-shadow: 0 0 8px var(--bad); }
  #overlay {
    position: fixed; inset: 0; background: rgba(10,10,20,.9);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 100;
  }
  #overlay.show { opacity: 1; pointer-events: auto; }
  #fireworks { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .panel2 {
    position: relative;
    background: var(--panel); border: 2px solid var(--accent); border-radius: 12px;
    box-shadow: 0 0 30px var(--accent-dim), 0 0 80px rgba(255,159,28,.15);
    padding: 26px 36px; text-align: center; max-width: 92vw;
  }
  .panel2 h2 { color: var(--accent); letter-spacing: 4px; font-size: 26px; text-shadow: 0 0 12px var(--accent); margin-bottom: 8px; }
  .panel2 .sub { color: #9a9ac8; font-size: 13px; margin-bottom: 16px; line-height: 1.8; }
  .panel2 .sub b { color: var(--accent); }
  .panel2 .rating { font-size: 15px; color: var(--good); text-shadow: 0 0 10px var(--good); letter-spacing: 2px; margin-bottom: 10px; }
  .btn {
    background: var(--accent); color: #241300; border: none; font-family: inherit;
    font-weight: bold; font-size: 15px; letter-spacing: 2px; padding: 11px 26px;
    border-radius: 6px; cursor: pointer; text-transform: uppercase;
    box-shadow: 0 0 14px var(--accent-dim);
  }
  .btn:hover { box-shadow: 0 0 26px var(--accent); }
  @media (max-height: 560px) {
    h1 { font-size: 18px; }
    #board { height: clamp(180px, 40vh, 260px); }
  }
</style>
</head>
<body>
<a class="back" href="../index.html">&larr; Arcade</a>
<h1>Tower of Hanoi</h1>
<div id="hud">
  <div class="hudbox">MOVES<b id="h-moves">0</b></div>
  <div class="hudbox">OPTIMAL<b id="h-opt">15</b></div>
  <div class="hudbox">BEST<b id="h-best">—</b></div>
  <div class="hudbox">SOLVED<b id="h-wins">0</b></div>
</div>
<div id="controls">
  <span class="lbl">DISCS:</span>
  <button class="nbtn" data-n="3">3</button>
  <button class="nbtn active" data-n="4">4</button>
  <button class="nbtn" data-n="5">5</button>
  <button class="nbtn" data-n="6">6</button>
  <button class="nbtn" data-n="7">7</button>
  <button class="nbtn" data-n="8">8</button>
  <button class="nbtn reset" id="resetbtn">↻ RESET</button>
</div>
<div id="board"></div>
<div id="status">Move the whole tower to another peg. Click a peg to lift, click again to drop — or drag discs. Keys 1 2 3 work too.</div>
<div id="overlay">
  <canvas id="fireworks"></canvas>
  <div class="panel2">
    <h2>TOWER COMPLETE!</h2>
    <div class="rating" id="ov-rating">★ PERFECT SOLVE ★</div>
    <div class="sub" id="ov-sub"></div>
    <button class="btn" id="ov-again">Play Again</button>
  </div>
</div>
<script>
(function () {
  "use strict";
  // keep physical Enter/Space from re-triggering the last clicked button
  document.addEventListener("click", function (e) {
    var b = e.target && e.target.closest ? e.target.closest("button") : null;
    if (b) b.blur();
  });
  // ---------- audio ----------
  var actx = null;
  function initAudio() {
    if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { actx = null; } }
    if (actx && actx.state === "suspended") actx.resume();
  }
  document.addEventListener("pointerdown", initAudio, { once: true });
  document.addEventListener("keydown", initAudio, { once: true });
  function beep(freq, dur, type, vol) {
    if (!actx) return;
    try {
      dur = dur || 0.06; type = type || "square"; vol = vol || 0.035;
      var o = actx.createOscillator(), g = actx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, actx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
      o.connect(g); g.connect(actx.destination);
      o.start(); o.stop(actx.currentTime + dur);
    } catch (e) { /* ignore */ }
  }

  // ---------- storage ----------
  var STORE_KEY = "wizzed-hanoi";
  var store = { best: {}, wins: 0 };
  try {
    var raw = localStorage.getItem(STORE_KEY);
    if (raw) { var p = JSON.parse(raw); if (p && typeof p === "object") store = Object.assign(store, p); }
    if (!store.best || typeof store.best !== "object") store.best = {};
  } catch (e) { /* ignore */ }
  function saveStore() { try { localStorage.setItem(STORE_KEY, JSON.stringify(store)); } catch (e) { /* ignore */ } }

  // ---------- state ----------
  var board = document.getElementById("board");
  var n = 4;
  var pegs = [[], [], []];   // arrays of disc ids, last = top; id 0 = smallest
  var discEls = [];
  var discW = [];
  var moves = 0;
  var selectedPeg = -1;
  var busy = false;
  var won = false;
  var metrics = { pegX: [0, 0, 0], baseY: 0, discH: 24, liftY: 20 };

  var DISC_HUES = [160, 190, 220, 275, 315, 350, 25, 55];

  function optimal() { return Math.pow(2, n) - 1; }

  function computeMetrics() {
    var W = board.clientWidth, H = board.clientHeight;
    metrics.pegX = [W / 6, W / 2, W * 5 / 6];
    metrics.baseY = H - 24;
    metrics.discH = Math.max(16, Math.min(28, Math.floor((H - 70) / Math.max(n, 5))));
    metrics.liftY = 14;
    var maxW = W / 3 - 18;
    var minW = Math.max(38, maxW * 0.30);
    discW = [];
    for (var i = 0; i < n; i++) {
      discW.push(n === 1 ? maxW : Math.round(minW + (maxW - minW) * i / (n - 1)));
    }
  }

  function buildBoard() {
    board.innerHTML = "";
    // rods
    for (var i = 0; i < 3; i++) {
      var rod = document.createElement("div");
      rod.className = "rod";
      rod.id = "rod" + i;
      board.appendChild(rod);
    }
    var base = document.createElement("div");
    base.id = "baseBar";
    board.appendChild(base);
    // click zones
    for (var z = 0; z < 3; z++) {
      (function (zi) {
        var zone = document.createElement("div");
        zone.className = "zone";
        zone.style.left = (zi * 33.333) + "%";
        var num = document.createElement("div");
        num.className = "pegnum";
        num.textContent = "[" + (zi + 1) + "]";
        zone.appendChild(num);
        zone.addEventListener("click", function () { clickPeg(zi); });
        board.appendChild(zone);
      })(z);
    }
    // discs
    discEls = [];
    for (var d = 0; d < n; d++) {
      var el = document.createElement("div");
      el.className = "disc";
      var hue = DISC_HUES[d % DISC_HUES.length];
      el.style.background = "linear-gradient(180deg, hsl(" + hue + ",100%,62%), hsl(" + hue + ",90%,45%))";
      el.style.boxShadow = "0 0 12px hsla(" + hue + ",100%,60%,.7)";
      el.textContent = String(d + 1);
      board.appendChild(el);
      discEls.push(el);
      attachDrag(el, d);
    }
    layoutAll(true);
  }

  function positionRods() {
    for (var i = 0; i < 3; i++) {
      var rod = document.getElementById("rod" + i);
      var rodH = metrics.baseY - 34;
      rod.style.left = (metrics.pegX[i] - 4) + "px";
      rod.style.top = (metrics.baseY - rodH) + "px";
      rod.style.height = rodH + "px";
    }
  }

  function discXY(d) {
    // find peg + height
    for (var pIdx = 0; pIdx < 3; pIdx++) {
      var h = pegs[pIdx].indexOf(d);
      if (h >= 0) {
        var lifted = (selectedPeg === pIdx && h === pegs[pIdx].length - 1);
        return {
          x: metrics.pegX[pIdx],
          y: lifted ? metrics.liftY : metrics.baseY - (h + 1) * metrics.discH
        };
      }
    }
    return { x: metrics.pegX[0], y: metrics.liftY };
  }

  function setDisc(d, x, y) {
    var el = discEls[d];
    el.style.width = discW[d] + "px";
    el.style.height = (metrics.discH - 3) + "px";
    el.style.left = (x - discW[d] / 2) + "px";
    el.style.top = y + "px";
  }

  function layoutAll(instant) {
    computeMetrics();
    positionRods();
    for (var d = 0; d < n; d++) {
      var el = discEls[d];
      if (instant) el.classList.add("drag"); // reuse no-transition class
      var pos = discXY(d);
      setDisc(d, pos.x, pos.y);
      if (instant) {
        void el.offsetWidth;
        el.classList.remove("drag");
      }
    }
  }

  function updateHud() {
    document.getElementById("h-moves").textContent = moves;
    document.getElementById("h-opt").textContent = optimal();
    var b = store.best[n];
    document.getElementById("h-best").textContent = b ? b : "—";
    document.getElementById("h-wins").textContent = store.wins;
  }

  function status(msg, cls) {
    var el = document.getElementById("status");
    el.textContent = msg;
    el.className = cls || "";
  }

  function reset() {
    pegs = [[], [], []];
    for (var d = n - 1; d >= 0; d--) pegs[0].push(d);
    moves = 0;
    selectedPeg = -1;
    busy = false;
    won = false;
    stopFireworks();
    document.getElementById("overlay").classList.remove("show");
    buildBoard();
    updateHud();
    status("Move the whole tower to another peg. Click a peg to lift, click again to drop — or drag discs. Keys 1 2 3 work too.");
  }

  function topDisc(p) {
    return pegs[p].length ? pegs[p][pegs[p].length - 1] : null;
  }

  function clickPeg(p) {
    if (busy || won) return;
    if (selectedPeg === -1) {
      if (!pegs[p].length) { beep(160, 0.08, "sawtooth", 0.03); return; }
      selectedPeg = p;
      var d = topDisc(p);
      discEls[d].classList.add("sel");
      setDisc(d, metrics.pegX[p], metrics.liftY);
      beep(520, 0.05, "square", 0.04);
      return;
    }
    if (selectedPeg === p) {
      // put back down
      var dd = topDisc(p);
      discEls[dd].classList.remove("sel");
      selectedPeg = -1;
      var pos = discXY(dd);
      setDisc(dd, pos.x, pos.y);
      beep(300, 0.05, "square", 0.03);
      return;
    }
    tryMove(selectedPeg, p);
  }

  function tryMove(from, to) {
    var d = topDisc(from);
    if (d === null) { selectedPeg = -1; return; }
    var t = topDisc(to);
    if (t !== null && t < d) {
      // illegal: smaller disc under bigger
      illegalMove(d, from);
      return;
    }
    // legal
    discEls[d].classList.remove("sel");
    pegs[from].pop();
    pegs[to].push(d);
    selectedPeg = -1;
    moves++;
    updateHud();
    busy = true;
    // slide across at lift height, then drop
    setDisc(d, metrics.pegX[to], metrics.liftY);
    beep(600 + d * 30, 0.05, "triangle", 0.04);
    setTimeout(function () {
      var pos = discXY(d);
      setDisc(d, pos.x, pos.y);
      beep(340, 0.05, "square", 0.03);
      setTimeout(function () {
        busy = false;
        checkWin();
      }, 240);
    }, 230);
  }

  function illegalMove(d, from) {
    status("Illegal move — you cannot place a bigger disc on a smaller one!", "bad");
    beep(120, 0.2, "sawtooth", 0.05);
    var el = discEls[d];
    el.classList.remove("sel");
    selectedPeg = -1;
    busy = true;
    var pos = discXY(d);
    setDisc(d, pos.x, pos.y);
    setTimeout(function () {
      el.classList.add("shake");
      setTimeout(function () {
        el.classList.remove("shake");
        busy = false;
      }, 420);
    }, 240);
  }

  function checkWin() {
    if (pegs[1].length === n || pegs[2].length === n) {
      won = true;
      var opt = optimal();
      var prevBest = store.best[n];
      var isBest = !prevBest || moves < prevBest;
      if (isBest) store.best[n] = moves;
      store.wins++;
      saveStore();
      updateHud();
      [523, 659, 784, 1047, 1319].forEach(function (f, i) {
        setTimeout(function () { beep(f, 0.14, "square", 0.05); }, i * 120);
      });
      var rating;
      if (moves === opt) rating = "★ PERFECT SOLVE — OPTIMAL! ★";
      else if (moves <= opt * 1.5) rating = "★ EXCELLENT ★";
      else if (moves <= opt * 2.5) rating = "GOOD WORK";
      else rating = "SOLVED — TRY FOR FEWER MOVES";
      document.getElementById("ov-rating").textContent = rating;
      document.getElementById("ov-sub").innerHTML =
        n + " discs solved in <b>" + moves + "</b> moves (optimal <b>" + opt + "</b>)<br>" +
        (isBest ? "★ NEW BEST FOR " + n + " DISCS ★" : "Your best for " + n + " discs: <b>" + store.best[n] + "</b>") +
        " &nbsp;|&nbsp; Towers solved: <b>" + store.wins + "</b>";
      document.getElementById("overlay").classList.add("show");
      startFireworks();
      status("Tower complete in " + moves + " moves!", "good");
    }
  }

  // ---------- drag ----------
  function attachDrag(el, d) {
    el.addEventListener("pointerdown", function (e) {
      if (busy || won) return;
      // only draggable if top of its peg
      var pIdx = -1;
      for (var i = 0; i < 3; i++) if (topDisc(i) === d) { pIdx = i; break; }
      if (pIdx === -1) return;
      e.preventDefault();
      // remember whether this disc was already lifted via click-selection
      var wasSelected = (selectedPeg === pIdx);
      // cancel any click-selection on another peg (lower that disc back down)
      if (selectedPeg !== -1 && selectedPeg !== pIdx) {
        var od = topDisc(selectedPeg);
        selectedPeg = -1;
        if (od !== null) {
          discEls[od].classList.remove("sel");
          var opos = discXY(od);
          setDisc(od, opos.x, opos.y);
        }
      }
      selectedPeg = -1;
      discEls[d].classList.remove("sel");
      var rect = board.getBoundingClientRect();
      var startX = e.clientX, startY = e.clientY;
      var isDrag = false;
      el.setPointerCapture(e.pointerId);
      function onMove(ev) {
        var dx = ev.clientX - startX, dy = ev.clientY - startY;
        if (!isDrag && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
          isDrag = true;
          el.classList.add("drag", "sel");
        }
        if (isDrag) {
          var x = ev.clientX - rect.left;
          var y = ev.clientY - rect.top - metrics.discH / 2;
          x = Math.max(discW[d] / 2, Math.min(rect.width - discW[d] / 2, x));
          y = Math.max(0, Math.min(rect.height - metrics.discH, y));
          setDisc(d, x, y);
        }
      }
      function onUp(ev) {
        el.removeEventListener("pointermove", onMove);
        el.removeEventListener("pointerup", onUp);
        el.removeEventListener("pointercancel", onUp);
        el.classList.remove("drag");
        if (!isDrag) {
          el.classList.remove("sel");
          if (wasSelected) {
            // it was lifted and tapped again: drop it back down
            var rpos = discXY(d);
            setDisc(d, rpos.x, rpos.y);
            beep(300, 0.05, "square", 0.03);
            return;
          }
          // treat as a click on the peg (lift this disc)
          clickPeg(pIdx);
          return;
        }
        el.classList.remove("sel");
        var x = ev.clientX - rect.left;
        var target = x < rect.width / 3 ? 0 : (x < rect.width * 2 / 3 ? 1 : 2);
        if (target === pIdx) {
          var pos = discXY(d);
          setDisc(d, pos.x, pos.y);
          return;
        }
        var t = topDisc(target);
        if (t !== null && t < d) {
          illegalMove(d, pIdx);
        } else {
          pegs[pIdx].pop();
          pegs[target].push(d);
          moves++;
          updateHud();
          busy = true;
          var pos2 = discXY(d);
          setDisc(d, pos2.x, pos2.y);
          beep(340, 0.05, "square", 0.03);
          setTimeout(function () { busy = false; checkWin(); }, 240);
        }
      }
      el.addEventListener("pointermove", onMove);
      el.addEventListener("pointerup", onUp);
      el.addEventListener("pointercancel", onUp);
    });
  }

  // ---------- fireworks ----------
  var fw = document.getElementById("fireworks");
  var fwCtx = fw.getContext("2d");
  var fwParts = [];
  var fwRaf = 0;
  var fwOn = false;
  var fwFrame = 0;

  function sizeFw() {
    fw.width = window.innerWidth;
    fw.height = window.innerHeight;
  }
  function burst() {
    var cx = fw.width * (0.15 + Math.random() * 0.7);
    var cy = fw.height * (0.1 + Math.random() * 0.5);
    var hue = Math.floor(Math.random() * 360);
    for (var i = 0; i < 55; i++) {
      var a = Math.random() * Math.PI * 2;
      var sp = 1.5 + Math.random() * 4.5;
      fwParts.push({
        x: cx, y: cy,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 1,
        hue: hue + Math.floor(Math.random() * 40 - 20)
      });
    }
    beep(200 + Math.random() * 400, 0.12, "triangle", 0.02);
  }
  function fwLoop() {
    if (!fwOn) return;
    fwFrame++;
    if (fwFrame % 45 === 1 && fwParts.length < 400) burst();
    fwCtx.globalCompositeOperation = "destination-out";
    fwCtx.fillStyle = "rgba(0,0,0,0.22)";
    fwCtx.fillRect(0, 0, fw.width, fw.height);
    fwCtx.globalCompositeOperation = "lighter";
    for (var i = fwParts.length - 1; i >= 0; i--) {
      var pt = fwParts[i];
      pt.x += pt.vx; pt.y += pt.vy;
      pt.vy += 0.05;
      pt.vx *= 0.985; pt.vy *= 0.985;
      pt.life -= 0.012;
      if (pt.life <= 0) { fwParts.splice(i, 1); continue; }
      fwCtx.fillStyle = "hsla(" + pt.hue + ",100%,60%," + pt.life + ")";
      fwCtx.beginPath();
      fwCtx.arc(pt.x, pt.y, 2.2, 0, Math.PI * 2);
      fwCtx.fill();
    }
    fwRaf = requestAnimationFrame(fwLoop);
  }
  function startFireworks() {
    sizeFw();
    fwParts = [];
    fwFrame = 0;
    fwOn = true;
    fwCtx.clearRect(0, 0, fw.width, fw.height);
    cancelAnimationFrame(fwRaf);
    fwRaf = requestAnimationFrame(fwLoop);
  }
  function stopFireworks() {
    fwOn = false;
    cancelAnimationFrame(fwRaf);
    fwParts = [];
    if (fw.width) fwCtx.clearRect(0, 0, fw.width, fw.height);
  }

  // ---------- controls ----------
  document.querySelectorAll(".nbtn[data-n]").forEach(function (b) {
    b.addEventListener("click", function () {
      document.querySelectorAll(".nbtn[data-n]").forEach(function (x) { x.classList.remove("active"); });
      b.classList.add("active");
      n = parseInt(b.getAttribute("data-n"), 10);
      reset();
      beep(520, 0.05, "square", 0.04);
    });
  });
  document.getElementById("resetbtn").addEventListener("click", function () {
    reset();
    beep(400, 0.06, "square", 0.04);
  });
  document.getElementById("ov-again").addEventListener("click", function () {
    reset();
    beep(520, 0.06, "square", 0.04);
  });

  window.addEventListener("keydown", function (e) {
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if (document.getElementById("overlay").classList.contains("show")) {
      if (e.key === "Enter") { reset(); e.preventDefault(); }
      return;
    }
    if (e.key === "1" || e.key === "2" || e.key === "3") clickPeg(parseInt(e.key, 10) - 1);
    else if (e.key === "r" || e.key === "R") reset();
  });

  window.addEventListener("resize", function () {
    layoutAll(true);
    if (fwOn) sizeFw();
  });

  reset();
})();
</script>
</body>
</html>
