<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jetpack Jack — Wizzed Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:#0f0f1a;color:#ffe9c7;font-family:'Courier New',ui-monospace,monospace;display:flex;align-items:center;justify-content:center;overflow:hidden}
canvas{background:#0c0c16;border:2px solid rgba(255,179,71,.55);box-shadow:0 0 22px rgba(255,179,71,.35),0 0 90px rgba(255,179,71,.10)}
a.back{position:fixed;top:10px;left:12px;z-index:10;color:#8890b0;text-decoration:none;font-size:13px;letter-spacing:1px;padding:4px 9px;border:1px solid rgba(136,144,176,.35);background:rgba(15,15,26,.75)}
a.back:hover{color:#ffb347;border-color:#ffb347;text-shadow:0 0 8px #ffb347}
</style>
</head>
<body>
<a class="back" href="../index.html">&larr; Arcade</a>
<canvas id="game" width="800" height="500"></canvas>
<script>
'use strict';
const cvs=document.getElementById('game'),ctx=cvs.getContext('2d');
const W=cvs.width,H=cvs.height,ACC='#ffb347';
function fit(){const s=Math.min(innerWidth/W,innerHeight/H)*0.97;cvs.style.width=Math.floor(W*s)+'px';cvs.style.height=Math.floor(H*s)+'px';}
addEventListener('resize',fit);fit();
const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
let best=0;try{best=parseInt(localStorage.getItem('wizzed-jetpack')||'0',10)||0;}catch(e){}
function saveBest(){try{localStorage.setItem('wizzed-jetpack',String(best));}catch(e){}}
let actx=null;
function audio(){if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(actx&&actx.state==='suspended')actx.resume();}
function beep(f,d,type,v,f2){if(!actx)return;try{const t=actx.currentTime,o=actx.createOscillator(),g=actx.createGain();o.type=type||'square';o.frequency.setValueAtTime(f,t);if(f2)o.frequency.exponentialRampToValueAtTime(Math.max(20,f2),t+d);g.gain.setValueAtTime(v||0.06,t);g.gain.exponentialRampToValueAtTime(0.0001,t+d);o.connect(g).connect(actx.destination);o.start(t);o.stop(t+d);}catch(e){}}
/* ---- constants ---- */
const FLOOR=H-56,CEIL=48,PX=170,PR=16;
/* ---- state ---- */
let state='title',stateT=0,gt=0,hold=false;
let py,vy,dist,coins,zaps,missiles,warns,coinArr,scis,parts,nextZap,nextMis,nextCoin,nextSci,bgOff;
function reset(){
  py=H/2;vy=0;dist=0;coins=0;
  zaps=[];missiles=[];warns=[];coinArr=[];scis=[];parts=[];
  nextZap=600;nextMis=2200;nextCoin=350;nextSci=500;bgOff=0;
  state='play';stateT=0;
}
function scoreNow(){return Math.floor(dist/15)+coins*10;}
function speedNow(){return Math.min(560,260+dist*0.005);}
/* ---- input ---- */
function press(){
  audio();
  if(state==='title'){reset();hold=true;return;}
  if(state==='over'){if(stateT>0.6)reset();return;}
  hold=true;
}
function release(){hold=false;}
addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k===' '||k==='arrowup'||k==='w'){e.preventDefault();if(!e.repeat)press();}
  if(k==='enter'&&state!=='play')press();
  if(k==='r'&&state==='over'){audio();reset();}
});
addEventListener('keyup',e=>{
  const k=e.key.toLowerCase();
  if(k===' '||k==='arrowup'||k==='w')release();
});
cvs.addEventListener('mousedown',press);
addEventListener('mouseup',release);
cvs.addEventListener('touchstart',e=>{e.preventDefault();press();},{passive:false});
addEventListener('touchend',release);
addEventListener('touchcancel',release);
/* ---- spawning ---- */
const ZTYPES=[
  {dx:0,dy:120},          /* vertical */
  {dx:150,dy:0},          /* horizontal */
  {dx:110,dy:110},        /* diagonal down */
  {dx:110,dy:-110},       /* diagonal up */
  {dx:0,dy:180}
];
function spawnZap(){
  const t=ZTYPES[Math.floor(Math.random()*ZTYPES.length)];
  const cx=W+120,cy=rand(CEIL+90,FLOOR-90);
  const z={x1:cx-t.dx/2,y1:cy-t.dy/2,x2:cx+t.dx/2,y2:cy+t.dy/2,rot:Math.random()<0.25?rand(-1,1)*0.8:0};
  z.y1=clamp(z.y1,CEIL+20,FLOOR-20);z.y2=clamp(z.y2,CEIL+20,FLOOR-20);
  zaps.push(z);
}
function spawnCoins(){
  const kind=Math.floor(Math.random()*3);
  const bx=W+60,by=rand(CEIL+70,FLOOR-90);
  if(kind===0){ /* line */
    for(let i=0;i<8;i++)coinArr.push({x:bx+i*30,y:by,got:false});
  }else if(kind===1){ /* sine arc */
    for(let i=0;i<10;i++)coinArr.push({x:bx+i*28,y:clamp(by+Math.sin(i*0.7)*55,CEIL+40,FLOOR-40),got:false});
  }else{ /* block */
    for(let r=0;r<2;r++)for(let c=0;c<5;c++)coinArr.push({x:bx+c*30,y:by+r*30,got:false});
  }
}
function spawnSci(){
  scis.push({x:W+40,walk:rand(0,6),spd:rand(30,70),flee:0,col:Math.random()<0.5?'#7dd8ff':'#b8ffa0'});
}
/* ---- update ---- */
function die(){
  state='over';stateT=0;hold=false;
  const sc=scoreNow();
  if(sc>best){best=sc;saveBest();}
  for(let i=0;i<50;i++){
    const a=rand(0,Math.PI*2),sp=rand(60,340);
    parts.push({x:PX,y:py,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:rand(0.4,1.2),max:1.2,col:Math.random()<0.5?ACC:'#ff5c5c',s:rand(2,6)});
  }
  beep(160,0.7,'sawtooth',0.11,30);
}
function segDist(px_,py_,x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy;
  let t=l2?((px_-x1)*dx+(py_-y1)*dy)/l2:0;
  t=clamp(t,0,1);
  const qx=x1+t*dx,qy=y1+t*dy;
  return Math.hypot(px_-qx,py_-qy);
}
function update(dt){
  gt+=dt;stateT+=dt;
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.98;p.vy+=200*dt;p.life-=dt;
    if(p.life<=0)parts.splice(i,1);
  }
  if(state==='title'){py=H/2+Math.sin(gt*2)*24;vy=0;bgOff-=80*dt;return;}
  if(state==='over')return;
  const spd=speedNow();
  dist+=spd*dt;bgOff-=spd*dt;
  /* player */
  vy+=(hold?-2400:1500)*dt;
  vy=clamp(vy,-460,520);
  py+=vy*dt;
  if(py>FLOOR-PR){py=FLOOR-PR;vy=0;}
  if(py<CEIL+PR){py=CEIL+PR;vy=Math.max(0,vy);}
  if(hold&&Math.random()<0.9){
    parts.push({x:PX-10,y:py+14,vx:rand(-60,-20)-spd*0.3,vy:rand(60,180),life:rand(0.15,0.4),max:0.4,col:Math.random()<0.5?ACC:'#ff6a00',s:rand(2,5)});
  }
  /* zappers */
  nextZap-=spd*dt;
  if(nextZap<=0){nextZap=rand(Math.max(320,700-dist*0.01),Math.max(560,1000-dist*0.01));spawnZap();}
  for(let i=zaps.length-1;i>=0;i--){
    const z=zaps[i];
    z.x1-=spd*dt;z.x2-=spd*dt;
    if(z.rot){
      const cx=(z.x1+z.x2)/2,cy=(z.y1+z.y2)/2,a=z.rot*dt;
      const cos=Math.cos(a),sin=Math.sin(a);
      const r1x=z.x1-cx,r1y=z.y1-cy,r2x=z.x2-cx,r2y=z.y2-cy;
      z.x1=cx+r1x*cos-r1y*sin;z.y1=cy+r1x*sin+r1y*cos;
      z.x2=cx+r2x*cos-r2y*sin;z.y2=cy+r2x*sin+r2y*cos;
    }
    if(Math.max(z.x1,z.x2)<-30){zaps.splice(i,1);continue;}
    if(segDist(PX,py,z.x1,z.y1,z.x2,z.y2)<PR+5){die();return;}
  }
  /* missiles */
  nextMis-=spd*dt;
  if(nextMis<=0&&dist>1500){
    nextMis=rand(Math.max(1400,3200-dist*0.02),Math.max(2400,4600-dist*0.02));
    warns.push({y:clamp(py,CEIL+30,FLOOR-30),t:1.0});
    beep(880,0.12,'square',0.06);
  }
  for(let i=warns.length-1;i>=0;i--){
    const w=warns[i];w.t-=dt;
    if(w.t<=0.66&&w.t+dt>0.66)beep(880,0.12,'square',0.06);
    if(w.t<=0.33&&w.t+dt>0.33)beep(880,0.12,'square',0.06);
    if(w.t<=0){
      missiles.push({x:W+50,y:w.y});
      beep(200,0.4,'sawtooth',0.07,120);
      warns.splice(i,1);
    }
  }
  for(let i=missiles.length-1;i>=0;i--){
    const m=missiles[i];
    m.x-=(spd+340)*dt;
    if(Math.random()<0.8)parts.push({x:m.x+26,y:m.y+rand(-3,3),vx:rand(40,120),vy:rand(-25,25),life:rand(0.2,0.5),max:0.5,col:'#9aa0b8',s:rand(2,5)});
    if(m.x<-60){missiles.splice(i,1);continue;}
    if(Math.abs(m.x-PX)<PR+20&&Math.abs(m.y-py)<PR+8){die();return;}
  }
  /* coins */
  nextCoin-=spd*dt;
  if(nextCoin<=0){nextCoin=rand(700,1400);spawnCoins();}
  for(let i=coinArr.length-1;i>=0;i--){
    const c=coinArr[i];
    c.x-=spd*dt;
    if(c.x<-20){coinArr.splice(i,1);continue;}
    if(!c.got&&Math.hypot(c.x-PX,c.y-py)<PR+11){
      c.got=true;coins++;
      beep(1050,0.08,'square',0.05,1500);
      for(let j=0;j<5;j++)parts.push({x:c.x,y:c.y,vx:rand(-90,90),vy:rand(-90,90),life:0.3,max:0.3,col:'#ffd23f',s:3});
      coinArr.splice(i,1);
    }
  }
  /* scientists */
  nextSci-=spd*dt;
  if(nextSci<=0){nextSci=rand(500,1300);spawnSci();}
  for(let i=scis.length-1;i>=0;i--){
    const s=scis[i];
    s.walk+=dt*(s.flee>0?14:6);
    if(py>FLOOR-90&&Math.abs(s.x-PX)<120)s.flee=1;
    s.x-=(spd-(s.flee?-160:s.spd))*dt;
    if(s.x<-30||s.x>W+200)scis.splice(i,1);
  }
}
/* ---- draw ---- */
function drawBG(){
  ctx.fillStyle='#101020';ctx.fillRect(0,0,W,H);
  /* far wall panels */
  const po=((bgOff*0.4)%160+160)%160;
  for(let x=-po;x<W;x+=160){
    ctx.fillStyle='#141428';ctx.fillRect(x,CEIL,150,FLOOR-CEIL);
    ctx.strokeStyle='rgba(90,100,150,0.18)';ctx.lineWidth=2;
    ctx.strokeRect(x+10,CEIL+30,130,FLOOR-CEIL-70);
    /* window glow */
    ctx.fillStyle='rgba(80,140,255,0.07)';
    ctx.fillRect(x+30,CEIL+55,90,80);
    ctx.strokeStyle='rgba(120,170,255,0.2)';
    ctx.strokeRect(x+30,CEIL+55,90,80);
    ctx.beginPath();ctx.moveTo(x+75,CEIL+55);ctx.lineTo(x+75,CEIL+135);ctx.stroke();
  }
  /* pipes near ceiling */
  const po2=((bgOff*0.7)%240+240)%240;
  ctx.fillStyle='#1b1b32';
  ctx.fillRect(0,CEIL+6,W,10);
  for(let x=-po2;x<W;x+=240){
    ctx.fillStyle='#232345';ctx.fillRect(x,CEIL+2,14,18);
  }
  /* ceiling & floor slabs */
  ctx.fillStyle='#1d1d33';
  ctx.fillRect(0,0,W,CEIL);ctx.fillRect(0,FLOOR,W,H-FLOOR);
  /* hazard stripes */
  const so=((bgOff)%40+40)%40;
  ctx.save();ctx.beginPath();ctx.rect(0,FLOOR,W,8);ctx.clip();
  for(let x=-so-40;x<W+40;x+=40){
    ctx.fillStyle=ACC;
    ctx.beginPath();ctx.moveTo(x,FLOOR+8);ctx.lineTo(x+14,FLOOR);ctx.lineTo(x+28,FLOOR);ctx.lineTo(x+14,FLOOR+8);ctx.fill();
  }
  ctx.restore();
  ctx.save();ctx.beginPath();ctx.rect(0,CEIL-8,W,8);ctx.clip();
  for(let x=-so-40;x<W+40;x+=40){
    ctx.fillStyle=ACC;
    ctx.beginPath();ctx.moveTo(x,CEIL);ctx.lineTo(x+14,CEIL-8);ctx.lineTo(x+28,CEIL-8);ctx.lineTo(x+14,CEIL);ctx.fill();
  }
  ctx.restore();
  ctx.fillStyle='rgba(255,179,71,0.25)';
  ctx.fillRect(0,CEIL-1,W,1);ctx.fillRect(0,FLOOR,W,1);
}
function drawSci(s){
  const y=FLOOR,bob=Math.abs(Math.sin(s.walk*2))*3;
  ctx.save();ctx.translate(s.x,y);
  /* legs */
  ctx.strokeStyle='#556';ctx.lineWidth=3;
  const la=Math.sin(s.walk*2)*6;
  ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(-3+la,0);ctx.moveTo(0,-14);ctx.lineTo(3-la,0);ctx.stroke();
  /* coat */
  ctx.fillStyle='#e8e8f2';
  ctx.fillRect(-6,-30+bob*0.3,12,17);
  /* head */
  ctx.fillStyle=s.col;
  ctx.beginPath();ctx.arc(0,-35+bob*0.3,5,0,Math.PI*2);ctx.fill();
  if(s.flee){
    ctx.fillStyle='#fff';ctx.font='10px monospace';ctx.textAlign='center';
    ctx.fillText('!',0,-44);
  }
  ctx.restore();
}
function drawPlayer(){
  ctx.save();
  ctx.translate(PX,py);
  ctx.rotate(clamp(vy*0.0006,-0.3,0.3));
  /* jetpack */
  ctx.fillStyle='#5a5a7a';
  ctx.fillRect(-16,-12,9,22);
  ctx.fillStyle=ACC;ctx.fillRect(-16,-12,9,5);
  /* flame */
  if(hold&&state==='play'){
    ctx.fillStyle='#ff6a00';
    ctx.beginPath();ctx.moveTo(-14,10);ctx.lineTo(-7,10);ctx.lineTo(-10.5,10+rand(10,22));ctx.fill();
    ctx.fillStyle='#ffd23f';
    ctx.beginPath();ctx.moveTo(-13,10);ctx.lineTo(-8,10);ctx.lineTo(-10.5,10+rand(5,12));ctx.fill();
  }
  /* body */
  ctx.fillStyle='#2f6df6';
  ctx.fillRect(-7,-10,14,20);
  /* head */
  ctx.fillStyle='#ffcf9e';
  ctx.beginPath();ctx.arc(2,-15,7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';ctx.fillRect(4,-18,4,3);
  /* hair */
  ctx.fillStyle='#5a3a1a';ctx.beginPath();ctx.arc(1,-18,6,Math.PI,0);ctx.fill();
  /* legs */
  ctx.strokeStyle='#24509e';ctx.lineWidth=4;
  const run=(py>=FLOOR-PR-1&&!hold)?Math.sin(gt*18)*5:2;
  ctx.beginPath();ctx.moveTo(-2,10);ctx.lineTo(-2+run,20);ctx.moveTo(4,10);ctx.lineTo(4-run,20);ctx.stroke();
  ctx.restore();
}
function drawZap(z){
  ctx.save();
  ctx.strokeStyle='#e8ff5c';
  ctx.shadowColor='#e8ff5c';ctx.shadowBlur=12;
  ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(z.x1,z.y1);
  const n=6;
  for(let i=1;i<n;i++){
    const t=i/n;
    ctx.lineTo(z.x1+(z.x2-z.x1)*t+rand(-3,3),z.y1+(z.y2-z.y1)*t+rand(-3,3));
  }
  ctx.lineTo(z.x2,z.y2);ctx.stroke();
  ctx.shadowBlur=0;
  for(const[ex,ey]of[[z.x1,z.y1],[z.x2,z.y2]]){
    ctx.fillStyle='#3a3a5c';
    ctx.beginPath();ctx.arc(ex,ey,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e8ff5c';
    ctx.beginPath();ctx.arc(ex,ey,4,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}
function drawHUD(){
  ctx.textAlign='left';
  ctx.fillStyle='#fff';ctx.font='bold 20px "Courier New",monospace';
  ctx.shadowColor=ACC;ctx.shadowBlur=8;
  ctx.fillText(Math.floor(dist/15)+'m',16,32);
  ctx.shadowBlur=0;
  ctx.fillStyle='#ffd23f';ctx.font='bold 16px "Courier New",monospace';
  ctx.fillText('◉ '+coins,16,54);
  ctx.textAlign='right';
  ctx.fillStyle='#8890b0';ctx.font='13px "Courier New",monospace';
  ctx.fillText('SCORE '+scoreNow()+'  BEST '+best,W-14,30);
}
function draw(){
  drawBG();
  for(const s of scis)drawSci(s);
  for(const c of coinArr){
    const w=Math.abs(Math.sin(gt*6+c.x*0.03));
    ctx.fillStyle='#ffd23f';
    ctx.beginPath();ctx.ellipse(c.x,c.y,9*Math.max(0.25,w),9,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#a87a00';ctx.lineWidth=1.5;ctx.stroke();
  }
  for(const z of zaps)drawZap(z);
  for(const w of warns){
    if(Math.sin(gt*18)>-0.4){
      ctx.fillStyle='#ff2244';
      ctx.fillRect(W-42,w.y-16,32,32);
      ctx.fillStyle='#fff';ctx.font='bold 22px monospace';ctx.textAlign='center';
      ctx.fillText('!',W-26,w.y+8);
    }
  }
  for(const m of missiles){
    ctx.save();ctx.translate(m.x,m.y);
    ctx.fillStyle='#c8ccdd';
    ctx.beginPath();ctx.moveTo(-24,-7);ctx.lineTo(14,-7);ctx.lineTo(26,0);ctx.lineTo(14,7);ctx.lineTo(-24,7);ctx.fill();
    ctx.fillStyle='#ff2244';ctx.beginPath();ctx.moveTo(14,-7);ctx.lineTo(26,0);ctx.lineTo(14,7);ctx.fill();
    ctx.fillStyle='#ff6a00';
    ctx.beginPath();ctx.moveTo(-24,-5);ctx.lineTo(-24-rand(8,20),0);ctx.lineTo(-24,5);ctx.fill();
    ctx.restore();
  }
  for(const p of parts){
    ctx.globalAlpha=Math.max(0,p.life/p.max);
    ctx.fillStyle=p.col;ctx.fillRect(p.x-p.s/2,p.y-p.s/2,p.s,p.s);
  }
  ctx.globalAlpha=1;
  if(state!=='over')drawPlayer();
  drawHUD();
  ctx.textAlign='center';
  if(state==='title'){
    ctx.fillStyle='rgba(12,12,22,0.62)';ctx.fillRect(0,0,W,H);
    drawPlayer();
    ctx.fillStyle=ACC;ctx.font='bold 52px "Courier New",monospace';
    ctx.shadowColor=ACC;ctx.shadowBlur=22;
    ctx.fillText('JETPACK JACK',W/2,170);
    ctx.shadowBlur=0;
    ctx.fillStyle='#c7cbe8';ctx.font='14px "Courier New",monospace';
    ctx.fillText('HOLD space / click / touch to thrust up — release to fall',W/2,215);
    ctx.fillText('Dodge zappers ⚡ and missiles 🚀 — grab the coins!',W/2,238);
    ctx.fillStyle='#ffd23f';ctx.fillText('BEST: '+best,W/2,275);
    if(Math.sin(gt*4)>-0.3){
      ctx.fillStyle='#fff';ctx.font='bold 18px "Courier New",monospace';
      ctx.fillText('CLICK / TAP / SPACE TO START',W/2,330);
    }
  }
  if(state==='over'){
    ctx.fillStyle='rgba(12,12,22,0.72)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff4d6d';ctx.font='bold 44px "Courier New",monospace';
    ctx.shadowColor='#ff4d6d';ctx.shadowBlur=18;
    ctx.fillText('ZAPPED!',W/2,190);
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff';ctx.font='bold 20px "Courier New",monospace';
    ctx.fillText(Math.floor(dist/15)+'m  ·  ◉ '+coins+'  ·  SCORE '+scoreNow(),W/2,240);
    ctx.fillStyle='#ffd23f';ctx.font='16px "Courier New",monospace';
    ctx.fillText(scoreNow()>=best&&scoreNow()>0?'★ NEW BEST! ★':'BEST: '+best,W/2,272);
    if(stateT>0.6&&Math.sin(gt*4)>-0.3){
      ctx.fillStyle='#c7cbe8';ctx.font='16px "Courier New",monospace';
      ctx.fillText('CLICK or R TO RESTART',W/2,325);
    }
  }
}
/* ---- boot ---- */
py=H/2;vy=0;dist=0;coins=0;
zaps=[];missiles=[];warns=[];coinArr=[];scis=[];parts=[];bgOff=0;
spawnSci();scis[0].x=W*0.6;
let last=0;
function loop(ts){
  const dt=Math.min(0.033,(ts-last)/1000||0.016);
  last=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
