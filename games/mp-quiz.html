  // ================================================================
  //  Minimal MQTT 3.1.1 client over WebSocket (public brokers, QoS 0)
  // ================================================================
  class TinyMQTT {
    constructor(urls, clientId) {
      this.urls = urls; this.urlIdx = 0;
      this.clientId = clientId;
      this.ws = null; this.buf = new Uint8Array(0);
      this.connected = false;
      this.onmessage = null; this.onstatus = null;
      this.pingTimer = null; this.dead = false;
      this.connect();
    }
    connect() {
      if (this.dead) return;
      const url = this.urls[this.urlIdx % this.urls.length];
      try { this.ws = new WebSocket(url, 'mqtt'); }
      catch (e) { this.retry(); return; }
      this.ws.binaryType = 'arraybuffer';
      const connectTimeout = setTimeout(() => { try { this.ws.close(); } catch (e) {} }, 6000);
      this.ws.onopen = () => {
        const cid = this.enc(this.clientId);
        const varh = new Uint8Array([0, 4, 77, 81, 84, 84, 4, 0x02, 0, 60]);
        this.send(0x10, this.cat(varh, cid));
      };
      this.ws.onmessage = e => { clearTimeout(connectTimeout); this.feed(new Uint8Array(e.data)); };
      this.ws.onclose = () => { clearTimeout(connectTimeout); this.onDown(); };
      this.ws.onerror = () => {};
    }
    onDown() {
      this.connected = false;
      clearInterval(this.pingTimer);
      if (this.onstatus) this.onstatus(false);
      this.retry();
    }
    retry() {
      if (this.dead) return;
      this.urlIdx++;
      clearTimeout(this.retryT);
      this.retryT = setTimeout(() => this.connect(), 2500);
    }
    close() { this.dead = true; clearInterval(this.pingTimer); try { this.ws.close(); } catch (e) {} }
    enc(str) {
      const b = new TextEncoder().encode(str);
      const out = new Uint8Array(b.length + 2);
      out[0] = b.length >> 8; out[1] = b.length & 255; out.set(b, 2);
      return out;
    }
    cat(...arrs) {
      const len = arrs.reduce((a, b) => a + b.length, 0);
      const out = new Uint8Array(len);
      let o = 0;
      for (const a of arrs) { out.set(a, o); o += a.length; }
      return out;
    }
    remLen(n) {
      const out = [];
      do { let d = n % 128; n = Math.floor(n / 128); if (n > 0) d |= 128; out.push(d); } while (n > 0);
      return new Uint8Array(out);
    }
    send(type, body) {
      if (!this.ws || this.ws.readyState !== 1) return;
      this.ws.send(this.cat(new Uint8Array([type]), this.remLen(body.length), body));
    }
    subscribe(filter) {
      const pid = new Uint8Array([0, 7]);
      this.send(0x82, this.cat(pid, this.enc(filter), new Uint8Array([0])));
    }
    publish(topic, payloadStr) {
      if (!this.connected) return;
      const pl = new TextEncoder().encode(payloadStr);
      this.send(0x30, this.cat(this.enc(topic), pl));
    }
    feed(chunk) {
      this.buf = this.cat(this.buf, chunk);
      for (;;) {
        if (this.buf.length < 2) return;
        let mul = 1, len = 0, pos = 1, ok = false;
        for (; pos < Math.min(this.buf.length, 5); pos++) {
          len += (this.buf[pos] & 127) * mul;
          mul *= 128;
          if ((this.buf[pos] & 128) === 0) { ok = true; pos++; break; }
        }
        if (!ok) return;
        const total = pos + len;
        if (this.buf.length < total) return;
        this.handle(this.buf[0] >> 4, this.buf.slice(pos, total));
        this.buf = this.buf.slice(total);
      }
    }
    handle(type, body) {
      if (type === 2) {
        if (body[1] === 0) {
          this.connected = true;
          this.pingTimer = setInterval(() => this.send(0xC0, new Uint8Array(0)), 25000);
          if (this.onstatus) this.onstatus(true);
        } else this.retry();
      } else if (type === 3) {
        const tlen = (body[0] << 8) | body[1];
        const topic = new TextDecoder().decode(body.slice(2, 2 + tlen));
        const payload = new TextDecoder().decode(body.slice(2 + tlen));
        if (this.onmessage) this.onmessage(topic, payload);
      }
    }
  }

  // ================================================================
  //  Seeded shuffle -> deterministic BANK identical on every client
  // ================================================================
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      let t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  function shuffle(arr, rng) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(rng() * (i + 1)); const t = arr[i]; arr[i] = arr[j]; arr[j] = t; } return arr; }

  const BANK = (function () {
    const brng = mulberry32(20240711);
    const order = RAW.map((_, i) => i);
    shuffle(order, brng);
    return order.map(idx => {
      const item = RAW[idx];
      const opts = [item.a, item.w[0], item.w[1], item.w[2]];
      const perm = [0, 1, 2, 3];
      shuffle(perm, mulberry32((idx + 1) * 2654435761));
      const options = perm.map(p => opts[p]);
      const correct = perm.indexOf(0);
      return { q: item.q, c: item.c, options, correct };
    });
  })();

  // ================================================================
  //  Round schedule from wall clock
  // ================================================================
  const ROUND = 25, ANSWER = 18, REVEAL = 7;
  function roundInfo() {
    const es = Date.now() / 1000;
    const round = Math.floor(es / ROUND);
    const into = es - round * ROUND;
    const answering = into < ANSWER;
    const qi = ((round % BANK.length) + BANK.length) % BANK.length;
    return { round, into, answering, qi, timeLeft: answering ? ANSWER - into : ROUND - into };
  }

  // ================================================================

  // ================================================================
  let actx = null;
  function initAudio() { if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } }
  function beep(freq, dur, type, vol) {
    if (!actx) return;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type || 'square'; o.frequency.value = freq;
    o.connect(g); g.connect(actx.destination);
    const t = actx.currentTime;
    g.gain.setValueAtTime(vol || 0.05, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + (dur || 0.12));
    o.start(t); o.stop(t + (dur || 0.12));
  }

    const dot = $('connDot'), txt = $('connTxt');
    if (up) { dot.className = 'dot live'; txt.textContent = 'LIVE — global quiz'; mq.subscribe(ROOM + '/s/#'); }
    else { dot.className = 'dot off'; txt.textContent = 'OFFLINE — vs AI'; }
  };
  mq.onmessage = (topic, payload) => {
    try {
      const st = JSON.parse(payload);
      if (!st || !st.i || st.i === myId) return;
      if (bots.has(st.i)) return;
      st.seen = performance.now();
      peers.set(st.i, st);
    } catch (e) {}
  };
  function publishMe() {
    if (!online) return;
    mq.publish(ROOM + '/s/' + myId, JSON.stringify({
      i: me.i, n: me.n, ai: 0, r: curRound, a: myLocked ? myAns : -1,
      t: myAnsT, sc: score, st: streak, c: myCorrectThisRound ? 1 : 0,
    }));
  }
  setInterval(publishMe, 1000);
  setInterval(() => { const now = performance.now(); for (const [id, p] of peers) if (now - p.seen > 6000) peers.delete(id); }, 1000);

  // ================================================================
  //  Bots (host = lexicographically-lowest human id)
  // ================================================================
  const BOT_TARGET = 5;
  const BOTNAMES = ['HAL-9', 'BeepBoop', 'Circuit', 'Servo', 'Chip', 'Databyte', 'Sparky', 'Gizmo', 'Rusty', 'Volt', 'Cortex', 'Nano'];
  function humanIds() { const ids = [myId]; for (const [id, p] of peers) if (!p.ai) ids.push(id); return ids.sort(); }
  function iAmBotHost() { return humanIds()[0] === myId; }
  function manageBots() {
    if (!iAmBotHost()) { if (bots.size) bots.clear(); return; }
    const need = Math.max(0, BOT_TARGET - humanIds().length);
    while (bots.size > need) { const k = bots.keys().next().value; bots.delete(k); }
    while (bots.size < need) {
      const bid = 'ai' + Math.random().toString(36).slice(2, 8);
      const used = new Set([...bots.values()].map(b => b.n));
      const free = BOTNAMES.filter(n => !used.has('🤖 ' + n));
      const nm = '🤖 ' + (free.length ? free[Math.random() * free.length | 0] : 'Bot' + bots.size);
      bots.set(bid, { i: bid, n: nm, ai: 1, sc: 0, st: 0, r: -1, a: -1, t: 0, c: 0, acc: 0.62 + Math.random() * 0.2, scoredRound: -1 });
    }
  }
  function botsAnswerRound(round, qi) {
    if (!iAmBotHost()) return;
    const q = BANK[qi];
    for (const b of bots.values()) {
      if (b.scoredRound === round) continue;
      const rng = Math.random;
      const correct = rng() < b.acc;
      b.a = correct ? q.correct : ([0, 1, 2, 3].filter(x => x !== q.correct)[Math.floor(rng() * 3)]);
      b.t = Math.round(1200 + rng() * (ANSWER * 1000 - 2500));
      b.c = correct ? 1 : 0;
      b.sc += pointsFor(correct, b.t);
      b.st = correct ? b.st + 1 : 0;
      b.r = round;
      b.scoredRound = round;
    }
  }
  setInterval(() => {
    if (!online || !iAmBotHost()) return;
    for (const b of bots.values()) {
      mq.publish(ROOM + '/s/' + b.i, JSON.stringify({ i: b.i, n: b.n, ai: 1, r: b.r, a: b.a, t: b.t, sc: b.sc, st: b.st, c: b.c }));
    }
  }, 1100);

  function pointsFor(correct, tMs) {
    if (!correct) return 0;
    const frac = Math.max(0, Math.min(1, tMs / (ANSWER * 1000)));
    return Math.round(1000 * (1 - 0.9 * frac)); // 1000 (instant) down to 100
  }

  // ================================================================
  //  UI wiring
  // ================================================================
  const ansEl = $('ans');
  const btns = [];
  const SHAPES = ['▲', '◆', '●', '■'];
  for (let i = 0; i < 4; i++) {
    const b = document.createElement('button');
    b.className = 'abtn a' + i;
    b.innerHTML = `<span class="shape">${SHAPES[i]}</span><span class="lbl"></span><span class="cnt">0</span>`;
    b.addEventListener('click', () => choose(i));
    ansEl.appendChild(b); btns.push(b);
  }
  addEventListener('keydown', e => {
    initAudio();
    if (e.key >= '1' && e.key <= '4') { choose(parseInt(e.key, 10) - 1); }
  });
  addEventListener('pointerdown', initAudio, { once: false });

  function choose(idx) {
    initAudio();
    const ri = roundInfo();
    if (!ri.answering || myLocked || idx < 0 || idx > 3) return;
    myLocked = true; myAns = idx; myAnsT = Math.round(ri.into * 1000);
    const q = BANK[ri.qi];
    myCorrectThisRound = (idx === q.correct);
    answered++;
    if (myCorrectThisRound) { const p = pointsFor(true, myAnsT); score += p; correctCount++; streak++; beep(720, 0.1, 'square', 0.05); }
    else { streak = 0; beep(200, 0.18, 'sawtooth', 0.05); }
    if (score > best) { best = score; persist(); }
    for (let i = 0; i < 4; i++) btns[i].classList.toggle('sel', i === idx);
    publishMe();
    renderResult(ri);
  }

  function onNewRound(round, qi) {
    curRound = round;
    myAns = -1; myLocked = false; myCorrectThisRound = false; myAnsT = 0; revealBeeped = false; missedApplied = false;
    const q = BANK[qi];
    $('qtext').textContent = q.q;
    $('cat').textContent = q.c;
    for (let i = 0; i < 4; i++) {
      btns[i].querySelector('.lbl').textContent = q.options[i];
      btns[i].className = 'abtn a' + i;
      btns[i].querySelector('.cnt').textContent = '0';
    }
    $('resultLine').textContent = '';
    botsAnswerRound(round, qi);
    publishMe();
    beep(520, 0.09, 'triangle', 0.045);
  }

  function everyoneStates() {
    // returns list of {i,n,ai,r,a,sc,st,c, me?}
    const arr = [{ i: myId, n: me.n, ai: 0, r: curRound, a: myLocked ? myAns : -1, sc: score, st: streak, c: myCorrectThisRound ? 1 : 0, me: true }];
    for (const p of peers.values()) arr.push(p);
    for (const b of bots.values()) arr.push(b);
    return arr;
  }

  function renderResult(ri) {
    const q = BANK[ri.qi];
    if (ri.answering) {
      if (myLocked) $('resultLine').innerHTML = myCorrectThisRound
        ? '<span style="color:#35d07f">Locked in — correct? find out at reveal!</span>'
        : '<span style="color:#ff9d3c">Locked in — waiting for reveal…</span>';
      else $('resultLine').innerHTML = '<span style="color:#b58cd6">Pick an answer! (1–4)</span>';
    } else {
      // reveal
      for (let i = 0; i < 4; i++) {
        btns[i].classList.add('showcnt');
        if (i === q.correct) btns[i].classList.add('correct');
        else btns[i].classList.add('wrong');
      }
      // counts
      const counts = [0, 0, 0, 0];
      for (const s of everyoneStates()) if (s.r === ri.round && s.a >= 0 && s.a < 4) counts[s.a]++;
      for (let i = 0; i < 4; i++) btns[i].querySelector('.cnt').textContent = counts[i];
      if (myLocked) {
        $('resultLine').innerHTML = myCorrectThisRound
          ? `<span style="color:#35d07f">✓ CORRECT!  +${pointsFor(true, myAnsT)} pts  ${streak > 1 ? '🔥×' + streak : ''}</span>`
          : `<span style="color:#ff4d6d">✗ Wrong — answer was "${q.options[q.correct].replace(/[<>&]/g, '')}"</span>`;
      } else {
        $('resultLine').innerHTML = `<span style="color:#b58cd6">No answer — it was "${q.options[q.correct].replace(/[<>&]/g, '')}"</span>`;
      }
    }
  }

  // ================================================================
  //  Main loop (rAF) — drives timer bar + phase transitions + HUD
  // ================================================================
  let boardT = 0;
  function frame() {
    const ri = roundInfo();
    if (ri.round !== curRound) onNewRound(ri.round, ri.qi);
    manageBots();

    // reveal transition
    if (!ri.answering) {
      if (!missedApplied) { missedApplied = true; if (!myLocked) streak = 0; }
      if (!revealBeeped) { revealBeeped = true; beep(myLocked && myCorrectThisRound ? 900 : 300, 0.25, 'triangle', 0.05); }
    }
    renderResult(ri);

    // timer bar
    const frac = ri.answering ? (ri.timeLeft / ANSWER) : (ri.timeLeft / REVEAL);
    const fill = $('timefill');
    fill.style.width = Math.max(0, Math.min(1, frac)) * 100 + '%';
    fill.style.background = ri.answering
      ? 'linear-gradient(90deg,#35d07f,#ffb03a,#ff4d6d)'
      : 'linear-gradient(90deg,#7a4bd0,#b14bff)';

    // round info
    $('roundNo').textContent = '#' + (ri.round % 100000);
    $('phaseTxt').innerHTML = ri.answering
      ? '<b style="color:#35d07f">ANSWER</b> ' + Math.ceil(ri.timeLeft) + 's'
      : '<b style="color:#b14bff">REVEAL</b> ' + Math.ceil(ri.timeLeft) + 's';

    // my stat
    $('scoreTxt').textContent = score;
    $('bestTxt').textContent = best;

    // counts / scoreboard (throttled)
    const now = performance.now();
    if (now - boardT > 400) { boardT = now; updateBoard(); }

    requestAnimationFrame(frame);
  }

  function updateBoard() {
    let humans = 1, ais = 0;
    for (const p of peers.values()) (p.ai ? ais++ : humans++);
    ais += bots.size;
    $('onlineN').textContent = (humans + ais);
    $('humanN').textContent = humans;
    $('aiN').textContent = ais;

    const rows = everyoneStates()
      .map(s => ({ s, sc: s.sc || 0 }))
      .sort((a, b) => b.sc - a.sc).slice(0, 10);
    $('blist').innerHTML = rows.map((r, i) => {
      const s = r.s;
      const flames = s.st >= 2 ? '🔥'.repeat(Math.min(3, s.st - 1)) : '';
      return `<div class="brow${s.me ? ' me' : ''}">` +
        `<span class="pos">${i + 1}</span>` +
        `<span class="nm">${(s.n || '???').replace(/[<>&]/g, '')}</span>` +
        (s.ai ? '<span class="aitag">AI</span>' : '') +
        `<span class="fl">${flames}</span>` +
        `<span class="sc">${r.sc}</span></div>`;
    }).join('');
  }

  // boot
  onNewRound(roundInfo().round, roundInfo().qi);
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
