<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Words — Wizzed Arcade</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f1a;
    --accent: #00ff9d;
    --correct: #00e08a;
    --present: #ffcf40;
    --absent: #2c2c44;
    --tile-border: #34345a;
    --panel: #191930;
  }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: #e8e8ff;
    font-family: 'Courier New', ui-monospace, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 8px 10px 16px;
    overflow-x: hidden;
  }
  a.back {
    position: fixed;
    top: 10px; left: 12px;
    color: #8888c0;
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 1px;
    z-index: 50;
    padding: 4px 8px;
    border: 1px solid #2a2a4a;
    border-radius: 6px;
    background: rgba(15,15,26,.8);
  }
  a.back:hover { color: var(--accent); border-color: var(--accent); text-shadow: 0 0 8px var(--accent); }
  h1 {
    margin-top: 4px;
    font-size: clamp(20px, 4.5vmin, 34px);
    letter-spacing: 5px;
    color: var(--accent);
    text-shadow: 0 0 8px var(--accent), 0 0 24px rgba(0,255,157,.5);
    text-transform: uppercase;
  }
  .statsbar {
    display: flex;
    gap: 8px;
    margin: 6px 0 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stat {
    background: var(--panel);
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    padding: 3px 10px;
    font-size: 11px;
    letter-spacing: 1px;
    color: #9a9ac8;
    box-shadow: 0 0 10px rgba(0,255,157,.08) inset;
  }
  .stat b { color: var(--accent); font-size: 14px; margin-left: 4px; text-shadow: 0 0 6px var(--accent); }
  #board {
    display: grid;
    grid-template-rows: repeat(6, auto);
    gap: 5px;
    margin-bottom: 10px;
  }
  .row { display: grid; grid-template-columns: repeat(5, auto); gap: 5px; }
  .tile {
    width: clamp(30px, 6.4vmin, 56px);
    height: clamp(30px, 6.4vmin, 56px);
    border: 2px solid var(--tile-border);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(16px, 3.6vmin, 30px);
    font-weight: bold;
    text-transform: uppercase;
    background: #14142a;
    transition: transform .22s ease, background-color .1s, border-color .1s;
  }
  .tile.filled { border-color: var(--accent); animation: pop .12s ease; box-shadow: 0 0 8px rgba(0,255,157,.25); }
  .tile.flip { transform: rotateX(90deg); }
  .tile.correct { background: var(--correct); border-color: var(--correct); color: #04140c; box-shadow: 0 0 12px rgba(0,224,138,.7); }
  .tile.present { background: var(--present); border-color: var(--present); color: #201800; box-shadow: 0 0 12px rgba(255,207,64,.6); }
  .tile.absent  { background: var(--absent);  border-color: var(--absent);  color: #77779a; }
  @keyframes pop { 50% { transform: scale(1.12); } }
  .row.shake { animation: shake .45s; }
  @keyframes shake {
    10%,90% { transform: translateX(-2px); }
    20%,80% { transform: translateX(4px); }
    30%,50%,70% { transform: translateX(-6px); }
    40%,60% { transform: translateX(6px); }
  }
  #toast {
    position: fixed;
    top: 56px; left: 50%;
    transform: translateX(-50%);
    background: #e8e8ff;
    color: #0f0f1a;
    font-weight: bold;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 13px;
    letter-spacing: 1px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
    z-index: 60;
  }
  #toast.show { opacity: 1; }
  #kb { display: flex; flex-direction: column; gap: 5px; align-items: center; width: 100%; max-width: 520px; }
  .kbrow { display: flex; gap: 4px; justify-content: center; width: 100%; }
  .key {
    flex: 1;
    max-width: 44px;
    height: clamp(34px, 6.5vh, 50px);
    background: #23233d;
    border: 1px solid #34345a;
    border-radius: 5px;
    color: #d8d8f8;
    font-family: inherit;
    font-weight: bold;
    font-size: clamp(11px, 2.4vmin, 15px);
    cursor: pointer;
    text-transform: uppercase;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    transition: background .1s, box-shadow .1s;
  }
  .key.wide { max-width: 68px; flex: 1.6; font-size: 10px; }
  .key:hover { border-color: var(--accent); box-shadow: 0 0 8px rgba(0,255,157,.35); }
  .key:active { transform: scale(.94); }
  .key.correct { background: var(--correct); color: #04140c; border-color: var(--correct); box-shadow: 0 0 8px rgba(0,224,138,.5); }
  .key.present { background: var(--present); color: #201800; border-color: var(--present); }
  .key.absent  { background: #17172a; color: #55557a; border-color: #22223a; }
  #overlay {
    position: fixed; inset: 0;
    background: rgba(10,10,20,.88);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
    z-index: 100;
  }
  #overlay.show { opacity: 1; pointer-events: auto; }
  .panel {
    background: var(--panel);
    border: 2px solid var(--accent);
    border-radius: 12px;
    box-shadow: 0 0 30px rgba(0,255,157,.4), 0 0 80px rgba(0,255,157,.15);
    padding: 26px 34px;
    text-align: center;
    max-width: 92vw;
  }
  .panel h2 {
    color: var(--accent);
    letter-spacing: 4px;
    font-size: 24px;
    text-shadow: 0 0 12px var(--accent);
    margin-bottom: 10px;
  }
  .panel .word { font-size: 20px; letter-spacing: 6px; color: #fff; margin: 8px 0 14px; text-shadow: 0 0 10px #fff; }
  .panel .sub { color: #9a9ac8; font-size: 13px; margin-bottom: 16px; line-height: 1.7; }
  .panel .sub b { color: var(--accent); }
  .btn {
    background: var(--accent);
    color: #04140c;
    border: none;
    font-family: inherit;
    font-weight: bold;
    font-size: 15px;
    letter-spacing: 2px;
    padding: 11px 26px;
    border-radius: 6px;
    cursor: pointer;
    box-shadow: 0 0 14px rgba(0,255,157,.6);
    text-transform: uppercase;
  }
  .btn:hover { box-shadow: 0 0 24px rgba(0,255,157,.9); }
  @media (max-height: 560px) {
    h1 { margin-top: 0; font-size: 18px; }
    .statsbar { margin: 3px 0 5px; }
    #board { gap: 3px; margin-bottom: 6px; }
    .row { gap: 3px; }
  }
</style>
</head>

  }
  function renderStats() {
    document.getElementById("s-streak").textContent = stats.streak;
    document.getElementById("s-best").textContent = stats.best;
    document.getElementById("s-wins").textContent = stats.wins;
    document.getElementById("s-played").textContent = stats.played;
  }

  // ---------- board ----------
  var boardEl = document.getElementById("board");
  var tiles = []; // [row][col]
  var rowsEls = [];
  (function buildBoard() {
    for (var r = 0; r < 6; r++) {
      var row = document.createElement("div");
      row.className = "row";
      var tr = [];
      for (var c = 0; c < 5; c++) {
        var t = document.createElement("div");
        t.className = "tile";
        row.appendChild(t);
        tr.push(t);
      }
      boardEl.appendChild(row);
      rowsEls.push(row);
      tiles.push(tr);
    }
  })();

  // ---------- keyboard ----------
  var kbEl = document.getElementById("kb");
  var keyEls = {};
  (function buildKb() {
    var rows = [["Q","W","E","R","T","Y","U","I","O","P"],
                ["A","S","D","F","G","H","J","K","L"],
                ["ENTER","Z","X","C","V","B","N","M","DEL"]];
    rows.forEach(function (r) {
      var rowEl = document.createElement("div");
      rowEl.className = "kbrow";
      r.forEach(function (k) {
        var b = document.createElement("button");
        b.className = "key" + (k.length > 1 ? " wide" : "");
        b.textContent = k === "DEL" ? "⌫" : k;
        b.setAttribute("data-key", k);
        b.addEventListener("click", function () { handleKey(k); });
        rowEl.appendChild(b);
        if (k.length === 1) keyEls[k] = b;
      });
      kbEl.appendChild(rowEl);
    });
  })();

  // ---------- game state ----------
  var answer = "", curRow = 0, curCol = 0, grid, finished = false, revealing = false;
  var toastTimer = null;

  function newGame() {
    answer = ANSWERS[Math.floor(Math.random() * ANSWERS.length)];
    curRow = 0; curCol = 0; finished = false; revealing = false;
    grid = [];
    for (var r = 0; r < 6; r++) {
      grid.push(["", "", "", "", ""]);
      for (var c = 0; c < 5; c++) {
        tiles[r][c].textContent = "";
        tiles[r][c].className = "tile";
      }
    }
    Object.keys(keyEls).forEach(function (k) { keyEls[k].className = "key"; });
    document.getElementById("overlay").classList.remove("show");
  }

  function toast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.classList.remove("show"); }, 1400);
  }

  function shakeRow(r) {
    var el = rowsEls[r];
    el.classList.remove("shake");
    void el.offsetWidth;
    el.classList.add("shake");
    beep(110, 0.15, "sawtooth", 0.05);
  }

  function handleKey(k) {
    if (finished || revealing) return;
    if (k === "ENTER") { submitGuess(); return; }
    if (k === "DEL") {
      if (curCol > 0) {
        curCol--;
        grid[curRow][curCol] = "";
        tiles[curRow][curCol].textContent = "";
        tiles[curRow][curCol].classList.remove("filled");
        beep(180, 0.04);
      }
      return;
    }
    if (/^[A-Z]$/.test(k) && curCol < 5) {
      grid[curRow][curCol] = k;
      tiles[curRow][curCol].textContent = k;
      tiles[curRow][curCol].classList.add("filled");
      curCol++;
      beep(440 + curCol * 40, 0.04);
    }
  }

  function statusesFor(guess) {
    var st = ["absent", "absent", "absent", "absent", "absent"];
    var counts = {};
    var i;
    for (i = 0; i < 5; i++) {
      var ch = answer[i];
      counts[ch] = (counts[ch] || 0) + 1;
    }
    for (i = 0; i < 5; i++) {
      if (guess[i] === answer[i]) { st[i] = "correct"; counts[guess[i]]--; }
    }
    for (i = 0; i < 5; i++) {
      if (st[i] === "correct") continue;
      if (counts[guess[i]] > 0) { st[i] = "present"; counts[guess[i]]--; }
    }
    return st;
  }

  var KEY_RANK = { absent: 1, present: 2, correct: 3 };
  function paintKey(letter, status) {
    var el = keyEls[letter];
    if (!el) return;
    var cur = el.getAttribute("data-status");
    if (cur && KEY_RANK[cur] >= KEY_RANK[status]) return;
    el.setAttribute("data-status", status);
    el.className = "key " + status;
  }

  function submitGuess() {
    if (curCol < 5) { toast("NOT ENOUGH LETTERS"); shakeRow(curRow); return; }
    var guess = grid[curRow].join("");
    if (!VALID.has(guess)) { toast("NOT IN WORD LIST"); shakeRow(curRow); return; }
    revealing = true;
    var st = statusesFor(guess);
    var r = curRow;
    st.forEach(function (s, i) {
      setTimeout(function () {
        var tile = tiles[r][i];
        tile.classList.add("flip");
        beep(s === "correct" ? 660 : s === "present" ? 520 : 300, 0.06, "triangle");
        setTimeout(function () {
          tile.classList.remove("flip", "filled");
          tile.classList.add(s);
        }, 160);
      }, i * 230);
    });
    setTimeout(function () {
      st.forEach(function (s, i) { paintKey(guess[i], s); });
      revealing = false;
      if (guess === answer) { endGame(true); return; }
      curRow++; curCol = 0;
      if (curRow >= 6) endGame(false);
    }, 5 * 230 + 250);
  }

  var WIN_WORDS = ["GENIUS!", "MAGNIFICENT!", "IMPRESSIVE!", "SPLENDID!", "GREAT!", "PHEW!"];
  function endGame(won) {
    finished = true;
    stats.played++;
    if (won) {
      stats.wins++;
      stats.streak++;
      if (stats.streak > stats.best) stats.best = stats.streak;
      var seq = [523, 659, 784, 1047];
      seq.forEach(function (f, i) { setTimeout(function () { beep(f, 0.12, "square", 0.05); }, i * 110); });
    } else {
      stats.streak = 0;
      [300, 240, 180].forEach(function (f, i) { setTimeout(function () { beep(f, 0.18, "sawtooth", 0.05); }, i * 150); });
    }
    saveStats();
    renderStats();
    setTimeout(function () {
      document.getElementById("ov-title").textContent = won ? WIN_WORDS[Math.min(curRow, 5)] : "GAME OVER";
      document.getElementById("ov-word").textContent = answer;
      document.getElementById("ov-sub").innerHTML = won
        ? "Solved in <b>" + (curRow + 1) + "/6</b> &nbsp;|&nbsp; Streak <b>" + stats.streak + "</b> &nbsp;|&nbsp; Best <b>" + stats.best + "</b>"
        : "The word was above. Streak reset. Best streak <b>" + stats.best + "</b>";
      document.getElementById("overlay").classList.add("show");
    }, won ? 600 : 500);
  }

  document.getElementById("ov-again").addEventListener("click", function () {
    beep(520, 0.06);
    newGame();
  });

  window.addEventListener("keydown", function (e) {
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    var k = e.key;
    if (k === "Enter") {
      if (document.getElementById("overlay").classList.contains("show")) {
        newGame();
      } else {
        handleKey("ENTER");
      }
      e.preventDefault();
    } else if (k === "Backspace") {
      handleKey("DEL");
      e.preventDefault();
    } else if (/^[a-zA-Z]$/.test(k)) {
      handleKey(k.toUpperCase());
    }
  });

  renderStats();
  newGame();
})();
</script>
</body>
</html>
