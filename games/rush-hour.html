  .stat.cyan .val { color: var(--cyan); }

function loadStore(){ try{ var v=JSON.parse(localStorage.getItem(LS_KEY)); if(v&&typeof v.unlocked==='number') return {unlocked:v.unlocked,best:v.best||{}}; }catch(e){} return {unlocked:0,best:{}}; }
function saveStore(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(store)); }catch(e){} }

function loadLevel(k){
  lvl=(k+LEVELS.length)%LEVELS.length;
  var L=LEVELS[lvl];
  par=L.par;
  cars=L.cars.map(function(c){ return {x:c.x,y:c.y,len:c.len,dir:c.dir,red:c.red}; });
  moves=0; sel=-1; undo=[]; lastAct=null; won=false; exitAnim=0;
  updateHud(); hideOverlay();
}
function redIndex(){ for(var i=0;i<cars.length;i++) if(cars[i].red) return i; return 0; }

function updateHud(){
  document.getElementById('hLevel').textContent=(lvl+1)+'/'+LEVELS.length;
  document.getElementById('hDiff').textContent=LEVELS[lvl].diff.toUpperCase();
  document.getElementById('hMoves').textContent=moves;
  document.getElementById('hPar').textContent=par;
  var b=store.best[lvl];
  document.getElementById('hBest').textContent = b?b:'–';
  document.getElementById('btnUndo').disabled = undo.length===0;
}

/* ---------- occupancy & movement ---------- */
function occupancy(excl){
  var g=new Array(GRID*GRID).fill(-1);
  for(var i=0;i<cars.length;i++){
    if(i===excl) continue;
    var c=cars[i];
    for(var k=0;k<c.len;k++){
      var x=c.x+(c.dir==='h'?k:0), y=c.y+(c.dir==='h'?0:k);
      g[y*GRID+x]=i;
    }
  }
  return g;
}
function freeRange(i){
  var c=cars[i], g=occupancy(i);
  if(c.dir==='h'){
    var minX=c.x, maxX=c.x;
    while(minX-1>=0 && g[c.y*GRID+(minX-1)]===-1) minX--;
    while(maxX+c.len<=GRID-1 && g[c.y*GRID+(maxX+c.len)]===-1) maxX++;
    return {min:minX, max:maxX};
  } else {
    var minY=c.y, maxY=c.y;
    while(minY-1>=0 && g[(minY-1)*GRID+c.x]===-1) minY--;
    while(maxY+c.len<=GRID-1 && g[(maxY+c.len)*GRID+c.x]===-1) maxY++;
    return {min:minY, max:maxY};
  }
}
function snapshot(){ return cars.map(function(c){ return {x:c.x,y:c.y}; }); }
function restore(s){ for(var i=0;i<cars.length;i++){ cars[i].x=s[i].x; cars[i].y=s[i].y; } }

function checkWin(){
  var r=cars[redIndex()];
  if(r.x+r.len-1===GRID-1){
    won=true;
    var isRec = !store.best[lvl] || moves<store.best[lvl];
    if(isRec) store.best[lvl]=moves;
    if(lvl>=store.unlocked) store.unlocked=lvl+1;
    saveStore();
    exitAnim=0.0001; // start drive-out
    [523,659,784,1047].forEach(function(f,i){ setTimeout(function(){ beep(f,.2,'triangle',.06); }, i*110); });
    setTimeout(function(){
      document.getElementById('ovlInfo').textContent = 'Solved in '+moves+' moves. Par is '+par+'.';
      var b=store.best[lvl];
      document.getElementById('ovlBest').textContent = (moves<=par? '★ PAR OR BETTER! ★' : (isRec? 'NEW BEST: '+b+' moves' : 'best: '+b+' moves'));
      document.getElementById('ovl').classList.remove('hidden');
    }, 900);
  }
}

/* ---------- keyboard ---------- */
function keyMove(dir){
  if(won || sel<0) return;
  var c=cars[sel];
  var delta=0;
  if(c.dir==='h'){ if(dir==='left') delta=-1; else if(dir==='right') delta=1; else return; }
  else { if(dir==='up') delta=-1; else if(dir==='down') delta=1; else return; }
  var range=freeRange(sel);
  var cur=(c.dir==='h')?c.x:c.y;
  var next=cur+delta;
  if(next<range.min || next>range.max) return;
  var sameSlide = lastAct && lastAct.type==='key' && lastAct.car===sel && lastAct.dir===dir;
  if(!sameSlide){ undo.push(snapshot()); moves++; }
  if(c.dir==='h') c.x=next; else c.y=next;
  lastAct={type:'key',car:sel,dir:dir};
  beep(300+moves*8,.04,'square',.03);
  updateHud();
  checkWin();
}
window.addEventListener('keydown', function(e){
  var m={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if(m[e.key]){ e.preventDefault(); keyMove(m[e.key]); }
});

/* ---------- pointer / drag ---------- */
function evtPos(e){
  var rect=canvas.getBoundingClientRect();
  var cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
  var cy=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
  return { x:cx*(464/rect.width), y:cy*(464/rect.height) };
}
function cellAt(px,py){
  var col=Math.floor((px-M)/cell), row=Math.floor((py-M)/cell);
  if(col<0||col>=GRID||row<0||row>=GRID) return null;
  return {col:col,row:row};
}
function carAtCell(col,row){
  for(var i=0;i<cars.length;i++){
    var c=cars[i];
    for(var k=0;k<c.len;k++){
      var x=c.x+(c.dir==='h'?k:0), y=c.y+(c.dir==='h'?0:k);
      if(x===col && y===row) return i;
    }
  }
  return -1;
}
canvas.addEventListener('pointerdown', function(e){
  ensureAudio();
  if(won) return;
  var p=evtPos(e); var cc=cellAt(p.x,p.y);
  if(!cc){ sel=-1; return; }
  var ci=carAtCell(cc.col,cc.row);
  if(ci<0){ sel=-1; return; }
  sel=ci;
  var c=cars[ci];
  var range=freeRange(ci);
  drag={ car:ci, startSnap:snapshot(), grabCol:cc.col, grabRow:cc.row, range:range, start:(c.dir==='h'?c.x:c.y), moved:false };
});
canvas.addEventListener('pointermove', function(e){
  if(!drag) return;
  var p=evtPos(e);
  var c=cars[drag.car];
  if(c.dir==='h'){
    var pointerCol=(p.x-M)/cell - (drag.grabCol - drag.start);
    var target=Math.round(pointerCol);
    target=Math.max(drag.range.min, Math.min(drag.range.max, target));
    if(target!==c.x){ c.x=target; drag.moved=true; }
  } else {
    var pointerRow=(p.y-M)/cell - (drag.grabRow - drag.start);
    var t2=Math.round(pointerRow);
    t2=Math.max(drag.range.min, Math.min(drag.range.max, t2));
    if(t2!==c.y){ c.y=t2; drag.moved=true; }
  }
});
canvas.addEventListener('pointerup', function(e){
  if(!drag) return;
  var c=cars[drag.car];
  var now=(c.dir==='h'?c.x:c.y);
  if(now!==drag.start){
    undo.push(drag.startSnap); moves++; lastAct={type:'drag'};
    beep(360,.05,'square',.03);
    updateHud(); checkWin();
  }
  drag=null;
});
canvas.addEventListener('pointercancel', function(){ if(drag){ restore(drag.startSnap); drag=null; } });

/* ---------- draw ---------- */
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function draw(){
  ctx.clearRect(0,0,464,464);
  // board
  ctx.save();
  ctx.fillStyle='#14141f';
  rr(M,M,GRID*cell,GRID*cell,10); ctx.fill();
  // grid
  ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=1;
  for(var i=0;i<=GRID;i++){
    ctx.beginPath(); ctx.moveTo(M+i*cell,M); ctx.lineTo(M+i*cell,M+GRID*cell); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(M,M+i*cell); ctx.lineTo(M+GRID*cell,M+i*cell); ctx.stroke();
  }
  ctx.restore();
  // exit marker (right of EXIT_ROW)
  var ey=M+EXIT_ROW*cell;
  ctx.save();
  ctx.fillStyle='rgba(255,59,78,.9)'; ctx.shadowColor='#ff3b4e'; ctx.shadowBlur=14;
  ctx.beginPath();
  ctx.moveTo(M+GRID*cell+3, ey+cell*0.2);
  ctx.lineTo(M+GRID*cell+16, ey+cell*0.5);
  ctx.lineTo(M+GRID*cell+3, ey+cell*0.8);
  ctx.closePath(); ctx.fill();
  ctx.restore();
  // draw cars
  for(var idx=0;idx<cars.length;idx++) drawCar(idx);
  if(exitAnim>0){ exitAnim+=0.05; if(exitAnim>4) exitAnim=4; }
  requestAnimationFrame(draw);
}
function drawCar(i){
  var c=cars[i];
  var w=(c.dir==='h'?c.len:1)*cell, h=(c.dir==='h'?1:c.len)*cell;
  var x=M+c.x*cell, y=M+c.y*cell;
  if(c.red && exitAnim>0){ x += exitAnim*cell; }
  var pad=6;
  var col = c.red ? '#ff3b4e' : CARCOL[i % CARCOL.length];
  ctx.save();
  // body
  var g=ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0, lighten(col,50));
  g.addColorStop(0.5, col);
  g.addColorStop(1, darken(col,40));
  ctx.fillStyle=g;
  ctx.shadowColor=col; ctx.shadowBlur=c.red?16:8;
  rr(x+pad,y+pad,w-pad*2,h-pad*2, 10); ctx.fill();
  ctx.shadowBlur=0;
  // cabin / window
  ctx.fillStyle='rgba(10,14,24,.55)';
  if(c.dir==='h'){ rr(x+pad+w*0.18, y+pad+6, w-pad*2-w*0.36, h-pad*2-12, 6); }
  else { rr(x+pad+6, y+pad+h*0.18, w-pad*2-12, h-pad*2-h*0.36, 6); }
  ctx.fill();
  // gloss
  ctx.fillStyle='rgba(255,255,255,.18)';
  rr(x+pad+3,y+pad+3, w-pad*2-6, (h-pad*2)*0.28, 6); ctx.fill();
  // selected outline
  if(i===sel && !won){
    ctx.strokeStyle='#ffd166'; ctx.lineWidth=3; ctx.setLineDash([6,4]);
    rr(x+3,y+3,w-6,h-6,10); ctx.stroke(); ctx.setLineDash([]);
  }
  // red car label
  if(c.red){
    ctx.fillStyle='#fff'; ctx.font='bold '+Math.round(cell*0.4)+'px "Courier New",monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('★', x+w/2, y+h/2+1);
  }
  ctx.restore();
}
function lighten(hex,amt){ var n=parseInt(hex.slice(1),16),r=(n>>16)&255,g=(n>>8)&255,b=n&255; return 'rgb('+Math.min(255,r+amt)+','+Math.min(255,g+amt)+','+Math.min(255,b+amt)+')'; }
function darken(hex,amt){ var n=parseInt(hex.slice(1),16),r=(n>>16)&255,g=(n>>8)&255,b=n&255; return 'rgb('+Math.max(0,r-amt)+','+Math.max(0,g-amt)+','+Math.max(0,b-amt)+')'; }

/* ---------- controls ---------- */
document.getElementById('btnPrev').addEventListener('click', function(){ loadLevel(lvl-1); });
document.getElementById('btnNext').addEventListener('click', function(){ loadLevel(lvl+1); });
document.getElementById('btnReset').addEventListener('click', function(){ loadLevel(lvl); beep(200,.06,'square',.03); });
document.getElementById('btnUndo').addEventListener('click', function(){
  if(!undo.length) return;
  restore(undo.pop()); moves=Math.max(0,moves-1); lastAct=null; won=false; exitAnim=0;
  beep(240,.05,'square',.03); updateHud();
});
document.getElementById('btnReplay').addEventListener('click', function(){ loadLevel(lvl); });
document.getElementById('btnAdvance').addEventListener('click', function(){ loadLevel(lvl+1); });
function hideOverlay(){ document.getElementById('ovl').classList.add('hidden'); }

/* ---------- audio ---------- */
var actx=null;
function ensureAudio(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==='suspended') actx.resume(); }
function beep(freq,dur,type,vol){
  if(!actx) return;
  var o=actx.createOscillator(), g=actx.createGain();
  o.type=type||'square'; o.frequency.value=freq; g.gain.value=vol||.04;
  o.connect(g); g.connect(actx.destination);
  o.start(); g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
  o.stop(actx.currentTime+dur);
}
window.addEventListener('pointerdown', ensureAudio, { once:true });

loadLevel(Math.min(store.unlocked, LEVELS.length-1));
draw();
})();
</script>
