<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake – Wizzed Arcade</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a;
      color: #e0e0ff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    #back-btn {
      align-self: flex-start;
      color: #9090b0;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 16px;
      transition: color 0.2s;
    }
    #back-btn:hover { color: #60a5fa; }
    h1 { font-size: 2rem; font-weight: 800; color: #34d399; margin-bottom: 4px; }
    #scoreboard {
      font-size: 1rem;
      color: #9090b0;
      margin-bottom: 16px;
    }
    #scoreboard span { color: #34d399; font-weight: 700; }
    canvas {
      border: 2px solid #34d399;
      border-radius: 8px;
      background: #0d1f0d;
      display: block;
    }
    #msg {
      margin-top: 16px;
      font-size: 1rem;
      color: #9090b0;
      text-align: center;
      min-height: 1.5em;
    }
    #controls {
      display: grid;
      grid-template-columns: repeat(3, 48px);
      gap: 6px;
      margin-top: 20px;
    }
    .ctrl-btn {
      width: 48px; height: 48px;
      background: #1a1a2e;
      border: 1px solid #34d399;
      border-radius: 8px;
      color: #34d399;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn:active { background: #2a2a4e; }
    .ctrl-empty { visibility: hidden; }
    #restart-btn {
      margin-top: 16px;
      padding: 10px 28px;
      background: #34d399;
      color: #0d1f0d;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    #restart-btn:hover { background: #6ee7b7; }
  </style>
</head>
<body>
  <a id="back-btn" href="../index.html">← Games</a>
  <h1>🐍 Snake</h1>
  <div id="scoreboard">Score: <span id="score">0</span> &nbsp;|&nbsp; Best: <span id="best">0</span></div>
  <canvas id="c" width="400" height="400"></canvas>
  <div id="msg">Press an arrow key or tap a direction to start</div>
  <div id="controls">
    <div class="ctrl-empty"></div>
    <button class="ctrl-btn" data-dir="up">▲</button>
    <div class="ctrl-empty"></div>
    <button class="ctrl-btn" data-dir="left">◀</button>
    <button class="ctrl-btn" data-dir="down">▼</button>
    <button class="ctrl-btn" data-dir="right">▶</button>
  </div>
  <button id="restart-btn">Restart</button>

  <script>
    const COLS = 20, ROWS = 20, CELL = 20;
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const msgEl = document.getElementById('msg');

    let snake, dir, nextDir, food, score, best = 0, running = false, interval;

    function init() {
      snake = [{x:10, y:10}, {x:9, y:10}, {x:8, y:10}];
      dir = {x:1, y:0};
      nextDir = {x:1, y:0};
      score = 0;
      scoreEl.textContent = 0;
      placeFood();
      running = false;
      msgEl.textContent = 'Press an arrow key or tap a direction to start';
      clearInterval(interval);
      draw();
    }

    function placeFood() {
      let pos;
      do {
        pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
      } while (snake.some(s => s.x===pos.x && s.y===pos.y));
      food = pos;
    }

    function start() {
      if (running) return;
      running = true;
      msgEl.textContent = '';
      interval = setInterval(tick, 120);
    }

    function tick() {
      dir = nextDir;
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
      if (head.x<0 || head.x>=COLS || head.y<0 || head.y>=ROWS || snake.some(s=>s.x===head.x&&s.y===head.y)) {
        clearInterval(interval);
        running = false;
        msgEl.textContent = `Game over! Score: ${score}. Press Restart.`;
        return;
      }
      snake.unshift(head);
      if (head.x===food.x && head.y===food.y) {
        score++;
        if (score > best) { best = score; bestEl.textContent = best; }
        scoreEl.textContent = score;
        placeFood();
      } else {
        snake.pop();
      }
      draw();
    }

    function draw() {
      ctx.fillStyle = '#0d1f0d';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid lines
      ctx.strokeStyle = '#0f2a0f';
      ctx.lineWidth = 0.5;
      for (let i=0; i<=COLS; i++) { ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,canvas.height); ctx.stroke(); }
      for (let j=0; j<=ROWS; j++) { ctx.beginPath(); ctx.moveTo(0,j*CELL); ctx.lineTo(canvas.width,j*CELL); ctx.stroke(); }

      // Snake
      snake.forEach((s, i) => {
        const ratio = 1 - i/(snake.length);
        ctx.fillStyle = `hsl(${140+ratio*20},70%,${30+ratio*30}%)`;
        ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2);
      });
      // Eyes on head
      const h = snake[0];
      ctx.fillStyle = '#000';
      ctx.fillRect(h.x*CELL+5, h.y*CELL+5, 3, 3);
      ctx.fillRect(h.x*CELL+12, h.y*CELL+5, 3, 3);

      // Food
      ctx.fillStyle = '#f87171';
      ctx.beginPath();
      ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#4ade80';
      ctx.fillRect(food.x*CELL+CELL/2-1, food.y*CELL+1, 2, 5);
    }

    document.addEventListener('keydown', e => {
      const map = {
        ArrowUp: {x:0,y:-1}, ArrowDown: {x:0,y:1},
        ArrowLeft: {x:-1,y:0}, ArrowRight: {x:1,y:0}
      };
      if (map[e.key]) {
        e.preventDefault();
        const d = map[e.key];
        if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
        start();
      }
    });

    document.querySelectorAll('.ctrl-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const map = {up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0}};
        const d = map[btn.dataset.dir];
        if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
        start();
      });
    });

    document.getElementById('restart-btn').addEventListener('click', init);

    init();
  </script>
</body>
</html>
