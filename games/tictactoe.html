<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe Neon — Wizzed Arcade</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    background: #0f0f1a;
    color: #d8f7ff;
    font-family: 'Courier New', ui-monospace, monospace;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 8px 10px 20px; overflow-x: hidden;
  }
  a.back {
    position: fixed; top: 10px; left: 12px; z-index: 60;
    color: #7f7fa8; text-decoration: none; font-size: 12px; letter-spacing: 1px;
    padding: 4px 9px; border: 1px solid #26264a; border-radius: 6px;
    background: rgba(15,15,26,.85);
  }
  a.back:hover { color: #00f0ff; border-color: #00f0ff; box-shadow: 0 0 8px rgba(0,240,255,.4); }
  h1 {
    margin-top: 4px; font-size: clamp(17px, 3.6vmin, 26px); letter-spacing: 3px;
    color: #eafcff; text-shadow: 0 0 8px #00f0ff, 0 0 22px rgba(0,240,255,.55);
  }
  h1 span { color: #ff4dd8; text-shadow: 0 0 8px #ff4dd8, 0 0 22px rgba(255,77,216,.55); }
  .controls { display: flex; gap: 6px; margin: 8px 0 6px; flex-wrap: wrap; justify-content: center; }
  .controls button {
    font-family: inherit; font-size: 11px; letter-spacing: 2px; cursor: pointer;
    background: #16162e; color: #9a9ac8; border: 1px solid #2c2c55;
    padding: 6px 12px; border-radius: 6px;
  }
  .controls button.on {
    color: #00f0ff; border-color: #00f0ff;
    box-shadow: 0 0 10px rgba(0,240,255,.5), inset 0 0 8px rgba(0,240,255,.15);
    text-shadow: 0 0 6px #00f0ff;
  }
  .status { font-size: clamp(12px, 2.4vmin, 15px); letter-spacing: 1px; margin: 2px 0 8px; min-height: 20px; color: #bffbff; text-shadow: 0 0 6px rgba(0,240,255,.5); }
  .boardwrap {
    position: relative;
    width: min(78vmin, calc(100vh - 235px), 400px);
    min-width: 220px;
    aspect-ratio: 1;
  }
  #board {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    width: 100%; height: 100%;
    background: #0c0c18; padding: 8px; border-radius: 12px;
    border: 2px solid #1f4b5c;
    box-shadow: 0 0 18px rgba(0,240,255,.35), inset 0 0 24px rgba(0,240,255,.08);
  }
  .cell {
    background: linear-gradient(145deg, #171733, #101026);
    border: 1px solid #26264f; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: box-shadow .15s, border-color .15s;
  }
  .cell:hover { border-color: #00f0ff; box-shadow: 0 0 10px rgba(0,240,255,.35) inset; }
  .cell svg { width: 76%; height: 76%; }
  .mark line, .mark circle {
    fill: none; stroke-width: 11; stroke-linecap: round;
    stroke-dasharray: 1; stroke-dashoffset: 1;
    animation: draw .32s ease forwards;
  }
  .xm line { stroke: #00f0ff; filter: drop-shadow(0 0 5px #00f0ff); }
  .xm .s2 { animation-delay: .16s; }
  .om circle { stroke: #ff4dd8; filter: drop-shadow(0 0 5px #ff4dd8); animation-duration: .4s; }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  #strike { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  #strikeLine {
    stroke: #eafffb; stroke-width: 7; stroke-linecap: round;
    filter: drop-shadow(0 0 7px #00ffb3) drop-shadow(0 0 14px #00ffb3);
    stroke-dasharray: 1; stroke-dashoffset: 1;
  }
  #strikeLine.show { animation: draw .4s ease-out forwards; }
  .score { display: flex; gap: 10px; margin-top: 12px; }
  .sc {
    background: #14142a; border: 1px solid #2c2c55; border-radius: 8px;
    padding: 6px 14px; font-size: 11px; letter-spacing: 2px; text-align: center; color: #9a9ac8;
  }
  .sc b { display: block; font-size: 20px; margin-top: 2px; }
  .sc.x b { color: #00f0ff; text-shadow: 0 0 8px #00f0ff; }
  .sc.t b { color: #cfcfe8; text-shadow: 0 0 8px rgba(255,255,255,.5); }
  .sc.o b { color: #ff4dd8; text-shadow: 0 0 8px #ff4dd8; }
  .hint { margin-top: 10px; font-size: 11px; color: #6f6f9a; letter-spacing: 1px; text-align: center; }
  .hint span { color: #00f0ff; }
  .overlay {
    position: absolute; inset: 0; z-index: 40; border-radius: 12px;
    background: rgba(10,10,22,.88); backdrop-filter: blur(2px);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    animation: fadein .3s ease;
  }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  .overlay.hidden { display: none; }
  .overlay .msg {
    font-size: clamp(20px, 5vmin, 34px); letter-spacing: 4px; color: #eafcff;
    text-shadow: 0 0 10px #00f0ff, 0 0 30px rgba(0,240,255,.7); text-align: center; padding: 0 10px;
  }
  .overlay .sub { font-size: 12px; color: #9a9ac8; letter-spacing: 2px; }
  .overlay button {
    font-family: inherit; font-size: 14px; letter-spacing: 3px; cursor: pointer;
    background: #0e2a33; color: #00f0ff; border: 2px solid #00f0ff; border-radius: 8px;
    padding: 10px 22px; text-shadow: 0 0 6px #00f0ff;
    box-shadow: 0 0 14px rgba(0,240,255,.5);
  }
  .overlay button:hover { background: #12404d; }
</style>
</head>
<body>
<a class="back" href="../index.html">← Arcade</a>
<h1>TIC-TAC-TOE <span>NEON</span></h1>
<div class="controls">
  <button data-d="easy">EASY</button>
  <button data-d="medium" class="on">MEDIUM</button>
  <button data-d="hard">HARD</button>
</div>
<div class="status" id="status">Your move — you are X</div>
<div class="boardwrap">
  <div id="board"></div>
  <svg id="strike" viewBox="0 0 300 300" preserveAspectRatio="none">
    <line id="strikeLine" x1="0" y1="0" x2="0" y2="0" pathLength="1"></line>
  </svg>
  <div id="overlay" class="overlay hidden">
    <div class="msg" id="ovMsg">YOU WIN!</div>
    <div class="sub" id="ovSub"></div>
    <button id="again">PLAY AGAIN</button>
  </div>
</div>
<div class="score">
  <div class="sc x">YOU (X)<b id="sX">0</b></div>
  <div class="sc t">TIES<b id="sT">0</b></div>
  <div class="sc o">AI (O)<b id="sO">0</b></div>
</div>
<div class="hint">tap a cell or press 1–9 · lifetime wins: <span id="tot">0</span></div>
<script>
(function () {
  'use strict';
  var $ = function (id) { return document.getElementById(id); };

  /* ---------- audio ---------- */
  var AC = null;
  function initAudio() {
    if (!AC) {
      try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { AC = null; }
    }
    if (AC && AC.state === 'suspended') { AC.resume(); }
  }
  function sfx(freq, dur, type, vol, when) {
    if (!AC) return;
    try {
      var t = AC.currentTime + (when || 0);
      var o = AC.createOscillator();
      var g = AC.createGain();
      o.type = type || 'square';
      o.frequency.value = freq;
      g.gain.setValueAtTime(vol || 0.04, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + (dur || 0.08));
      o.connect(g); g.connect(AC.destination);
      o.start(t); o.stop(t + (dur || 0.08) + 0.05);
    } catch (e) { /* noop */ }
  }
  document.addEventListener('pointerdown', initAudio, true);
  document.addEventListener('keydown', initAudio, true);

  /* ---------- persistence ---------- */
  var LSKEY = 'wizzed-tictactoe';
  function getWins() { try { return parseInt(localStorage.getItem(LSKEY), 10) || 0; } catch (e) { return 0; } }
  function addWin() { try { localStorage.setItem(LSKEY, String(getWins() + 1)); } catch (e) { /* noop */ } }

  /* ---------- state ---------- */
  var HUMAN = 1, AI = 2;
  var board, turn, over, busy, diff = 'medium';
  var starter = HUMAN;
  var scores = { x: 0, t: 0, o: 0 };
  var LINES = [[0, 1, 2], [3, 4, 5], [6, 7, 8], [0, 3, 6], [1, 4, 7], [2, 5, 8], [0, 4, 8], [2, 4, 6]];
  var cells = [];
  var aiTimer = null;

  /* ---------- board DOM ---------- */
  var boardEl = $('board');
  (function buildCells() {
    for (var i = 0; i < 9; i++) {
      var c = document.createElement('div');
      c.className = 'cell';
      c.setAttribute('data-i', String(i));
      c.addEventListener('click', onCellClick);
      boardEl.appendChild(c);
      cells.push(c);
    }
  })();

  function svgX() {
    return '<svg viewBox="0 0 100 100" class="mark xm">' +
      '<line class="s1" x1="22" y1="22" x2="78" y2="78" pathLength="1"></line>' +
      '<line class="s2" x1="78" y1="22" x2="22" y2="78" pathLength="1"></line></svg>';
  }
  function svgO() {
    return '<svg viewBox="0 0 100 100" class="mark om">' +
      '<circle class="s1" cx="50" cy="50" r="30" pathLength="1"></circle></svg>';
  }

  /* ---------- game logic ---------- */
  function winnerOf(b) {
    for (var i = 0; i < LINES.length; i++) {
      var L = LINES[i];
      if (b[L[0]] !== 0 && b[L[0]] === b[L[1]] && b[L[1]] === b[L[2]]) {
        return { p: b[L[0]], line: L };
      }
    }
    return null;
  }
  function emptiesOf(b) {
    var out = [];
    for (var i = 0; i < 9; i++) { if (b[i] === 0) out.push(i); }
    return out;
  }

  function newRound() {
    if (aiTimer) { clearTimeout(aiTimer); aiTimer = null; }
    board = [0, 0, 0, 0, 0, 0, 0, 0, 0];
    over = false; busy = false;
    for (var i = 0; i < 9; i++) { cells[i].innerHTML = ''; }
    var sl = $('strikeLine');
    sl.classList.remove('show');
    $('overlay').classList.add('hidden');
    turn = starter;
    starter = (starter === HUMAN) ? AI : HUMAN;
    if (turn === AI) {
      busy = true;
      setStatus('AI starts this round…');
      aiTimer = setTimeout(aiMove, 550);
    } else {
      setStatus('Your move — you are X');
    }
  }

  function setStatus(s) { $('status').textContent = s; }

  function place(i, p) {
    board[i] = p;
    cells[i].innerHTML = (p === HUMAN) ? svgX() : svgO();
  }

  function onCellClick(e) {
    var i = parseInt(e.currentTarget.getAttribute('data-i'), 10);
    tryHuman(i);
  }

  function tryHuman(i) {
    if (over || busy || turn !== HUMAN || board[i] !== 0) return;
    place(i, HUMAN);
    sfx(720, 0.07, 'square', 0.05);
    afterMove();
  }

  function afterMove() {
    var w = winnerOf(board);
    if (w) { endRound(w); return; }
    if (emptiesOf(board).length === 0) { endRound(null); return; }
    turn = (turn === HUMAN) ? AI : HUMAN;
    if (turn === AI) {
      busy = true;
      setStatus('AI is thinking…');
      aiTimer = setTimeout(aiMove, 380 + Math.random() * 320);
    } else {
      setStatus('Your move — you are X');
    }
  }

  function aiMove() {
    aiTimer = null;
    if (over) return;
    var i = pickMove();
    if (i == null) { busy = false; return; }
    place(i, AI);
    sfx(430, 0.08, 'square', 0.05);
    busy = false;
    afterMove();
  }

  /* ---------- AI ---------- */
  function randomOf(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function findWinning(b, p) {
    var es = emptiesOf(b);
    for (var k = 0; k < es.length; k++) {
      b[es[k]] = p;
      var w = winnerOf(b);
      b[es[k]] = 0;
      if (w && w.p === p) return es[k];
    }
    return -1;
  }

  function minimax(b, isMax, depth, alpha, beta) {
    var w = winnerOf(b);
    if (w) return (w.p === AI) ? 10 - depth : depth - 10;
    var es = emptiesOf(b);
    if (es.length === 0) return 0;
    var best = isMax ? -Infinity : Infinity;
    for (var k = 0; k < es.length; k++) {
      b[es[k]] = isMax ? AI : HUMAN;
      var v = minimax(b, !isMax, depth + 1, alpha, beta);
      b[es[k]] = 0;
      if (isMax) {
        if (v > best) best = v;
        if (best > alpha) alpha = best;
      } else {
        if (v < best) best = v;
        if (best < beta) beta = best;
      }
      if (alpha >= beta) break;
    }
    return best;
  }

  function pickMove() {
    var es = emptiesOf(board);
    if (es.length === 0) return null;
    if (diff === 'easy') return randomOf(es);
    var w = findWinning(board, AI);
    if (w >= 0) return w;
    var blk = findWinning(board, HUMAN);
    if (blk >= 0) return blk;
    if (diff === 'medium') return randomOf(es);
    /* hard: minimax */
    if (es.length === 9) return randomOf([0, 2, 4, 6, 8]);
    var bestScore = -Infinity, bestMoves = [];
    for (var k = 0; k < es.length; k++) {
      board[es[k]] = AI;
      var v = minimax(board, false, 0, -Infinity, Infinity);
      board[es[k]] = 0;
      if (v > bestScore) { bestScore = v; bestMoves = [es[k]]; }
      else if (v === bestScore) { bestMoves.push(es[k]); }
    }
    return randomOf(bestMoves);
  }

  /* ---------- round end ---------- */
  function cellCenter(i) {
    var col = i % 3, row = Math.floor(i / 3);
    return { x: col * 100 + 50, y: row * 100 + 50 };
  }

  function showStrike(line) {
    var a = cellCenter(line[0]), b = cellCenter(line[2]);
    var sl = $('strikeLine');
    var dx = b.x - a.x, dy = b.y - a.y;
    var len = Math.sqrt(dx * dx + dy * dy) || 1;
    var pad = 22 / len;
    sl.setAttribute('x1', String(a.x - dx * pad * 0.4));
    sl.setAttribute('y1', String(a.y - dy * pad * 0.4));
    sl.setAttribute('x2', String(b.x + dx * pad * 0.4));
    sl.setAttribute('y2', String(b.y + dy * pad * 0.4));
    sl.classList.remove('show');
    void sl.getBoundingClientRect();
    sl.classList.add('show');
  }

  function endRound(w) {
    over = true; busy = false;
    var msg, sub;
    if (w) {
      showStrike(w.line);
      if (w.p === HUMAN) {
        scores.x++; addWin();
        msg = 'YOU WIN!'; sub = 'X takes the round';
        sfx(523, 0.1, 'square', 0.05, 0); sfx(659, 0.1, 'square', 0.05, 0.1); sfx(784, 0.16, 'square', 0.05, 0.2);
      } else {
        scores.o++;
        msg = 'AI WINS'; sub = 'O takes the round';
        sfx(300, 0.12, 'sawtooth', 0.05, 0); sfx(220, 0.2, 'sawtooth', 0.05, 0.14);
      }
    } else {
      scores.t++;
      msg = 'DRAW'; sub = 'Nobody scores';
      sfx(392, 0.1, 'triangle', 0.05, 0); sfx(392, 0.1, 'triangle', 0.05, 0.12);
    }
    setStatus(msg);
    updateScore();
    setTimeout(function () {
      $('ovMsg').textContent = msg;
      $('ovSub').textContent = sub + '  ·  ' + scores.x + ' – ' + scores.t + ' – ' + scores.o;
      $('overlay').classList.remove('hidden');
    }, w ? 850 : 500);
  }

  function updateScore() {
    $('sX').textContent = String(scores.x);
    $('sT').textContent = String(scores.t);
    $('sO').textContent = String(scores.o);
    $('tot').textContent = String(getWins());
  }

  /* ---------- controls ---------- */
  var diffBtns = document.querySelectorAll('.controls button');
  diffBtns.forEach(function (btn) {
    btn.addEventListener('click', function () {
      diff = btn.getAttribute('data-d');
      diffBtns.forEach(function (b) { b.classList.remove('on'); });
      btn.classList.add('on');
      sfx(600, 0.05, 'square', 0.04);
      newRound();
    });
  });

  $('again').addEventListener('click', function () {
    sfx(660, 0.06, 'square', 0.04);
    newRound();
  });

  document.addEventListener('keydown', function (e) {
    if (e.key >= '1' && e.key <= '9') {
      tryHuman(parseInt(e.key, 10) - 1);
    } else if ((e.key === 'Enter' || e.key === ' ') && !$('overlay').classList.contains('hidden')) {
      e.preventDefault();
      newRound();
    }
  });

  window.addEventListener('resize', function () { /* layout is fluid via CSS */ });

  /* ---------- boot ---------- */
  updateScore();
  newRound();
})();
</script>
</body>
</html>
