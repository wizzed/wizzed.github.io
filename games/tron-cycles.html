<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Light Cycles — Wizzed Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:#0f0f1a;color:#bff4ff;font-family:'Courier New',ui-monospace,monospace;display:flex;align-items:center;justify-content:center;overflow:hidden}
canvas{background:#05060f;border:2px solid rgba(0,229,255,.55);box-shadow:0 0 22px rgba(0,229,255,.35),0 0 90px rgba(0,229,255,.10)}
a.back{position:fixed;top:10px;left:12px;z-index:10;color:#8890b0;text-decoration:none;font-size:13px;letter-spacing:1px;padding:4px 9px;border:1px solid rgba(136,144,176,.35);background:rgba(15,15,26,.75)}
a.back:hover{color:#00e5ff;border-color:#00e5ff;text-shadow:0 0 8px #00e5ff}
#touch{display:none;position:fixed;left:0;right:0;bottom:10px;z-index:9;justify-content:space-between;padding:0 14px;pointer-events:none}
#touch .grp{display:flex;gap:10px}
#touch button{pointer-events:auto;width:58px;height:58px;border-radius:12px;border:2px solid rgba(0,229,255,.6);background:rgba(10,30,40,.6);color:#00e5ff;font-size:22px;font-family:inherit;text-shadow:0 0 8px #00e5ff;touch-action:none;user-select:none;-webkit-user-select:none}
</style>
</head>
<body>
<a class="back" href="../index.html">&larr; Arcade</a>
<canvas id="game" width="800" height="500"></canvas>
<div id="touch">
  <div class="grp"><button id="btnL">&#8592;</button><button id="btnU">&#8593;</button><button id="btnD">&#8595;</button><button id="btnR">&#8594;</button></div>
  <div class="grp"><button id="btnBo">BOOST</button></div>
</div>
<script>
'use strict';
const cvs=document.getElementById('game'),ctx=cvs.getContext('2d');
const W=cvs.width,H=cvs.height;
const ACC='#00e5ff';
const CELL=10,GW=W/CELL|0,GH=H/CELL|0; // 80 x 50
function fit(){const s=Math.min(innerWidth/W,(innerHeight-("ontouchstart" in window?86:0))/H)*0.97;cvs.style.width=Math.floor(W*s)+'px';cvs.style.height=Math.floor(H*s)+'px';}
addEventListener('resize',fit);fit();
const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
let bestWins=0;try{bestWins=parseInt(localStorage.getItem('wizzed-tron-cycles')||'0',10)||0;}catch(e){}
function saveBest(){try{localStorage.setItem('wizzed-tron-cycles',String(bestWins));}catch(e){}}
/* audio */
let actx=null;
function audio(){if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(actx&&actx.state==='suspended')actx.resume();}
function beep(f,d,type,v,f2){if(!actx)return;try{const t=actx.currentTime,o=actx.createOscillator(),g=actx.createGain();o.type=type||'square';o.frequency.setValueAtTime(f,t);if(f2)o.frequency.exponentialRampToValueAtTime(Math.max(20,f2),t+d);g.gain.setValueAtTime(v||0.05,t);g.gain.exponentialRampToValueAtTime(0.0001,t+d);o.connect(g).connect(actx.destination);o.start(t);o.stop(t+d);}catch(e){}}
/* trail offscreen */
const tc=document.createElement('canvas');tc.width=W;tc.height=H;const tctx=tc.getContext('2d');
/* grid */
let grid=new Uint8Array(GW*GH);
function idx(x,y){return y*GW+x;}
function free(x,y){return x>=0&&y>=0&&x<GW&&y<GH&&grid[idx(x,y)]===0;}
const COLORS=[
  {core:'#eaffff',neon:'#00e5ff',halo:'rgba(0,229,255,0.16)'},
  {core:'#ffd0e0',neon:'#ff2d78',halo:'rgba(255,45,120,0.16)'},
  {core:'#ffe6c8',neon:'#ff9a3d',halo:'rgba(255,154,61,0.16)'},
  {core:'#e6d6ff',neon:'#9d6bff',halo:'rgba(157,107,255,0.16)'}
];
const NAMES=['YOU','RED','AMBER','VIOLET'];
let riders=[],state='title',stepFx=0,countT=0,roundEndT=0,winnerMsg='',titleT=0,demoRoundT=0;
function layCell(x,y,c){
  const px=x*CELL,py=y*CELL;
  tctx.fillStyle=c.halo;tctx.fillRect(px-2,py-2,CELL+4,CELL+4);
  tctx.fillStyle=c.neon;tctx.fillRect(px,py,CELL,CELL);
  tctx.fillStyle=c.core;tctx.fillRect(px+2,py+2,CELL-4,CELL-4);
}
function spawnRiders(playerHuman){
  grid=new Uint8Array(GW*GH);
  tctx.clearRect(0,0,W,H);
  riders=[
    {x:14,y:GH/2|0,dx:1,dy:0},
    {x:GW-15,y:GH/2|0,dx:-1,dy:0},
    {x:GW/2|0,y:8,dx:0,dy:1},
    {x:GW/2|0,y:GH-9,dx:0,dy:-1}
  ].map((r,i)=>({...r,i,alive:true,isAI:!(i===0&&playerHuman),color:COLORS[i],acc:0,boostFuel:60,boosting:false,aggr:0.6+i*0.15,nextDx:r.dx,nextDy:r.dy}));
  for(const r of riders){grid[idx(r.x,r.y)]=r.i+1;layCell(r.x,r.y,r.color);}
}
let wins=[0,0,0,0];
function newMatch(){wins=[0,0,0,0];startRound(true);state='countdown';countT=2.2;}
function startRound(playerHuman){spawnRiders(playerHuman);}
function floodCap(sx,sy,cap){
  if(!free(sx,sy))return 0;
  const seen=new Set();const st=[[sx,sy]];seen.add(sx+sy*GW);let c=0;
  while(st.length&&c<cap){const[x,y]=st.pop();c++;const nb=[[x+1,y],[x-1,y],[x,y+1],[x,y-1]];for(const[nx,ny]of nb){if(free(nx,ny)){const k=nx+ny*GW;if(!seen.has(k)){seen.add(k);st.push([nx,ny]);}}}}
  return c;
}
function aiDecide(r){
  const opts=[[r.dx,r.dy],[r.dy,-r.dx],[-r.dy,r.dx]];
  let best=null,bestSc=-1e18;
  const player=riders[0];
  for(const[dx,dy]of opts){
    const nx=r.x+dx,ny=r.y+dy;
    if(!free(nx,ny))continue;
    let sc=floodCap(nx,ny,150);
    // avoid heading straight at a wall a couple cells out
    if(!free(nx+dx,ny+dy))sc-=20;
    if(!free(nx+dx*2,ny+dy*2))sc-=8;
    // aggression: aim at cutoff point in front of player
    if(player&&player.alive){
      const tx=player.x+player.dx*7,ty=player.y+player.dy*7;
      sc-=(Math.abs(nx-tx)+Math.abs(ny-ty))*0.7*r.aggr;
    }
    if(dx===r.dx&&dy===r.dy)sc+=4;
    sc+=Math.random()*3;
    if(sc>bestSc){bestSc=sc;best=[dx,dy];}
  }
  if(best){r.nextDx=best[0];r.nextDy=best[1];}
}
function stepRider(r){
  if(r.isAI)aiDecide(r);
  r.dx=r.nextDx;r.dy=r.nextDy;
  const nx=r.x+r.dx,ny=r.y+r.dy;
  if(!free(nx,ny)){r.alive=false;boom(nx*CELL+CELL/2,ny*CELL+CELL/2,r.color.neon);beep(90,0.4,'sawtooth',0.08,30);return;}
  r.x=nx;r.y=ny;grid[idx(nx,ny)]=r.i+1;layCell(nx,ny,r.color);
}
let parts=[];
function boom(x,y,col){for(let i=0;i<26;i++){const a=rand(0,Math.PI*2),sp=rand(40,260);parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:rand(0.3,0.8),max:0.8,col,s:rand(1.5,3.5)});}}
/* input */
const keys={};
function startPress(){audio();if(state==='title'||state==='matchover')newMatch();}
function setDir(dx,dy){const r=riders[0];if(!r||!r.alive||r.isAI)return;if(dx===-r.dx&&dy===-r.dy)return;r.nextDx=dx;r.nextDy=dy;}
addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k))e.preventDefault();
  if(k==='arrowleft'||k==='a')setDir(-1,0);
  if(k==='arrowright'||k==='d')setDir(1,0);
  if(k==='arrowup'||k==='w')setDir(0,-1);
  if(k==='arrowdown'||k==='s')setDir(0,1);
  if(k===' '){if(state==='play'&&riders[0]&&!riders[0].isAI)riders[0].boosting=true;else startPress();}
  if(k==='enter')startPress();
  if(k==='r'){audio();newMatch();}
});
addEventListener('keyup',e=>{const k=e.key.toLowerCase();if(k===' '&&riders[0])riders[0].boosting=false;});
cvs.addEventListener('pointerdown',e=>{if(state!=='play'){startPress();return;}audio();
  // tap direction relative to player head
  const r=riders[0];if(!r||r.isAI)return;const rect=cvs.getBoundingClientRect();const mx=(e.clientX-rect.left)/rect.width*W,my=(e.clientY-rect.top)/rect.height*H;
  const hx=r.x*CELL,hy=r.y*CELL;if(Math.abs(mx-hx)>Math.abs(my-hy))setDir(mx>hx?1:-1,0);else setDir(0,my>hy?1:-1);
});
if(window.matchMedia&&matchMedia('(pointer:coarse)').matches)document.getElementById('touch').style.display='flex';
function tapBtn(id,fn){const b=document.getElementById(id);b.addEventListener('pointerdown',e=>{e.preventDefault();audio();fn();if(state!=='play')startPress();});}
tapBtn('btnL',()=>setDir(-1,0));tapBtn('btnR',()=>setDir(1,0));tapBtn('btnU',()=>setDir(0,-1));tapBtn('btnD',()=>setDir(0,1));
(function(){const b=document.getElementById('btnBo');const on=e=>{e.preventDefault();audio();if(riders[0])riders[0].boosting=true;};const off=e=>{e.preventDefault();if(riders[0])riders[0].boosting=false;};b.addEventListener('pointerdown',on);b.addEventListener('pointerup',off);b.addEventListener('pointerleave',off);})();
/* update */
function aliveCount(){return riders.filter(r=>r.alive).length;}
function endRound(){
  const alive=riders.filter(r=>r.alive);
  if(alive.length===1){wins[alive[0].i]++;winnerMsg=NAMES[alive[0].i]+' WINS THE ROUND';beep(660,0.15,'square',0.06,990);}
  else{winnerMsg='DRAW';}
  if(wins.some(w=>w>=3)){
    const champ=wins.indexOf(Math.max(...wins));
    winnerMsg=NAMES[champ]+' WINS THE MATCH!';
    if(wins[0]>bestWins){bestWins=wins[0];saveBest();}
    state='matchover';roundEndT=0;
  }else{state='roundend';roundEndT=0;}
}
function update(dt){
  titleT+=dt;
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.94;p.vy*=0.94;p.life-=dt;if(p.life<=0)parts.splice(i,1);}
  if(state==='title'){
    demoRoundT+=dt;
    for(const r of riders){if(!r.alive)continue;const iv=0.05;r.acc+=dt;while(r.acc>=iv&&r.alive){r.acc-=iv;stepRider(r);}}
    if(aliveCount()<=1||demoRoundT>16){spawnRiders(false);demoRoundT=0;}
    return;
  }
  if(state==='countdown'){countT-=dt;if(countT<=0){state='play';beep(880,0.12,'square',0.06);}return;}
  if(state==='roundend'){roundEndT+=dt;if(roundEndT>1.6){startRound(true);state='countdown';countT=1.6;}return;}
  if(state==='matchover'){roundEndT+=dt;return;}
  // play
  for(const r of riders){
    if(!r.alive)continue;
    let iv=0.055;
    if(r.boosting&&r.boostFuel>0){iv=0.03;}
    r.acc+=dt;
    while(r.acc>=iv&&r.alive){
      r.acc-=iv;
      if(r.boosting&&r.boostFuel>0){r.boostFuel-=1;if(r.boostFuel<=0)r.boosting=false;}
      // AI occasionally boosts when chasing
      if(r.isAI&&!r.boosting&&r.boostFuel>10&&Math.random()<0.004)r.boosting=true;
      if(r.isAI&&r.boosting&&Math.random()<0.03)r.boosting=false;
      stepRider(r);
    }
  }
  if(aliveCount()<=1)endRound();
}
/* render */
function render(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#05060f';ctx.fillRect(0,0,W,H);
  // grid backdrop
  ctx.strokeStyle='rgba(0,229,255,.05)';ctx.lineWidth=1;ctx.beginPath();
  for(let x=0;x<=GW;x+=4){ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,H);}
  for(let y=0;y<=GH;y+=4){ctx.moveTo(0,y*CELL);ctx.lineTo(W,y*CELL);}
  ctx.stroke();
  // trails
  ctx.drawImage(tc,0,0);
  // glow bloom
  ctx.globalCompositeOperation='lighter';ctx.globalAlpha=0.35;ctx.drawImage(tc,0,0);ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
  // heads
  for(const r of riders){if(!r.alive)continue;const px=r.x*CELL+CELL/2,py=r.y*CELL+CELL/2;ctx.save();ctx.shadowColor=r.color.neon;ctx.shadowBlur=16;ctx.fillStyle=r.color.core;ctx.fillRect(px-CELL/2,py-CELL/2,CELL,CELL);ctx.restore();
    if(r.boosting){ctx.fillStyle='rgba(255,255,255,.6)';ctx.fillRect(px-r.dx*CELL-CELL/2,py-r.dy*CELL-CELL/2,CELL,CELL);}
  }
  // particles
  for(const p of parts){ctx.globalAlpha=clamp(p.life/p.max,0,1);ctx.fillStyle=p.col;ctx.fillRect(p.x-p.s/2,p.y-p.s/2,p.s,p.s);}
  ctx.globalAlpha=1;
  // HUD scoreboard
  ctx.textAlign='left';ctx.font='14px Courier New';
  for(let i=0;i<4;i++){
    const bx=10+i*100;ctx.fillStyle=riders[i]&&!riders[i].alive?'rgba(120,120,150,.6)':COLORS[i].neon;ctx.shadowColor=COLORS[i].neon;ctx.shadowBlur=6;
    ctx.fillText(NAMES[i]+' '+wins[i],bx,H-12);ctx.shadowBlur=0;
  }
  // player boost meter
  if(riders[0]&&!riders[0].isAI){ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(W-130,H-22,110,10);ctx.fillStyle=ACC;ctx.fillRect(W-130,H-22,110*clamp(riders[0].boostFuel/60,0,1),10);ctx.fillStyle='#bff4ff';ctx.font='11px Courier New';ctx.textAlign='left';ctx.fillText('BOOST',W-130,H-26);}
  // overlays
  ctx.textAlign='center';
  if(state==='title'){
    ctx.fillStyle='rgba(5,6,15,.55)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle=ACC;ctx.shadowColor=ACC;ctx.shadowBlur=20;ctx.font='bold 54px Courier New';ctx.fillText('LIGHT CYCLES',W/2,150);
    ctx.shadowBlur=0;ctx.fillStyle='#bff4ff';ctx.font='16px Courier New';
    ctx.fillText('Leave a wall of light. Box in your rivals.',W/2,196);
    ctx.fillText('Do not touch any trail or the edge. Last one riding wins.',W/2,220);
    ctx.fillStyle='#7fd6ff';ctx.font='14px Courier New';
    ctx.fillText('TURN: Arrows / WASD (or tap side)     BOOST: Space (limited)',W/2,270);
    ctx.fillText('First rider to 3 round wins takes the match.',W/2,292);
    ctx.fillStyle=ACC;ctx.font='20px Courier New';if(Math.floor(titleT*2)%2)ctx.fillText('CLICK / TAP / SPACE TO RIDE',W/2,352);
    if(bestWins>0){ctx.fillStyle='#7fd6ff';ctx.font='15px Courier New';ctx.fillText('BEST MATCH WINS: '+bestWins,W/2,392);}
  }else if(state==='countdown'){
    ctx.fillStyle=ACC;ctx.shadowColor=ACC;ctx.shadowBlur=16;ctx.font='bold 70px Courier New';
    const n=Math.ceil(countT);ctx.fillText(n>0?String(n):'GO',W/2,H/2);ctx.shadowBlur=0;
  }else if(state==='roundend'){
    ctx.fillStyle='rgba(5,6,15,.5)';ctx.fillRect(0,H/2-40,W,80);
    ctx.fillStyle=ACC;ctx.shadowColor=ACC;ctx.shadowBlur=14;ctx.font='bold 34px Courier New';ctx.fillText(winnerMsg,W/2,H/2+10);ctx.shadowBlur=0;
  }else if(state==='matchover'){
    ctx.fillStyle='rgba(5,6,15,.75)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ffd166';ctx.shadowColor='#ffd166';ctx.shadowBlur=16;ctx.font='bold 40px Courier New';ctx.fillText(winnerMsg,W/2,200);ctx.shadowBlur=0;
    ctx.fillStyle='#bff4ff';ctx.font='20px Courier New';ctx.fillText('Final: '+NAMES.map((n,i)=>n+' '+wins[i]).join('   '),W/2,250);
    ctx.fillStyle=ACC;ctx.font='20px Courier New';if(Math.floor(roundEndT*2)%2)ctx.fillText('Press R / Tap for a new match',W/2,320);
  }
}
let last=performance.now();
function loop(now){let dt=(now-last)/1000;last=now;if(dt>0.05)dt=0.05;update(dt);render();requestAnimationFrame(loop);}
spawnRiders(false); // demo backdrop
requestAnimationFrame(loop);
</script>
</body>
</html>
