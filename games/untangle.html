<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untangle — Wizzed Arcade</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --neon: #3dff9e; --bad: #ff3d68; }
  body {
    background: #0f0f1a;
    background-image: radial-gradient(ellipse at 50% -20%, rgba(61,255,158,.07), transparent 60%);
    color: #dcffe9;
    font-family: 'Courier New', ui-monospace, monospace;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 8px 12px 20px;
    user-select: none; -webkit-user-select: none;
    overflow-x: hidden;
  }
  a.back {
    position: fixed; top: 10px; left: 12px; z-index: 60;
    color: #7a7a9a; text-decoration: none; font-size: 13px;
    padding: 4px 8px; border: 1px solid #2a2a4a; border-radius: 6px;
    background: rgba(15,15,26,.8);
  }
  a.back:hover { color: var(--neon); border-color: var(--neon); }
  h1 {
    margin: 8px 0 2px; font-size: clamp(20px, 5vmin, 30px); letter-spacing: 6px;
    color: var(--neon);
    text-shadow: 0 0 8px var(--neon), 0 0 28px rgba(61,255,158,.45);
  }
  .sub { color: #5fae83; font-size: 11px; letter-spacing: 3px; margin-bottom: 8px; }
  .hud { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; justify-content: center; }
  .stat {
    background: #12261b; border: 2px solid #2b5c41; border-radius: 8px;
    padding: 3px 10px; min-width: 78px; text-align: center;
  }
  .stat .lbl { display: block; font-size: 10px; letter-spacing: 2px; color: #5fae83; }
  .stat .val { display: block; font-size: 18px; font-weight: bold; color: var(--neon); text-shadow: 0 0 6px rgba(61,255,158,.7); }
  .stat.bad .val { color: var(--bad); text-shadow: 0 0 6px rgba(255,61,104,.7); }
  #wrap { position: relative; width: min(94vw, 680px); }
  canvas {
    display: block; width: 100%; height: auto;
    background: radial-gradient(circle at 50% 40%, #131425 0%, #0d0d18 80%);
    border: 3px solid var(--neon); border-radius: 12px;
    box-shadow: 0 0 18px rgba(61,255,158,.35), 0 0 60px rgba(61,255,158,.1), inset 0 0 30px rgba(0,0,0,.7);
    cursor: grab; touch-action: none;
  }
  canvas.dragging { cursor: grabbing; }
  .controls { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }
  .controls button {
    font-family: inherit; font-size: 12px; font-weight: bold; letter-spacing: 2px;
    color: var(--neon); background: #12261b;
    border: 2px solid var(--neon); border-radius: 8px;
    padding: 7px 14px; cursor: pointer;
    box-shadow: 0 0 10px rgba(61,255,158,.22);
    text-shadow: 0 0 6px rgba(61,255,158,.6);
  }
  .controls button:hover { background: #1a3828; box-shadow: 0 0 18px rgba(61,255,158,.45); }
  .controls button:active { transform: translateY(1px); }
  .controls button:disabled { opacity: .35; cursor: default; box-shadow: none; }
  .tip { margin-top: 10px; color: #4d7a62; font-size: 11px; letter-spacing: 1px; text-align: center; max-width: 540px; }
  .overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(8,8,16,.85); backdrop-filter: blur(3px);
    display: flex; align-items: center; justify-content: center;
  }
  .overlay.hidden { display: none; }
  .panel {
    background: #12261b; border: 3px solid var(--neon); border-radius: 14px;
    padding: 26px 34px; text-align: center; max-width: 90vw;
    box-shadow: 0 0 30px rgba(61,255,158,.5), 0 0 90px rgba(61,255,158,.18);
    animation: pop .3s cubic-bezier(.3,1.5,.5,1);
  }
  @keyframes pop { from { transform: scale(.7); opacity: 0; } }
  .panel h2 { color: var(--neon); letter-spacing: 5px; font-size: 24px; text-shadow: 0 0 12px var(--neon); margin-bottom: 10px; }
  .panel p { color: #bdeccf; margin: 5px 0; font-size: 14px; }
  .panel .rec { color: #6de0ff; text-shadow: 0 0 10px rgba(109,224,255,.8); font-weight: bold; }
  .panel button {
    font-family: inherit; font-size: 13px; font-weight: bold; letter-spacing: 2px;
    color: var(--neon); background: #12261b; border: 2px solid var(--neon); border-radius: 8px;
    padding: 8px 16px; cursor: pointer; margin: 14px 5px 0;
    box-shadow: 0 0 10px rgba(61,255,158,.25);
  }
  .panel button:hover { background: #1a3828; }
</style>
</head>
<body>
<a class="back" href="../index.html">← Arcade</a>
<h1>UNTANGLE</h1>
<div class="sub">DRAG THE NODES UNTIL NO WIRES CROSS</div>
<div class="hud">
  <div class="stat"><span class="lbl">LEVEL</span><span class="val" id="hLevel">1</span></div>
  <div class="stat"><span class="lbl">NODES</span><span class="val" id="hNodes">6</span></div>
  <div class="stat bad"><span class="lbl">CROSSINGS</span><span class="val" id="hCross">0</span></div>
  <div class="stat"><span class="lbl">MOVES</span><span class="val" id="hMoves">0</span></div>
  <div class="stat"><span class="lbl">TIME</span><span class="val" id="hTime">0:00</span></div>
</div>
<div id="wrap"><canvas id="cv"></canvas></div>
<div class="controls">
  <button id="btnPrev">◀ LVL</button>
  <button id="btnShuffle">RESHUFFLE</button>
  <button id="btnNew">NEW GRAPH</button>
  <button id="btnNext">LVL ▶</button>
</div>
<div class="tip">DRAG a glowing node · RED wires intersect another wire, GREEN wires are clear · zero crossings wins</div>
<div class="overlay hidden" id="winOverlay">
  <div class="panel">
    <h2>UNTANGLED!</h2>
    <p id="winInfo"></p>
    <p id="winBest" class="rec"></p>
    <button id="btnAgain">REPLAY</button>
    <button id="btnAdvance">NEXT LEVEL →</button>
  </div>
</div>
<script>
(function(){
'use strict';
/* ===== core (node-verified): planar generation + crossing detection ===== */
function untangleCore() {
  function segCross(p1, p2, p3, p4) {
    function o(a, b, c) {
      var v = (b.x - a.x) * (c.y - a.y) - (b.y - a.y) * (c.x - a.x);
      return v > 1e-12 ? 1 : (v < -1e-12 ? -1 : 0);
    }
    var o1 = o(p1, p2, p3), o2 = o(p1, p2, p4), o3 = o(p3, p4, p1), o4 = o(p3, p4, p2);
    return o1 !== o2 && o3 !== o4 && o1 !== 0 && o2 !== 0 && o3 !== 0 && o4 !== 0;
  }
  function crossingPairs(verts, edges) {
    var pairs = [];
    for (var i = 0; i < edges.length; i++) {
      for (var j = i + 1; j < edges.length; j++) {
        var a = edges[i], b = edges[j];
        if (a[0] === b[0] || a[0] === b[1] || a[1] === b[0] || a[1] === b[1]) continue;
        if (segCross(verts[a[0]], verts[a[1]], verts[b[0]], verts[b[1]])) pairs.push([i, j]);
      }
    }
    return pairs;
  }
  function genGraph(n, rnd, removeFrac) {
    var verts = [
      { x: 0.50, y: 0.06 },
      { x: 0.05, y: 0.92 },
      { x: 0.95, y: 0.92 }
    ];
    var edges = [[0, 1], [1, 2], [0, 2]];
    var tris = [[0, 1, 2]];
    function area(t) {
      var A = verts[t[0]], B = verts[t[1]], C = verts[t[2]];
      return Math.abs((B.x - A.x) * (C.y - A.y) - (B.y - A.y) * (C.x - A.x)) / 2;
    }
    while (verts.length < n) {
      var total = 0, areas = [];
      for (var i = 0; i < tris.length; i++) { areas.push(area(tris[i])); total += areas[i]; }
      var r = rnd() * total, ti = 0;
      while (ti < tris.length - 1 && r > areas[ti]) { r -= areas[ti]; ti++; }
      var t = tris[ti];
      var w1 = 1 + rnd() * 1.5, w2 = 1 + rnd() * 1.5, w3 = 1 + rnd() * 1.5;
      var ws = w1 + w2 + w3;
      var A = verts[t[0]], B = verts[t[1]], C = verts[t[2]];
      var p = {
        x: (A.x * w1 + B.x * w2 + C.x * w3) / ws,
        y: (A.y * w1 + B.y * w2 + C.y * w3) / ws
      };
      var vi = verts.length;
      verts.push(p);
      edges.push([t[0], vi], [t[1], vi], [t[2], vi]);
      tris.splice(ti, 1, [t[0], t[1], vi], [t[1], t[2], vi], [t[0], t[2], vi]);
    }
    if (removeFrac > 0) {
      var deg = new Array(verts.length).fill(0);
      edges.forEach(function(e) { deg[e[0]]++; deg[e[1]]++; });
      var want = Math.floor(edges.length * removeFrac);
      var idxs = [];
      for (var k = 0; k < edges.length; k++) idxs.push(k);
      for (var i2 = idxs.length - 1; i2 > 0; i2--) {
        var j2 = Math.floor(rnd() * (i2 + 1));
        var tmp = idxs[i2]; idxs[i2] = idxs[j2]; idxs[j2] = tmp;
      }
      var removed = {};
      function connectedWithout(skipIdx) {
        var adj = verts.map(function() { return []; });
        for (var k2 = 0; k2 < edges.length; k2++) {
          if (removed[k2] || k2 === skipIdx) continue;
          adj[edges[k2][0]].push(edges[k2][1]);
          adj[edges[k2][1]].push(edges[k2][0]);
        }
        var seen = new Array(verts.length).fill(false);
        var st = [0]; seen[0] = true; var cnt = 1;
        while (st.length) {
          var u = st.pop();
          for (var m = 0; m < adj[u].length; m++) {
            var v = adj[u][m];
            if (!seen[v]) { seen[v] = true; cnt++; st.push(v); }
          }
        }
        return cnt === verts.length;
      }
      var got = 0;
      for (var q = 0; q < idxs.length && got < want; q++) {
        var ei = idxs[q];
        var e = edges[ei];
        if (deg[e[0]] <= 2 || deg[e[1]] <= 2) continue;
        if (!connectedWithout(ei)) continue;
        removed[ei] = true;
        deg[e[0]]--; deg[e[1]]--;
        got++;
      }
      var newEdges = [];
      for (var z = 0; z < edges.length; z++) if (!removed[z]) newEdges.push(edges[z]);
      edges = newEdges;
    }
    return { verts: verts, edges: edges };
  }
  function scramble(nVerts, rnd) {
    var pos = [];
    var order = [];
    for (var i = 0; i < nVerts; i++) order.push(i);
    for (var j = order.length - 1; j > 0; j--) {
      var k = Math.floor(rnd() * (j + 1));
      var t = order[j]; order[j] = order[k]; order[k] = t;
    }
    for (var m = 0; m < nVerts; m++) {
      var ang = (order[m] / nVerts) * Math.PI * 2 + (rnd() - 0.5) * 0.25;
      var rad = 0.34 + rnd() * 0.12;
      pos.push({ x: 0.5 + Math.cos(ang) * rad, y: 0.5 + Math.sin(ang) * rad * 0.95 });
    }
    return pos;
  }
  return { segCross: segCross, crossingPairs: crossingPairs, genGraph: genGraph, scramble: scramble };
}
/* ===== game ===== */
var core = untangleCore();
var LS_KEY = 'wizzed-untangle';
var store;
try { store = JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch (e) { store = {}; }
if (!store.best) store.best = {};
if (!store.unlocked) store.unlocked = 1;
var level = Math.min(store.level || 1, store.unlocked);

var cv = document.getElementById('cv');
var ctx = cv.getContext('2d');
var wrap = document.getElementById('wrap');
var hLevel = document.getElementById('hLevel');
var hNodes = document.getElementById('hNodes');
var hCross = document.getElementById('hCross');
var hMoves = document.getElementById('hMoves');
var hTime = document.getElementById('hTime');
var winOverlay = document.getElementById('winOverlay');

var graph = null;       // {verts (solution layout), edges}
var pos = [];           // current normalized positions
var edgeBad = [];       // per-edge crossing flag
var crossings = 0;
var moves = 0;
var startTime = Date.now();
var finalTime = null;
var dragIdx = -1;
var solvedFlag = false;

var AC = null;
function beep(freq, dur, type, gain) {
  try {
    if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
    if (AC.state === 'suspended') AC.resume();
    var o = AC.createOscillator(), g = AC.createGain();
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.setValueAtTime(gain || 0.05, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime + dur);
  } catch (e) {}
}

function nodesForLevel(l) { return Math.min(5 + l, 34); }
function fracForLevel(l) { return nodesForLevel(l) > 10 ? 0.25 : 0.1; }

function sizeCanvas() {
  var w = wrap.clientWidth;
  var h = Math.max(240, Math.min(w * 0.68, window.innerHeight - 230));
  var dpr = window.devicePixelRatio || 1;
  cv.width = Math.round(w * dpr);
  cv.height = Math.round(h * dpr);
  cv.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}
function px(p) { return { x: p.x * cv.clientWidth, y: p.y * cv.clientHeight }; }

function recompute() {
  var pairs = core.crossingPairs(pos, graph.edges);
  crossings = pairs.length;
  edgeBad = graph.edges.map(function() { return false; });
  pairs.forEach(function(p) { edgeBad[p[0]] = edgeBad[p[1]] = true; });
  hCross.textContent = crossings;
}

function newLevel(reuseGraph) {
  if (!reuseGraph) {
    var n = nodesForLevel(level);
    graph = core.genGraph(n, Math.random, fracForLevel(level));
  }
  // scramble until there are crossings
  for (var t = 0; t < 40; t++) {
    pos = core.scramble(graph.verts.length, Math.random);
    if (core.crossingPairs(pos, graph.edges).length >= Math.max(2, graph.verts.length / 3)) break;
  }
  moves = 0;
  startTime = Date.now();
  finalTime = null;
  solvedFlag = false;
  dragIdx = -1;
  winOverlay.classList.add('hidden');
  store.level = level;
  saveStore();
  hLevel.textContent = level;
  hNodes.textContent = graph.verts.length;
  hMoves.textContent = '0';
  recompute();
  updateNav();
  draw();
}
function saveStore() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(store)); } catch (e) {}
}
function updateNav() {
  document.getElementById('btnPrev').disabled = level <= 1;
  document.getElementById('btnNext').disabled = level >= store.unlocked;
}
function fmtTime(sec) {
  var m = Math.floor(sec / 60), s = Math.floor(sec - m * 60);
  return m + ':' + (s < 10 ? '0' : '') + s;
}

function draw() {
  var w = cv.clientWidth, h = cv.clientHeight;
  ctx.clearRect(0, 0, w, h);
  if (!graph) return;
  // subtle grid backdrop
  ctx.strokeStyle = 'rgba(61,255,158,.05)';
  ctx.lineWidth = 1;
  for (var gx = 40; gx < w; gx += 40) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, h); ctx.stroke(); }
  for (var gy = 40; gy < h; gy += 40) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(w, gy); ctx.stroke(); }
  // edges
  for (var i = 0; i < graph.edges.length; i++) {
    var e = graph.edges[i];
    var a = px(pos[e[0]]), b = px(pos[e[1]]);
    var bad = edgeBad[i];
    ctx.beginPath();
    ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = bad ? '#ff3d68' : '#3dff9e';
    ctx.lineWidth = bad ? 2.5 : 2;
    ctx.shadowColor = bad ? '#ff3d68' : '#3dff9e';
    ctx.shadowBlur = bad ? 10 : 6;
    ctx.globalAlpha = bad ? 0.95 : 0.75;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
  // vertices
  for (var v = 0; v < pos.length; v++) {
    var p = px(pos[v]);
    var r = v === dragIdx ? 13 : 9;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = v === dragIdx ? '#ffffff' : '#0f0f1a';
    ctx.shadowColor = '#3dff9e';
    ctx.shadowBlur = v === dragIdx ? 22 : 12;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = v === dragIdx ? '#3dff9e' : '#8fffc9';
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(p.x, p.y, r * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = '#3dff9e';
    ctx.fill();
  }
}

function hitVertex(x, y) {
  var best = -1, bestD = 24 * 24;
  for (var i = 0; i < pos.length; i++) {
    var p = px(pos[i]);
    var d = (p.x - x) * (p.x - x) + (p.y - y) * (p.y - y);
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;
}
function evPos(e) {
  var r = cv.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

cv.addEventListener('pointerdown', function(e) {
  if (solvedFlag) return;
  var p = evPos(e);
  var i = hitVertex(p.x, p.y);
  if (i < 0) return;
  dragIdx = i;
  cv.classList.add('dragging');
  cv.setPointerCapture(e.pointerId);
  beep(600, .04, 'sine', .03);
  draw();
  e.preventDefault();
});
cv.addEventListener('pointermove', function(e) {
  if (dragIdx < 0) return;
  var p = evPos(e);
  pos[dragIdx] = {
    x: Math.min(0.98, Math.max(0.02, p.x / cv.clientWidth)),
    y: Math.min(0.98, Math.max(0.02, p.y / cv.clientHeight))
  };
  recompute();
  draw();
  e.preventDefault();
});
function endDrag() {
  if (dragIdx < 0) return;
  dragIdx = -1;
  cv.classList.remove('dragging');
  moves++;
  hMoves.textContent = moves;
  recompute();
  draw();
  if (crossings === 0) win();
  else beep(340, .04, 'sine', .025);
}
cv.addEventListener('pointerup', endDrag);
cv.addEventListener('pointercancel', endDrag);

function win() {
  solvedFlag = true;
  finalTime = (Date.now() - startTime) / 1000;
  var prev = store.best[level];
  var isRecord = !prev || moves < prev.m || (moves === prev.m && finalTime < prev.t);
  if (isRecord) store.best[level] = { m: moves, t: Math.round(finalTime * 10) / 10 };
  if (level >= store.unlocked) store.unlocked = level + 1;
  saveStore();
  document.getElementById('winInfo').textContent =
    graph.verts.length + ' nodes untangled in ' + moves + ' moves · ' + fmtTime(finalTime);
  document.getElementById('winBest').textContent = isRecord
    ? '★ NEW BEST FOR LEVEL ' + level + ' ★'
    : 'best: ' + store.best[level].m + ' moves · ' + fmtTime(store.best[level].t);
  [523, 659, 784, 1047].forEach(function(f, i) {
    setTimeout(function() { beep(f, .22, 'triangle', .06); }, i * 110);
  });
  updateNav();
  setTimeout(function() { winOverlay.classList.remove('hidden'); }, 400);
}

document.getElementById('btnShuffle').addEventListener('click', function() { newLevel(true); beep(300, .06, 'square', .03); });
document.getElementById('btnNew').addEventListener('click', function() { newLevel(false); beep(420, .06, 'square', .03); });
document.getElementById('btnPrev').addEventListener('click', function() { if (level > 1) { level--; newLevel(false); } });
document.getElementById('btnNext').addEventListener('click', function() { if (level < store.unlocked) { level++; newLevel(false); } });
document.getElementById('btnAgain').addEventListener('click', function() { newLevel(true); });
document.getElementById('btnAdvance').addEventListener('click', function() { level++; newLevel(false); });
window.addEventListener('resize', sizeCanvas);
setInterval(function() {
  hTime.textContent = fmtTime(finalTime !== null ? finalTime : (Date.now() - startTime) / 1000);
}, 250);

newLevel(false);
sizeCanvas();
})();
</script>
</body>
</html>
