<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breathe · Wizzed Arcade</title>
<style>
:root{
  --bg:#0f0f1a; --accent:#a78bfa; --accent-soft:rgba(167,139,250,.5);
  --panel:rgba(22,22,35,.72); --line:#33314f; --text:#efeafd; --dim:#9a92bf;
  --teal:#5eead4; --pink:#f9a8d4; --sky:#7dd3fc;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;}
body{
  color:var(--text); font-family:'Courier New', ui-monospace, monospace;
  overflow-x:hidden; padding-bottom:22px; min-height:100vh;
  background:linear-gradient(135deg,#0f0f1a,#151027,#0d1a26,#181031,#0f0f1a);
  background-size:400% 400%; animation:bgShift 38s ease infinite;
}
@keyframes bgShift{ 0%{background-position:0% 0%} 50%{background-position:100% 100%} 100%{background-position:0% 0%} }
a.back{
  position:fixed; top:10px; left:12px; z-index:60;
  color:var(--dim); text-decoration:none; font-size:12px; letter-spacing:1px;
  border:1px solid var(--line); padding:3px 8px; background:rgba(15,15,26,.7);
}
a.back:hover{ color:var(--accent); border-color:var(--accent); text-shadow:0 0 8px var(--accent); }
header{ text-align:center; padding:10px 8px 2px; }
h1{
  display:inline-block; font-size:clamp(17px,3vw,26px); letter-spacing:7px; color:var(--accent);
  text-shadow:0 0 8px var(--accent), 0 0 30px var(--accent-soft);
}
header .sub{ font-size:11px; color:var(--dim); letter-spacing:2px; margin-top:2px; }
main{
  display:flex; flex-wrap:wrap; gap:22px; justify-content:center; align-items:center;
  max-width:900px; margin:8px auto 0; padding:6px 14px;
}

/* ---- orb stage ---- */
.stage{ position:relative; width:min(54vmin,300px); height:min(54vmin,300px); flex:0 0 auto; }
.stage svg{ position:absolute; inset:0; width:100%; height:100%; transform:rotate(-90deg); }
#ringBg{ fill:none; stroke:rgba(255,255,255,.07); stroke-width:3; }
#ringFg{
  fill:none; stroke:var(--accent); stroke-width:4; stroke-linecap:round;
  filter:drop-shadow(0 0 6px var(--accent));
  transition:stroke .5s ease;
}
.orb{
  position:absolute; top:50%; left:50%; width:60%; height:60%; border-radius:50%;
  transform:translate(-50%,-50%) scale(.80);
  background:radial-gradient(circle at 38% 32%, #e6dcff 0%, #a78bfa 42%, #6d4bc4 74%, #4a2f96 100%);
  box-shadow:0 0 45px 8px var(--accent-soft), inset 0 0 34px rgba(255,255,255,.28);
  will-change:transform;
}
.orb.idle{ animation:idlePulse 6s ease-in-out infinite; }
@keyframes idlePulse{
  0%,100%{ transform:translate(-50%,-50%) scale(.78); }
  50%{ transform:translate(-50%,-50%) scale(.90); }
}
.center{
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; pointer-events:none; text-align:center;
}
.phase{
  font-size:clamp(13px,2vw,16px); letter-spacing:3px; color:#fff; text-transform:uppercase;
  text-shadow:0 0 12px var(--accent); margin-bottom:2px;
}
.count{ font-size:clamp(34px,7vw,52px); color:#fff; line-height:1; text-shadow:0 0 16px var(--accent-soft); }
.sess{ font-size:11px; color:var(--dim); letter-spacing:2px; margin-top:6px; }

/* ---- controls ---- */
.panel{
  background:var(--panel); border:1px solid var(--line); padding:14px 15px;
  box-shadow:0 0 0 1px rgba(0,0,0,.4), 0 0 26px rgba(167,139,250,.10);
  width:300px; max-width:100%; backdrop-filter:blur(4px);
}
.modes{ display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:10px; }
.modes button{
  font-family:inherit; font-size:11px; letter-spacing:1px; cursor:pointer; padding:8px 6px;
  background:#14122a; color:var(--dim); border:1px solid var(--line);
}
.modes button small{ display:block; font-size:9px; letter-spacing:0; margin-top:2px; opacity:.8; }
.modes button.on{
  color:#0f0f1a; background:var(--accent); border-color:var(--accent);
  box-shadow:0 0 12px var(--accent-soft); font-weight:bold;
}
.pattern{
  text-align:center; font-size:11px; letter-spacing:1.5px; color:var(--teal);
  margin-bottom:10px; text-shadow:0 0 8px rgba(94,234,212,.4);
}
.custom{ border:1px solid var(--line); padding:8px 10px; margin-bottom:10px; background:rgba(10,10,20,.4); }
.custom.hidden{ display:none; }
.srow{ display:flex; align-items:center; gap:8px; margin:5px 0; font-size:11px; }
.srow label{ color:var(--dim); letter-spacing:1px; width:56px; }
.srow input[type="range"]{ flex:1; accent-color:var(--accent); cursor:pointer; }
.srow .sv{ color:var(--text); width:34px; text-align:right; }
.lenrow{ display:flex; align-items:center; gap:9px; margin-bottom:12px; font-size:11px; color:var(--dim); letter-spacing:1px; }
.lenrow input[type="range"]{ flex:1; accent-color:var(--accent); cursor:pointer; }
.lenrow .lv{ color:var(--accent); min-width:52px; text-align:right; }
.btns{ display:flex; gap:7px; margin-bottom:12px; }
.btns button{
  font-family:inherit; font-size:12px; letter-spacing:1px; cursor:pointer; padding:9px 8px; flex:1;
  background:#14122a; color:var(--text); border:1px solid var(--line);
}
.btns button:hover{ border-color:var(--accent); box-shadow:0 0 10px var(--accent-soft); }
.btns .primary{
  color:#0f0f1a; background:var(--accent); border-color:var(--accent);
  box-shadow:0 0 14px var(--accent-soft); font-weight:bold; flex:1.6;
}
.btns .snd.off{ color:var(--dim); opacity:.7; }
.btns .snd.on{ color:var(--teal); border-color:var(--teal); }
.stats{
  display:flex; justify-content:space-around; align-items:baseline;
  border-top:1px solid var(--line); padding-top:10px; text-align:center;
}
.stats .num{ font-size:22px; color:var(--accent); text-shadow:0 0 10px var(--accent-soft); }
.stats .lab{ font-size:9px; color:var(--dim); letter-spacing:1px; text-transform:uppercase; }
.stats .allt{ width:100%; margin-top:8px; font-size:9px; color:var(--dim); letter-spacing:1px; }
footer{ text-align:center; margin-top:6px; font-size:10px; color:var(--dim); letter-spacing:2px; }
@media (max-width:680px){ main{ gap:14px; } }
@media (prefers-reduced-motion: reduce){
  body{ animation:none; }
  .orb.idle{ animation:none; transform:translate(-50%,-50%) scale(.84); }
}
</style>
</head>
<body>
<a class="back" href="../index.html">&larr; Arcade</a>
<header>
  <h1>BREATHE</h1>
  <div class="sub">GUIDED BREATHING &middot; BOX &middot; 4-7-8 &middot; COHERENT &middot; CUSTOM</div>
</header>
<main>
  <div class="stage">
    <svg viewBox="0 0 100 100" aria-hidden="true">
      <circle id="ringBg" cx="50" cy="50" r="45"></circle>
      <circle id="ringFg" cx="50" cy="50" r="45" stroke-dasharray="282.743" stroke-dashoffset="204"></circle>
    </svg>
    <div class="orb idle" id="orb"></div>
    <div class="center">
      <div class="phase" id="phaseLbl">Ready</div>
      <div class="count" id="countLbl">4</div>
      <div class="sess" id="sessLbl">5:00</div>
    </div>
  </div>

  <section class="panel">
    <div class="modes" id="modes">
      <button data-mode="box" class="on">BOX<small>4·4·4·4</small></button>
      <button data-mode="relax">RELAX<small>4·7·8</small></button>
      <button data-mode="coherent">COHERENT<small>5·5</small></button>
      <button data-mode="custom">CUSTOM<small>your own</small></button>
    </div>
    <div class="pattern" id="patternLbl">IN 4 &middot; HOLD 4 &middot; OUT 4 &middot; HOLD 4</div>

    <div class="custom hidden" id="customBox">
      <div class="srow"><label>In</label><input type="range" id="c_in" min="1" max="12" value="4"><span class="sv" id="cv_in">4s</span></div>
      <div class="srow"><label>Hold</label><input type="range" id="c_h1" min="0" max="12" value="4"><span class="sv" id="cv_h1">4s</span></div>
      <div class="srow"><label>Out</label><input type="range" id="c_out" min="1" max="12" value="6"><span class="sv" id="cv_out">6s</span></div>
      <div class="srow"><label>Hold</label><input type="range" id="c_h2" min="0" max="12" value="2"><span class="sv" id="cv_h2">2s</span></div>
    </div>

    <div class="lenrow">
      <span>SESSION</span>
      <input type="range" id="len" min="1" max="10" value="5">
      <span class="lv" id="lenLbl">5 min</span>
    </div>

    <div class="btns">
      <button class="primary" id="btnPrimary">START</button>
      <button id="btnReset">RESET</button>
      <button class="snd on" id="btnSound">&#9834; ON</button>
    </div>

    <div class="stats">
      <div><div class="num" id="stSessions">0</div><div class="lab">sessions</div></div>
      <div><div class="num" id="stMinutes">0</div><div class="lab">minutes</div></div>
      <div class="allt">all-time &middot; saved on this device</div>
    </div>
  </section>
</main>
<footer>INHALE CALM &middot; EXHALE NOISE</footer>
<script>
"use strict";

var LS_KEY = "wizzed-breathe";
var CIRC = 2 * Math.PI * 45; // 282.743
var MINS = 0.55, MAXS = 1.0;
var prefersReduced = false;
try{ prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches; }catch(e){}
if(prefersReduced){ MINS = 0.72; }

/* ---- phase meta ---- */
var META = {
  inhale:  { label:"Breathe in",  color:"var(--accent)", freq:528 },
  holdIn:  { label:"Hold",        color:"var(--teal)",   freq:440 },
  exhale:  { label:"Breathe out", color:"var(--pink)",   freq:396 },
  holdOut: { label:"Hold",        color:"var(--sky)",    freq:440 }
};
var MODES = {
  box:      [4,4,4,4],
  relax:    [4,7,8,0],
  coherent: [5,0,5,0],
  custom:   null
};

/* ---- state ---- */
var st = {
  mode:"box", lenMin:5, sound:true,
  custom:{ in:4, h1:4, out:6, h2:2 },
  sessions:0, minutes:0
};
function load(){
  try{
    var o = JSON.parse(localStorage.getItem(LS_KEY) || "null");
    if(o){
      if(o.mode && (MODES.hasOwnProperty(o.mode))) st.mode = o.mode;
      if(o.lenMin >= 1 && o.lenMin <= 10) st.lenMin = o.lenMin|0;
      if(typeof o.sound === "boolean") st.sound = o.sound;
      if(o.custom) for(var k in st.custom){ if(typeof o.custom[k] === "number") st.custom[k] = o.custom[k]; }
      if(o.sessions >= 0) st.sessions = o.sessions|0;
      if(o.minutes >= 0) st.minutes = o.minutes|0;
    }
  }catch(e){}
}
function save(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(st)); }catch(e){}
}

/* ---- dom ---- */
function el(id){ return document.getElementById(id); }
var orb = el("orb"), ringFg = el("ringFg");
var phaseLbl = el("phaseLbl"), countLbl = el("countLbl"), sessLbl = el("sessLbl");
var patternLbl = el("patternLbl"), customBox = el("customBox");
var btnPrimary = el("btnPrimary"), btnReset = el("btnReset"), btnSound = el("btnSound");

/* ---- audio ---- */
var audioCtx = null, master = null;
function initAudio(){
  if(audioCtx) return;
  try{
    var AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    audioCtx = new AC();
    master = audioCtx.createGain();
    master.gain.value = 0.22;
    master.connect(audioCtx.destination);
  }catch(e){ audioCtx = null; }
}
function tone(freq, dur, vol, delay){
  if(!st.sound || !audioCtx) return;
  var t = audioCtx.currentTime + (delay || 0);
  var o = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  o.type = "sine"; o.frequency.value = freq;
  var o2 = audioCtx.createOscillator();
  o2.type = "sine"; o2.frequency.value = freq * 2;
  var g2 = audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.05);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  g2.gain.setValueAtTime(0.0001, t);
  g2.gain.exponentialRampToValueAtTime(vol * 0.18, t + 0.05);
  g2.gain.exponentialRampToValueAtTime(0.0001, t + dur * 0.7);
  o.connect(g); g.connect(master);
  o2.connect(g2); g2.connect(master);
  o.start(t); o.stop(t + dur + 0.05);
  o2.start(t); o2.stop(t + dur + 0.05);
}
function chime(key){ var m = META[key]; if(m) tone(m.freq, 0.7, 0.9, 0); }
function completeChime(){
  tone(440, 0.5, 0.8, 0);
  tone(554.37, 0.5, 0.8, 0.18);
  tone(659.25, 0.9, 0.8, 0.36);
}

/* ---- phases ---- */
function currentPattern(){
  if(st.mode === "custom") return [st.custom.in, st.custom.h1, st.custom.out, st.custom.h2];
  return MODES[st.mode].slice();
}
function buildPhases(){
  var pat = currentPattern();
  var keys = ["inhale","holdIn","exhale","holdOut"];
  var phases = [];
  for(var i=0;i<4;i++){
    if(pat[i] > 0) phases.push({ key:keys[i], secs:pat[i] });
  }
  if(phases.length === 0) phases.push({ key:"inhale", secs:4 });
  return phases;
}

/* ---- run engine ---- */
var runState = "idle"; // idle | running | paused | done
var phases = [], phaseIndex = 0, phaseElapsedMs = 0;
var sessionElapsedMs = 0, sessionTotalMs = 0, lastTs = 0, rafId = 0;

function fmtTime(ms){
  var s = Math.max(0, Math.ceil(ms/1000));
  var m = Math.floor(s/60);
  return m + ":" + (s%60 < 10 ? "0" : "") + (s%60);
}
function orbScale(key, p){
  p = Math.min(1, Math.max(0, p));
  var e = 0.5 - 0.5 * Math.cos(p * Math.PI); // ease in-out
  if(key === "inhale") return MINS + (MAXS - MINS) * e;
  if(key === "exhale") return MAXS - (MAXS - MINS) * e;
  if(key === "holdIn") return MAXS;
  return MINS; // holdOut
}
function setOrb(s){ orb.style.transform = "translate(-50%,-50%) scale(" + s.toFixed(4) + ")"; }
function setRing(p, color){
  ringFg.style.strokeDashoffset = (CIRC * (1 - Math.min(1, Math.max(0, p)))).toFixed(2);
  if(color) ringFg.style.stroke = color;
}
function enterPhase(ph, playSound){
  var m = META[ph.key];
  phaseLbl.textContent = m.label;
  setRing(0, m.color);
  if(playSound) chime(ph.key);
}
function updateSessionLabel(){
  sessLbl.textContent = fmtTime(sessionTotalMs - sessionElapsedMs) + " left";
}

function loop(ts){
  if(runState !== "running") return;
  var dt = ts - lastTs; lastTs = ts;
  if(dt > 120) dt = 120; // clamp after tab-away
  phaseElapsedMs += dt;
  sessionElapsedMs += dt;

  var ph = phases[phaseIndex];
  var phaseDur = ph.secs * 1000;
  if(phaseElapsedMs >= phaseDur){
    phaseElapsedMs -= phaseDur;
    phaseIndex = (phaseIndex + 1) % phases.length;
    ph = phases[phaseIndex];
    phaseDur = ph.secs * 1000;
    enterPhase(ph, true);
  }
  var p = phaseDur > 0 ? phaseElapsedMs / phaseDur : 1;
  setOrb(orbScale(ph.key, p));
  setRing(p, META[ph.key].color);
  countLbl.textContent = Math.max(1, Math.ceil((phaseDur - phaseElapsedMs) / 1000));
  updateSessionLabel();

  if(sessionElapsedMs >= sessionTotalMs){ finish(); return; }
  rafId = requestAnimationFrame(loop);
}

function start(){
  initAudio();
  if(audioCtx && audioCtx.state === "suspended"){ try{ audioCtx.resume(); }catch(e){} }
  if(runState === "running") return;

  if(runState === "idle" || runState === "done"){
    phases = buildPhases();
    phaseIndex = 0; phaseElapsedMs = 0; sessionElapsedMs = 0;
    sessionTotalMs = st.lenMin * 60 * 1000;
    orb.classList.remove("idle");
    enterPhase(phases[0], true);
    countLbl.textContent = phases[0].secs;
  } else if(runState === "paused"){
    phaseLbl.textContent = META[phases[phaseIndex].key].label; // restore label after pause
  }
  runState = "running";
  lastTs = performance.now();
  rafId = requestAnimationFrame(loop);
  syncButtons();
}
function pause(){
  if(runState !== "running") return;
  runState = "paused";
  cancelAnimationFrame(rafId);
  phaseLbl.textContent = "Paused";
  syncButtons();
}
function reset(){
  cancelAnimationFrame(rafId);
  runState = "idle";
  orb.classList.add("idle");
  orb.style.transform = "";
  var pat = currentPattern();
  var first = pat[0] > 0 ? pat[0] : (pat[2] > 0 ? pat[2] : 4);
  phaseLbl.textContent = "Ready";
  countLbl.textContent = first;
  sessLbl.textContent = fmtTime(st.lenMin * 60 * 1000);
  setRing(0.28, "var(--accent)");
  syncButtons();
}
function finish(){
  cancelAnimationFrame(rafId);
  runState = "done";
  st.sessions += 1;
  st.minutes += st.lenMin;
  save();
  renderStats();
  orb.classList.add("idle");
  orb.style.transform = "";
  phaseLbl.textContent = "Well done";
  countLbl.textContent = "✓";
  sessLbl.textContent = st.lenMin + " min complete";
  setRing(1, "var(--teal)");
  completeChime();
  syncButtons();
}

function syncButtons(){
  if(runState === "running")      btnPrimary.textContent = "PAUSE";
  else if(runState === "paused")  btnPrimary.textContent = "RESUME";
  else if(runState === "done")    btnPrimary.textContent = "AGAIN";
  else                            btnPrimary.textContent = "START";
}

/* ---- ui rendering ---- */
function renderPattern(){
  var pat = currentPattern();
  var keys = ["IN","HOLD","OUT","HOLD"];
  var parts = [];
  for(var i=0;i<4;i++){ if(pat[i] > 0) parts.push(keys[i] + " " + pat[i]); }
  patternLbl.innerHTML = parts.join(" &middot; ");
}
function renderStats(){
  el("stSessions").textContent = st.sessions;
  el("stMinutes").textContent = st.minutes;
}
function renderModes(){
  var btns = el("modes").querySelectorAll("button");
  for(var i=0;i<btns.length;i++) btns[i].classList.toggle("on", btns[i].dataset.mode === st.mode);
  customBox.classList.toggle("hidden", st.mode !== "custom");
}
function renderCustom(){
  el("c_in").value = st.custom.in; el("cv_in").textContent = st.custom.in + "s";
  el("c_h1").value = st.custom.h1; el("cv_h1").textContent = st.custom.h1 + "s";
  el("c_out").value = st.custom.out; el("cv_out").textContent = st.custom.out + "s";
  el("c_h2").value = st.custom.h2; el("cv_h2").textContent = st.custom.h2 + "s";
}
function renderLen(){
  el("len").value = st.lenMin;
  el("lenLbl").textContent = st.lenMin + " min";
}
function renderSound(){
  btnSound.textContent = st.sound ? "♪ ON" : "♪ OFF";
  btnSound.classList.toggle("on", st.sound);
  btnSound.classList.toggle("off", !st.sound);
}

/* ---- events ---- */
el("modes").addEventListener("click", function(e){
  var b = e.target.closest("button"); if(!b) return;
  st.mode = b.dataset.mode; save();
  renderModes(); renderPattern();
  reset(); // switching pattern stops any active session and returns to Ready
});
["c_in","c_h1","c_out","c_h2"].forEach(function(id){
  el(id).addEventListener("input", function(){
    var map = { c_in:"in", c_h1:"h1", c_out:"out", c_h2:"h2" };
    st.custom[map[id]] = parseInt(el(id).value, 10) || 0;
    renderCustom(); renderPattern(); save();
    if(st.mode === "custom" && runState !== "running") reset();
  });
});
el("len").addEventListener("input", function(){
  st.lenMin = parseInt(el("len").value, 10) || 1;
  renderLen(); save();
  if(runState === "idle" || runState === "done") sessLbl.textContent = fmtTime(st.lenMin*60*1000);
});
btnPrimary.addEventListener("click", function(){
  if(runState === "running") pause();
  else start();
});
btnReset.addEventListener("click", reset);
btnSound.addEventListener("click", function(){
  st.sound = !st.sound; save(); renderSound();
  if(st.sound){ initAudio(); if(audioCtx && audioCtx.state === "suspended"){ try{ audioCtx.resume(); }catch(e){} } tone(528, 0.4, 0.7, 0); }
});
window.addEventListener("resize", function(){ /* layout is CSS-driven; nothing to recompute */ });

/* ---- init ---- */
load();
renderModes(); renderPattern(); renderCustom(); renderLen(); renderSound(); renderStats();
reset(); // sets Ready pose, ring arc, initial counts
</script>
</body>
</html>
