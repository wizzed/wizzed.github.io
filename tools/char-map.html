<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Character Map · Wizzed Arcade</title>
<style>
:root{
  --bg:#0f0f1a; --accent:#ffe14d; --accent-soft:rgba(255,225,77,.4);
  --panel:#161623; --line:#2c2c46; --text:#f8f4e6; --dim:#9c9782;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Courier New', ui-monospace, monospace;
  overflow-x:hidden; padding-bottom:20px;
}
a.back{
  position:fixed; top:10px; left:12px; z-index:60;
  color:var(--dim); text-decoration:none; font-size:12px; letter-spacing:1px;
  border:1px solid var(--line); padding:3px 8px; background:rgba(15,15,26,.92);
}
a.back:hover{ color:var(--accent); border-color:var(--accent); text-shadow:0 0 8px var(--accent); }
header{ text-align:center; padding:8px 8px 2px; }
h1{
  display:inline-block; font-size:clamp(16px,3vw,24px); letter-spacing:5px; color:var(--accent);
  text-shadow:0 0 6px var(--accent), 0 0 26px var(--accent-soft);
}
header .sub{ font-size:10px; color:var(--dim); letter-spacing:2px; margin-top:1px; }
#wrap{ max-width:960px; margin:6px auto 0; padding:0 12px; }
#topBar{
  display:flex; flex-wrap:wrap; gap:8px; align-items:center;
  background:var(--panel); border:2px solid var(--line); padding:8px 10px;
  box-shadow:0 0 0 1px #000;
}
#search{
  flex:1; min-width:150px; font-family:inherit; font-size:13px; padding:6px 9px;
  background:#0c0c16; color:var(--text); border:1px solid var(--line); outline:none;
}
#search:focus{ border-color:var(--accent); box-shadow:0 0 8px var(--accent-soft); }
#recentRow{ display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
#recentRow .lbl{ font-size:9px; color:var(--dim); letter-spacing:1px; }
.recent{
  width:26px; height:26px; display:flex; align-items:center; justify-content:center;
  border:1px solid var(--line); cursor:pointer; font-size:14px; background:#111120;
}
.recent:hover{ border-color:var(--accent); box-shadow:0 0 8px var(--accent-soft); }
#tabs{ display:flex; flex-wrap:wrap; gap:5px; margin-top:9px; }
#tabs button{
  font-family:inherit; font-size:10px; letter-spacing:1px; cursor:pointer;
  background:#121220; color:var(--dim); border:1px solid var(--line); padding:5px 9px;
}
#tabs button.on{
  color:#0f0f1a; background:var(--accent); border-color:var(--accent); font-weight:bold;
  box-shadow:0 0 12px var(--accent-soft);
}
#grid{
  margin-top:9px; display:grid; gap:5px;
  grid-template-columns:repeat(auto-fill,minmax(58px,1fr));
  background:var(--panel); border:2px solid var(--line); padding:9px;
  box-shadow:0 0 0 1px #000, 0 0 24px rgba(255,225,77,.06);
  min-height:220px; align-content:start;
}
.cell{
  border:1px solid var(--line); background:#111120; cursor:pointer; text-align:center;
  padding:6px 2px 4px; user-select:none;
}
.cell .g{ font-size:21px; line-height:1.25; display:block; }
.cell .cp{ font-size:8px; color:var(--dim); letter-spacing:0; display:block; margin-top:2px; }
.cell:hover{
  border-color:var(--accent); background:#1c1c2e;
  box-shadow:0 0 10px var(--accent-soft);
}
.cell:hover .cp{ color:var(--accent); }
.cell:active{ transform:scale(.93); }
#empty{ grid-column:1/-1; text-align:center; color:var(--dim); font-size:11px;
  letter-spacing:2px; padding:30px 0; }
#toast{
  position:fixed; left:50%; bottom:18px; transform:translateX(-50%) translateY(60px);
  background:#000; color:var(--accent); border:1px solid var(--accent); padding:6px 14px;
  font-size:11px; letter-spacing:1px; transition:transform .25s; z-index:99;
  text-shadow:0 0 8px var(--accent); box-shadow:0 0 14px var(--accent-soft); pointer-events:none;
}
#toast.show{ transform:translateX(-50%) translateY(0); }
</style>

var state={ cat:0, recent:[] };

function codepoints(ch){
  return Array.from(ch).map(function(c){
    return "U+"+c.codePointAt(0).toString(16).toUpperCase().padStart(4,"0");
  }).join(" ");
}

var toastTimer=null;
function toast(msg){
  var t=$("toast"); t.textContent=msg; t.classList.add("show");
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.classList.remove("show");},1200);
}
function copyChar(ch){
  function ok(){
    toast("COPIED  "+ch+"  "+codepoints(ch));
    addRecent(ch);
  }
  function fallback(){
    try{
      var ta=document.createElement("textarea");
      ta.value=ch;ta.style.position="fixed";ta.style.opacity="0";
      document.body.appendChild(ta);ta.select();
      document.execCommand("copy");document.body.removeChild(ta);ok();
    }catch(e){toast("COPY FAILED");}
  }
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(ch).then(ok,fallback);
  else fallback();
}

function addRecent(ch){
  var i=state.recent.indexOf(ch);
  if(i>=0)state.recent.splice(i,1);
  state.recent.unshift(ch);
  if(state.recent.length>14)state.recent.length=14;
  renderRecent();
  save();
}
function renderRecent(){
  var row=$("recentRow");
  row.innerHTML='<span class="lbl">RECENT:</span>';
  if(!state.recent.length){
    var s=document.createElement("span"); s.className="lbl"; s.textContent="—";
    row.appendChild(s); return;
  }
  state.recent.forEach(function(ch){
    var d=document.createElement("div"); d.className="recent"; d.textContent=ch;
    d.title="copy "+ch+" again";
    d.addEventListener("click",function(){copyChar(ch);});
    row.appendChild(d);
  });
}

function makeCell(ch,name){
  var c=document.createElement("div"); c.className="cell";
  c.title=name+"\n"+codepoints(ch)+"\nclick to copy";
  var g=document.createElement("span"); g.className="g"; g.textContent=ch;
  var cp=document.createElement("span"); cp.className="cp"; cp.textContent=codepoints(ch).split(" ")[0];
  c.appendChild(g); c.appendChild(cp);
  c.addEventListener("click",function(){copyChar(ch);});
  return c;
}

function renderGrid(){
  var grid=$("grid"); grid.innerHTML="";
  var q=$("search").value.trim().toLowerCase();
  var shown=0;
  if(q){
    CATS.forEach(function(cat){
      cat[1].forEach(function(item){
        if(item[1].indexOf(q)>=0||item[0]===q){ grid.appendChild(makeCell(item[0],item[1])); shown++; }
      });
    });
  }else{
    CATS[state.cat][1].forEach(function(item){
      grid.appendChild(makeCell(item[0],item[1])); shown++;
    });
  }
  if(!shown){
    var em=document.createElement("div"); em.id="empty";
    em.textContent="NO GLYPHS MATCH “"+q.toUpperCase()+"”";
    grid.appendChild(em);
  }
  renderTabs(!!q);
}

function renderTabs(searching){
  Array.prototype.forEach.call($("tabs").children,function(b,i){
    b.classList.toggle("on",!searching&&i===state.cat);
  });
}

(function buildTabs(){
  var tabs=$("tabs");
  CATS.forEach(function(cat,i){
    var b=document.createElement("button");
    b.textContent=cat[0].toUpperCase();
    b.addEventListener("click",function(){
      state.cat=i; $("search").value=""; renderGrid(); save();
    });
    tabs.appendChild(b);
  });
})();

$("search").addEventListener("input",renderGrid);

function save(){
  try{ localStorage.setItem(LS_KEY,JSON.stringify({cat:state.cat,recent:state.recent})); }catch(e){}
}
function load(){
  try{
    var d=JSON.parse(localStorage.getItem(LS_KEY));
    if(d){
      if(typeof d.cat==="number"&&d.cat>=0&&d.cat<CATS.length)state.cat=d.cat;
      if(Array.isArray(d.recent))state.recent=d.recent.filter(function(x){return typeof x==="string";}).slice(0,14);
    }
  }catch(e){}
}
load();
renderRecent();
renderGrid();
})();
