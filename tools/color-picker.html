<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Studio · Wizzed Arcade</title>
<style>
:root{
  --bg:#0f0f1a; --accent:#ff3ec8; --accent-soft:rgba(255,62,200,.45);
  --panel:#161623; --line:#2c2c46; --text:#f6ecf3; --dim:#98899d;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Courier New', ui-monospace, monospace;
  overflow-x:hidden; padding-bottom:24px;
}
a.back{
  position:fixed; top:10px; left:12px; z-index:60;
  color:var(--dim); text-decoration:none; font-size:12px; letter-spacing:1px;
  border:1px solid var(--line); padding:3px 8px; background:rgba(15,15,26,.92);
}
a.back:hover{ color:var(--accent); border-color:var(--accent); text-shadow:0 0 8px var(--accent); }
header{ text-align:center; padding:8px 8px 2px; }
h1{
  display:inline-block; font-size:clamp(16px,3vw,24px); letter-spacing:5px; color:var(--accent);
  text-shadow:0 0 6px var(--accent), 0 0 26px var(--accent-soft);
}
header .sub{ font-size:10px; color:var(--dim); letter-spacing:2px; margin-top:1px; }
main{
  display:flex; flex-wrap:wrap; gap:12px; justify-content:center; align-items:flex-start;
  max-width:900px; margin:6px auto 0; padding:0 12px;
}
.panel{
  background:var(--panel); border:2px solid var(--line); padding:10px;
  box-shadow:0 0 0 1px #000, 0 0 20px rgba(255,62,200,.08);
}
#pickCol{ display:flex; flex-direction:column; gap:8px; }
#slWrap{ position:relative; width:min(78vw,252px); height:200px; cursor:crosshair; touch-action:none;
  border:1px solid var(--line); }
#slCanvas{ display:block; width:100%; height:100%; }
#slDot{
  position:absolute; width:14px; height:14px; border:2px solid #fff; border-radius:50%;
  transform:translate(-50%,-50%); pointer-events:none;
  box-shadow:0 0 0 1px #000, 0 0 8px rgba(0,0,0,.8);
}
#hueWrap{ position:relative; height:20px; cursor:pointer; touch-action:none; border:1px solid var(--line);
  background:linear-gradient(90deg,#f00 0%,#ff0 17%,#0f0 33%,#0ff 50%,#00f 67%,#f0f 83%,#f00 100%);}
#hueThumb{
  position:absolute; top:-3px; width:8px; height:26px; transform:translateX(-50%);
  background:#fff; border:1px solid #000; pointer-events:none;
  box-shadow:0 0 6px rgba(255,255,255,.8);
}
#swatchRow{ display:flex; gap:8px; align-items:stretch; }
#bigSwatch{
  flex:1; height:44px; border:2px solid var(--line);
  box-shadow:inset 0 0 0 1px #000, 0 0 14px var(--sw-glow, rgba(255,62,200,.35));
}
#saveBtn{
  font-family:inherit; font-size:11px; letter-spacing:1px; cursor:pointer;
  background:#121220; color:var(--accent); border:1px solid var(--accent); padding:4px 10px;
  text-shadow:0 0 6px var(--accent);
}
#saveBtn:hover{ box-shadow:0 0 12px var(--accent-soft); }
#fieldCol{ display:flex; flex-direction:column; gap:8px; min-width:280px; max-width:340px; flex:1; }
.frow{ display:flex; gap:6px; align-items:center; }
.frow label{ width:34px; font-size:11px; color:var(--dim); letter-spacing:1px; }
.frow input{
  flex:1; font-family:inherit; font-size:13px; padding:5px 7px; min-width:0;
  background:#0c0c16; color:var(--text); border:1px solid var(--line); outline:none;
}
.frow input:focus{ border-color:var(--accent); box-shadow:0 0 8px var(--accent-soft); }
.frow input.bad{ border-color:#ff4560; box-shadow:0 0 8px rgba(255,69,96,.5); }
.copy{
  font-family:inherit; font-size:10px; cursor:pointer; letter-spacing:1px;
  background:#121220; color:var(--dim); border:1px solid var(--line); padding:5px 8px;
}
.copy:hover{ color:var(--accent); border-color:var(--accent); }
.copy.ok{ color:#3ddc84; border-color:#3ddc84; text-shadow:0 0 6px #3ddc84; }
.scaleTitle{ font-size:10px; color:var(--dim); letter-spacing:2px; margin:2px 0; }
.scale{ display:flex; height:26px; border:1px solid var(--line); }
.scale div{ flex:1; cursor:pointer; }
.scale div:hover{ outline:2px solid #fff; outline-offset:-2px; z-index:2; }
#harmony{ display:flex; gap:6px; flex-wrap:wrap; }
.chip{
  display:flex; align-items:center; gap:5px; cursor:pointer;
  border:1px solid var(--line); padding:3px 7px; font-size:10px; color:var(--dim); letter-spacing:1px;
  background:#121220;
}
.chip:hover{ border-color:var(--accent); color:var(--text); }
.chip b{ width:14px; height:14px; display:inline-block; border:1px solid #000; }
#shelfPanel{ width:min(96vw,860px); margin:12px auto 0; }
#shelfPanel .scaleTitle{ display:flex; justify-content:space-between; align-items:center; }
#clearShelf{ font-family:inherit; font-size:9px; background:none; border:1px solid var(--line);
  color:var(--dim); cursor:pointer; padding:2px 6px; letter-spacing:1px; }
#clearShelf:hover{ color:#ff4560; border-color:#ff4560; }
#shelf{ display:flex; gap:7px; flex-wrap:wrap; min-height:34px; padding-top:5px; }
.saved{
  position:relative; width:30px; height:30px; border:2px solid var(--line); cursor:pointer;
  box-shadow:0 0 0 1px #000;
}
.saved:hover{ border-color:#fff; }
.saved span{
  position:absolute; top:-7px; right:-7px; width:14px; height:14px; line-height:12px;
  font-size:9px; text-align:center; background:#000; color:#ff4560;
  border:1px solid #ff4560; display:none; cursor:pointer;
}
.saved:hover span{ display:block; }
#shelfEmpty{ font-size:10px; color:var(--dim); align-self:center; letter-spacing:1px; }
#toast{
  position:fixed; left:50%; bottom:18px; transform:translateX(-50%) translateY(60px);
  background:#000; color:var(--accent); border:1px solid var(--accent); padding:6px 14px;
  font-size:11px; letter-spacing:1px; transition:transform .25s; z-index:99;
  text-shadow:0 0 8px var(--accent); box-shadow:0 0 14px var(--accent-soft); pointer-events:none;
}
#toast.show{ transform:translateX(-50%) translateY(0); }
@media (max-width:620px){ #fieldCol{ min-width:78vw; } }
</style>
</head>
<body>
<a class="back" href="../index.html">← Arcade</a>
<header>
  <h1>◆ COLOR STUDIO ◆</h1>
  <div class="sub">PICK · TUNE · HARMONIZE</div>
</header>
<main>
  <div class="panel" id="pickCol">
    <div id="slWrap">
      <canvas id="slCanvas" width="252" height="200"></canvas>
      <div id="slDot"></div>
    </div>
    <div id="hueWrap"><div id="hueThumb"></div></div>
    <div id="swatchRow">
      <div id="bigSwatch"></div>
      <button id="saveBtn">＋ SAVE</button>
    </div>
  </div>
  <div class="panel" id="fieldCol">
    <div class="frow"><label>HEX</label><input id="fHex" spellcheck="false"><button class="copy" data-for="fHex">COPY</button></div>
    <div class="frow"><label>RGB</label><input id="fRgb" spellcheck="false"><button class="copy" data-for="fRgb">COPY</button></div>
    <div class="frow"><label>HSL</label><input id="fHsl" spellcheck="false"><button class="copy" data-for="fHsl">COPY</button></div>
    <div class="scaleTitle">SHADES</div>
    <div class="scale" id="shades"></div>
    <div class="scaleTitle">TINTS</div>
    <div class="scale" id="tints"></div>
    <div class="scaleTitle">HARMONY</div>
    <div id="harmony">
      <div class="chip" id="chipComp"><b></b>COMPLEMENT</div>
      <div class="chip" id="chipAn1"><b></b>ANALOG −30°</div>
      <div class="chip" id="chipAn2"><b></b>ANALOG +30°</div>
    </div>
  </div>
</main>
<div class="panel" id="shelfPanel">
  <div class="scaleTitle"><span>SAVED SWATCHES</span><button id="clearShelf">CLEAR</button></div>
  <div id="shelf"></div>
</div>
<div id="toast">COPIED!</div>
<script>
(function(){
"use strict";
var LS_KEY="wizzed-color-picker";
var $=function(id){return document.getElementById(id);};
var slCanvas=$("slCanvas"), slCtx=slCanvas.getContext("2d");
var slWrap=$("slWrap"), slDot=$("slDot"), hueWrap=$("hueWrap"), hueThumb=$("hueThumb");

// state: h 0-360, s 0-100, l 0-100
var state={h:322,s:100,l:62,saved:[]};

function clamp(v,a,b){return Math.min(b,Math.max(a,v));}
function hslToRgb(h,s,l){
  h=((h%360)+360)%360; s/=100; l/=100;
  var c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs((h/60)%2-1)), m=l-c/2, r=0,g=0,b=0;
  if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}
  else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}
  return [Math.round((r+m)*255),Math.round((g+m)*255),Math.round((b+m)*255)];
}
function rgbToHsl(r,g,b){
  r/=255;g/=255;b/=255;
  var max=Math.max(r,g,b),min=Math.min(r,g,b),h=0,s=0,l=(max+min)/2,d=max-min;
  if(d!==0){
    s=l>0.5? d/(2-max-min) : d/(max+min);
    if(max===r)h=((g-b)/d)%6; else if(max===g)h=(b-r)/d+2; else h=(r-g)/d+4;
    h*=60; if(h<0)h+=360;
  }
  return [h,s*100,l*100];
}
function hex2(n){return ("0"+n.toString(16)).slice(-2);}
function rgbToHex(r,g,b){return "#"+hex2(r)+hex2(g)+hex2(b);}
function hslToHex(h,s,l){var c=hslToRgb(h,s,l);return rgbToHex(c[0],c[1],c[2]);}
function parseHex(str){
  var m=/^#?([0-9a-f]{6})$/i.exec(str.trim());
  if(m){var n=parseInt(m[1],16);return [(n>>16)&255,(n>>8)&255,n&255];}
  m=/^#?([0-9a-f]{3})$/i.exec(str.trim());
  if(m){return m[1].split("").map(function(c){return parseInt(c+c,16);});}
  return null;
}

function drawSL(){
  var w=slCanvas.width,h=slCanvas.height;
  var img=slCtx.createImageData(w,h);
  var d=img.data,i=0;
  for(var y=0;y<h;y++){
    var l=100*(1-y/(h-1));
    for(var x=0;x<w;x++){
      var s=100*x/(w-1);
      var c=hslToRgb(state.h,s,l);
      d[i++]=c[0];d[i++]=c[1];d[i++]=c[2];d[i++]=255;
    }
  }
  slCtx.putImageData(img,0,0);
}

var toastTimer=null;
function toast(msg){
  var t=$("toast"); t.textContent=msg; t.classList.add("show");
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.classList.remove("show");},1100);
}
function copyText(txt,btn){
  function ok(){
    toast("COPIED "+txt.toUpperCase());
    if(btn){btn.classList.add("ok");setTimeout(function(){btn.classList.remove("ok");},700);}
  }
  function fallback(){
    try{
      var ta=document.createElement("textarea");
      ta.value=txt; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta); ok();
    }catch(e){ toast("COPY FAILED"); }
  }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(ok,fallback);
  }else fallback();
}

function currentHex(){return hslToHex(state.h,state.s,state.l);}

function makeCells(el,n){
  var cells=[];
  for(var i=0;i<n;i++){var d=document.createElement("div");el.appendChild(d);cells.push(d);}
  return cells;
}
var shadeCells=makeCells($("shades"),10), tintCells=makeCells($("tints"),10);

function render(fromField){
  var hex=currentHex(), rgb=hslToRgb(state.h,state.s,state.l);
  drawSL();
  slDot.style.left=(state.s/100*100)+"%";
  slDot.style.top=((1-state.l/100)*100)+"%";
  hueThumb.style.left=(state.h/360*100)+"%";
  $("bigSwatch").style.background=hex;
  $("bigSwatch").style.setProperty("--sw-glow",hex);
  if(fromField!=="hex"){$("fHex").value=hex;$("fHex").classList.remove("bad");}
  if(fromField!=="rgb"){$("fRgb").value="rgb("+rgb[0]+", "+rgb[1]+", "+rgb[2]+")";$("fRgb").classList.remove("bad");}
  if(fromField!=="hsl"){$("fHsl").value="hsl("+Math.round(state.h)+", "+Math.round(state.s)+"%, "+Math.round(state.l)+"%)";$("fHsl").classList.remove("bad");}
  for(var i=0;i<10;i++){
    var sl=state.l*(1-(i+1)/11);
    var tl=state.l+(100-state.l)*((i+1)/11);
    var sh=hslToHex(state.h,state.s,sl), th=hslToHex(state.h,state.s,tl);
    shadeCells[i].style.background=sh; shadeCells[i].dataset.hex=sh; shadeCells[i].title=sh;
    tintCells[i].style.background=th; tintCells[i].dataset.hex=th; tintCells[i].title=th;
  }
  setChip("chipComp",(state.h+180)%360);
  setChip("chipAn1",(state.h+330)%360);
  setChip("chipAn2",(state.h+30)%360);
  save();
}
function setChip(id,h){
  var hex=hslToHex(h,state.s,state.l);
  var chip=$(id); chip.querySelector("b").style.background=hex;
  chip.dataset.hex=hex; chip.title=hex;
}

function setFromHex(hex){
  var rgb=parseHex(hex); if(!rgb)return false;
  var hsl=rgbToHsl(rgb[0],rgb[1],rgb[2]);
  // keep hue when grayscale (s=0) so canvas stays put
  if(hsl[1]>0.5)state.h=hsl[0];
  state.s=hsl[1]; state.l=hsl[2];
  return true;
}

// ---- pointer handling
function bindDrag(el,fn){
  var active=false;
  function move(e){
    if(!active)return;
    var t=e.touches?e.touches[0]:e;
    fn(t.clientX,t.clientY);
    e.preventDefault();
  }
  function down(e){ active=true; move(e); }
  function up(){ active=false; }
  el.addEventListener("mousedown",down);
  el.addEventListener("touchstart",down,{passive:false});
  window.addEventListener("mousemove",move);
  window.addEventListener("touchmove",move,{passive:false});
  window.addEventListener("mouseup",up);
  window.addEventListener("touchend",up);
}
bindDrag(slWrap,function(cx,cy){
  var r=slWrap.getBoundingClientRect();
  state.s=clamp((cx-r.left)/r.width,0,1)*100;
  state.l=clamp(1-(cy-r.top)/r.height,0,1)*100;
  render();
});
bindDrag(hueWrap,function(cx){
  var r=hueWrap.getBoundingClientRect();
  state.h=clamp((cx-r.left)/r.width,0,1)*359.9;
  render();
});

// ---- editable fields
$("fHex").addEventListener("input",function(){
  if(setFromHex(this.value)){this.classList.remove("bad");render("hex");}
  else this.classList.add("bad");
});
$("fRgb").addEventListener("input",function(){
  var m=/^\s*(?:rgb\s*\(\s*)?(\d{1,3})\s*[, ]\s*(\d{1,3})\s*[, ]\s*(\d{1,3})\s*\)?\s*$/i.exec(this.value);
  if(m){
    var r=+m[1],g=+m[2],b=+m[3];
    if(r<256&&g<256&&b<256){
      var hsl=rgbToHsl(r,g,b);
      if(hsl[1]>0.5)state.h=hsl[0];
      state.s=hsl[1];state.l=hsl[2];
      this.classList.remove("bad");render("rgb");return;
    }
  }
  this.classList.add("bad");
});
$("fHsl").addEventListener("input",function(){
  var m=/^\s*(?:hsl\s*\(\s*)?(\d{1,3})\s*[, ]\s*(\d{1,3})%?\s*[, ]\s*(\d{1,3})%?\s*\)?\s*$/i.exec(this.value);
  if(m){
    var h=+m[1],s=+m[2],l=+m[3];
    if(h<=360&&s<=100&&l<=100){
      state.h=h%360;state.s=s;state.l=l;
      this.classList.remove("bad");render("hsl");return;
    }
  }
  this.classList.add("bad");
});
Array.prototype.forEach.call(document.querySelectorAll(".copy"),function(btn){
  btn.addEventListener("click",function(){copyText($(btn.dataset.for).value,btn);});
});

// ---- scales & chips click to select
function pickCell(e){
  var hex=e.target.dataset.hex;
  if(hex&&setFromHex(hex))render();
}
$("shades").addEventListener("click",pickCell);
$("tints").addEventListener("click",pickCell);
["chipComp","chipAn1","chipAn2"].forEach(function(id){
  $(id).addEventListener("click",function(){
    if(setFromHex(this.dataset.hex))render();
  });
});

// ---- shelf
function renderShelf(){
  var shelf=$("shelf"); shelf.innerHTML="";
  if(!state.saved.length){
    var em=document.createElement("div");em.id="shelfEmpty";
    em.textContent="click ＋ SAVE to pin colors here";
    shelf.appendChild(em);return;
  }
  state.saved.forEach(function(hex,i){
    var d=document.createElement("div");
    d.className="saved"; d.style.background=hex; d.title=hex;
    var x=document.createElement("span"); x.textContent="×";
    x.addEventListener("click",function(e){
      e.stopPropagation(); state.saved.splice(i,1); renderShelf(); save();
    });
    d.appendChild(x);
    d.addEventListener("click",function(){ if(setFromHex(hex))render(); });
    shelf.appendChild(d);
  });
}
$("saveBtn").addEventListener("click",function(){
  var hex=currentHex();
  if(state.saved.indexOf(hex)===-1){
    state.saved.push(hex);
    if(state.saved.length>40)state.saved.shift();
    renderShelf(); save(); toast("SAVED "+hex.toUpperCase());
  }else toast("ALREADY SAVED");
});
$("clearShelf").addEventListener("click",function(){
  state.saved=[]; renderShelf(); save();
});

// ---- persistence
function save(){
  try{
    localStorage.setItem(LS_KEY,JSON.stringify({h:state.h,s:state.s,l:state.l,saved:state.saved}));
  }catch(e){}
}
function load(){
  try{
    var d=JSON.parse(localStorage.getItem(LS_KEY));
    if(d&&typeof d.h==="number"){
      state.h=clamp(d.h,0,360);state.s=clamp(d.s,0,100);state.l=clamp(d.l,0,100);
      if(Array.isArray(d.saved))state.saved=d.saved.filter(function(x){return parseHex(x);}).slice(0,40);
    }
  }catch(e){}
}
load();
render();
renderShelf();
})();
</script>
</body>
</html>
