<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decision Wheel · Wizzed Arcade</title>
<style>
:root{
  --bg:#0f0f1a; --accent:#ff6ec7; --accent-soft:rgba(255,110,199,.45);
  --panel:#161623; --line:#2c2c46; --text:#fdeaf6; --dim:#8f9bb0;
  --green:#3ddc84; --red:#ff4560; --cyan:#00e5ff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Courier New', ui-monospace, monospace;
  overflow-x:hidden; padding-bottom:24px;
}
a.back{
  position:fixed; top:10px; left:12px; z-index:60;
  color:var(--dim); text-decoration:none; font-size:12px; letter-spacing:1px;
  border:1px solid var(--line); padding:3px 8px; background:rgba(15,15,26,.92);
}
a.back:hover{ color:var(--accent); border-color:var(--accent); text-shadow:0 0 8px var(--accent); }
header{ text-align:center; padding:10px 8px 2px; }
h1{
  display:inline-block; font-size:clamp(16px,3vw,24px); letter-spacing:5px; color:var(--accent);
  text-shadow:0 0 6px var(--accent), 0 0 26px var(--accent-soft);
}
header .sub{ font-size:10px; color:var(--dim); letter-spacing:2px; margin-top:2px; }
main{
  display:grid; grid-template-columns:minmax(300px,1.2fr) minmax(230px,1fr); gap:12px;
  max-width:900px; margin:6px auto 0; padding:0 12px; align-items:start;
}
@media (max-width:640px){ main{ grid-template-columns:1fr; } }
#wheelPanel{ text-align:center; }
.panel{
  background:var(--panel); border:2px solid var(--line); padding:12px;
  box-shadow:0 0 0 1px #000, 0 0 18px rgba(255,110,199,.08);
}
#wheelBox{ position:relative; width:min(300px,80vw); margin:10px auto 0; }
#wheel{ display:block; width:100%; cursor:pointer; }
#flap{
  position:absolute; top:-4px; left:50%; transform:translateX(-50%);
  width:0; height:0; z-index:5; transform-origin:50% 0;
  border-left:11px solid transparent; border-right:11px solid transparent;
  border-top:20px solid var(--accent);
  filter:drop-shadow(0 0 6px var(--accent));
}
#flap.kick{ animation:flapKick .13s ease-out; }
@keyframes flapKick{
  0%{ transform:translateX(-50%) rotate(0deg); }
  40%{ transform:translateX(-50%) rotate(-30deg); }
  100%{ transform:translateX(-50%) rotate(0deg); }
}
#spinBtn{
  margin-top:12px; font-family:inherit; font-size:15px; letter-spacing:4px; cursor:pointer;
  background:#2a1223; color:var(--accent); border:2px solid var(--accent); padding:10px 34px;
  text-shadow:0 0 8px var(--accent);
}
#spinBtn:hover:not(:disabled){ box-shadow:0 0 20px var(--accent-soft); }
#spinBtn:disabled{ opacity:.45; cursor:default; }
#result{
  margin-top:10px; min-height:34px; font-size:16px; letter-spacing:1px; color:var(--dim);
}
#result.win{
  color:#fff; text-shadow:0 0 14px var(--accent);
  animation:pop .35s cubic-bezier(.3,1.8,.5,1);
}
@keyframes pop{ 0%{ transform:scale(.5); opacity:0; } 100%{ transform:scale(1); opacity:1; } }
.ptitle{ font-size:11px; letter-spacing:2px; color:var(--accent); text-shadow:0 0 8px var(--accent-soft); margin-bottom:8px; }
#optList{ display:flex; flex-direction:column; gap:4px; max-height:34vh; overflow-y:auto; margin-bottom:8px; }
.opt{ display:flex; gap:6px; align-items:center; }
.opt .chip{ width:12px; height:12px; flex:none; border:1px solid #000; box-shadow:0 0 6px var(--cc); background:var(--cc); }
.opt input{
  flex:1; min-width:0; background:#0b0b15; color:var(--text); border:1px solid #222238;
  font-family:inherit; font-size:12px; padding:5px 7px; outline:none;
}
.opt input:focus{ border-color:var(--accent); }
.opt button{
  font-family:inherit; font-size:11px; cursor:pointer; background:#1a1a2e;
  color:var(--dim); border:1px solid var(--line); padding:4px 7px;
}
.opt button:hover:not(:disabled){ color:var(--red); border-color:var(--red); }
.opt button:disabled{ opacity:.25; cursor:default; }
.addrow{ display:flex; gap:6px; }
.addrow input{
  flex:1; min-width:0; background:#0b0b15; color:var(--text); border:1px dashed var(--line);
  font-family:inherit; font-size:12px; padding:6px 8px; outline:none;
}
.addrow input:focus{ border-color:var(--accent); }
.addrow button{
  font-family:inherit; font-size:13px; cursor:pointer; background:#1a1a2e;
  color:var(--green); border:1px solid var(--line); padding:0 10px;
}
.addrow button:hover:not(:disabled){ border-color:var(--green); box-shadow:0 0 8px rgba(61,220,132,.4); }
.addrow button:disabled{ opacity:.3; cursor:default; }
#optCount{ font-size:9px; color:var(--dim); letter-spacing:1px; margin-top:5px; }
#presets{ display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
#presets button{
  font-family:inherit; font-size:10px; letter-spacing:1px; cursor:pointer;
  background:#111120; color:var(--cyan); border:1px solid var(--line); padding:5px 8px;
}
#presets button:hover{ border-color:var(--cyan); box-shadow:0 0 8px rgba(0,229,255,.4); }
#histPanel{ margin-top:12px; }
#history{ display:flex; flex-direction:column; gap:3px; max-height:22vh; overflow-y:auto; }
#history .h{
  display:flex; gap:8px; font-size:11px; padding:4px 6px; background:#111120;
  border-left:3px solid var(--accent);
}
#history .h .t{ margin-left:auto; color:#5d688a; font-size:9px; }
#history .none{ font-size:10px; color:#555f77; padding:6px 2px; }
#clearHist{
  margin-top:6px; font-family:inherit; font-size:9px; letter-spacing:1px; cursor:pointer;
  background:transparent; color:var(--dim); border:1px solid var(--line); padding:3px 8px;
}
#clearHist:hover{ color:var(--red); border-color:var(--red); }
#confetti{ position:fixed; inset:0; width:100%; height:100%; z-index:80; pointer-events:none; }
footer{ text-align:center; font-size:10px; color:#4c576d; letter-spacing:1px; margin-top:14px; }
</style>
</head>
<body>
<a class="back" href="../index.html">← Arcade</a>
<header>
  <h1>DECISION WHEEL</h1>
  <div class="sub">CAN'T DECIDE? LET THE WHEEL DO IT · SPACE TO SPIN</div>
</header>
<main>
  <section class="panel" id="wheelPanel">
    <div id="wheelBox">
      <div id="flap"></div>
      <canvas id="wheel"></canvas>
    </div>
    <button id="spinBtn">⟳ SPIN</button>
    <div id="result">click the wheel or hit SPIN</div>
  </section>
  <div>
    <section class="panel">
      <div class="ptitle">▸ OPTIONS</div>
      <div id="optList"></div>
      <div class="addrow">
        <input type="text" id="newOpt" maxlength="40" placeholder="add option…">
        <button id="addOpt" title="add option">+</button>
      </div>
      <div id="optCount"></div>
      <div id="presets">
        <button data-p="yn">YES / NO</button>
        <button data-p="dinner">DINNER</button>
        <button data-p="chores">CHORES</button>
      </div>
    </section>
    <section class="panel" id="histPanel">
      <div class="ptitle">▸ SPIN HISTORY</div>
      <div id="history"></div>
      <button id="clearHist">clear history</button>
    </section>
  </div>
</main>
<canvas id="confetti"></canvas>
<footer>saved automatically in this browser</footer>
<script>
(function(){
"use strict";
var KEY='wizzed-decision-wheel';
var MAXN=16, MINN=2;
var PALETTE=['#ff4560','#00e5ff','#ffb300','#3ddc84','#b388ff','#ff6ec7','#00ffc8','#ff8a3d'];
var PRESETS={
  yn:['Yes ✅','No ❌','Yes ✅','No ❌'],
  dinner:['Pizza 🍕','Tacos 🌮','Sushi 🍣','Burgers 🍔','Ramen 🍜','Salad 🥗'],
  chores:['Dishes 🍽️','Laundry 🧺','Vacuum 🧹','Trash 🗑️','Bathroom 🚿','Dust shelves 🪶']
};
function demo(){
  return {options:PRESETS.dinner.slice(), history:[]};
}
function load(){
  try{
    var d=JSON.parse(localStorage.getItem(KEY));
    if(d && Array.isArray(d.options) && d.options.length>=MINN) return {options:d.options.slice(0,MAXN),history:Array.isArray(d.history)?d.history:[]};
  }catch(e){}
  return demo();
}
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){} }
var state=load();

function colorFor(i,n){
  var c=PALETTE[i%PALETTE.length];
  if(i===n-1 && n>1 && n%PALETTE.length===1) c=PALETTE[(i+3)%PALETTE.length];
  return c;
}

/* ---------- wheel ---------- */
var cv=document.getElementById('wheel');
var ctx=cv.getContext('2d');
var dpr=Math.min(2,window.devicePixelRatio||1);
var rot=-Math.PI/2;             /* start with a boundary at the pointer's right */
var spinning=false;

function sizeCanvas(){
  var w=cv.clientWidth||300;
  cv.width=w*dpr; cv.height=w*dpr;
  draw();
}
function draw(){
  var w=cv.width/dpr, c=w/2, R=c-6;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,w,w);
  var n=state.options.length;
  if(!n) return;
  var seg=Math.PI*2/n;
  for(var i=0;i<n;i++){
    var a0=rot+i*seg, a1=a0+seg;
    ctx.beginPath();
    ctx.moveTo(c,c);
    ctx.arc(c,c,R,a0,a1);
    ctx.closePath();
    ctx.fillStyle=colorFor(i,n)+'33';
    ctx.fill();
    ctx.strokeStyle=colorFor(i,n);
    ctx.lineWidth=1.5;
    ctx.stroke();
    /* label */
    ctx.save();
    ctx.translate(c,c);
    ctx.rotate(a0+seg/2);
    ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillStyle='#fff';
    ctx.shadowColor=colorFor(i,n); ctx.shadowBlur=6;
    var fs=Math.max(9,Math.min(14,Math.floor(w/(n>10?26:20))));
    ctx.font=fs+'px "Courier New", ui-monospace, monospace';
    var label=state.options[i];
    if(label.length>16) label=label.slice(0,15)+'…';
    ctx.fillText(label,R-10,0);
    ctx.restore();
  }
  /* rim */
  ctx.beginPath(); ctx.arc(c,c,R,0,Math.PI*2);
  ctx.lineWidth=3; ctx.strokeStyle='#ff6ec7';
  ctx.shadowColor='#ff6ec7'; ctx.shadowBlur=12;
  ctx.stroke(); ctx.shadowBlur=0;
  /* hub */
  ctx.beginPath(); ctx.arc(c,c,w*0.09,0,Math.PI*2);
  ctx.fillStyle='#161623'; ctx.fill();
  ctx.lineWidth=2; ctx.strokeStyle='#ff6ec7'; ctx.stroke();
  ctx.fillStyle='#ff6ec7'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='bold '+Math.floor(w*0.045)+'px "Courier New", ui-monospace, monospace';
  ctx.fillText('SPIN',c,c);
}
function mod2pi(a){
  var t=a%(Math.PI*2);
  return t<0?t+Math.PI*2:t;
}
function winnerIndex(){
  var n=state.options.length;
  if(!n) return -1;
  var seg=Math.PI*2/n;
  return Math.floor(mod2pi(-Math.PI/2-rot)/seg)%n;
}

var flap=document.getElementById('flap');
function kickFlap(){
  flap.classList.remove('kick');
  void flap.offsetWidth;
  flap.classList.add('kick');
}

function spin(){
  if(spinning || state.options.length<MINN) return;
  spinning=true;
  document.getElementById('spinBtn').disabled=true;
  var res=document.getElementById('result');
  res.classList.remove('win');
  res.textContent='spinning…';
  var start=rot;
  var delta=(4+Math.random()*3)*Math.PI*2+Math.random()*Math.PI*2;
  var dur=3600+Math.random()*1000;
  var t0=performance.now();
  var lastIdx=winnerIndex();
  function frame(t){
    var k=Math.min(1,(t-t0)/dur);
    var e=1-Math.pow(1-k,3);
    rot=start+delta*e;
    draw();
    var idx=winnerIndex();
    if(idx!==lastIdx){ kickFlap(); lastIdx=idx; }
    if(k<1){ requestAnimationFrame(frame); }
    else finish();
  }
  requestAnimationFrame(frame);
}
function finish(){
  spinning=false;
  document.getElementById('spinBtn').disabled=false;
  var idx=winnerIndex();
  var label=state.options[idx]||'?';
  var res=document.getElementById('result');
  res.textContent='🎯 '+label;
  res.classList.add('win');
  var now=new Date();
  state.history.unshift({label:label,t:now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')});
  state.history=state.history.slice(0,14);
  save();
  renderHistory();
  confettiBurst();
}
cv.addEventListener('click',spin);
document.getElementById('spinBtn').addEventListener('click',spin);
document.addEventListener('keydown',function(e){
  if(e.key===' ' && document.activeElement &&
     document.activeElement.tagName!=='INPUT'){
    e.preventDefault(); spin();
  }
});

/* ---------- confetti ---------- */
var ccv=document.getElementById('confetti');
var cctx=ccv.getContext('2d');
var parts=[], confettiRaf=null;
function confettiBurst(){
  ccv.width=window.innerWidth; ccv.height=window.innerHeight;
  var r=cv.getBoundingClientRect();
  var ox=r.left+r.width/2, oy=r.top;
  for(var i=0;i<130;i++){
    var a=Math.random()*Math.PI*2, sp=2+Math.random()*7;
    parts.push({
      x:ox, y:oy,
      vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-4,
      w:4+Math.random()*5, h:2+Math.random()*4,
      rot:Math.random()*Math.PI, vr:(Math.random()-.5)*.4,
      c:PALETTE[i%PALETTE.length], life:70+Math.random()*50
    });
  }
  if(!confettiRaf) confettiRaf=requestAnimationFrame(confettiStep);
}
function confettiStep(){
  cctx.clearRect(0,0,ccv.width,ccv.height);
  parts=parts.filter(function(p){ return p.life>0 && p.y<ccv.height+20; });
  parts.forEach(function(p){
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.vx*=0.99; p.rot+=p.vr; p.life--;
    cctx.save();
    cctx.translate(p.x,p.y);
    cctx.rotate(p.rot);
    cctx.globalAlpha=Math.max(0,Math.min(1,p.life/40));
    cctx.fillStyle=p.c;
    cctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    cctx.restore();
  });
  if(parts.length){ confettiRaf=requestAnimationFrame(confettiStep); }
  else{ confettiRaf=null; cctx.clearRect(0,0,ccv.width,ccv.height); }
}

/* ---------- options editor ---------- */
function renderOptions(){
  var list=document.getElementById('optList');
  list.innerHTML='';
  var n=state.options.length;
  state.options.forEach(function(opt,i){
    var row=document.createElement('div'); row.className='opt';
    var chip=document.createElement('span'); chip.className='chip';
    chip.style.setProperty('--cc',colorFor(i,n));
    var inp=document.createElement('input');
    inp.value=opt; inp.maxLength=40;
    inp.addEventListener('change',function(){
      var v=inp.value.trim();
      if(v) state.options[i]=v; else inp.value=state.options[i];
      save(); draw(); renderOptions();
    });
    var x=document.createElement('button'); x.textContent='✕'; x.title='remove';
    x.disabled=n<=MINN;
    x.addEventListener('click',function(){
      state.options.splice(i,1);
      save(); draw(); renderOptions();
    });
    row.appendChild(chip); row.appendChild(inp); row.appendChild(x);
    list.appendChild(row);
  });
  document.getElementById('optCount').textContent=n+' / '+MAXN+' OPTIONS';
  document.getElementById('addOpt').disabled=n>=MAXN;
}
function addOption(){
  var inp=document.getElementById('newOpt');
  var v=inp.value.trim();
  if(!v || state.options.length>=MAXN){ inp.focus(); return; }
  state.options.push(v);
  inp.value='';
  save(); draw(); renderOptions();
  inp.focus();
}
document.getElementById('addOpt').addEventListener('click',addOption);
document.getElementById('newOpt').addEventListener('keydown',function(e){
  if(e.key==='Enter') addOption();
});
[].forEach.call(document.querySelectorAll('#presets button'),function(b){
  b.addEventListener('click',function(){
    if(spinning) return;
    state.options=PRESETS[b.dataset.p].slice();
    save(); draw(); renderOptions();
    var res=document.getElementById('result');
    res.classList.remove('win');
    res.textContent='new wheel loaded — spin it!';
  });
});

/* ---------- history ---------- */
function renderHistory(){
  var h=document.getElementById('history');
  h.innerHTML='';
  if(!state.history.length){
    var e=document.createElement('div'); e.className='none';
    e.textContent='no spins yet';
    h.appendChild(e);
    return;
  }
  state.history.forEach(function(it){
    var row=document.createElement('div'); row.className='h';
    var l=document.createElement('span'); l.textContent=it.label;
    var t=document.createElement('span'); t.className='t'; t.textContent=it.t;
    row.appendChild(l); row.appendChild(t);
    h.appendChild(row);
  });
}
document.getElementById('clearHist').addEventListener('click',function(){
  state.history=[];
  save(); renderHistory();
});

window.addEventListener('resize',function(){ sizeCanvas(); });
renderOptions();
renderHistory();
sizeCanvas();
})();
</script>
</body>
</html>
