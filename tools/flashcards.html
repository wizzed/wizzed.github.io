<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards · Wizzed Arcade</title>
<style>
:root{
  --bg:#0f0f1a; --accent:#b388ff; --accent-soft:rgba(179,136,255,.45);
  --panel:#161623; --line:#2c2c46; --text:#f1eafc; --dim:#8f9bb0;
  --green:#3ddc84; --red:#ff4560; --cyan:#00e5ff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Courier New', ui-monospace, monospace;
  overflow-x:hidden; padding-bottom:24px;
}
a.back{
  position:fixed; top:10px; left:12px; z-index:60;
  color:var(--dim); text-decoration:none; font-size:12px; letter-spacing:1px;
  border:1px solid var(--line); padding:3px 8px; background:rgba(15,15,26,.92);
}
a.back:hover{ color:var(--accent); border-color:var(--accent); text-shadow:0 0 8px var(--accent); }
header{ text-align:center; padding:10px 8px 4px; }
h1{
  display:inline-block; font-size:clamp(16px,3vw,24px); letter-spacing:5px; color:var(--accent);
  text-shadow:0 0 6px var(--accent), 0 0 26px var(--accent-soft);
}
header .sub{ font-size:10px; color:var(--dim); letter-spacing:2px; margin-top:2px; }
main{
  display:grid; grid-template-columns:230px 1fr; gap:12px;
  max-width:960px; margin:6px auto 0; padding:0 12px; align-items:start;
}
@media (max-width:640px){ main{ grid-template-columns:1fr; } }
.panel{
  background:var(--panel); border:2px solid var(--line); padding:10px;
  box-shadow:0 0 0 1px #000, 0 0 18px rgba(179,136,255,.08);
}
.ptitle{ font-size:11px; letter-spacing:2px; color:var(--accent); text-shadow:0 0 8px var(--accent-soft); margin-bottom:8px; }
#deckList{ display:flex; flex-direction:column; gap:5px; margin-bottom:10px; }
.deck{
  display:flex; align-items:center; gap:6px; cursor:pointer;
  border:1px solid var(--line); background:#111120; padding:7px 8px; font-size:12px;
}
.deck:hover{ border-color:#454570; }
.deck.on{ border-color:var(--accent); box-shadow:0 0 10px var(--accent-soft); }
.deck .n{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.deck .c{ font-size:9px; color:var(--dim); }
.deck .x{
  font-family:inherit; font-size:10px; cursor:pointer; background:transparent;
  color:var(--dim); border:none; padding:2px 3px;
}
.deck .x:hover{ color:var(--red); text-shadow:0 0 6px var(--red); }
.addrow{ display:flex; gap:6px; }
.addrow input{
  flex:1; min-width:0; background:#0b0b15; color:var(--text); border:1px solid var(--line);
  font-family:inherit; font-size:11px; padding:6px 8px; outline:none;
}
.addrow input:focus{ border-color:var(--accent); box-shadow:0 0 8px var(--accent-soft); }
.addrow button{
  font-family:inherit; font-size:13px; cursor:pointer; background:#1a1a2e;
  color:var(--accent); border:1px solid var(--line); padding:0 10px;
}
.addrow button:hover{ border-color:var(--accent); box-shadow:0 0 8px var(--accent-soft); }
#studyBtn{
  width:100%; margin-top:4px; font-family:inherit; font-size:13px; letter-spacing:3px;
  cursor:pointer; background:#1d1233; color:var(--accent); border:2px solid var(--accent);
  padding:10px; text-shadow:0 0 8px var(--accent);
}
#studyBtn:hover{ box-shadow:0 0 18px var(--accent-soft); }
#studyBtn:disabled{ opacity:.35; cursor:default; box-shadow:none; }
#cardRows{ display:flex; flex-direction:column; gap:4px; max-height:46vh; overflow-y:auto; margin-bottom:10px; }
.crow{ display:flex; gap:6px; align-items:center; }
.crow input{
  flex:1; min-width:0; background:#0b0b15; color:var(--text); border:1px solid #222238;
  font-family:inherit; font-size:11px; padding:5px 7px; outline:none;
}
.crow input:focus{ border-color:var(--accent); }
.crow .x{
  font-family:inherit; font-size:11px; cursor:pointer; background:#1a1a2e;
  color:var(--dim); border:1px solid var(--line); padding:4px 7px;
}
.crow .x:hover{ color:var(--red); border-color:var(--red); }
.crow.new input{ border-style:dashed; }
#study{ display:none; }
body.studying main{ display:none; }
body.studying #study{ display:block; }
#study .inner{ max-width:560px; margin:0 auto; padding:0 12px; }
#progWrap{ height:10px; background:#0b0b15; border:1px solid var(--line); margin:8px 0 4px; }
#progBar{
  height:100%; width:0; background:linear-gradient(90deg,#5a3d99,var(--accent));
  box-shadow:0 0 10px var(--accent-soft); transition:width .3s;
}
#progLab{ font-size:10px; color:var(--dim); letter-spacing:1px; text-align:center; margin-bottom:10px; }
#flipScene{ perspective:1000px; height:min(46vh,280px); cursor:pointer; }
#flipInner{
  position:relative; width:100%; height:100%;
  transform-style:preserve-3d; transition:transform .45s cubic-bezier(.4,1.6,.5,1);
}
#flipInner.flipped{ transform:rotateY(180deg); }
.face{
  position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
  background:var(--panel); border:2px solid var(--accent); padding:18px;
  box-shadow:0 0 0 1px #000, 0 0 26px var(--accent-soft); text-align:center;
}
.face .tag{ font-size:9px; letter-spacing:3px; color:var(--dim); }
.face .word{ font-size:clamp(18px,4vw,30px); text-shadow:0 0 12px var(--accent-soft); word-break:break-word; }
.face.backf{ transform:rotateY(180deg); border-color:var(--cyan); box-shadow:0 0 0 1px #000, 0 0 26px rgba(0,229,255,.4); }
.face.backf .word{ color:var(--cyan); text-shadow:0 0 12px rgba(0,229,255,.5); }
.face .hint{ font-size:9px; color:#555f77; letter-spacing:1px; }
#judge{ display:flex; gap:10px; margin-top:14px; visibility:hidden; }
#judge button{
  flex:1; font-family:inherit; font-size:12px; letter-spacing:2px; cursor:pointer;
  padding:11px 6px; background:#111120; border:2px solid var(--line); color:var(--text);
}
#againBtn{ color:var(--red); border-color:var(--red) !important; text-shadow:0 0 8px var(--red); }
#againBtn:hover{ box-shadow:0 0 14px rgba(255,69,96,.5); }
#knewBtn{ color:var(--green); border-color:var(--green) !important; text-shadow:0 0 8px var(--green); }
#knewBtn:hover{ box-shadow:0 0 14px rgba(61,220,132,.5); }
#exitStudy{
  display:block; margin:14px auto 0; font-family:inherit; font-size:10px; letter-spacing:1px;
  cursor:pointer; background:transparent; color:var(--dim); border:1px solid var(--line); padding:5px 12px;
}
#exitStudy:hover{ color:var(--text); border-color:var(--dim); }
#summary{ display:none; text-align:center; padding:20px 10px; }
#summary.show{ display:block; }
#summary .big{ font-size:34px; color:var(--green); text-shadow:0 0 16px rgba(61,220,132,.6); margin:8px 0; }
#summary .line{ font-size:12px; color:var(--dim); margin:4px 0; }
#summary button{
  font-family:inherit; font-size:11px; letter-spacing:2px; cursor:pointer; margin:12px 5px 0;
  background:#1d1233; color:var(--accent); border:2px solid var(--accent); padding:9px 16px;
  text-shadow:0 0 6px var(--accent);
}
#summary button:hover{ box-shadow:0 0 14px var(--accent-soft); }
.kbd{ font-size:9px; color:#555f77; letter-spacing:1px; text-align:center; margin-top:8px; }
footer{ text-align:center; font-size:10px; color:#4c576d; letter-spacing:1px; margin-top:14px; }
</style>
</head>
<body>
<a class="back" href="../index.html">← Arcade</a>
<header>
  <h1>FLASHCARDS</h1>
  <div class="sub">BUILD DECKS · FLIP · KNOW IT OR SEE IT AGAIN</div>
</header>
<main>
  <section class="panel">
    <div class="ptitle">▸ DECKS</div>
    <div id="deckList"></div>
    <div class="addrow">
      <input type="text" id="newDeck" maxlength="40" placeholder="new deck…">
      <button id="addDeck" title="add deck">+</button>
    </div>
  </section>
  <section class="panel">
    <div class="ptitle" id="deckTitle">▸ CARDS</div>
    <div id="cardRows"></div>
    <button id="studyBtn">▶ STUDY THIS DECK</button>
    <div class="kbd">click front/back text to edit · SPACE flips in study mode</div>
  </section>
</main>
<section id="study">
  <div class="inner">
    <div id="progWrap"><div id="progBar"></div></div>
    <div id="progLab"></div>
    <div id="flipScene">
      <div id="flipInner">
        <div class="face frontf">
          <div class="tag">FRONT</div>
          <div class="word" id="frontWord"></div>
          <div class="hint">click / space to flip</div>
        </div>
        <div class="face backf">
          <div class="tag">BACK</div>
          <div class="word" id="backWord"></div>
          <div class="hint">how did you do?</div>
        </div>
      </div>
    </div>
    <div id="judge">
      <button id="againBtn">✖ AGAIN <small>(1)</small></button>
      <button id="knewBtn">✔ KNEW IT <small>(2)</small></button>
    </div>
    <div id="summary">
      <div class="line">SESSION COMPLETE</div>
      <div class="big" id="sumPct">100%</div>
      <div class="line" id="sumCards"></div>
      <div class="line" id="sumAgain"></div>
      <button id="restudy">↻ STUDY AGAIN</button>
      <button id="backToDecks">DECKS</button>
    </div>
    <button id="exitStudy">← back to decks (esc)</button>
  </div>
</section>
<footer>saved automatically in this browser</footer>
<script>
(function(){
"use strict";
var KEY='wizzed-flashcards';
var uid=function(){ return 'd'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); };

function demo(){
  var caps=[['France','Paris'],['Japan','Tokyo'],['Italy','Rome'],['Spain','Madrid'],
    ['Germany','Berlin'],['Canada','Ottawa'],['Australia','Canberra'],['Brazil','Brasília'],
    ['Egypt','Cairo'],['Kenya','Nairobi'],['India','New Delhi'],['China','Beijing'],
    ['Russia','Moscow'],['Mexico','Mexico City'],['Argentina','Buenos Aires'],['Norway','Oslo'],
    ['Greece','Athens'],['Turkey','Ankara'],['South Korea','Seoul'],['Thailand','Bangkok']];
  return { sel:0, decks:[{
    id:uid(), name:'World Capitals 🌍',
    cards:caps.map(function(p){ return {f:p[0],b:p[1]}; })
  }]};
}
function load(){
  try{
    var d=JSON.parse(localStorage.getItem(KEY));
    if(d && Array.isArray(d.decks)) return d;
  }catch(e){}
  return demo();
}
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){} }
var state=load();

function curDeck(){
  if(state.sel>=state.decks.length) state.sel=Math.max(0,state.decks.length-1);
  return state.decks[state.sel]||null;
}

/* ---------- manager ---------- */
function render(){
  var dl=document.getElementById('deckList');
  dl.innerHTML='';
  state.decks.forEach(function(d,i){
    var el=document.createElement('div');
    el.className='deck'+(i===state.sel?' on':'');
    var n=document.createElement('span'); n.className='n'; n.textContent=d.name; el.appendChild(n);
    var c=document.createElement('span'); c.className='c'; c.textContent=d.cards.length+' cards'; el.appendChild(c);
    var x=document.createElement('button'); x.className='x'; x.textContent='✕'; x.title='delete deck';
    x.addEventListener('click',function(e){
      e.stopPropagation();
      state.decks.splice(i,1);
      if(state.sel>=state.decks.length) state.sel=Math.max(0,state.decks.length-1);
      render();
    });
    el.appendChild(x);
    el.addEventListener('click',function(){ state.sel=i; render(); });
    dl.appendChild(el);
  });
  if(!state.decks.length){
    var e=document.createElement('div');
    e.style.cssText='font-size:10px;color:#555f77;padding:8px 2px;';
    e.textContent='no decks yet — create one below';
    dl.appendChild(e);
  }

  var d=curDeck();
  document.getElementById('deckTitle').textContent='▸ CARDS'+(d?' — '+d.name.toUpperCase():'');
  var rows=document.getElementById('cardRows');
  rows.innerHTML='';
  if(d){
    d.cards.forEach(function(card,ci){
      rows.appendChild(cardRow(d,card,ci));
    });
    rows.appendChild(newCardRow(d));
  }
  document.getElementById('studyBtn').disabled=!(d && d.cards.length);
  save();
}
function cardRow(d,card,ci){
  var row=document.createElement('div'); row.className='crow';
  var f=document.createElement('input'); f.value=card.f; f.maxLength=120; f.title='front';
  var b=document.createElement('input'); b.value=card.b; b.maxLength=120; b.title='back';
  f.addEventListener('change',function(){ card.f=f.value.trim()||card.f; save(); });
  b.addEventListener('change',function(){ card.b=b.value.trim()||card.b; save(); });
  var x=document.createElement('button'); x.className='x'; x.textContent='✕'; x.title='delete card';
  x.addEventListener('click',function(){ d.cards.splice(ci,1); render(); });
  row.appendChild(f); row.appendChild(b); row.appendChild(x);
  return row;
}
function newCardRow(d){
  var row=document.createElement('div'); row.className='crow new';
  var f=document.createElement('input'); f.placeholder='front…'; f.maxLength=120;
  var b=document.createElement('input'); b.placeholder='back…'; b.maxLength=120;
  var x=document.createElement('button'); x.className='x'; x.textContent='+'; x.title='add card';
  x.style.color='var(--green)';
  var add=function(){
    var fv=f.value.trim(), bv=b.value.trim();
    if(!fv || !bv){ (fv?b:f).focus(); return; }
    d.cards.push({f:fv,b:bv});
    render();
    var rows=document.getElementById('cardRows');
    rows.scrollTop=rows.scrollHeight;
    var last=rows.querySelector('.crow.new input');
    if(last) last.focus();
  };
  x.addEventListener('click',add);
  b.addEventListener('keydown',function(e){ if(e.key==='Enter') add(); });
  f.addEventListener('keydown',function(e){ if(e.key==='Enter') b.focus(); });
  row.appendChild(f); row.appendChild(b); row.appendChild(x);
  return row;
}
document.getElementById('addDeck').addEventListener('click',addDeck);
document.getElementById('newDeck').addEventListener('keydown',function(e){ if(e.key==='Enter') addDeck(); });
function addDeck(){
  var inp=document.getElementById('newDeck');
  var v=inp.value.trim();
  if(!v){ inp.focus(); return; }
  state.decks.push({id:uid(),name:v,cards:[]});
  state.sel=state.decks.length-1;
  inp.value='';
  render();
}

/* ---------- study ---------- */
var session=null;   /* {queue:[card..], total, knew, again, cur, flipped} */
var flipInner=document.getElementById('flipInner');
function shuffle(a){
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=a[i]; a[i]=a[j]; a[j]=t;
  }
  return a;
}
function startStudy(){
  var d=curDeck();
  if(!d || !d.cards.length) return;
  session={queue:shuffle(d.cards.slice()),total:d.cards.length,knew:0,again:0,cur:null,flipped:false};
  document.body.classList.add('studying');
  document.getElementById('summary').classList.remove('show');
  document.getElementById('flipScene').style.display='';
  document.getElementById('judge').style.display='';
  nextCard();
}
function nextCard(){
  var s=session;
  if(!s) return;
  if(!s.queue.length){ endStudy(); return; }
  s.cur=s.queue.shift();
  s.flipped=false;
  flipInner.style.transition='none';
  flipInner.classList.remove('flipped');
  void flipInner.offsetWidth;
  flipInner.style.transition='';
  document.getElementById('frontWord').textContent=s.cur.f;
  document.getElementById('backWord').textContent=s.cur.b;
  document.getElementById('judge').style.visibility='hidden';
  updateProg();
}
function updateProg(){
  var s=session;
  var pct=s.total? Math.round(s.knew/s.total*100):0;
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('progLab').textContent=
    s.knew+' / '+s.total+' KNOWN · '+(s.queue.length+1)+' IN QUEUE'+(s.again?' · '+s.again+' AGAIN':'');
}
function flip(){
  var s=session;
  if(!s || !s.cur) return;
  s.flipped=!s.flipped;
  flipInner.classList.toggle('flipped',s.flipped);
  if(s.flipped) document.getElementById('judge').style.visibility='visible';
}
function judge(knew){
  var s=session;
  if(!s || !s.cur || !s.flipped) return;
  if(knew){ s.knew++; }
  else{
    s.again++;
    var pos=Math.min(2,s.queue.length);       /* recycle soon */
    s.queue.splice(pos,0,s.cur);
  }
  nextCard();
}
function endStudy(){
  var s=session;
  document.getElementById('flipScene').style.display='none';
  document.getElementById('judge').style.display='none';
  var sum=document.getElementById('summary');
  sum.classList.add('show');
  var attempts=s.knew+s.again;
  var pct=attempts? Math.round(s.knew/attempts*100):100;
  document.getElementById('sumPct').textContent=pct+'%';
  document.getElementById('sumCards').textContent=s.total+' cards studied · '+attempts+' answers';
  document.getElementById('sumAgain').textContent=s.again? s.again+' card'+(s.again>1?'s':'')+' needed a retry':'perfect run — no retries!';
  document.getElementById('progBar').style.width='100%';
  document.getElementById('progLab').textContent='DONE';
  session=null;
}
function exitStudy(){
  session=null;
  document.body.classList.remove('studying');
  render();
}
document.getElementById('studyBtn').addEventListener('click',startStudy);
document.getElementById('flipScene').addEventListener('click',flip);
document.getElementById('againBtn').addEventListener('click',function(){ judge(false); });
document.getElementById('knewBtn').addEventListener('click',function(){ judge(true); });
document.getElementById('exitStudy').addEventListener('click',exitStudy);
document.getElementById('restudy').addEventListener('click',startStudy);
document.getElementById('backToDecks').addEventListener('click',exitStudy);
document.addEventListener('keydown',function(e){
  if(!document.body.classList.contains('studying')) return;
  if(e.key===' '){ e.preventDefault(); flip(); }
  else if(e.key==='1'){ judge(false); }
  else if(e.key==='2' || e.key==='Enter'){ judge(true); }
  else if(e.key==='Escape'){ exitStudy(); }
});

render();
})();
</script>
</body>
</html>
