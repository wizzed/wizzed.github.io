<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker · Wizzed Arcade</title>
<style>
:root{
  --bg:#0f0f1a; --accent:#3ddc84; --accent-soft:rgba(61,220,132,.45);
  --panel:#161623; --line:#2c2c46; --text:#eafaf0; --dim:#8f9bb0;
  --red:#ff4560; --cyan:#00e5ff; --amber:#ffb300;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Courier New', ui-monospace, monospace;
  overflow-x:hidden; padding-bottom:24px;
}
a.back{
  position:fixed; top:10px; left:12px; z-index:60;
  color:var(--dim); text-decoration:none; font-size:12px; letter-spacing:1px;
  border:1px solid var(--line); padding:3px 8px; background:rgba(15,15,26,.92);
}
a.back:hover{ color:var(--accent); border-color:var(--accent); text-shadow:0 0 8px var(--accent); }
header{ text-align:center; padding:10px 8px 4px; }
h1{
  display:inline-block; font-size:clamp(16px,3vw,24px); letter-spacing:5px; color:var(--accent);
  text-shadow:0 0 6px var(--accent), 0 0 26px var(--accent-soft);
}
header .sub{ font-size:10px; color:var(--dim); letter-spacing:2px; margin-top:2px; }
main{ max-width:980px; margin:6px auto 0; padding:0 12px; }
#board{
  background:var(--panel); border:2px solid var(--line); padding:10px;
  box-shadow:0 0 0 1px #000, 0 0 18px rgba(61,220,132,.08);
  overflow-x:auto;
}
table{ border-collapse:collapse; min-width:100%; }
th,td{ padding:0; }
.day-head{ font-size:8px; color:var(--dim); text-align:center; line-height:1.2; padding:0 1px 4px; font-weight:normal; }
.day-head.wk{ color:var(--accent); text-shadow:0 0 6px var(--accent-soft); }
.day-head.today{ color:#fff; }
.hname{ text-align:left; padding-right:10px; white-space:nowrap; }
.hname .top{ display:flex; align-items:center; gap:6px; }
.emoji-btn{
  font-family:inherit; font-size:16px; line-height:1; cursor:pointer;
  background:#101020; border:1px solid var(--line); padding:3px 4px;
}
.emoji-btn:hover{ border-color:var(--accent); box-shadow:0 0 8px var(--accent-soft); }
.hname .nm{ font-size:12px; cursor:text; max-width:120px; overflow:hidden; text-overflow:ellipsis; }
.hname .nm:hover{ color:var(--accent); }
.hname input{
  width:120px; background:#0b0b15; color:var(--text); border:1px solid var(--accent);
  font-family:inherit; font-size:12px; padding:2px 4px; outline:none;
}
.pctbar{ margin-top:5px; width:150px; height:7px; background:#0b0b15; border:1px solid var(--line); position:relative; }
.pctbar i{
  display:block; height:100%; background:linear-gradient(90deg,#1a7a4a,var(--accent));
  box-shadow:0 0 8px var(--accent-soft);
}
.pctlab{ font-size:9px; color:var(--dim); margin-top:2px; letter-spacing:1px; }
.cell{ padding:1px; }
.cell button{
  display:block; width:15px; height:15px; cursor:pointer; padding:0;
  background:#0b0b15; border:1px solid #24243c;
}
.cell button:hover{ border-color:var(--accent); }
.cell button.on{
  background:var(--accent); border-color:var(--accent);
  box-shadow:0 0 7px var(--accent-soft);
}
.cell.wk button{ border-left:2px solid #3d6b50; }
.cell.today button{ outline:1px solid #fff; outline-offset:-1px; }
.streaks{ padding-left:10px; white-space:nowrap; font-size:10px; color:var(--dim); }
.streaks b{ color:var(--amber); text-shadow:0 0 7px rgba(255,179,0,.6); font-size:12px; }
.streaks .best b{ color:var(--cyan); text-shadow:0 0 7px rgba(0,229,255,.6); }
.delh{
  font-family:inherit; font-size:10px; cursor:pointer; margin-left:8px;
  background:#1a1a2e; color:var(--dim); border:1px solid var(--line); padding:2px 5px;
}
.delh:hover{ color:var(--red); border-color:var(--red); text-shadow:0 0 6px var(--red); }
tr.habit td{ border-top:1px solid #1d1d31; }
tr.habit .hname,tr.habit .streaks{ padding-top:8px; padding-bottom:8px; }
#adder{
  display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; align-items:center;
  background:var(--panel); border:2px solid var(--line); padding:10px;
  box-shadow:0 0 0 1px #000;
}
#adder input{
  flex:1; min-width:150px; background:#0b0b15; color:var(--text); border:1px solid var(--line);
  font-family:inherit; font-size:12px; padding:7px 9px; outline:none;
}
#adder input:focus{ border-color:var(--accent); box-shadow:0 0 10px var(--accent-soft); }
#adder .emoji-btn{ font-size:18px; padding:4px 7px; }
#addBtn{
  font-family:inherit; font-size:11px; letter-spacing:2px; cursor:pointer;
  background:#12281c; color:var(--accent); border:1px solid var(--accent); padding:8px 14px;
  text-shadow:0 0 6px var(--accent);
}
#addBtn:hover{ box-shadow:0 0 14px var(--accent-soft); }
#emojiPop{
  position:fixed; z-index:80; background:#12121f; border:2px solid var(--accent);
  box-shadow:0 0 20px var(--accent-soft); padding:6px; display:none;
  grid-template-columns:repeat(6,1fr); gap:2px; max-width:220px;
}
#emojiPop.open{ display:grid; }
#emojiPop button{
  font-family:inherit; font-size:17px; cursor:pointer; background:transparent;
  border:1px solid transparent; padding:3px;
}
#emojiPop button:hover{ border-color:var(--accent); background:#0b0b15; }
footer{ text-align:center; font-size:10px; color:#4c576d; letter-spacing:1px; margin-top:14px; }
</style>
</head>
<body>
<a class="back" href="../index.html">← Arcade</a>
<header>
  <h1>HABIT TRACKER</h1>
  <div class="sub">TAP A CELL TO TOGGLE · LAST 30 DAYS · ▍= WEEK START</div>
</header>
<main>
  <div id="board"><table id="grid"></table></div>
  <div id="adder">
    <button class="emoji-btn" id="newEmoji" title="pick emoji">✨</button>
    <input type="text" id="newName" maxlength="40" placeholder="new habit name…">
    <button id="addBtn">+ ADD HABIT</button>
  </div>
</main>
<div id="emojiPop"></div>
<footer>saved automatically in this browser</footer>
<script>
(function(){
"use strict";
var KEY='wizzed-habit-tracker';
var DAYS=30;
var EMOJIS=['💧','🏃','📖','🧘','💪','🥗','😴','🎸','✍️','🦷','🌞','🚭','🧹','💊','🎨','🐕','💰','📵','🎯','✨','🍎','🚴','🗣️','🧠'];
var uid=function(){ return 'h'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); };

function dstr(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function dayAgo(n){
  var d=new Date(); d.setHours(12,0,0,0); d.setDate(d.getDate()-n); return d;
}

function demo(){
  var mk=function(name,emoji,fn){
    var dates={};
    for(var i=0;i<DAYS;i++){ if(fn(i)) dates[dstr(dayAgo(i))]=1; }
    return {id:uid(),name:name,emoji:emoji,dates:dates};
  };
  return { habits:[
    mk('Drink water','💧',function(i){ return i%9!==4 && i%13!==7; }),
    mk('Morning run','🏃',function(i){ return i%2===0 && i%16!==6; }),
    mk('Read 20 min','📖',function(i){ return i<5 || i%5===2 || i%7===3; })
  ]};
}
function load(){
  try{
    var d=JSON.parse(localStorage.getItem(KEY));
    if(d && Array.isArray(d.habits)) return d;
  }catch(e){}
  return demo();
}
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){} }
var state=load();

function curStreak(h){
  var n=0, i=0;
  if(!h.dates[dstr(dayAgo(0))]) i=1;               /* today not done yet: streak alive from yesterday */
  while(h.dates[dstr(dayAgo(i))]){ n++; i++; }
  return n;
}
function bestStreak(h){
  var keys=Object.keys(h.dates).sort();
  var best=0, run=0, prev=null;
  keys.forEach(function(k){
    var t=new Date(k+'T12:00:00').getTime();
    var gap=prev===null?0:t-prev;
    run=(gap>=82800000 && gap<=90000000)? run+1 : 1;   /* 24h ± DST hour */
    prev=t;
    if(run>best) best=run;
  });
  return best;
}
function pct30(h){
  var n=0;
  for(var i=0;i<DAYS;i++) if(h.dates[dstr(dayAgo(i))]) n++;
  return Math.round(n/DAYS*100);
}

var renaming=null;
function render(){
  var grid=document.getElementById('grid');
  grid.innerHTML='';
  var days=[];
  for(var i=DAYS-1;i>=0;i--) days.push(dayAgo(i));

  var thead=document.createElement('tr');
  var corner=document.createElement('th'); corner.className='day-head'; thead.appendChild(corner);
  days.forEach(function(d,ix){
    var th=document.createElement('th');
    th.className='day-head'+(d.getDay()===1?' wk':'')+(ix===days.length-1?' today':'');
    th.innerHTML='';
    var w=document.createElement('div'); w.textContent='SMTWTFS'[d.getDay()];
    var n=document.createElement('div'); n.textContent=String(d.getDate());
    th.appendChild(w); th.appendChild(n);
    thead.appendChild(th);
  });
  var th2=document.createElement('th'); th2.className='day-head'; th2.textContent='STREAK';
  thead.appendChild(th2);
  grid.appendChild(thead);

  state.habits.forEach(function(h){
    var tr=document.createElement('tr'); tr.className='habit';
    var name=document.createElement('td'); name.className='hname';
    var top=document.createElement('div'); top.className='top';

    var eb=document.createElement('button');
    eb.className='emoji-btn'; eb.textContent=h.emoji||'✨'; eb.title='change emoji';
    eb.addEventListener('click',function(e){ openEmojiPop(eb,function(em){ h.emoji=em; render(); }); e.stopPropagation(); });
    top.appendChild(eb);

    if(renaming===h.id){
      var inp=document.createElement('input');
      inp.value=h.name; inp.maxLength=40;
      var commit=function(){
        renaming=null;
        var v=inp.value.trim();
        if(v) h.name=v;
        render();
      };
      inp.addEventListener('blur',commit);
      inp.addEventListener('keydown',function(e){
        if(e.key==='Enter') inp.blur();
        if(e.key==='Escape'){ inp.value=h.name; inp.blur(); }
      });
      top.appendChild(inp);
      setTimeout(function(){ inp.focus(); inp.select(); },0);
    }else{
      var nm=document.createElement('span');
      nm.className='nm'; nm.textContent=h.name; nm.title='click to rename';
      nm.addEventListener('click',function(){ renaming=h.id; render(); });
      top.appendChild(nm);
    }
    name.appendChild(top);

    var p=pct30(h);
    var bar=document.createElement('div'); bar.className='pctbar';
    var fill=document.createElement('i'); fill.style.width=p+'%'; bar.appendChild(fill);
    name.appendChild(bar);
    var lab=document.createElement('div'); lab.className='pctlab'; lab.textContent=p+'% THIS MONTH';
    name.appendChild(lab);
    tr.appendChild(name);

    days.forEach(function(d,ix){
      var td=document.createElement('td');
      td.className='cell'+(d.getDay()===1?' wk':'')+(ix===days.length-1?' today':'');
      var b=document.createElement('button');
      var k=dstr(d);
      if(h.dates[k]) b.className='on';
      b.title=k;
      b.addEventListener('click',function(){
        if(h.dates[k]) delete h.dates[k]; else h.dates[k]=1;
        render();
      });
      td.appendChild(b);
      tr.appendChild(td);
    });

    var st=document.createElement('td'); st.className='streaks';
    var cur=document.createElement('div');
    cur.innerHTML='🔥 <b>'+curStreak(h)+'</b> now';
    var best=document.createElement('div'); best.className='best';
    best.innerHTML='🏆 <b>'+bestStreak(h)+'</b> best';
    st.appendChild(cur); st.appendChild(best);
    var del=document.createElement('button');
    del.className='delh'; del.textContent='✕ del'; del.title='delete habit';
    del.addEventListener('click',function(){
      state.habits=state.habits.filter(function(x){ return x.id!==h.id; });
      render();
    });
    st.appendChild(del);
    tr.appendChild(st);
    grid.appendChild(tr);
  });
  save();
}

/* emoji popover */
var pop=document.getElementById('emojiPop');
var popCb=null;
EMOJIS.forEach(function(em){
  var b=document.createElement('button');
  b.textContent=em;
  b.addEventListener('click',function(e){
    e.stopPropagation();
    if(popCb) popCb(em);
    closePop();
  });
  pop.appendChild(b);
});
function openEmojiPop(anchor,cb){
  popCb=cb;
  var r=anchor.getBoundingClientRect();
  pop.classList.add('open');
  var pw=pop.offsetWidth, ph=pop.offsetHeight;
  var x=Math.min(Math.max(6,r.left), window.innerWidth-pw-6);
  var y=r.bottom+6;
  if(y+ph>window.innerHeight-6) y=Math.max(6,r.top-ph-6);
  pop.style.left=x+'px'; pop.style.top=y+'px';
}
function closePop(){ pop.classList.remove('open'); popCb=null; }
document.addEventListener('click',function(e){
  if(pop.classList.contains('open') && !pop.contains(e.target)) closePop();
});
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closePop(); });

/* adder */
var newEmoji=document.getElementById('newEmoji');
newEmoji.addEventListener('click',function(e){
  e.stopPropagation();
  openEmojiPop(newEmoji,function(em){ newEmoji.textContent=em; });
});
function addHabit(){
  var inp=document.getElementById('newName');
  var v=inp.value.trim();
  if(!v) { inp.focus(); return; }
  state.habits.push({id:uid(),name:v,emoji:newEmoji.textContent,dates:{}});
  inp.value=''; newEmoji.textContent='✨';
  render();
}
document.getElementById('addBtn').addEventListener('click',addHabit);
document.getElementById('newName').addEventListener('keydown',function(e){
  if(e.key==='Enter') addHabit();
});

render();
})();
</script>
</body>
</html>
