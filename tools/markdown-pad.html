<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Pad · Wizzed Arcade</title>
<style>
:root{
  --bg:#0f0f1a; --accent:#00e5ff; --accent-soft:rgba(0,229,255,.4);
  --panel:#161623; --line:#2c2c46; --text:#e8f7fb; --dim:#8aa0a8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Courier New', ui-monospace, monospace;
  display:flex; flex-direction:column; overflow:hidden;
}
a.back{
  position:fixed; top:10px; left:12px; z-index:60;
  color:var(--dim); text-decoration:none; font-size:12px; letter-spacing:1px;
  border:1px solid var(--line); padding:3px 8px; background:rgba(15,15,26,.9);
}
a.back:hover{ color:var(--accent); border-color:var(--accent); text-shadow:0 0 8px var(--accent); }
header{ text-align:center; padding:8px 8px 4px; flex:none; }
h1{
  display:inline-block; font-size:clamp(15px,2.6vw,22px); letter-spacing:5px; color:var(--accent);
  text-shadow:0 0 6px var(--accent), 0 0 24px var(--accent-soft);
}
#bar{
  flex:none; display:flex; flex-wrap:wrap; gap:4px; align-items:center;
  padding:4px 10px 6px; justify-content:center;
}
#bar button{
  font-family:inherit; font-size:11px; letter-spacing:1px; cursor:pointer;
  background:#121220; color:var(--dim); border:1px solid var(--line); padding:4px 8px;
}
#bar button:hover{ color:var(--accent); border-color:var(--accent); box-shadow:0 0 8px var(--accent-soft); }
#bar .sep{ width:1px; height:18px; background:var(--line); margin:0 3px; }
#bar #dl{ color:#0a161a; background:var(--accent); border-color:var(--accent); font-weight:bold; box-shadow:0 0 10px var(--accent-soft); }
#bar #dl:hover{ color:#000; }
#panes{
  flex:1; display:flex; gap:8px; padding:0 10px 6px; min-height:0;
}
.pane{
  flex:1; min-width:0; display:flex; flex-direction:column;
  background:var(--panel); border:2px solid var(--line);
  box-shadow:0 0 0 1px #000, 0 0 18px rgba(0,229,255,.07);
}
.pane .ph{
  flex:none; font-size:9px; letter-spacing:2px; color:var(--dim);
  padding:4px 8px; border-bottom:1px solid var(--line);
  display:flex; justify-content:space-between;
}
#src{
  flex:1; width:100%; resize:none; border:0; outline:none;
  background:#10101c; color:var(--text);
  font-family:inherit; font-size:13px; line-height:1.55; padding:10px;
}
#preview{ flex:1; overflow-y:auto; padding:10px 14px; font-size:13px; line-height:1.55; }
#preview h1,#preview h2,#preview h3,#preview h4,#preview h5,#preview h6{
  color:var(--accent); letter-spacing:1px; margin:12px 0 6px;
  text-shadow:0 0 8px var(--accent-soft);
}
#preview h1{ font-size:22px; border-bottom:1px solid var(--line); padding-bottom:4px; }
#preview h2{ font-size:18px; }
#preview h3{ font-size:15px; }
#preview p{ margin:6px 0; }
#preview strong{ color:#fff; text-shadow:0 0 6px rgba(255,255,255,.4); }
#preview em{ color:#9ef2ff; }
#preview code{
  background:#0a0a14; border:1px solid var(--line); padding:1px 5px;
  color:#ffe066; font-size:12px;
}
#preview pre{
  background:#0a0a14; border:1px solid var(--line); padding:9px 11px;
  margin:8px 0; overflow-x:auto; box-shadow:inset 0 0 12px rgba(0,0,0,.6);
}
#preview pre code{ border:0; padding:0; background:none; color:#7dffb3; }
#preview blockquote{
  border-left:3px solid var(--accent); margin:8px 0; padding:4px 10px;
  color:var(--dim); background:rgba(0,229,255,.05);
}
#preview ul,#preview ol{ margin:6px 0 6px 22px; }
#preview li{ margin:2px 0; }
#preview a{ color:var(--accent); text-shadow:0 0 6px var(--accent-soft); }
#preview hr{ border:0; border-top:1px dashed var(--accent); margin:12px 0; opacity:.6; }
#preview table{ border-collapse:collapse; margin:8px 0; font-size:12px; }
#preview th,#preview td{ border:1px solid var(--line); padding:4px 9px; }
#preview th{ color:var(--accent); background:#10101e; letter-spacing:1px; }
#preview tr:nth-child(even) td{ background:#12121f; }
#preview::-webkit-scrollbar{ width:8px; }
#preview::-webkit-scrollbar-thumb{ background:var(--line); }
#stats{ color:var(--accent); }
@media (max-width:640px){
  #panes{ flex-direction:column; }
  body{ overflow:auto; }
  .pane{ min-height:240px; }
}
</style>
</head>
<body>
<a class="back" href="../index.html">← Arcade</a>
<header><h1>MARKDOWN PAD</h1></header>
<div id="bar">
  <button data-act="h1" title="Heading 1"># H1</button>
  <button data-act="h2" title="Heading 2">## H2</button>
  <span class="sep"></span>
  <button data-act="bold" title="Bold (Ctrl+B)"><b>B</b></button>
  <button data-act="italic" title="Italic (Ctrl+I)"><i>I</i></button>
  <button data-act="code" title="Inline code">`code`</button>
  <span class="sep"></span>
  <button data-act="ul" title="Bullet list">• list</button>
  <button data-act="ol" title="Numbered list">1. list</button>
  <button data-act="quote" title="Quote">&gt; quote</button>
  <button data-act="link" title="Link">[link]</button>
  <button data-act="table" title="Table">| table |</button>
  <button data-act="fence" title="Code block">``` block</button>
  <button data-act="hr" title="Horizontal rule">— rule</button>
  <span class="sep"></span>
  <button id="dl" title="Download .md">▼ .MD</button>
</div>
<div id="panes">
  <div class="pane">
    <div class="ph"><span>EDITOR</span><span id="stats">0 WORDS</span></div>
    <textarea id="src" spellcheck="false"></textarea>
  </div>
  <div class="pane">
    <div class="ph"><span>PREVIEW</span><span>LIVE</span></div>
    <div id="preview"></div>
  </div>
</div>

<script>
(function(){
'use strict';
var LS_KEY='wizzed-markdown-pad';
var src=document.getElementById('src');
var preview=document.getElementById('preview');
var stats=document.getElementById('stats');

var DEMO=[
'# Markdown Pad',
'',
'Welcome to the **neon** editor. Everything renders *live* on the right — no network, no nonsense.',
'',
'## Features',
'',
'- **Bold**, *italic* and `inline code`',
'- [Links](https://example.com) that open in a new tab',
'- Nested lists:',
'  - one level deep',
'  - like this',
'1. Ordered lists too',
'2. With numbers',
'',
'> Quotes glow softly in the dark.',
'> Multi-line quotes are joined.',
'',
'### Code blocks',
'',
'```',
'function glow(x) {',
'  return x * 1.21; // gigawatts',
'}',
'```',
'',
'### Tables',
'',
'| Key | Action |',
'| --- | --- |',
'| Ctrl+B | **bold** |',
'| Ctrl+I | *italic* |',
'| Tab | indent 2 spaces |',
'',
'---',
'',
'That rule above? Just type `---` on its own line. Happy writing!'
].join('\n');

/* ---------- tiny markdown parser ---------- */
function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function inline(s){
  s=esc(s);
  var codes=[];
  s=s.replace(/`([^`]+)`/g,function(m,c){
    codes.push('<code>'+c+'</code>');
    return '\u0001'+(codes.length-1)+'\u0001';
  });
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*([^*]+)\*/g,'<em>$1</em>');
  s=s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,function(m,t,u){
    if(/^\s*javascript:/i.test(u)) u='#';
    return '<a href="'+u+'" target="_blank" rel="noopener">'+t+'</a>';
  });
  s=s.replace(/\u0001(\d+)\u0001/g,function(m,i){ return codes[+i]; });
  return s;
}
function isTableSep(l){
  return /^\s*\|?[\s:|-]*-[\s:|-]*\|?\s*$/.test(l) && l.indexOf('-')>-1 && l.indexOf('|')>-1;
}
function splitRow(l){
  return l.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(function(c){ return c.trim(); });
}
function render(md){
  var lines=md.replace(/\r\n?/g,'\n').split('\n');
  var html='', i=0, m;
  function listBlock(){
    var items=[], firstOrd=null;
    while(i<lines.length){
      var lm=lines[i].match(/^(\s*)([-*]|\d+\.)\s+(.*)$/);
      if(!lm) break;
      var ind=lm[1].length>=2?1:0, ord=/^\d/.test(lm[2]);
      if(firstOrd===null) firstOrd=ord;
      else if(ind===0 && ord!==firstOrd) break;
      items.push({ind:ind, ord:ord, text:lm[3]});
      i++;
    }
    var tag=items[0].ord?'ol':'ul';
    var out='<'+tag+'>', j=0;
    while(j<items.length){
      var it=items[j];
      var li='<li>'+inline(it.text);
      j++;
      if(it.ind===0 && j<items.length && items[j].ind===1){
        var sub=items[j].ord?'ol':'ul';
        li+='<'+sub+'>';
        while(j<items.length && items[j].ind===1){
          li+='<li>'+inline(items[j].text)+'</li>'; j++;
        }
        li+='</'+sub+'>';
      }
      out+=li+'</li>';
    }
    return out+'</'+tag+'>';
  }
  while(i<lines.length){
    var line=lines[i];
    if(/^```/.test(line)){
      var buf=[]; i++;
      while(i<lines.length && !/^```/.test(lines[i])){ buf.push(lines[i]); i++; }
      i++;
      html+='<pre><code>'+esc(buf.join('\n'))+'</code></pre>';
      continue;
    }
    if(/^\s{0,3}(-{3,}|\*{3,})\s*$/.test(line)){ html+='<hr>'; i++; continue; }
    m=line.match(/^(#{1,6})\s+(.*)$/);
    if(m){ var lv=m[1].length; html+='<h'+lv+'>'+inline(m[2])+'</h'+lv+'>'; i++; continue; }
    if(/^>\s?/.test(line)){
      var qb=[];
      while(i<lines.length && /^>\s?/.test(lines[i])){ qb.push(lines[i].replace(/^>\s?/,'')); i++; }
      html+='<blockquote>'+qb.map(inline).join('<br>')+'</blockquote>';
      continue;
    }
    if(line.indexOf('|')>-1 && i+1<lines.length && isTableSep(lines[i+1])){
      var head=splitRow(line); i+=2;
      var body=[];
      while(i<lines.length && lines[i].indexOf('|')>-1 && lines[i].trim()!==''){
        body.push(splitRow(lines[i])); i++;
      }
      html+='<table><thead><tr>'+head.map(function(c){return '<th>'+inline(c)+'</th>';}).join('')+'</tr></thead><tbody>';
      body.forEach(function(r){
        html+='<tr>'+r.map(function(c){return '<td>'+inline(c)+'</td>';}).join('')+'</tr>';
      });
      html+='</tbody></table>';
      continue;
    }
    if(/^(\s*)([-*]|\d+\.)\s+/.test(line)){ html+=listBlock(); continue; }
    if(line.trim()===''){ i++; continue; }
    var pb=[line]; i++;
    while(i<lines.length && lines[i].trim()!=='' &&
          !/^(#{1,6}\s|```|>|\s*([-*]|\d+\.)\s|\s{0,3}(-{3,}|\*{3,})\s*$)/.test(lines[i]) &&
          !(lines[i].indexOf('|')>-1 && i+1<lines.length && isTableSep(lines[i+1]))){
      pb.push(lines[i]); i++;
    }
    html+='<p>'+pb.map(inline).join(' ')+'</p>';
  }
  return html;
}

/* ---------- editor ---------- */
var saveT=null;
function update(){
  preview.innerHTML=render(src.value);
  var words=src.value.replace(/[`#>*_\-|[\]()]/g,' ').split(/\s+/).filter(Boolean).length;
  stats.textContent=words+' WORD'+(words===1?'':'S')+' · '+src.value.length+' CH';
  clearTimeout(saveT);
  saveT=setTimeout(function(){
    try{ localStorage.setItem(LS_KEY, JSON.stringify({content:src.value})); }catch(e){}
  },300);
}
src.addEventListener('input',update);

function surround(before,after,ph){
  var s=src.selectionStart, e=src.selectionEnd;
  var sel=src.value.slice(s,e)||ph;
  src.setRangeText(before+sel+after,s,e,'select');
  src.selectionStart=s+before.length;
  src.selectionEnd=s+before.length+sel.length;
  src.focus(); update();
}
function linePrefix(prefix){
  var s=src.selectionStart, e=src.selectionEnd;
  var v=src.value;
  var ls=v.lastIndexOf('\n',s-1)+1;
  var le=v.indexOf('\n',e); if(le<0) le=v.length;
  var block=v.slice(ls,le).split('\n').map(function(l,idx){
    return (typeof prefix==='function'?prefix(idx):prefix)+l;
  }).join('\n');
  src.setRangeText(block,ls,le,'end');
  src.focus(); update();
}
function insertBlock(text){
  var s=src.selectionStart;
  var v=src.value;
  var pre=(s>0 && v[s-1]!=='\n')?'\n':'';
  src.setRangeText(pre+text,s,src.selectionEnd,'end');
  src.focus(); update();
}
var ACT={
  h1:function(){ linePrefix('# '); },
  h2:function(){ linePrefix('## '); },
  bold:function(){ surround('**','**','bold text'); },
  italic:function(){ surround('*','*','italic text'); },
  code:function(){ surround('`','`','code'); },
  ul:function(){ linePrefix('- '); },
  ol:function(){ linePrefix(function(i){ return (i+1)+'. '; }); },
  quote:function(){ linePrefix('> '); },
  link:function(){ surround('[','](https://example.com)','link text'); },
  table:function(){ insertBlock('| Col A | Col B |\n| --- | --- |\n| cell | cell |\n'); },
  fence:function(){ insertBlock('```\ncode here\n```\n'); },
  hr:function(){ insertBlock('\n---\n'); }
};
Array.prototype.forEach.call(document.querySelectorAll('#bar button[data-act]'),function(b){
  b.addEventListener('click',function(){ ACT[b.getAttribute('data-act')](); });
});
document.getElementById('dl').addEventListener('click',function(){
  var blob=new Blob([src.value],{type:'text/markdown'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='document.md';
  document.body.appendChild(a); a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); },500);
});
src.addEventListener('keydown',function(e){
  if(e.key==='Tab'){ e.preventDefault(); src.setRangeText('  ',src.selectionStart,src.selectionEnd,'end'); update(); }
  else if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='b'){ e.preventDefault(); ACT.bold(); }
  else if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='i'){ e.preventDefault(); ACT.italic(); }
});

/* ---------- init ---------- */
var savedContent=null;
try{
  var raw=localStorage.getItem(LS_KEY);
  if(raw){ var d=JSON.parse(raw); if(typeof d.content==='string') savedContent=d.content; }
}catch(e){}
src.value = savedContent!==null ? savedContent : DEMO;
update();
})();
</script>
</body>
</html>
