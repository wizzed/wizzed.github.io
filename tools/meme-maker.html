<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meme Maker · Wizzed Arcade</title>
<style>
:root{
  --bg:#0f0f1a; --accent:#00ff9c; --accent-soft:rgba(0,255,156,.4);
  --panel:#141a17; --panel2:#0f1512; --line:#2c463a; --text:#e2ffef; --dim:#78b39a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{ background:var(--bg); color:var(--text); font-family:'Courier New', ui-monospace, monospace; overflow:hidden; }
a.back{ position:fixed; top:10px; left:12px; z-index:200; color:var(--dim); text-decoration:none; font-size:12px; letter-spacing:1px; border:1px solid var(--line); padding:3px 8px; background:rgba(15,15,26,.9); }
a.back:hover{ color:var(--accent); border-color:var(--accent); text-shadow:0 0 8px var(--accent); }
.app{ display:flex; height:100vh; width:100vw; }
.stage{ flex:1; position:relative; display:flex; align-items:center; justify-content:center; min-width:0; background:radial-gradient(circle at 50% 42%,#141d18,#0f0f1a 75%); overflow:hidden; }
#preview{ display:block; box-shadow:0 0 0 1px #000,0 0 32px rgba(0,255,156,.24); cursor:grab; touch-action:none; }
#preview.grabbing{ cursor:grabbing; }
.stage.dragover::after{ content:'DROP IMAGE'; position:absolute; inset:14px; z-index:5; border:3px dashed var(--accent); color:var(--accent); font-size:26px; letter-spacing:6px; display:flex; align-items:center; justify-content:center; background:rgba(0,255,156,.06); }
.title{ position:absolute; top:10px; left:50%; transform:translateX(-50%); z-index:6; font-size:14px; letter-spacing:5px; color:var(--accent); pointer-events:none; text-shadow:0 0 8px var(--accent),0 0 24px var(--accent-soft); }
.badge{ position:absolute; bottom:10px; left:50%; transform:translateX(-50%); z-index:6; font-size:10px; letter-spacing:1px; color:var(--dim); pointer-events:none; background:rgba(15,15,26,.8); padding:3px 10px; border:1px solid var(--line); white-space:nowrap; }
.panel{ width:296px; flex:none; height:100vh; overflow-y:auto; background:var(--panel); border-left:2px solid var(--line); padding:12px 12px 30px; display:flex; flex-direction:column; gap:12px; }
.panel::-webkit-scrollbar{ width:8px; } .panel::-webkit-scrollbar-thumb{ background:var(--line); }
.grp{ border:1px solid var(--line); background:var(--panel2); padding:9px 10px; }
.grp h2{ font-size:10px; letter-spacing:2px; color:var(--accent); margin-bottom:8px; text-transform:uppercase; border-bottom:1px solid var(--line); padding-bottom:4px; }
.row{ display:flex; align-items:center; gap:6px; margin-bottom:8px; }
.row:last-child{ margin-bottom:0; }
.lbl{ font-size:10px; letter-spacing:1px; color:var(--dim); width:52px; flex:none; }
.val{ font-size:10px; color:var(--accent); width:32px; text-align:right; flex:none; }
button{ font-family:inherit; font-size:11px; letter-spacing:1px; cursor:pointer; background:#0f150f; color:var(--text); border:2px solid var(--line); padding:6px 6px; text-transform:uppercase; }
button:hover{ border-color:var(--accent); text-shadow:0 0 6px var(--accent); }
button:active{ transform:translateY(1px); }
button.on{ color:#010; background:var(--accent); border-color:var(--accent); box-shadow:0 0 12px var(--accent-soft); text-shadow:none; font-weight:bold; }
button.prime{ color:#010; background:var(--accent); border-color:var(--accent); font-weight:bold; box-shadow:0 0 14px var(--accent-soft); text-shadow:none; }
.templates{ display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.templates button{ font-size:10px; padding:8px 4px; }
.srcbtns{ display:grid; grid-template-columns:1fr 1fr; gap:6px; }
input[type=text]{ font-family:inherit; font-size:12px; background:#0a100c; color:var(--text); border:1px solid var(--line); padding:6px; width:100%; outline:none; }
input[type=text]:focus{ border-color:var(--accent); }
input[type=range]{ flex:1; -webkit-appearance:none; appearance:none; height:8px; min-width:40px; background:#0a100c; border:1px solid var(--line); outline:none; cursor:pointer; }
input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:15px; height:19px; background:var(--accent); border:2px solid #000; box-shadow:0 0 8px var(--accent); cursor:pointer; }
input[type=range]::-moz-range-thumb{ width:13px; height:17px; border-radius:0; background:var(--accent); border:2px solid #000; cursor:pointer; }
.note{ font-size:9px; color:var(--dim); line-height:1.4; letter-spacing:.5px; margin-top:2px; }
.boxlist{ display:flex; flex-direction:column; gap:5px; max-height:120px; overflow-y:auto; }
.boxitem{ display:flex; align-items:center; gap:5px; }
.boxitem input{ flex:1; font-size:11px; padding:4px 5px; }
.boxitem button{ flex:none; padding:4px 7px; font-size:10px; }
.boxitem.sel input{ border-color:var(--accent); box-shadow:0 0 8px var(--accent-soft); }
@media (max-width:760px){ .app{ flex-direction:column; } .stage{ height:44vh; flex:none; } .panel{ width:100%; height:56vh; border-left:none; border-top:2px solid var(--line); } }
</style>
</head>
<body>
<a class="back" href="../index.html">← Arcade</a>
<div class="app">
  <div class="stage" id="stage">
    <div class="title">MEME MAKER</div>
    <canvas id="preview"></canvas>
    <div class="badge" id="badge">Drag the extra text boxes to reposition · 100% local, nothing uploaded</div>
  </div>
  <div class="panel">
    <div class="grp">
      <h2>Template</h2>
      <div class="templates">
        <button data-tpl="distracted" class="on">Distracted Guy</button>
        <button data-tpl="thisisfine">This Is Fine</button>
        <button data-tpl="galaxy">Galaxy Brain</button>
        <button data-tpl="drake">Drake 2-Row</button>
        <button data-tpl="pyramid">Expanding</button>
        <button data-tpl="blank">Blank</button>
      </div>
      <div class="srcbtns" style="margin-top:8px;">
        <button id="loadBtn">📂 Load Image</button>
        <button id="pasteBtn">📋 Paste</button>
      </div>
      <input type="file" id="fileInput" accept="image/*" hidden>
      <div class="note">Files never leave your browser — everything renders locally.</div>
    </div>

    <div class="grp">
      <h2>Top / Bottom Text</h2>
      <div class="row"><input type="text" id="topIn" placeholder="TOP TEXT"></div>
      <div class="row"><input type="text" id="botIn" placeholder="BOTTOM TEXT"></div>
      <div class="row"><span class="lbl">Size</span><input type="range" id="sizeR" min="60" max="160" value="100"><span class="val" id="sizeV">100</span></div>
      <div class="row"><span class="lbl">Outline</span><input type="range" id="outR" min="0" max="30" value="14"><span class="val" id="outV">14</span></div>
    </div>

    <div class="grp">
      <h2>Extra Text Boxes</h2>
      <div class="boxlist" id="boxList"></div>
      <div class="row" style="margin-top:8px;">
        <button id="addBox" style="flex:1;">＋ Add Box</button>
        <button id="delBox" style="flex:1;">✕ Delete Sel</button>
      </div>
      <div class="note">Click a box on the canvas to select, then drag to move it.</div>
    </div>

    <div class="grp">
      <h2>Export</h2>
      <button class="prime" id="exportBtn" style="width:100%;">⬇ Download Meme PNG</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";
  var SLUG='wizzed-meme-maker';
  var stage=document.getElementById('stage');
  var preview=document.getElementById('preview');
  var pctx=preview.getContext('2d');
  var badge=document.getElementById('badge');
  var work=document.createElement('canvas');
  var wctx=work.getContext('2d');

  var userImg=null; // loaded image overrides template bg
  var T=null;       // current template {w,h,draw}
  var topText='', botText='', boxes=[], selBox=-1;
  var sizeMult=1.0, outlineMult=14;

  // ---------- Impact text ----------
  function wrap(ctx,text,maxW){
    var words=text.split(/\s+/), lines=[], cur='';
    for(var i=0;i<words.length;i++){
      var test=cur?cur+' '+words[i]:words[i];
      if(ctx.measureText(test).width<=maxW||!cur){ cur=test; }
      else{ lines.push(cur); cur=words[i]; }
    }
    if(cur) lines.push(cur);
    return lines;
  }
  function fit(ctx,text,maxW,maxH,baseSize){
    for(var size=baseSize; size>=11; size-=2){
      ctx.font='900 '+size+'px Impact, "Arial Black", "Franklin Gothic Bold", sans-serif';
      var lines=wrap(ctx,text,maxW), lh=size*1.04, ok=true;
      for(var i=0;i<lines.length;i++){ if(ctx.measureText(lines[i]).width>maxW){ ok=false; break; } }
      if(ok && lines.length*lh<=maxH) return {lines:lines,size:size,lh:lh};
    }
    ctx.font='900 11px Impact,"Arial Black",sans-serif';
    return {lines:wrap(ctx,text,maxW),size:11,lh:11*1.04};
  }
  // mode: 'top' y=topEdge, 'bottom' y=bottomEdge, 'center' y=centerY
  function drawBlock(ctx,text,cx,y,maxW,maxH,mode,baseSize){
    text=(text||'').toUpperCase();
    if(!text.trim()) return {x:cx-10,y:y-10,w:20,h:20};
    var f=fit(ctx,text,maxW,maxH,baseSize);
    var total=f.lines.length*f.lh;
    var startTop;
    if(mode==='top') startTop=y;
    else if(mode==='bottom') startTop=y-total;
    else startTop=y-total/2;
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.lineJoin='round'; ctx.miterLimit=2;
    var lw=Math.max(0,f.size*(outlineMult/100));
    var maxLineW=0;
    for(var i=0;i<f.lines.length;i++){
      var ly=startTop+i*f.lh+(f.lh-f.size)/2;
      var w=ctx.measureText(f.lines[i]).width; if(w>maxLineW) maxLineW=w;
      if(lw>0){ ctx.strokeStyle='#000'; ctx.lineWidth=lw; ctx.strokeText(f.lines[i],cx,ly); }
      ctx.fillStyle='#fff'; ctx.fillText(f.lines[i],cx,ly);
    }
    return {x:cx-maxLineW/2-6,y:startTop-4,w:maxLineW+12,h:total+8};
  }

  // ---------- render ----------
  function baseSize(){ return T.h/7.5*sizeMult; }
  function render(){
    if(!T) return;
    work.width=T.w; work.height=T.h;
    if(userImg){
      wctx.fillStyle='#000'; wctx.fillRect(0,0,T.w,T.h);
      // cover fit
      var s=Math.max(T.w/userImg.width,T.h/userImg.height);
      var dw=userImg.width*s, dh=userImg.height*s;
      wctx.drawImage(userImg,(T.w-dw)/2,(T.h-dh)/2,dw,dh);
    } else {
      T.draw(wctx,T.w,T.h);
    }
    var pad=T.w*0.03;
    drawBlock(wctx,topText,T.w/2,pad,T.w-2*pad,T.h*0.30,'top',baseSize());
    drawBlock(wctx,botText,T.w/2,T.h-pad,T.w-2*pad,T.h*0.30,'bottom',baseSize());
    for(var i=0;i<boxes.length;i++){
      var b=boxes[i];
      var mw=T.w*(b.mw||0.5);
      b.bbox=drawBlock(wctx,b.text,b.fx*T.w,b.fy*T.h,mw,T.h*0.5,'center',T.h/9*sizeMult);
      if(i===selBox){
        wctx.save(); wctx.strokeStyle='#00ff9c'; wctx.lineWidth=Math.max(2,T.w*0.004);
        wctx.setLineDash([8,6]); wctx.strokeRect(b.bbox.x,b.bbox.y,b.bbox.w,b.bbox.h); wctx.restore();
      }
    }
    blit();
  }
  var scale=1, offX=0, offY=0;
  function blit(){
    var pad=24;
    var aw=Math.max(40,stage.clientWidth-pad*2), ah=Math.max(40,stage.clientHeight-pad*2);
    scale=Math.min(aw/T.w, ah/T.h, 1.4);
    var dw=Math.round(T.w*scale), dh=Math.round(T.h*scale);
    preview.width=dw; preview.height=dh;
    pctx.imageSmoothingEnabled=true; pctx.imageSmoothingQuality='high';
    pctx.drawImage(work,0,0,dw,dh);
  }

  // ---------- templates ----------
  function person(ctx,x,y,scale,shirt,skin,hair){
    ctx.save(); ctx.translate(x,y); ctx.scale(scale,scale);
    ctx.fillStyle=shirt; ctx.fillRect(-26,0,52,70);
    ctx.fillStyle=skin; ctx.beginPath(); ctx.arc(0,-24,22,0,7); ctx.fill();
    ctx.fillStyle=hair; ctx.beginPath(); ctx.arc(0,-30,22,Math.PI,0); ctx.fill(); ctx.fillRect(-22,-32,44,8);
    ctx.fillStyle=skin; ctx.fillRect(-34,4,10,44); ctx.fillRect(24,4,10,44);
    ctx.restore();
  }
  function brain(ctx,x,y,r,glow){
    ctx.save();
    var g=ctx.createRadialGradient(x,y,2,x,y,r*1.4);
    g.addColorStop(0,'rgba('+glow+','+ (0.9)+')'); g.addColorStop(1,'rgba('+glow+',0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r*1.4,0,7); ctx.fill();
    ctx.fillStyle='#ffb8e6'; ctx.beginPath(); ctx.arc(x-r*0.4,y,r*0.7,0,7); ctx.arc(x+r*0.4,y,r*0.7,0,7); ctx.fill();
    ctx.strokeStyle='#c94f9e'; ctx.lineWidth=Math.max(1.5,r*0.09);
    for(var i=0;i<5;i++){ ctx.beginPath(); ctx.arc(x-r*0.4+i*r*0.2,y+((i%2)?-r*0.2:r*0.2),r*0.28,0,Math.PI); ctx.stroke(); }
    ctx.restore();
  }
  function starfield(ctx,x,y,w,h,seed){
    for(var i=0;i<40;i++){ var n=Math.sin((i+seed)*12.9)*43758.5; n=n-Math.floor(n); var m=Math.sin((i+seed)*78.2)*12543.3; m=m-Math.floor(m); ctx.fillStyle='rgba(255,255,255,'+(0.3+((n*7)%1)*0.6)+')'; ctx.fillRect(x+n*w,y+m*h,2,2); }
  }

  var TEMPLATES={
    distracted:{w:640,h:620,draw:function(ctx,w,h){
      var g=ctx.createLinearGradient(0,0,0,h); g.addColorStop(0,'#8fc7e8'); g.addColorStop(1,'#d9c7a3'); ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
      ctx.fillStyle='#b0b0b8'; ctx.fillRect(0,h*0.62,w,h*0.38); // pavement
      ctx.fillStyle='#7d8a97'; for(var i=0;i<7;i++){ ctx.fillRect(i*w/6-10,h*0.05,70,h*0.5); ctx.fillStyle='rgba(255,255,255,.3)'; for(var r=0;r<5;r++)for(var c=0;c<2;c++) ctx.fillRect(i*w/6+c*30-2,h*0.08+r*40,20,26); ctx.fillStyle='#7d8a97'; } // buildings + windows
      // passing girl (right)
      person(ctx,w*0.80,h*0.5,1.5,'#00c2b0','#e8b98a','#3a2a1a');
      // guy turning
      ctx.save(); ctx.translate(w*0.46,h*0.52); ctx.scale(1.6,1.6);
      ctx.fillStyle='#2a6cc4'; ctx.fillRect(-26,0,52,72);
      ctx.fillStyle='#e8b98a'; ctx.beginPath(); ctx.arc(8,-24,22,0,7); ctx.fill();
      ctx.fillStyle='#241a12'; ctx.beginPath(); ctx.arc(8,-30,22,Math.PI,0); ctx.fill();
      ctx.fillStyle='#e8b98a'; ctx.fillRect(-34,6,10,40); ctx.fillRect(24,6,10,40);
      ctx.restore();
      // girlfriend (left, annoyed)
      person(ctx,w*0.18,h*0.55,1.5,'#e0455f','#e8b98a','#b83a20');
      // motion lines
      ctx.strokeStyle='rgba(255,255,255,.7)'; ctx.lineWidth=3;
      for(var m=0;m<3;m++){ ctx.beginPath(); ctx.moveTo(w*0.6,h*0.4+m*14); ctx.lineTo(w*0.68,h*0.4+m*14); ctx.stroke(); }
    }},
    thisisfine:{w:640,h:600,draw:function(ctx,w,h){
      ctx.fillStyle='#3a1f12'; ctx.fillRect(0,0,w,h);
      ctx.fillStyle='#5a2e14'; ctx.fillRect(0,h*0.66,w,h*0.34); // floor
      // flames
      function flame(x,base,s){ for(var f=0;f<3;f++){ ctx.fillStyle=['#ff3b00','#ff7b00','#ffd000'][f]; ctx.beginPath(); ctx.moveTo(x-30*s+f*10*s,base); ctx.quadraticCurveTo(x-10*s,base-70*s+f*18*s,x,base-110*s+f*26*s); ctx.quadraticCurveTo(x+10*s,base-70*s+f*18*s,x+30*s-f*10*s,base); ctx.closePath(); ctx.fill(); } }
      for(var i=0;i<7;i++) flame(50+i*95,h*0.7,0.8+((i*7)%3)*0.22);
      flame(w*0.16,h*0.4,0.7); flame(w*0.86,h*0.42,0.7);
      // smoke
      ctx.fillStyle='rgba(60,40,30,.45)'; for(var s=0;s<6;s++){ ctx.beginPath(); ctx.arc(80+s*90,h*0.16,26+((s*5)%3)*8,0,7); ctx.fill(); }
      // table
      ctx.fillStyle='#7a4a26'; ctx.fillRect(w*0.32,h*0.62,w*0.36,16); ctx.fillRect(w*0.34,h*0.63,10,70); ctx.fillRect(w*0.62,h*0.63,10,70);
      // coffee cup
      ctx.fillStyle='#f4f0e8'; ctx.fillRect(w*0.52,h*0.57,26,30); ctx.strokeStyle='#f4f0e8'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(w*0.52+30,h*0.6,9,-1,1.4); ctx.stroke();
      // dog
      ctx.save(); ctx.translate(w*0.42,h*0.5); ctx.fillStyle='#e0a03a';
      ctx.beginPath(); ctx.arc(0,0,40,0,7); ctx.fill(); // head
      ctx.fillStyle='#c8862a'; ctx.beginPath(); ctx.moveTo(-40,-30); ctx.lineTo(-22,0); ctx.lineTo(-48,10); ctx.closePath(); ctx.fill(); ctx.beginPath(); ctx.moveTo(40,-30); ctx.lineTo(22,0); ctx.lineTo(48,10); ctx.closePath(); ctx.fill(); // ears
      ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-14,-6,5,0,7); ctx.arc(14,-6,5,0,7); ctx.fill(); ctx.beginPath(); ctx.arc(0,12,7,0,7); ctx.fill();
      ctx.strokeStyle='#000'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,16,14,0.2,Math.PI-0.2); ctx.stroke();
      // little hat
      ctx.fillStyle='#d84a4a'; ctx.beginPath(); ctx.moveTo(-16,-34); ctx.lineTo(16,-34); ctx.lineTo(0,-58); ctx.closePath(); ctx.fill();
      ctx.restore();
    }},
    galaxy:{w:600,h:760,draw:function(ctx,w,h){
      var n=4; var glows=['80,40,120','120,60,200','200,80,255','255,180,255'];
      for(var i=0;i<n;i++){
        var y0=i*h/n; var t=i/(n-1);
        var g=ctx.createLinearGradient(0,y0,0,y0+h/n); g.addColorStop(0,'#0a0a18'); g.addColorStop(1,'rgba('+glows[i]+',0.35)');
        ctx.fillStyle=g; ctx.fillRect(0,y0,w,h/n);
        starfield(ctx,0,y0,w*0.5,h/n,i+1);
        brain(ctx,w*0.24,y0+h/n/2,26+i*10,glows[i]);
        // caption panel right
        ctx.fillStyle='rgba(12,12,22,.82)'; ctx.fillRect(w*0.48,y0+6,w*0.5,h/n-12);
        ctx.strokeStyle='rgba(0,255,156,.35)'; ctx.lineWidth=2; ctx.strokeRect(w*0.48,y0+6,w*0.5,h/n-12);
        ctx.strokeStyle='rgba(255,255,255,.15)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,y0); ctx.lineTo(w,y0); ctx.stroke();
      }
    }},
    pyramid:{w:600,h:760,draw:function(ctx,w,h){
      var n=4; var glows=['70,140,255','80,220,180','255,200,60','255,90,200'];
      for(var i=0;i<n;i++){
        var y0=i*h/n; var cy=y0+h/n/2;
        ctx.fillStyle=i%2?'#10101e':'#14141f'; ctx.fillRect(0,y0,w,h/n);
        // expanding rings
        for(var r=4;r>=0;r--){ ctx.strokeStyle='rgba('+glows[i]+','+(0.15+r*0.12)+')'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(w*0.24,cy,(10+r*10)*(1+i*0.35),0,7); ctx.stroke(); }
        brain(ctx,w*0.24,cy,20+i*9,glows[i]);
        ctx.fillStyle='rgba(12,12,22,.82)'; ctx.fillRect(w*0.48,y0+6,w*0.5,h/n-12);
        ctx.strokeStyle='rgba(0,255,156,.35)'; ctx.lineWidth=2; ctx.strokeRect(w*0.48,y0+6,w*0.5,h/n-12);
        ctx.strokeStyle='rgba(255,255,255,.15)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,y0); ctx.lineTo(w,y0); ctx.stroke();
      }
    }},
    drake:{w:600,h:640,draw:function(ctx,w,h){
      var rows=[{y:0,tint:'rgba(200,40,40,.14)',pose:'no'},{y:h/2,tint:'rgba(40,200,120,.14)',pose:'yes'}];
      rows.forEach(function(R){
        ctx.fillStyle='#e8b98a'; ctx.fillRect(0,R.y,w*0.46,h/2); // figure bg skin-ish
        var g=ctx.createLinearGradient(0,R.y,0,R.y+h/2); g.addColorStop(0,'#d8a878'); g.addColorStop(1,'#b8865a'); ctx.fillStyle=g; ctx.fillRect(0,R.y,w*0.46,h/2);
        // Drake figure: cream jacket
        ctx.fillStyle='#efe7d8'; ctx.fillRect(w*0.06,R.y+h*0.22,w*0.34,h*0.3);
        ctx.fillStyle='#5a3a22'; ctx.beginPath(); ctx.arc(w*0.24,R.y+h*0.18,52,0,7); ctx.fill(); // head
        ctx.fillStyle='#2a1a10'; ctx.beginPath(); ctx.arc(w*0.24,R.y+h*0.13,52,Math.PI,0); ctx.fill(); // hair
        if(R.pose==='no'){ // hand up refuse
          ctx.fillStyle='#5a3a22'; ctx.save(); ctx.translate(w*0.30,R.y+h*0.2); ctx.fillRect(-8,-70,60,26); ctx.beginPath(); ctx.arc(52,-57,18,0,7); ctx.fill(); ctx.restore();
          ctx.fillStyle='rgba(255,255,255,.5)'; ctx.font='bold 60px Arial'; ctx.textAlign='center'; ctx.fillText('✋',w*0.36,R.y+h*0.2);
        } else { // pointing / approving
          ctx.fillStyle='#5a3a22'; ctx.save(); ctx.translate(w*0.30,R.y+h*0.26); ctx.fillRect(-8,-6,66,22); ctx.beginPath(); ctx.arc(58,5,16,0,7); ctx.fill(); ctx.restore();
          ctx.fillStyle='rgba(255,255,255,.5)'; ctx.font='bold 54px Arial'; ctx.textAlign='center'; ctx.fillText('👉',w*0.40,R.y+h*0.30);
        }
        ctx.fillStyle=R.tint; ctx.fillRect(0,R.y,w*0.46,h/2);
        // caption panel
        ctx.fillStyle=R.pose==='no'?'#f4d0d0':'#d0f4d8'; ctx.fillRect(w*0.46,R.y,w*0.54,h/2);
        ctx.fillStyle='rgba(10,10,20,.78)'; ctx.fillRect(w*0.48,R.y+8,w*0.5,h/2-16);
        ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,h/2); ctx.lineTo(w,h/2); ctx.stroke();
      });
    }},
    blank:{w:640,h:600,draw:function(ctx,w,h){
      var g=ctx.createLinearGradient(0,0,w,h); g.addColorStop(0,'#3a3a4a'); g.addColorStop(1,'#22222e'); ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
      ctx.strokeStyle='rgba(255,255,255,.05)'; ctx.lineWidth=1; for(var i=0;i<w;i+=30){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,h); ctx.stroke(); } for(var j=0;j<h;j+=30){ ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(w,j); ctx.stroke(); }
    }}
  };

  var DEFAULTS={
    distracted:{top:'WHEN THE CODE WORKS',bottom:"BUT YOU DON'T KNOW WHY",boxes:[]},
    thisisfine:{top:'',bottom:'THIS IS FINE',boxes:[]},
    galaxy:{top:'',bottom:'',boxes:[
      {fx:0.72,fy:0.13,text:'using loops',mw:0.46},
      {fx:0.72,fy:0.38,text:'using map',mw:0.46},
      {fx:0.72,fy:0.62,text:'using recursion',mw:0.46},
      {fx:0.72,fy:0.87,text:'thinking in vectors',mw:0.46}
    ]},
    pyramid:{top:'',bottom:'',boxes:[
      {fx:0.72,fy:0.13,text:'good idea',mw:0.46},
      {fx:0.72,fy:0.38,text:'better idea',mw:0.46},
      {fx:0.72,fy:0.62,text:'great idea',mw:0.46},
      {fx:0.72,fy:0.87,text:'galaxy idea',mw:0.46}
    ]},
    drake:{top:'',bottom:'',boxes:[
      {fx:0.73,fy:0.25,text:'writing docs',mw:0.48},
      {fx:0.73,fy:0.75,text:'shipping it anyway',mw:0.48}
    ]},
    blank:{top:'TOP TEXT',bottom:'BOTTOM TEXT',boxes:[]}
  };

  function applyTemplate(name){
    T=TEMPLATES[name]; userImg=null;
    var d=DEFAULTS[name];
    topText=d.top; botText=d.bottom;
    boxes=d.boxes.map(function(b){ return {fx:b.fx,fy:b.fy,text:b.text,mw:b.mw}; });
    selBox=boxes.length?0:-1;
    document.querySelectorAll('[data-tpl]').forEach(function(b){ b.classList.toggle('on',b.getAttribute('data-tpl')===name); });
    document.getElementById('topIn').value=topText;
    document.getElementById('botIn').value=botText;
    rebuildBoxList(); render(); save();
  }

  // ---------- box list UI ----------
  function rebuildBoxList(){
    var list=document.getElementById('boxList'); list.innerHTML='';
    boxes.forEach(function(b,i){
      var row=document.createElement('div'); row.className='boxitem'+(i===selBox?' sel':'');
      var inp=document.createElement('input'); inp.type='text'; inp.value=b.text; inp.placeholder='text…';
      inp.addEventListener('input',function(){ b.text=inp.value; render(); save(); });
      inp.addEventListener('focus',function(){ selBox=i; markSel(); render(); });
      var btn=document.createElement('button'); btn.textContent='✕';
      btn.addEventListener('click',function(){ boxes.splice(i,1); if(selBox>=boxes.length) selBox=boxes.length-1; rebuildBoxList(); render(); save(); });
      row.appendChild(inp); row.appendChild(btn); list.appendChild(row);
    });
    if(!boxes.length){ var e=document.createElement('div'); e.className='note'; e.textContent='No extra boxes. Add one below.'; list.appendChild(e); }
  }
  function markSel(){ document.querySelectorAll('#boxList .boxitem').forEach(function(r,i){ r.classList.toggle('sel',i===selBox); }); }

  document.getElementById('addBox').addEventListener('click',function(){
    boxes.push({fx:0.5,fy:0.5,text:'NEW TEXT',mw:0.6}); selBox=boxes.length-1;
    rebuildBoxList(); render(); save(); badge.textContent='Added text box — drag it on the canvas';
  });
  document.getElementById('delBox').addEventListener('click',function(){
    if(selBox>=0){ boxes.splice(selBox,1); if(selBox>=boxes.length) selBox=boxes.length-1; rebuildBoxList(); render(); save(); }
  });

  // ---------- drag on canvas ----------
  var drag=null;
  function ptr(e){ var r=preview.getBoundingClientRect(); var cx=(e.touches?e.touches[0].clientX:e.clientX)-r.left; var cy=(e.touches?e.touches[0].clientY:e.clientY)-r.top; return {x:cx/scale,y:cy/scale}; }
  function hit(p){ for(var i=boxes.length-1;i>=0;i--){ var b=boxes[i].bbox; if(b&&p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h) return i; } return -1; }
  function down(e){ if(!T) return; var p=ptr(e); var i=hit(p); if(i>=0){ e.preventDefault(); selBox=i; markSel(); drag={i:i,dx:p.x-boxes[i].fx*T.w,dy:p.y-boxes[i].fy*T.h}; preview.classList.add('grabbing'); render(); } }
  function move(e){ if(!drag) return; e.preventDefault(); var p=ptr(e); var b=boxes[drag.i]; b.fx=Math.max(0.05,Math.min(0.95,(p.x-drag.dx)/T.w)); b.fy=Math.max(0.05,Math.min(0.95,(p.y-drag.dy)/T.h)); render(); }
  function up(){ if(drag){ drag=null; preview.classList.remove('grabbing'); save(); } }
  preview.addEventListener('mousedown',down); window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
  preview.addEventListener('touchstart',down,{passive:false}); window.addEventListener('touchmove',move,{passive:false}); window.addEventListener('touchend',up);

  // ---------- inputs ----------
  document.getElementById('topIn').addEventListener('input',function(){ topText=this.value; render(); save(); });
  document.getElementById('botIn').addEventListener('input',function(){ botText=this.value; render(); save(); });
  document.getElementById('sizeR').addEventListener('input',function(){ sizeMult=parseInt(this.value,10)/100; document.getElementById('sizeV').textContent=this.value; render(); save(); });
  document.getElementById('outR').addEventListener('input',function(){ outlineMult=parseInt(this.value,10); document.getElementById('outV').textContent=this.value; render(); save(); });
  document.querySelectorAll('[data-tpl]').forEach(function(b){ b.addEventListener('click',function(){ applyTemplate(b.getAttribute('data-tpl')); badge.textContent='Template: '+b.textContent; }); });

  // ---------- image load ----------
  function handleFile(file){ if(!file||!/^image\//.test(file.type)) return; var reader=new FileReader(); reader.onload=function(){ var img=new Image(); img.onload=function(){ userImg=img; T=TEMPLATES.blank; T={w:img.width,h:img.height,draw:function(){}}; document.querySelectorAll('[data-tpl]').forEach(function(b){ b.classList.remove('on'); }); render(); badge.textContent='Loaded image '+img.width+'×'+img.height; }; img.src=reader.result; }; reader.readAsDataURL(file); }
  document.getElementById('fileInput').addEventListener('change',function(e){ if(e.target.files[0]) handleFile(e.target.files[0]); e.target.value=''; });
  document.getElementById('loadBtn').addEventListener('click',function(){ document.getElementById('fileInput').click(); });
  document.getElementById('pasteBtn').addEventListener('click',function(){ if(navigator.clipboard&&navigator.clipboard.read){ navigator.clipboard.read().then(function(items){ for(var i=0;i<items.length;i++){ var t=items[i].types.find(function(x){return x.indexOf('image/')===0;}); if(t){ items[i].getType(t).then(function(b){ handleFile(new File([b],'p',{type:b.type})); }); return; } } badge.textContent='No image on clipboard'; }).catch(function(){ badge.textContent='Clipboard blocked — try Ctrl+V'; }); } else badge.textContent='Use Ctrl+V to paste'; });
  window.addEventListener('paste',function(e){ var items=(e.clipboardData||{}).items||[]; for(var i=0;i<items.length;i++){ if(items[i].type.indexOf('image/')===0){ handleFile(items[i].getAsFile()); e.preventDefault(); return; } } });
  ['dragenter','dragover'].forEach(function(ev){ stage.addEventListener(ev,function(e){ e.preventDefault(); stage.classList.add('dragover'); }); });
  ['dragleave','drop'].forEach(function(ev){ stage.addEventListener(ev,function(e){ e.preventDefault(); if(ev==='drop'||e.target===stage) stage.classList.remove('dragover'); }); });
  stage.addEventListener('drop',function(e){ e.preventDefault(); stage.classList.remove('dragover'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });

  // ---------- export ----------
  document.getElementById('exportBtn').addEventListener('click',function(){
    var keep=selBox; selBox=-1; render(); // hide selection outline in export
    work.toBlob(function(blob){ selBox=keep; render(); if(!blob) return; var url=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=url; a.download='meme.png'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(function(){ URL.revokeObjectURL(url); },1500); badge.textContent='Meme downloaded ('+T.w+'×'+T.h+')'; },'image/png');
  });

  window.addEventListener('resize',function(){ if(T) blit(); });

  // ---------- persistence ----------
  function save(){ try{ localStorage.setItem(SLUG,JSON.stringify({tpl:currentName(),top:topText,bottom:botText,boxes:boxes.map(function(b){return {fx:b.fx,fy:b.fy,text:b.text,mw:b.mw};}),sizeMult:sizeMult,outlineMult:outlineMult})); }catch(e){} }
  function currentName(){ var on=document.querySelector('[data-tpl].on'); return on?on.getAttribute('data-tpl'):'distracted'; }
  function load(){
    var s; try{ s=JSON.parse(localStorage.getItem(SLUG)||'null'); }catch(e){ s=null; }
    if(!s){ applyTemplate('distracted'); return; }
    if(typeof s.sizeMult==='number'){ sizeMult=s.sizeMult; document.getElementById('sizeR').value=Math.round(sizeMult*100); document.getElementById('sizeV').textContent=Math.round(sizeMult*100); }
    if(typeof s.outlineMult==='number'){ outlineMult=s.outlineMult; document.getElementById('outR').value=outlineMult; document.getElementById('outV').textContent=outlineMult; }
    var name=TEMPLATES[s.tpl]?s.tpl:'distracted';
    T=TEMPLATES[name]; userImg=null;
    topText=s.top||''; botText=s.bottom||'';
    boxes=(s.boxes||[]).map(function(b){ return {fx:b.fx,fy:b.fy,text:b.text,mw:b.mw}; });
    selBox=boxes.length?0:-1;
    document.querySelectorAll('[data-tpl]').forEach(function(b){ b.classList.toggle('on',b.getAttribute('data-tpl')===name); });
    document.getElementById('topIn').value=topText; document.getElementById('botIn').value=botText;
    rebuildBoxList(); render();
  }

  load();
})();
</script>
</body>
</html>
