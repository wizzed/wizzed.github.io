<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base Converter · Wizzed Arcade</title>
<style>
:root{
  --bg:#0f0f1a; --accent:#39ff14; --soft:rgba(57,255,20,.4);
  --panel:#121a12; --line:#2b4e2b; --text:#e6ffe6; --dim:#7fb87f;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Courier New', ui-monospace, monospace;
  overflow-x:hidden; padding:8px 12px 40px;
}
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:linear-gradient(rgba(57,255,20,.035) 1px,transparent 1px),
             linear-gradient(90deg,rgba(57,255,20,.035) 1px,transparent 1px);
  background-size:28px 28px;
}
a.back{
  position:fixed; top:10px; left:12px; z-index:60;
  color:var(--dim); text-decoration:none; font-size:12px; letter-spacing:1px;
  border:1px solid var(--line); padding:3px 8px; background:rgba(15,15,26,.9);
}
a.back:hover{ color:var(--accent); border-color:var(--accent); text-shadow:0 0 8px var(--accent); }
header{ text-align:center; padding:6px 8px 2px; position:relative; z-index:1; }
h1{
  display:inline-block; font-size:clamp(17px,3vw,24px); letter-spacing:5px; color:var(--accent);
  text-shadow:0 0 6px var(--accent), 0 0 26px var(--soft);
}
header .sub{ font-size:10px; color:var(--dim); letter-spacing:2px; margin-top:2px; }
main{ max-width:760px; margin:8px auto 0; position:relative; z-index:1; display:flex; flex-direction:column; gap:12px; }
.panel{
  background:var(--panel); border:2px solid var(--line);
  box-shadow:0 0 22px rgba(57,255,20,.10), inset 0 1px 0 rgba(255,255,255,.04);
  padding:12px 14px;
}
.baserow{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.baserow:last-child{ margin-bottom:0; }
.tag{
  flex:0 0 56px; text-align:center; font-size:11px; font-weight:bold; letter-spacing:1px;
  color:#03140a; background:var(--accent); padding:6px 0;
  box-shadow:0 0 10px var(--soft);
}
.baserow input{
  flex:1; min-width:0; font-family:inherit; font-size:clamp(14px,2.6vw,19px); font-weight:bold;
  color:var(--accent); background:#0a120a; border:2px solid var(--line);
  padding:8px 10px; outline:none; letter-spacing:1px;
  text-shadow:0 0 7px var(--soft);
  box-shadow:inset 0 2px 8px rgba(0,0,0,.6);
}
.baserow input:focus{ border-color:var(--accent); box-shadow:inset 0 2px 8px rgba(0,0,0,.6), 0 0 12px var(--soft); }
.baserow input.bad{ color:#ff6b6b; text-shadow:none; border-color:#7a3030; }
.baserow .pre{ flex:0 0 auto; font-size:11px; color:var(--dim); width:24px; text-align:right; }
#bitsPanel h2, #infoPanel h2{ font-size:10px; letter-spacing:3px; color:var(--dim); margin-bottom:8px; }
#bitsPanel h2 b{ color:var(--accent); font-weight:normal; text-shadow:0 0 6px var(--soft); }
#bits{ display:flex; gap:4px; justify-content:center; flex-wrap:wrap; }
.nib{ display:flex; gap:4px; margin-right:8px; }
.nib:last-child{ margin-right:0; }
.bit{
  font-family:inherit; font-size:15px; font-weight:bold; cursor:pointer;
  width:32px; height:38px; padding:0;
  color:#355a35; background:#0a120a; border:2px solid var(--line);
  box-shadow:0 3px 0 #041004;
  position:relative;
}
.bit small{ position:absolute; top:-14px; left:0; right:0; font-size:8px; color:var(--dim); font-weight:normal; }
.bit:hover{ border-color:var(--accent); }
.bit:active{ transform:translateY(2px); box-shadow:0 1px 0 #041004; }
.bit.on{
  color:#03140a; background:var(--accent);
  box-shadow:0 3px 0 #041004, 0 0 14px var(--soft);
}
#bits{ padding-top:14px; }
#bitNote{ text-align:center; font-size:10px; color:var(--dim); letter-spacing:1px; margin-top:9px; min-height:12px; }
#infoPanel{ display:flex; flex-wrap:wrap; gap:12px 20px; align-items:center; justify-content:space-between; }
#tcWrap{ display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
#tcWrap .sw{
  width:40px; height:20px; border:2px solid var(--line); background:#0a120a; position:relative; flex:0 0 auto;
}
#tcWrap .sw::after{
  content:''; position:absolute; top:1px; left:1px; width:14px; height:14px; background:var(--dim);
  transition:left .15s, background .15s;
}
#tcWrap.on .sw{ border-color:var(--accent); }
#tcWrap.on .sw::after{ left:21px; background:var(--accent); box-shadow:0 0 10px var(--soft); }
#tcWrap span.lab{ font-size:11px; letter-spacing:1px; color:var(--dim); }
#tcWrap.on span.lab{ color:var(--accent); text-shadow:0 0 6px var(--soft); }
#fits{ display:flex; gap:6px; align-items:center; font-size:10px; color:var(--dim); letter-spacing:1px; }
#fits i{
  font-style:normal; border:1px solid var(--line); padding:3px 7px; color:#456045;
}
#fits i.ok{ color:var(--accent); border-color:var(--accent); text-shadow:0 0 6px var(--soft); }
#msg{ text-align:center; font-size:11px; color:#ffd54a; letter-spacing:1px; min-height:14px; position:relative; z-index:1; margin-top:8px; }
</style>
</head>
<body>
<a class="back" href="../index.html">← Arcade</a>
<header>
  <h1>BASE CONVERTER</h1>
  <div class="sub">DEC · BIN · OCT · HEX — EDIT ANY, CLICK THE BITS</div>
</header>
<main>
  <section class="panel">
    <div class="baserow"><span class="tag">DEC</span><span class="pre">&nbsp;</span><input id="in10" type="text" inputmode="numeric" autocomplete="off" spellcheck="false"></div>
    <div class="baserow"><span class="tag">BIN</span><span class="pre">0b</span><input id="in2" type="text" autocomplete="off" spellcheck="false"></div>
    <div class="baserow"><span class="tag">OCT</span><span class="pre">0o</span><input id="in8" type="text" autocomplete="off" spellcheck="false"></div>
    <div class="baserow"><span class="tag">HEX</span><span class="pre">0x</span><input id="in16" type="text" autocomplete="off" spellcheck="false"></div>
  </section>
  <section class="panel" id="bitsPanel">
    <h2>16-BIT REGISTER — <b>CLICK A BIT TO FLIP IT</b></h2>
    <div id="bits"></div>
    <div id="bitNote"></div>
  </section>
  <section class="panel" id="infoPanel">
    <div id="tcWrap" role="switch" aria-checked="false" tabindex="0">
      <span class="sw"></span><span class="lab">TWO'S COMPLEMENT (16-BIT)</span>
    </div>
    <div id="fits">FITS IN: <i id="f8">8</i><i id="f16">16</i><i id="f32">32</i><i id="f53">53</i> BITS</div>
  </section>
  <div id="msg"></div>
</main>
<script>
(function(){
'use strict';
var LS_KEY='wizzed-number-base';
var $=function(id){ return document.getElementById(id); };
var LIMIT=BigInt(2)**BigInt(53);          /* 9007199254740992 */
var B16=BigInt(65536), B15=BigInt(32768), ONE=BigInt(1), ZERO=BigInt(0);

var state={ v:BigInt(1337), tc:false };
try{
  var raw=localStorage.getItem(LS_KEY);
  if(raw){
    var s=JSON.parse(raw);
    if(s && typeof s.v==='string' && /^-?\d+$/.test(s.v)){
      var restored=BigInt(s.v);
      if(restored<=LIMIT && restored>=-LIMIT) state.v=restored;
    }
    if(s && s.tc===true) state.tc=true;
  }
}catch(e){}
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify({v:state.v.toString(), tc:state.tc})); }catch(e){} }

var inputs={10:$('in10'), 2:$('in2'), 8:$('in8'), 16:$('in16')};
var msgEl=$('msg'), msgTimer=null;
function flash(t){
  msgEl.textContent=t;
  if(msgTimer) clearTimeout(msgTimer);
  msgTimer=setTimeout(function(){ msgEl.textContent=''; },2600);
}

/* ---------- parse ---------- */
var RES={10:/^[0-9]+$/, 2:/^[01]+$/, 8:/^[0-7]+$/, 16:/^[0-9a-f]+$/};
var PREF={2:'0b',8:'0o',16:'0x'};
function parseIn(text,base){
  /* returns {v:BigInt} or {err:string} */
  var t=String(text).trim().replace(/[\s,_']/g,'').toLowerCase();
  if(!t) return {err:'empty'};
  var neg=false;
  if(t.charAt(0)==='-'){ neg=true; t=t.slice(1); }
  else if(t.charAt(0)==='+'){ t=t.slice(1); }
  if(PREF[base] && t.indexOf(PREF[base])===0) t=t.slice(2);
  if(!t || !RES[base].test(t)) return {err:'bad digits'};
  var v;
  try{ v = base===10 ? BigInt(t) : BigInt(PREF[base]+t); }
  catch(e){ return {err:'bad number'}; }
  if(state.tc){
    if(neg) v=-v;
    else if(base!==10 && v>=B15 && v<B16) v=v-B16;   /* raw 16-bit pattern → signed */
    if(v>B15-ONE || v< -B15) return {err:'out of 16-bit signed range (−32768 … 32767)'};
    return {v:v};
  }
  if(neg) v=-v;
  if(v>LIMIT || v< -LIMIT) return {err:'magnitude above 2^53'};
  return {v:v};
}

/* ---------- format ---------- */
function groupRight(s,size,sep){
  var out='', c=0;
  for(var i=s.length-1;i>=0;i--){
    out=s.charAt(i)+out;
    if(++c%size===0 && i>0) out=sep+out;
  }
  return out;
}
function pattern16(){ return state.v & (B16-ONE); }  /* BigInt & sign-extends: works for negatives */
function render(skipBase){
  var v=state.v;
  var texts={};
  if(state.tc){
    var p=pattern16();
    texts[10]=v.toString(10);
    texts[2]=groupRight(pad(p.toString(2),16),4,' ');
    texts[8]=groupRight(pad(p.toString(8),6),3,' ');
    texts[16]=groupRight(pad(p.toString(16).toUpperCase(),4),4,' ');
  }else{
    var neg=v<ZERO, a=neg?-v:v, sign=neg?'-':'';
    texts[10]=sign+groupRight(a.toString(10),3,',');
    texts[2]=sign+groupRight(a.toString(2),4,' ');
    texts[8]=sign+groupRight(a.toString(8),3,' ');
    texts[16]=sign+groupRight(a.toString(16).toUpperCase(),4,' ');
  }
  [10,2,8,16].forEach(function(b){
    if(b!==skipBase){ inputs[b].value=texts[b]; inputs[b].classList.remove('bad'); }
  });
  renderBits();
  renderFits();
  save();
}
function pad(s,len){ while(s.length<len) s='0'+s; return s; }

/* ---------- bits ---------- */
var bitEls=[];
(function buildBits(){
  var wrap=$('bits');
  for(var g=3;g>=0;g--){
    var nib=document.createElement('div');
    nib.className='nib';
    for(var k=g*4+3;k>=g*4;k--){
      (function(idx){
        var b=document.createElement('button');
        b.type='button'; b.className='bit';
        b.innerHTML='0<small>'+idx+'</small>';
        b.setAttribute('aria-label','bit '+idx);
        b.addEventListener('click',function(){ toggleBit(idx); });
        bitEls[idx]=b;
        nib.appendChild(b);
      })(k);
    }
    wrap.appendChild(nib);
  }
})();
function bitsSource(){
  if(state.tc) return pattern16();
  return (state.v<ZERO?-state.v:state.v) & (B16-ONE);
}
function renderBits(){
  var p=bitsSource();
  for(var i=0;i<16;i++){
    var on=((p>>BigInt(i)) & ONE)===ONE;
    bitEls[i].classList.toggle('on',on);
    bitEls[i].innerHTML=(on?'1':'0')+'<small>'+i+'</small>';
  }
  var note='';
  if(state.tc){
    note='signed 16-bit view · bit 15 is the sign bit';
  }else if(state.v<ZERO){
    note='showing bits of the magnitude ('+(-state.v).toString(10)+')';
  }else if(state.v>=B16){
    note='value exceeds 16 bits — showing the low 16; higher bits are kept';
  }else{
    note='unsigned view · bit 15 = 32768';
  }
  $('bitNote').textContent=note;
}
function toggleBit(i){
  var bi=BigInt(i);
  if(state.tc){
    var p=pattern16() ^ (ONE<<bi);
    state.v = p>=B15 ? p-B16 : p;
  }else{
    var neg=state.v<ZERO;
    var a=neg?-state.v:state.v;
    a=a ^ (ONE<<bi);
    if(a>LIMIT){ flash('that flip would pass 2^53'); return; }
    state.v = neg ? -a : a;
  }
  render();
}

/* ---------- fits badges ---------- */
function fitsSigned(v,bits){
  var half=ONE<<BigInt(bits-1);
  return v>=-half && v<=half-ONE;
}
function fitsUnsigned(v,bits){
  return v>=ZERO && v < (ONE<<BigInt(bits));
}
function renderFits(){
  var v=state.v;
  var neg=v<ZERO;
  [[8,'f8'],[16,'f16'],[32,'f32'],[53,'f53']].forEach(function(pair){
    var ok = neg ? fitsSigned(v,pair[0]) : fitsUnsigned(v,pair[0]);
    if(pair[0]===53 && !neg) ok = v<=LIMIT;
    $(pair[1]).classList.toggle('ok',ok);
  });
}

/* ---------- wiring ---------- */
[10,2,8,16].forEach(function(base){
  var el=inputs[base];
  el.addEventListener('input',function(){
    var r=parseIn(el.value,base);
    if(r.err){
      el.classList.add('bad');
      if(r.err!=='empty' && r.err!=='bad digits') flash(r.err);
      return;
    }
    el.classList.remove('bad');
    state.v=r.v;
    render(base);
  });
  el.addEventListener('change',function(){ render(); }); /* reformat edited field on blur */
});

var tcWrap=$('tcWrap');
function setTC(on){
  state.tc=on;
  tcWrap.classList.toggle('on',on);
  tcWrap.setAttribute('aria-checked',on?'true':'false');
  if(on && (state.v>B15-ONE || state.v< -B15)){
    var p=state.v & (B16-ONE);
    state.v = p>=B15 ? p-B16 : p;
    flash('value wrapped to 16 bits: '+state.v.toString(10));
  }
  render();
}
tcWrap.addEventListener('click',function(){ setTC(!state.tc); });
tcWrap.addEventListener('keydown',function(e){
  if(e.key===' '||e.key==='Enter'){ e.preventDefault(); setTC(!state.tc); }
});

tcWrap.classList.toggle('on',state.tc);
tcWrap.setAttribute('aria-checked',state.tc?'true':'false');
render();
})();
</script>
</body>
</html>
