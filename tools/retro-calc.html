<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Calculator · Wizzed Arcade</title>
<style>
:root{
  --bg:#0f0f1a; --accent:#3ddc84; --accent-soft:rgba(61,220,132,.5);
  --panel:#161622; --line:#2c2c46; --text:#e8f4ea; --dim:#88a08e;
  --lcd:#9bbc0f; --lcd-dark:#0f380f;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Courier New', ui-monospace, monospace;
  overflow-x:hidden; padding-bottom:24px;
}
a.back{
  position:fixed; top:10px; left:12px; z-index:60;
  color:var(--dim); text-decoration:none; font-size:12px; letter-spacing:1px;
  border:1px solid var(--line); padding:3px 8px; background:rgba(15,15,26,.9);
}
a.back:hover{ color:var(--accent); border-color:var(--accent); text-shadow:0 0 8px var(--accent); }
header{ text-align:center; padding:10px 8px 2px; }
h1{
  display:inline-block; font-size:clamp(17px,3vw,26px); letter-spacing:5px; color:var(--accent);
  text-shadow:0 0 6px var(--accent), 0 0 26px var(--accent-soft);
}
header .sub{ font-size:11px; color:var(--dim); letter-spacing:2px; margin-top:2px; }
main{
  display:flex; flex-wrap:wrap; gap:16px; justify-content:center; align-items:flex-start;
  max-width:760px; margin:8px auto 0; padding:0 12px;
}
#calc{
  width:min(92vw,320px);
  background:linear-gradient(#23233a,#15151f);
  border:3px solid #34345a;
  border-radius:14px;
  padding:14px 14px 16px;
  box-shadow:0 0 0 2px #000, 0 0 34px rgba(61,220,132,.18), inset 0 2px 0 rgba(255,255,255,.08);
}
#brand{
  display:flex; justify-content:space-between; align-items:center;
  font-size:9px; letter-spacing:2px; color:#6a6a90; margin-bottom:8px;
}
#brand b{ color:var(--accent); font-weight:normal; text-shadow:0 0 6px var(--accent-soft); }
#lcd{
  background:linear-gradient(#aecb26,#8fae0c);
  border:3px solid #0a0a12;
  border-radius:4px;
  box-shadow:inset 0 3px 10px rgba(0,0,0,.5), 0 0 12px rgba(155,188,15,.35);
  padding:6px 10px 8px; margin-bottom:12px;
  color:var(--lcd-dark);
  position:relative;
}
#exprLine{
  font-size:11px; min-height:14px; text-align:right; letter-spacing:1px;
  opacity:.75; overflow:hidden; white-space:nowrap;
}
#display{
  font-size:clamp(26px,7vw,32px); text-align:right; letter-spacing:2px;
  font-weight:bold; white-space:nowrap; overflow:hidden;
  text-shadow:1px 1px 0 rgba(15,56,15,.25);
}
#memFlag{
  position:absolute; top:5px; left:8px; font-size:9px; font-weight:bold;
  letter-spacing:1px; opacity:0;
}
#memFlag.on{ opacity:.8; }
#bsBtn{
  position:absolute; bottom:4px; left:8px; font-size:9px; font-family:inherit;
  background:rgba(15,56,15,.15); color:var(--lcd-dark); border:1px solid rgba(15,56,15,.4);
  padding:1px 5px; cursor:pointer; border-radius:2px;
}
#keys{ display:grid; grid-template-columns:repeat(4,1fr); gap:7px; }
.k{
  font-family:inherit; font-size:15px; cursor:pointer;
  padding:9px 0; text-align:center; color:var(--text);
  background:linear-gradient(#31314e,#1d1d30);
  border:2px solid #0a0a12; border-radius:7px;
  box-shadow:0 4px 0 #0a0a12, inset 0 1px 0 rgba(255,255,255,.14);
  transition:transform .04s, box-shadow .04s;
  user-select:none; touch-action:manipulation;
}
.k:hover{ filter:brightness(1.15); }
.k:active,.k.pressed{
  transform:translateY(3px);
  box-shadow:0 1px 0 #0a0a12, inset 0 1px 4px rgba(0,0,0,.5);
}
.k.mem{ font-size:11px; padding:8px 0; color:#9db4ff; }
.k.op{ color:var(--accent); text-shadow:0 0 8px var(--accent-soft); }
.k.danger{ color:#ff6d6d; text-shadow:0 0 8px rgba(255,109,109,.5); }
.k.eq{
  background:linear-gradient(#2c7a4e,#175c34); color:#eaffe8;
  text-shadow:0 0 10px var(--accent); border-color:#0a0a12;
}
#tape{
  width:min(92vw,270px);
  background:var(--panel); border:2px solid var(--line);
  box-shadow:0 0 0 1px #000, 0 0 20px rgba(61,220,132,.12);
  padding:10px;
}
#tape h2{
  font-size:11px; letter-spacing:2px; color:var(--accent);
  border-bottom:1px solid var(--line); padding-bottom:5px; margin-bottom:6px;
  text-shadow:0 0 6px var(--accent-soft);
  display:flex; justify-content:space-between; align-items:center;
}
#clearTape{
  font-family:inherit; font-size:9px; letter-spacing:1px; cursor:pointer;
  background:none; color:var(--dim); border:1px solid var(--line); padding:2px 6px;
}
#clearTape:hover{ color:#ff6d6d; border-color:#ff6d6d; }
#tapeList{
  height:330px; overflow-y:auto; font-size:12px; line-height:1.5;
}
.tline{
  padding:3px 6px; color:#bfe8cc; cursor:pointer; border-bottom:1px dashed #22223a;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.tline:hover{ background:#1c2c22; color:#fff; }
.tline b{ color:var(--accent); font-weight:normal; text-shadow:0 0 6px var(--accent-soft); }
.tempty{ color:var(--dim); font-size:11px; padding:8px 4px; letter-spacing:1px; }
#hint{ text-align:center; font-size:10px; color:var(--dim); letter-spacing:1px; margin-top:10px; width:100%; }
@media (max-width:660px){ #tapeList{ height:160px; } }
</style>
</head>
<body>
<a class="back" href="../index.html">&larr; Arcade</a>
<header>
  <h1>RETRO CALC</h1>
  <div class="sub">WZ-80 PROGRAMMABLE &middot; SOLAR NOT INCLUDED</div>
</header>
<main>
  <div id="calc">
    <div id="brand"><span>WIZZED</span><b>WZ-80 LCD</b></div>
    <div id="lcd">
      <span id="memFlag">M</span>
      <div id="exprLine">&nbsp;</div>
      <div id="display">0</div>
      <button id="bsBtn" title="backspace">&larr;DEL</button>
    </div>
    <div id="keys">
      <button class="k mem" data-a="mc">MC</button>
      <button class="k mem" data-a="mr">MR</button>
      <button class="k mem" data-a="m-">M&minus;</button>
      <button class="k mem" data-a="m+">M+</button>

      <button class="k danger" data-a="ac">AC</button>
      <button class="k op" data-a="sqrt">&radic;</button>
      <button class="k op" data-a="pct">%</button>
      <button class="k op" data-a="div" data-key="/">&divide;</button>

      <button class="k" data-a="d7" data-key="7">7</button>
      <button class="k" data-a="d8" data-key="8">8</button>
      <button class="k" data-a="d9" data-key="9">9</button>
      <button class="k op" data-a="mul" data-key="*">&times;</button>

      <button class="k" data-a="d4" data-key="4">4</button>
      <button class="k" data-a="d5" data-key="5">5</button>
      <button class="k" data-a="d6" data-key="6">6</button>
      <button class="k op" data-a="sub" data-key="-">&minus;</button>

      <button class="k" data-a="d1" data-key="1">1</button>
      <button class="k" data-a="d2" data-key="2">2</button>
      <button class="k" data-a="d3" data-key="3">3</button>
      <button class="k op" data-a="add" data-key="+">+</button>

      <button class="k" data-a="neg">&plusmn;</button>
      <button class="k" data-a="d0" data-key="0">0</button>
      <button class="k" data-a="dot" data-key=".">.</button>
      <button class="k eq" data-a="eq" data-key="=">=</button>
    </div>
  </div>
  <div id="tape">
    <h2>HISTORY TAPE <button id="clearTape">CLEAR</button></h2>
    <div id="tapeList"></div>
  </div>
  <div id="hint">KEYBOARD: 0-9 &middot; + &minus; * / &middot; ENTER = &middot; BACKSPACE &middot; ESC = AC &middot; CLICK A TAPE LINE TO REUSE ITS RESULT</div>
</main>
<script>
(function(){
'use strict';
var LS_KEY='wizzed-retro-calc';
var OPS={add:'+',sub:'−',mul:'×',div:'÷'};

var entry='0', acc=null, op=null, fresh=true, memory=0, errorState=false;
var history=[];

/* ---------- persistence ---------- */
function loadStore(){
  try{
    var raw=localStorage.getItem(LS_KEY);
    if(raw){
      var o=JSON.parse(raw);
      if(o&&typeof o==='object'){
        if(Array.isArray(o.history)) history=o.history;
        if(typeof o.memory==='number') memory=o.memory;
      }
      return true;
    }
  }catch(e){}
  return false;
}
function persist(){
  try{ localStorage.setItem(LS_KEY,JSON.stringify({history:history.slice(-100),memory:memory})); }catch(e){}
}

/* ---------- display ---------- */
var displayEl=document.getElementById('display');
var exprEl=document.getElementById('exprLine');
var memFlag=document.getElementById('memFlag');
function fmt(n){
  if(typeof n!=='number'||!isFinite(n)||isNaN(n)) return 'ERROR';
  if(n===0) return '0';
  var abs=Math.abs(n);
  var s;
  if(abs>=1e12||abs<1e-9){ s=n.toExponential(6); }
  else{
    s=n.toPrecision(12);
    if(s.indexOf('e')===-1&&s.indexOf('.')!==-1){
      s=s.replace(/0+$/,'').replace(/\.$/,'');
    }
  }
  if(s.length>14) s=n.toExponential(6);
  return s;
}
function renderDisplay(){
  displayEl.textContent=errorState?'ERROR':entry;
  if(op!==null&&acc!==null){
    exprEl.textContent=fmt(acc)+' '+OPS[op]+(fresh?'':' '+entry);
  }else{
    exprEl.innerHTML='&nbsp;';
  }
  memFlag.classList.toggle('on',memory!==0);
}

/* ---------- tape ---------- */
var tapeList=document.getElementById('tapeList');
function renderTape(){
  tapeList.innerHTML='';
  if(!history.length){
    var d=document.createElement('div');
    d.className='tempty';
    d.textContent='— tape is empty —';
    tapeList.appendChild(d);
    return;
  }
  history.forEach(function(h){
    var d=document.createElement('div');
    d.className='tline';
    d.innerHTML=escapeHtml(h.expr)+' = <b>'+escapeHtml(h.res)+'</b>';
    d.title='click to use '+h.res;
    d.addEventListener('click',function(){
      clickSound(760);
      errorState=false;
      entry=h.res; fresh=false;
      renderDisplay();
    });
    tapeList.appendChild(d);
  });
  tapeList.scrollTop=tapeList.scrollHeight;
}
function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function pushHistory(expr,res){
  history.push({expr:expr,res:res});
  if(history.length>100) history=history.slice(-100);
  persist(); renderTape();
}
document.getElementById('clearTape').addEventListener('click',function(){
  clickSound(300);
  history=[]; persist(); renderTape();
});

/* ---------- sound ---------- */
var actx=null;
function ensureAudio(){
  if(!actx){
    var AC=window.AudioContext||window.webkitAudioContext;
    try{ actx=new AC(); }catch(e){ actx=null; }
  }
  if(actx&&actx.state==='suspended') actx.resume();
}
function clickSound(freq){
  if(!actx) return;
  var t=actx.currentTime;
  var o=actx.createOscillator(); o.type='square';
  o.frequency.value=freq||520;
  var g=actx.createGain();
  g.gain.setValueAtTime(0.06,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
  o.connect(g); g.connect(actx.destination);
  o.start(t); o.stop(t+0.06);
}

/* ---------- calculator logic ---------- */
function calc(a,o,b){
  switch(o){
    case 'add': return a+b;
    case 'sub': return a-b;
    case 'mul': return a*b;
    case 'div': return b===0?NaN:a/b;
  }
  return NaN;
}
function clearAll(){
  entry='0'; acc=null; op=null; fresh=true; errorState=false;
}
function inputDigit(d){
  if(errorState) clearAll();
  if(fresh){
    entry=(d==='.')?'0.':d;
    fresh=false;
  }else{
    if(d==='.'&&entry.indexOf('.')!==-1) return;
    if(entry==='0'&&d!=='.') entry=d;
    else if(entry.replace('-','').replace('.','').length<12) entry+=d;
  }
}
function inputOp(o){
  if(errorState) clearAll();
  var v=parseFloat(entry);
  if(op!==null&&!fresh){
    var r=calc(acc,op,v);
    if(!isFinite(r)){ setError(); return; }
    pushHistory(fmt(acc)+' '+OPS[op]+' '+fmt(v),fmt(r));
    acc=r; entry=fmt(r);
  }else if(op===null){
    acc=v;
  }
  op=o; fresh=true;
}
function equals(){
  if(errorState){ clearAll(); return; }
  if(op===null||acc===null) return;
  var b=fresh?acc:parseFloat(entry);
  var r=calc(acc,op,b);
  if(!isFinite(r)){ setError(); return; }
  pushHistory(fmt(acc)+' '+OPS[op]+' '+fmt(b),fmt(r));
  entry=fmt(r);
  acc=null; op=null; fresh=true;
}
function percent(){
  if(errorState) clearAll();
  var v=parseFloat(entry);
  var r;
  if(acc!==null&&(op==='add'||op==='sub')) r=acc*v/100;
  else r=v/100;
  entry=fmt(r); fresh=false;
}
function sqrt(){
  if(errorState) clearAll();
  var v=parseFloat(entry);
  if(v<0){ setError(); return; }
  var r=Math.sqrt(v);
  pushHistory('√'+fmt(v),fmt(r));
  entry=fmt(r); fresh=false;
}
function negate(){
  if(errorState) clearAll();
  if(entry==='0') return;
  entry=(entry.charAt(0)==='-')?entry.slice(1):'-'+entry;
  fresh=false;
}
function backspace(){
  if(errorState){ clearAll(); return; }
  if(fresh) return;
  entry=entry.length>1?entry.slice(0,-1):'0';
  if(entry==='-'||entry==='') entry='0';
}
function setError(){
  errorState=true; acc=null; op=null; fresh=true; entry='0';
}
function memOp(a){
  if(errorState) clearAll();
  var v=parseFloat(entry);
  if(a==='mc') memory=0;
  else if(a==='mr'){ entry=fmt(memory); fresh=false; }
  else if(a==='m+') memory+=v;
  else if(a==='m-') memory-=v;
  persist();
}

/* ---------- dispatch ---------- */
function press(a){
  ensureAudio();
  if(a.charAt(0)==='d'&&a.length===2){ clickSound(500+parseInt(a.charAt(1),10)*14); inputDigit(a.charAt(1)); }
  else if(a==='dot'){ clickSound(480); inputDigit('.'); }
  else if(a==='add'||a==='sub'||a==='mul'||a==='div'){ clickSound(680); inputOp(a); }
  else if(a==='eq'){ clickSound(880); setTimeout(function(){ clickSound(1100); },60); equals(); }
  else if(a==='ac'){ clickSound(300); clearAll(); }
  else if(a==='pct'){ clickSound(640); percent(); }
  else if(a==='sqrt'){ clickSound(640); sqrt(); }
  else if(a==='neg'){ clickSound(560); negate(); }
  else if(a==='bs'){ clickSound(420); backspace(); }
  else if(a==='mc'||a==='mr'||a==='m+'||a==='m-'){ clickSound(720); memOp(a); }
  renderDisplay();
}

var keyBtns={};
document.querySelectorAll('.k').forEach(function(b){
  var a=b.dataset.a;
  keyBtns[a]=b;
  b.addEventListener('click',function(){ press(a); });
});
document.getElementById('bsBtn').addEventListener('click',function(){ press('bs'); });

function flash(a){
  var b=keyBtns[a];
  if(!b) return;
  b.classList.add('pressed');
  setTimeout(function(){ b.classList.remove('pressed'); },110);
}
document.addEventListener('keydown',function(e){
  var tag=(e.target&&e.target.tagName)||'';
  if(tag==='INPUT'||tag==='TEXTAREA') return;
  var k=e.key;
  var a=null;
  if(k>='0'&&k<='9') a='d'+k;
  else if(k==='.') a='dot';
  else if(k==='+') a='add';
  else if(k==='-') a='sub';
  else if(k==='*') a='mul';
  else if(k==='/') a='div';
  else if(k==='Enter'||k==='=') a='eq';
  else if(k==='Backspace') a='bs';
  else if(k==='Escape'||k.toLowerCase()==='c') a='ac';
  else if(k==='%') a='pct';
  else if(k.toLowerCase()==='r') a='sqrt';
  else if(k.toLowerCase()==='n') a='neg';
  else if(k.toLowerCase()==='m') a='m+';
  if(a===null) return;
  e.preventDefault();
  press(a);
  flash(a);
});

/* ---------- init ---------- */
var had=loadStore();
if(!had&&!history.length){
  history=[
    {expr:'128 + 256',res:'384'},
    {expr:'384 × 2',res:'768'},
    {expr:'√1024',res:'32'}
  ];
  persist();
}
renderTape();
renderDisplay();
})();
</script>
</body>
</html>
