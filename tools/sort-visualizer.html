<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sort Visualizer · Wizzed Arcade</title>
<style>
:root{
  --bg:#0f0f1a; --accent:#c77dff; --soft:rgba(199,125,255,.4);
  --panel:#15101c; --line:#432b5e; --text:#f0e4ff; --dim:#a888c7;
  --bar:#00e5ff; --cmp:#ffd166; --swap:#ff3d7f; --done:#00ff9c;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Courier New', ui-monospace, monospace;
  overflow-x:hidden; padding:8px 12px 40px;
}
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:linear-gradient(rgba(199,125,255,.03) 1px,transparent 1px),
             linear-gradient(90deg,rgba(199,125,255,.03) 1px,transparent 1px);
  background-size:28px 28px;
}
a.back{
  position:fixed; top:10px; left:12px; z-index:60;
  color:var(--dim); text-decoration:none; font-size:12px; letter-spacing:1px;
  border:1px solid var(--line); padding:3px 8px; background:rgba(15,15,26,.9);
}
a.back:hover{ color:var(--accent); border-color:var(--accent); text-shadow:0 0 8px var(--accent); }
header{ text-align:center; padding:6px 8px 2px; position:relative; z-index:1; }
h1{ display:inline-block; font-size:clamp(17px,3vw,24px); letter-spacing:5px; color:var(--accent);
  text-shadow:0 0 6px var(--accent), 0 0 26px var(--soft); }
header .sub{ font-size:10px; color:var(--dim); letter-spacing:2px; margin-top:2px; }
main{ max-width:940px; margin:8px auto 0; position:relative; z-index:1; display:flex; flex-direction:column; gap:12px; }
.panel{
  background:var(--panel); border:2px solid var(--line);
  box-shadow:0 0 22px rgba(199,125,255,.08), inset 0 1px 0 rgba(255,255,255,.04);
  padding:12px 14px;
}
.controls{ display:flex; flex-wrap:wrap; gap:9px 14px; align-items:center; }
.grp{ display:flex; align-items:center; gap:7px; }
.grp .cap{ font-size:10px; color:var(--dim); letter-spacing:1px; }
select{
  font-family:inherit; font-size:12px; color:var(--accent); background:#100a17;
  border:2px solid var(--line); padding:6px 8px; outline:none; letter-spacing:1px; cursor:pointer;
}
select:focus{ border-color:var(--accent); }
input[type=range]{ -webkit-appearance:none; appearance:none; width:110px; height:6px; background:#2a1c3a; outline:none; border:1px solid var(--line); }
input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; appearance:none; width:14px; height:20px; background:var(--accent); box-shadow:0 0 10px var(--soft); cursor:pointer; }
input[type=range]::-moz-range-thumb{ width:14px; height:20px; border:none; background:var(--accent); box-shadow:0 0 10px var(--soft); cursor:pointer; }
.grp .val{ font-size:11px; color:var(--accent); min-width:32px; text-shadow:0 0 6px var(--soft); }
button.btn{
  font-family:inherit; font-size:11px; letter-spacing:1px; cursor:pointer;
  color:var(--accent); background:#140d1c; border:2px solid var(--line);
  padding:7px 11px; box-shadow:0 3px 0 #0a0612; text-transform:uppercase; white-space:nowrap;
}
button.btn:hover{ border-color:var(--accent); box-shadow:0 3px 0 #0a0612,0 0 12px var(--soft); }
button.btn:active{ transform:translateY(2px); box-shadow:0 1px 0 #0a0612; }
button.btn.primary{ color:#100a17; background:var(--accent); box-shadow:0 3px 0 #0a0612,0 0 14px var(--soft); }
button.btn.on{ color:#100a17; background:var(--accent); box-shadow:0 3px 0 #0a0612,0 0 14px var(--soft); }
.stage{ display:flex; flex-direction:column; gap:10px; }
.race .lane{ }
.lanehead{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
.lanehead .nm{ font-size:12px; letter-spacing:2px; color:var(--accent); text-shadow:0 0 6px var(--soft); }
.lanehead .st{ font-size:10px; color:var(--dim); letter-spacing:1px; }
canvas{ display:block; width:100%; background:#0a0710; border:1px solid var(--line); }
.counters{ display:flex; gap:16px; font-size:11px; color:var(--dim); letter-spacing:1px; margin-top:5px; flex-wrap:wrap; }
.counters b{ color:var(--accent); text-shadow:0 0 6px var(--soft); }
.legend{ display:flex; gap:14px; flex-wrap:wrap; font-size:10px; color:var(--dim); letter-spacing:1px; margin-top:2px; }
.legend i{ display:inline-block; width:11px; height:11px; margin-right:5px; vertical-align:-1px; }
.winner{ text-align:center; font-size:13px; letter-spacing:2px; color:var(--done); text-shadow:0 0 10px rgba(0,255,156,.5); min-height:18px; margin-top:4px; }
.raceonly{ display:none; }
body.raceon .raceonly{ display:flex; }
body.raceon .singleonly{ display:none; }
</style>
</head>
<body>
<a class="back" href="../index.html">← Arcade</a>
<header>
  <h1>SORT VISUALIZER</h1>
  <div class="sub">SIX ALGORITHMS · WATCH THEM COMPARE, SWAP &amp; RACE</div>
</header>
<main>
  <section class="panel">
    <div class="controls">
      <div class="grp singleonly"><span class="cap">ALGO</span>
        <select id="algo">
          <option value="bubble">Bubble</option>
          <option value="insertion">Insertion</option>
          <option value="selection">Selection</option>
          <option value="merge">Merge</option>
          <option value="quick" selected>Quick</option>
          <option value="heap">Heap</option>
        </select>
      </div>
      <div class="grp raceonly"><span class="cap">A</span>
        <select id="algoA">
          <option value="bubble">Bubble</option><option value="insertion">Insertion</option>
          <option value="selection">Selection</option><option value="merge">Merge</option>
          <option value="quick" selected>Quick</option><option value="heap">Heap</option>
        </select>
      </div>
      <div class="grp raceonly"><span class="cap">B</span>
        <select id="algoB">
          <option value="bubble">Bubble</option><option value="insertion">Insertion</option>
          <option value="selection">Selection</option><option value="merge" selected>Merge</option>
          <option value="quick">Quick</option><option value="heap">Heap</option>
        </select>
      </div>
      <div class="grp"><span class="cap">SIZE</span><input id="size" type="range" min="8" max="120" step="1" value="48"><span class="val" id="sizeV">48</span></div>
      <div class="grp"><span class="cap">SPEED</span><input id="speed" type="range" min="1" max="100" step="1" value="55"><span class="val" id="speedV">55</span></div>
      <button class="btn primary" id="run">▶ Run</button>
      <button class="btn" id="race">Race Mode</button>
    </div>
    <div class="controls" style="margin-top:9px;">
      <span class="cap" style="font-size:10px;color:var(--dim);letter-spacing:1px;">ARRANGE:</span>
      <button class="btn" id="pShuffle">Shuffle</button>
      <button class="btn" id="pReverse">Reverse</button>
      <button class="btn" id="pNearly">Nearly Sorted</button>
    </div>
  </section>

  <section class="panel stage">
    <!-- single -->
    <div class="lane singleonly" id="laneS">
      <div class="lanehead"><span class="nm" id="nmS">QUICK</span><span class="st" id="stS">idle</span></div>
      <canvas id="cvS" height="240"></canvas>
      <div class="counters">COMPARISONS <b id="cmpS">0</b> · SWAPS/MOVES <b id="swpS">0</b> · N <b id="nS">48</b></div>
    </div>
    <!-- race -->
    <div class="raceonly" style="flex-direction:column;gap:12px;">
      <div class="lane" id="laneA">
        <div class="lanehead"><span class="nm" id="nmA">QUICK</span><span class="st" id="stA">idle</span></div>
        <canvas id="cvA" height="170"></canvas>
        <div class="counters">COMPARISONS <b id="cmpA">0</b> · SWAPS/MOVES <b id="swpA">0</b></div>
      </div>
      <div class="lane" id="laneB">
        <div class="lanehead"><span class="nm" id="nmB">MERGE</span><span class="st" id="stB">idle</span></div>
        <canvas id="cvB" height="170"></canvas>
        <div class="counters">COMPARISONS <b id="cmpB">0</b> · SWAPS/MOVES <b id="swpB">0</b></div>
      </div>
    </div>
    <div class="winner" id="winner"></div>
    <div class="legend">
      <span><i style="background:var(--bar)"></i>unsorted</span>
      <span><i style="background:var(--cmp)"></i>comparing</span>
      <span><i style="background:var(--swap)"></i>swapping</span>
      <span><i style="background:var(--done)"></i>sorted</span>
    </div>
  </section>
</main>
<script>
(function(){
'use strict';
var LS_KEY='wizzed-sort-visualizer';
var $=function(id){ return document.getElementById(id); };
var COL={ bar:'#00e5ff', cmp:'#ffd166', swap:'#ff3d7f', done:'#00ff9c' };

/* ---------- op generators ---------- */
function makeOps(values, algo){
  var a=values.slice(), n=a.length, ops=[];
  function cmp(i,j){ ops.push(['c',i,j]); }
  function swap(i,j){ ops.push(['s',i,j]); var t=a[i]; a[i]=a[j]; a[j]=t; }
  function set(i,v){ ops.push(['w',i,v]); a[i]=v; }

  if(algo==='bubble'){
    for(var i=0;i<n-1;i++){ var done=true;
      for(var j=0;j<n-1-i;j++){ cmp(j,j+1); if(a[j]>a[j+1]){ swap(j,j+1); done=false; } }
      if(done) break;
    }
  } else if(algo==='insertion'){
    for(var i2=1;i2<n;i2++){ var key=a[i2], j2=i2-1;
      while(j2>=0){ cmp(j2,i2); if(a[j2]>key){ set(j2+1,a[j2]); j2--; } else break; }
      set(j2+1,key);
    }
  } else if(algo==='selection'){
    for(var i3=0;i3<n-1;i3++){ var m=i3;
      for(var j3=i3+1;j3<n;j3++){ cmp(m,j3); if(a[j3]<a[m]) m=j3; }
      if(m!==i3) swap(i3,m);
    }
  } else if(algo==='merge'){
    (function ms(lo,hi){
      if(hi-lo<2) return;
      var mid=(lo+hi)>>1; ms(lo,mid); ms(mid,hi);
      var tmp=[], i=lo, j=mid;
      while(i<mid && j<hi){ cmp(i,j); if(a[i]<=a[j]) tmp.push(a[i++]); else tmp.push(a[j++]); }
      while(i<mid) tmp.push(a[i++]);
      while(j<hi) tmp.push(a[j++]);
      for(var k=0;k<tmp.length;k++) set(lo+k,tmp[k]);
    })(0,n);
  } else if(algo==='quick'){
    (function qs(lo,hi){
      if(lo>=hi) return;
      var pivot=a[hi], i=lo;
      for(var j=lo;j<hi;j++){ cmp(j,hi); if(a[j]<pivot){ if(i!==j) swap(i,j); i++; } }
      if(i!==hi) swap(i,hi);
      qs(lo,i-1); qs(i+1,hi);
    })(0,n-1);
  } else if(algo==='heap'){
    function down(i,size){
      while(true){ var l=2*i+1,r=2*i+2,m=i;
        if(l<size){ cmp(l,m); if(a[l]>a[m]) m=l; }
        if(r<size){ cmp(r,m); if(a[r]>a[m]) m=r; }
        if(m===i) break; swap(i,m); i=m;
      }
    }
    for(var i4=(n>>1)-1;i4>=0;i4--) down(i4,n);
    for(var e=n-1;e>0;e--){ swap(0,e); down(0,e); }
  }
  return ops;
}

/* ---------- runner ---------- */
function Runner(values, algo){
  this.name=algo;
  this.arr=values.slice();
  this.ops=makeOps(values, algo);
  this.idx=0; this.cmp=0; this.swaps=0;
  this.hlA=-1; this.hlB=-1; this.hlType='';
  this.sorted=[]; for(var i=0;i<values.length;i++) this.sorted.push(false);
  this.phase='run'; this.sweep=0; this.finishFrame=-1;
}
Runner.prototype.step=function(frame){
  if(this.phase==='done') return;
  if(this.phase==='run'){
    if(this.idx>=this.ops.length){ this.phase='sweep'; this.hlA=this.hlB=-1; if(this.finishFrame<0) this.finishFrame=frame; return; }
    var op=this.ops[this.idx++];
    if(op[0]==='c'){ this.cmp++; this.hlA=op[1]; this.hlB=op[2]; this.hlType='c'; }
    else if(op[0]==='s'){ this.swaps++; var t=this.arr[op[1]]; this.arr[op[1]]=this.arr[op[2]]; this.arr[op[2]]=t; this.hlA=op[1]; this.hlB=op[2]; this.hlType='s'; }
    else if(op[0]==='w'){ this.swaps++; this.arr[op[1]]=op[2]; this.hlA=op[1]; this.hlB=-1; this.hlType='s'; }
  } else if(this.phase==='sweep'){
    var chunk=Math.max(1, Math.round(this.arr.length/28));
    for(var k=0;k<chunk && this.sweep<this.arr.length;k++){ this.sorted[this.sweep++]=true; }
    this.hlA=this.sweep-1; this.hlB=-1; this.hlType='done';
    if(this.sweep>=this.arr.length){ this.phase='done'; this.hlA=this.hlB=-1; }
  }
};
Runner.prototype.statusText=function(){
  if(this.phase==='run' && this.ops.length===0) return 'idle';
  if(this.phase==='done') return 'DONE · '+this.ops.length.toLocaleString()+' ops';
  if(this.phase==='sweep') return 'verifying…';
  var pct=this.ops.length?Math.floor(this.idx/this.ops.length*100):100;
  return 'sorting '+pct+'%';
};

/* ---------- canvas draw ---------- */
function draw(canvas, r){
  var ctx=canvas.getContext('2d');
  var W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  if(!r){ return; }
  var n=r.arr.length, bw=W/n, maxv=n, gap=n>80?0:(n>40?0.5:1);
  for(var i=0;i<n;i++){
    var v=r.arr[i], h=(v/maxv)*(H-2);
    var col;
    if(r.sorted[i]) col=COL.done;
    else if(i===r.hlA||i===r.hlB) col=(r.hlType==='c')?COL.cmp:(r.hlType==='done'?COL.done:COL.swap);
    else col=COL.bar;
    ctx.fillStyle=col;
    ctx.fillRect(i*bw+gap, H-h, Math.max(1,bw-gap*2), h);
  }
}

/* ---------- state ---------- */
var size=48, speed=55, raceMode=false;
var base=[]; /* current unsorted array (1..size permutation) */
var runners=[]; /* active runners */
var running=false, opsAcc=0, frameCount=0, rafId=0;
var cvS=$('cvS'), cvA=$('cvA'), cvB=$('cvB');

function genBase(kind){
  var a=[]; for(var i=1;i<=size;i++) a.push(i);
  if(kind==='reverse'){ a.reverse(); }
  else if(kind==='nearly'){
    var swaps=Math.max(1,Math.round(size*0.08));
    for(var s=0;s<swaps;s++){ var i2=(Math.random()*size)|0, j=Math.min(size-1,i2+1+((Math.random()*2)|0)); var t=a[i2]; a[i2]=a[j]; a[j]=t; }
  } else { /* shuffle */
    for(var k=a.length-1;k>0;k--){ var m=(Math.random()*(k+1))|0; var tt=a[k]; a[k]=a[m]; a[m]=tt; }
  }
  base=a;
}

function idleRunner(algo){ var r=new Runner(base, algo); r.ops=[]; r.phase='run'; return r; } /* shows unsorted */
function buildRunners(){
  runners=[];
  if(raceMode){
    runners=[ new Runner(base,$('algoA').value), new Runner(base,$('algoB').value) ];
  } else {
    runners=[ new Runner(base,$('algo').value) ];
  }
}
function showUnsorted(){
  running=false; $('winner').textContent='';
  if(raceMode){
    runners=[ idleRunner($('algoA').value), idleRunner($('algoB').value) ];
  } else {
    runners=[ idleRunner($('algo').value) ];
  }
  updateHeads(); redraw(); updateCounters();
}
function startRun(){
  $('winner').textContent='';
  buildRunners();
  running=true; opsAcc=0; frameCount=0;
  updateHeads();
}

function updateHeads(){
  if(raceMode){
    $('nmA').textContent=$('algoA').value.toUpperCase();
    $('nmB').textContent=$('algoB').value.toUpperCase();
  } else {
    $('nmS').textContent=$('algo').value.toUpperCase();
  }
}
function updateCounters(){
  if(raceMode){
    if(runners[0]){ $('cmpA').textContent=runners[0].cmp.toLocaleString(); $('swpA').textContent=runners[0].swaps.toLocaleString(); $('stA').textContent=runners[0].statusText(); }
    if(runners[1]){ $('cmpB').textContent=runners[1].cmp.toLocaleString(); $('swpB').textContent=runners[1].swaps.toLocaleString(); $('stB').textContent=runners[1].statusText(); }
  } else if(runners[0]){
    $('cmpS').textContent=runners[0].cmp.toLocaleString();
    $('swpS').textContent=runners[0].swaps.toLocaleString();
    $('nS').textContent=runners[0].arr.length;
    $('stS').textContent=runners[0].statusText();
  }
}
function redraw(){
  if(raceMode){ draw(cvA,runners[0]); draw(cvB,runners[1]); }
  else { draw(cvS,runners[0]); }
}

/* ---------- animation ---------- */
function loop(){
  rafId=requestAnimationFrame(loop);
  if(running && runners.length){
    var rate=(speed/100)*(2+size/4);
    opsAcc+=rate;
    var steps=Math.floor(opsAcc); opsAcc-=steps;
    for(var s=0;s<steps;s++){ frameCount++; for(var r=0;r<runners.length;r++) runners[r].step(frameCount); }
    var allDone=true;
    for(var q=0;q<runners.length;q++) if(runners[q].phase!=='done') allDone=false;
    if(allDone){ running=false; announceWinner(); }
  }
  redraw(); updateCounters();
}
function announceWinner(){
  if(raceMode && runners.length===2){
    var a=runners[0], b=runners[1];
    var msg;
    if(a.finishFrame>=0 && b.finishFrame>=0){
      if(a.finishFrame<b.finishFrame) msg='★ '+a.name.toUpperCase()+' WINS — '+a.ops.length.toLocaleString()+' vs '+b.ops.length.toLocaleString()+' ops';
      else if(b.finishFrame<a.finishFrame) msg='★ '+b.name.toUpperCase()+' WINS — '+b.ops.length.toLocaleString()+' vs '+a.ops.length.toLocaleString()+' ops';
      else msg='DEAD HEAT!';
    } else msg='done';
    $('winner').textContent=msg;
  } else if(runners[0]){
    $('winner').textContent='SORTED · '+runners[0].cmp.toLocaleString()+' comparisons, '+runners[0].swaps.toLocaleString()+' moves';
  }
}

/* ---------- sizing ---------- */
function resizeCanvas(){
  var setW=function(c){ if(!c) return; var w=c.clientWidth||c.parentElement.clientWidth; if(w>0) c.width=w; };
  if(raceMode){ setW(cvA); setW(cvB); } else { setW(cvS); }
  redraw();
}
window.addEventListener('resize',function(){ resizeCanvas(); });

/* ---------- controls ---------- */
$('size').addEventListener('input',function(){ size=+this.value; $('sizeV').textContent=size; genBase('shuffle'); showUnsorted(); save(); });
$('speed').addEventListener('input',function(){ speed=+this.value; $('speedV').textContent=speed; save(); });
$('algo').addEventListener('change',function(){ if(!running) showUnsorted(); save(); });
$('algoA').addEventListener('change',function(){ if(!running) showUnsorted(); save(); });
$('algoB').addEventListener('change',function(){ if(!running) showUnsorted(); save(); });
$('run').addEventListener('click',function(){ if(running){ running=false; showUnsorted(); this.textContent='▶ Run'; } else { startRun(); this.textContent='■ Stop'; } });
$('race').addEventListener('click',function(){
  raceMode=!raceMode; document.body.classList.toggle('raceon',raceMode);
  this.classList.toggle('on',raceMode);
  running=false; $('run').textContent='▶ Run';
  resizeCanvas(); showUnsorted(); save();
});
$('pShuffle').addEventListener('click',function(){ running=false; $('run').textContent='▶ Run'; genBase('shuffle'); showUnsorted(); });
$('pReverse').addEventListener('click',function(){ running=false; $('run').textContent='▶ Run'; genBase('reverse'); showUnsorted(); });
$('pNearly').addEventListener('click',function(){ running=false; $('run').textContent='▶ Run'; genBase('nearly'); showUnsorted(); });

/* reset Run button label when a run naturally finishes */
var _announce=announceWinner;
announceWinner=function(){ _announce(); $('run').textContent='▶ Run'; };

/* ---------- persistence ---------- */
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify({ size:size, speed:speed, race:raceMode, algo:$('algo').value, a:$('algoA').value, b:$('algoB').value })); }catch(e){} }
function load(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)||'null'); }catch(e){ return null; } }

/* ---------- init ---------- */
(function init(){
  var s=load();
  if(s){
    if(s.size){ size=Math.min(120,Math.max(8,s.size)); $('size').value=size; }
    if(s.speed){ speed=Math.min(100,Math.max(1,s.speed)); $('speed').value=speed; }
    if(s.algo) $('algo').value=s.algo;
    if(s.a) $('algoA').value=s.a;
    if(s.b) $('algoB').value=s.b;
    /* start in single mode for the auto-demo regardless of saved race */
  }
  $('sizeV').textContent=size; $('speedV').textContent=speed;
  genBase('shuffle');
  resizeCanvas();
  updateHeads();
  /* auto-run demo quicksort on load */
  raceMode=false; document.body.classList.remove('raceon');
  $('algo').value='quick'; updateHeads();
  startRun();
  $('run').textContent='■ Stop';
  rafId=requestAnimationFrame(loop);
})();
})();
</script>
</body>
</html>
