<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table to Markdown · Wizzed Arcade</title>
<style>
:root{
  --bg:#0f0f1a; --accent:#9d6bff; --soft:rgba(157,107,255,.4);
  --panel:#130f1e; --line:#3d2b66; --text:#e7ddff; --dim:#a48fd6; --warn:#ff6b6b; --ok:#00ff9c;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Courier New', ui-monospace, monospace;
  overflow-x:hidden; padding:10px 12px 40px;
}
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:linear-gradient(rgba(157,107,255,.03) 1px,transparent 1px),
             linear-gradient(90deg,rgba(157,107,255,.03) 1px,transparent 1px);
  background-size:30px 30px;
}
a.back{
  position:fixed; top:10px; left:12px; z-index:60;
  color:var(--dim); text-decoration:none; font-size:12px; letter-spacing:1px;
  border:1px solid var(--line); padding:3px 8px; background:rgba(15,15,26,.9);
}
a.back:hover{ color:var(--accent); border-color:var(--accent); text-shadow:0 0 8px var(--accent); }
header{ text-align:center; padding:4px 8px 2px; position:relative; z-index:1; }
h1{ display:inline-block; font-size:clamp(18px,3vw,26px); letter-spacing:4px; color:var(--accent);
  text-shadow:0 0 6px var(--accent), 0 0 26px var(--soft); }
header .sub{ font-size:10px; color:var(--dim); letter-spacing:2px; margin-top:2px; }
main{ max-width:1080px; margin:8px auto 0; position:relative; z-index:1; display:flex; flex-direction:column; gap:12px; }
.toolbar{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
button.btn{
  font-family:inherit; font-size:11px; letter-spacing:1px; cursor:pointer; text-transform:uppercase;
  color:var(--accent); background:#1a1230; border:2px solid var(--line); padding:7px 11px; box-shadow:0 3px 0 #0a0714;
}
button.btn:hover{ border-color:var(--accent); box-shadow:0 3px 0 #0a0714,0 0 12px var(--soft); }
button.btn:active{ transform:translateY(2px); box-shadow:0 1px 0 #0a0714; }
.seg{ display:inline-flex; border:2px solid var(--line); background:#1a1230; }
.seg button{ font-family:inherit; font-size:11px; letter-spacing:1px; cursor:pointer; color:var(--dim); background:transparent; border:none; padding:7px 12px; text-transform:uppercase; }
.seg button.on{ color:#120a24; background:var(--accent); text-shadow:none; box-shadow:0 0 12px var(--soft); }
.dsel{ display:inline-flex; align-items:center; gap:6px; font-size:10px; color:var(--dim); letter-spacing:1px; }
.dsel select{ font-family:inherit; font-size:11px; color:var(--accent); background:#1a1230; border:2px solid var(--line); padding:5px 7px; outline:none; }
.dsel select:focus{ border-color:var(--accent); }
.detect{ font-size:10px; color:var(--dim); letter-spacing:1px; margin-left:auto; }
.detect b{ color:var(--accent); }
.panel{
  background:var(--panel); border:2px solid var(--line);
  box-shadow:0 0 22px rgba(157,107,255,.07); padding:12px 14px;
}
.lbl{ font-size:10px; letter-spacing:3px; color:var(--dim); margin-bottom:8px; text-transform:uppercase; }
.lbl b{ color:var(--accent); font-weight:normal; text-shadow:0 0 6px var(--soft); }
textarea{
  width:100%; resize:vertical; min-height:120px; font-family:inherit; font-size:13px; line-height:1.5;
  color:var(--text); background:#0c0916; border:2px solid var(--line); padding:10px 12px; outline:none;
  white-space:pre; overflow:auto; tab-size:4;
}
textarea:focus{ border-color:var(--accent); box-shadow:0 0 12px var(--soft); }
textarea.out{ color:var(--accent); text-shadow:0 0 4px var(--soft); }
.aligns{ display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; }
.acol{ flex:0 0 auto; border:1px solid var(--line); background:#0c0916; padding:5px 7px; min-width:96px; }
.acol .nm{ font-size:10px; color:var(--dim); letter-spacing:.5px; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:130px; }
.acol .chips{ display:flex; gap:3px; }
.acol .chips button{ flex:1; font-family:inherit; font-size:11px; cursor:pointer; color:var(--dim); background:#150f26; border:1px solid var(--line); padding:3px 0; }
.acol .chips button.on{ color:#120a24; background:var(--accent); border-color:var(--accent); }
.grid2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media(max-width:820px){ .grid2{ grid-template-columns:1fr; } }
.previewWrap{ overflow-x:auto; }
table.pv{ border-collapse:collapse; font-size:12.5px; width:100%; }
table.pv th, table.pv td{ border:1px solid var(--line); padding:5px 9px; }
table.pv th{ background:#1a1230; color:var(--accent); letter-spacing:1px; }
table.pv tr:nth-child(even) td{ background:rgba(157,107,255,.05); }
.err{ font-size:11px; color:var(--warn); min-height:15px; margin-top:6px; letter-spacing:.3px; }
.err.good{ color:var(--ok); }
.priv{ text-align:center; font-size:10px; color:var(--dim); letter-spacing:1px; }
</style>
</head>
<body>
<a class="back" href="../index.html">← Arcade</a>
<header>
  <h1>TABLE → MARKDOWN</h1>
  <div class="sub">CSV / TSV / SPREADSHEET PASTE → GITHUB MARKDOWN · &amp; BACK</div>
</header>
<main>
  <div class="toolbar">
    <div class="seg" id="mode">
      <button data-m="t2m" class="on">Data → Markdown</button>
      <button data-m="m2c">Markdown → CSV</button>
    </div>
    <div class="dsel">Delimiter
      <select id="delim">
        <option value="auto">auto-detect</option>
        <option value=",">comma ,</option>
        <option value="\t">tab ⇥</option>
        <option value=";">semicolon ;</option>
        <option value="|">pipe |</option>
      </select>
    </div>
    <button class="btn" id="demoBtn">◆ Demo</button>
    <button class="btn" id="copyBtn">⧉ Copy out</button>
    <div class="detect" id="detect"></div>
  </div>

  <div class="panel">
    <div class="lbl"><span id="inLbl">Paste data</span> — <span style="color:var(--dim)">CSV, TSV or copied straight from a spreadsheet</span></div>
    <textarea id="input" spellcheck="false" aria-label="input"></textarea>
    <div class="err" id="inErr"></div>
  </div>

  <div class="panel" id="alignPanel">
    <div class="lbl">Column <b>alignment</b> — L / C / R per column</div>
    <div class="aligns" id="aligns"></div>
  </div>

  <div class="grid2">
    <div class="panel">
      <div class="lbl"><span id="outLbl">Markdown</span> <b>output</b></div>
      <textarea id="output" class="out" spellcheck="false" readonly aria-label="output"></textarea>
    </div>
    <div class="panel">
      <div class="lbl">Live <b>preview</b></div>
      <div class="previewWrap"><table class="pv" id="preview"></table></div>
    </div>
  </div>
  <div class="priv">100% local — parsing and formatting happen entirely in your browser.</div>
</main>

<script>
"use strict";
var $=function(id){return document.getElementById(id);};
var state={ mode:'t2m', aligns:[] };

/* ---------- delimited parsing (quoted-aware) ---------- */
function parseDelimited(text, delim){
  var rows=[], row=[], field='', i=0, n=text.length, inQ=false;
  if(text.charCodeAt(0)===0xFEFF){ text=text.slice(1); n=text.length; }
  while(i<n){
    var ch=text[i];
    if(inQ){
      if(ch==='"'){ if(text[i+1]==='"'){ field+='"'; i+=2; continue; } inQ=false; i++; continue; }
      field+=ch; i++; continue;
    }
    if(ch==='"'){ inQ=true; i++; continue; }
    if(ch===delim){ row.push(field); field=''; i++; continue; }
    if(ch==='\r'){ if(text[i+1]==='\n') i++; row.push(field); field=''; rows.push(row); row=[]; i++; continue; }
    if(ch==='\n'){ row.push(field); field=''; rows.push(row); row=[]; i++; continue; }
    field+=ch; i++;
  }
  if(field!=='' || row.length>0){ row.push(field); rows.push(row); }
  // drop trailing empty rows
  while(rows.length>1 && rows[rows.length-1].length===1 && rows[rows.length-1][0].trim()===''){ rows.pop(); }
  return rows;
}
function detectDelim(text){
  var firstLine=text.split(/\r?\n/)[0]||'';
  var cands=[['\t','tab'],[',','comma'],[';','semicolon'],['|','pipe']];
  var best=',', bestName='comma', bestCount=-1;
  for(var k=0;k<cands.length;k++){
    var d=cands[k][0];
    var count=firstLine.split(d).length-1;
    // tab gets priority when present (spreadsheet paste)
    if(count>bestCount){ bestCount=count; best=d; bestName=cands[k][1]; }
  }
  if(bestCount<=0){ return {delim:',', name:'comma (single column)'}; }
  return {delim:best, name:bestName};
}

/* ---------- build markdown ---------- */
function padCell(s, w, align){
  var gap=w-s.length; if(gap<0) gap=0;
  if(align==='right') return ' '.repeat(gap)+s;
  if(align==='center'){ var l=Math.floor(gap/2), r=gap-l; return ' '.repeat(l)+s+' '.repeat(r); }
  return s+' '.repeat(gap);
}
function sepFor(w, align){
  w=Math.max(w,3);
  if(align==='right') return '-'.repeat(w-1)+':';
  if(align==='center') return ':'+'-'.repeat(w-2)+':';
  if(align==='left') return ':'+'-'.repeat(w-1);
  return '-'.repeat(w);
}
function escCell(s){ return String(s).replace(/\|/g,'\\|').replace(/\r?\n/g,' '); }
function buildMarkdown(rows, aligns){
  if(rows.length===0) return '';
  var ncol=0; rows.forEach(function(r){ ncol=Math.max(ncol,r.length); });
  var grid=rows.map(function(r){ var o=[]; for(var c=0;c<ncol;c++) o.push(escCell(r[c]!==undefined?r[c]:'')); return o; });
  var header=grid[0], body=grid.slice(1);
  var widths=[];
  for(var c=0;c<ncol;c++){
    var w=header[c].length;
    for(var r=0;r<body.length;r++) w=Math.max(w, body[r][c].length);
    widths[c]=Math.max(w,3);
  }
  var lines=[];
  lines.push('| '+header.map(function(h,c){ return padCell(h,widths[c],aligns[c]); }).join(' | ')+' |');
  lines.push('| '+widths.map(function(w,c){ return sepFor(w,aligns[c]); }).join(' | ')+' |');
  for(var b=0;b<body.length;b++){
    lines.push('| '+body[b].map(function(v,c){ return padCell(v,widths[c],aligns[c]); }).join(' | ')+' |');
  }
  return lines.join('\n');
}

/* ---------- parse markdown -> rows ---------- */
function splitMdRow(line){
  line=line.trim().replace(/^\|/,'').replace(/\|$/,'');
  var cells=[], cur='', i=0;
  while(i<line.length){
    var ch=line[i];
    if(ch==='\\' && line[i+1]==='|'){ cur+='|'; i+=2; continue; }
    if(ch==='|'){ cells.push(cur.trim()); cur=''; i++; continue; }
    cur+=ch; i++;
  }
  cells.push(cur.trim());
  return cells;
}
function isSepRow(cells){ return cells.length>0 && cells.every(function(c){ return /^:?-{1,}:?$/.test(c.replace(/\s/g,'')); }); }
function alignFromSep(cell){
  cell=cell.replace(/\s/g,''); var l=cell.charAt(0)===':', r=cell.charAt(cell.length-1)===':';
  if(l&&r) return 'center'; if(r) return 'right'; if(l) return 'left'; return 'none';
}
function parseMarkdownTable(text){
  var lines=text.split(/\r?\n/).filter(function(l){ return l.trim()!==''; });
  var rows=[], aligns=null;
  for(var i=0;i<lines.length;i++){
    if(!/\|/.test(lines[i])) continue;
    var cells=splitMdRow(lines[i]);
    if(isSepRow(cells)){ aligns=cells.map(alignFromSep); continue; }
    rows.push(cells);
  }
  return {rows:rows, aligns:aligns};
}

/* ---------- CSV out ---------- */
function toCsv(rows){
  return rows.map(function(r){ return r.map(function(v){ var s=String(v); return /[",\r\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(','); }).join('\r\n');
}

/* ---------- alignment chips ---------- */
function renderAligns(header){
  var wrap=$('aligns');
  wrap.innerHTML=header.map(function(h,c){
    var a=state.aligns[c]||'left';
    function chip(v,lab){ return '<button data-c="'+c+'" data-a="'+v+'" class="'+(a===v?'on':'')+'">'+lab+'</button>'; }
    return '<div class="acol"><div class="nm" title="'+escAttr(h)+'">'+(escAttr(h)||'col '+(c+1))+'</div><div class="chips">'+chip('left','L')+chip('center','C')+chip('right','R')+'</div></div>';
  }).join('');
  wrap.querySelectorAll('button').forEach(function(b){
    b.addEventListener('click', function(){ state.aligns[+b.dataset.c]=b.dataset.a; update(); });
  });
}
function escAttr(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

/* ---------- preview ---------- */
function renderPreview(rows, aligns){
  if(rows.length===0){ $('preview').innerHTML=''; return; }
  var ncol=0; rows.forEach(function(r){ ncol=Math.max(ncol,r.length); });
  var head=rows[0], body=rows.slice(1);
  function align(c){ var a=aligns[c]||'left'; return a==='none'?'left':a; }
  var html='<thead><tr>';
  for(var c=0;c<ncol;c++) html+='<th style="text-align:'+align(c)+'">'+escAttr(head[c]!==undefined?head[c]:'')+'</th>';
  html+='</tr></thead><tbody>';
  for(var r=0;r<body.length;r++){
    html+='<tr>';
    for(var c2=0;c2<ncol;c2++) html+='<td style="text-align:'+align(c2)+'">'+escAttr(body[r][c2]!==undefined?body[r][c2]:'')+'</td>';
    html+='</tr>';
  }
  html+='</tbody>';
  $('preview').innerHTML=html;
}

/* ---------- main update ---------- */
function currentDelim(text){
  var sel=$('delim').value;
  if(sel==='auto'){ var d=detectDelim(text); $('detect').innerHTML='detected: <b>'+d.name+'</b>'; return d.delim; }
  var map={',':',',';':';','|':'|','\\t':'\t'}; var d2=map[sel]||',';
  $('detect').innerHTML='delimiter: <b>'+(sel==='\\t'?'tab':sel)+'</b>';
  return d2;
}
function update(){
  var text=$('input').value;
  if(state.mode==='t2m'){
    if(text.trim()===''){ $('output').value=''; $('preview').innerHTML=''; $('aligns').innerHTML=''; setErr('inErr','',''); return; }
    var delim=currentDelim(text);
    var rows=parseDelimited(text, delim);
    var ncol=0; rows.forEach(function(r){ ncol=Math.max(ncol,r.length); });
    // size aligns
    while(state.aligns.length<ncol) state.aligns.push('left');
    state.aligns.length=ncol;
    renderAligns(rows[0]||[]);
    var md=buildMarkdown(rows, state.aligns);
    $('output').value=md;
    renderPreview(rows, state.aligns);
    setErr('inErr','good','✓ '+ (rows.length-1) +' row'+((rows.length-1)===1?'':'s')+' × '+ncol+' column'+(ncol===1?'':'s'));
  } else {
    if(text.trim()===''){ $('output').value=''; $('preview').innerHTML=''; $('aligns').innerHTML=''; setErr('inErr','',''); return; }
    var parsed=parseMarkdownTable(text);
    if(parsed.rows.length===0){ setErr('inErr','bad','✕ no markdown table rows found (need | separated cells).'); $('output').value=''; $('preview').innerHTML=''; return; }
    if(parsed.aligns){ state.aligns=parsed.aligns.slice(); }
    renderAligns(parsed.rows[0]||[]);
    $('output').value=toCsv(parsed.rows);
    renderPreview(parsed.rows, parsed.aligns||[]);
    setErr('inErr','good','✓ parsed '+(parsed.rows.length-1)+' data row'+((parsed.rows.length-1)===1?'':'s'));
  }
  $('detect').style.display = state.mode==='t2m' ? '' : 'none';
  persist();
}
function setErr(id,cls,msg){ var el=$(id); el.className='err '+cls; el.textContent=msg; }
function persist(){ try{ localStorage.setItem('wizzed-table-markdown', JSON.stringify({mode:state.mode, delim:$('delim').value, input:$('input').value, aligns:state.aligns})); }catch(e){} }

/* ---------- demo ---------- */
var DEMO_TSV="Language\tReleased\tParadigm\tStars\nJavaScript\t1995\tMulti-paradigm\t98000\nPython\t1991\tObject-oriented\t112000\nRust\t2010\tSystems\t89000\nGo\t2009\tConcurrent\t76000";
var DEMO_MD="| Planet  | Moons | Day (hrs) |\n| :------ | :---: | --------: |\n| Mercury | 0     | 1408      |\n| Earth   | 1     | 24        |\n| Jupiter | 95    | 10        |";
function loadDemo(){
  if(state.mode==='t2m'){ $('delim').value='auto'; state.aligns=['left','left','left','right']; $('input').value=DEMO_TSV; }
  else { state.aligns=[]; $('input').value=DEMO_MD; }
  update();
}

/* ---------- wire ---------- */
$('mode').querySelectorAll('button').forEach(function(b){
  b.addEventListener('click', function(){
    if(state.mode===b.dataset.m) return;
    state.mode=b.dataset.m;
    $('mode').querySelectorAll('button').forEach(function(x){ x.classList.toggle('on', x===b); });
    $('inLbl').textContent = state.mode==='t2m'?'Paste data':'Paste Markdown table';
    $('outLbl').textContent = state.mode==='t2m'?'Markdown':'CSV';
    $('alignPanel').style.display = '';
    state.aligns=[];
    loadDemo();
  });
});
$('input').addEventListener('input', update);
$('delim').addEventListener('change', update);
$('demoBtn').addEventListener('click', loadDemo);
$('copyBtn').addEventListener('click', function(){
  var t=$('output').value;
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(t).catch(function(){});
  else { $('output').removeAttribute('readonly'); $('output').select(); try{document.execCommand('copy');}catch(e){} $('output').setAttribute('readonly','readonly'); }
  var b=$('copyBtn'), o=b.textContent; b.textContent='✓ Copied'; setTimeout(function(){ b.textContent=o; },1000);
});

/* ---------- init ---------- */
(function init(){
  var restored=false;
  try{
    var raw=localStorage.getItem('wizzed-table-markdown');
    if(raw){ var s=JSON.parse(raw);
      if(s && typeof s.input==='string' && s.input.trim()){
        state.mode=s.mode==='m2c'?'m2c':'t2m';
        state.aligns=Array.isArray(s.aligns)?s.aligns:[];
        $('delim').value=s.delim||'auto';
        $('input').value=s.input;
        $('mode').querySelectorAll('button').forEach(function(x){ x.classList.toggle('on', x.dataset.m===state.mode); });
        $('inLbl').textContent = state.mode==='t2m'?'Paste data':'Paste Markdown table';
        $('outLbl').textContent = state.mode==='t2m'?'Markdown':'CSV';
        restored=true;
      }
    }
  }catch(e){}
  if(restored) update(); else loadDemo();
})();
</script>
</body>
</html>
