<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Picker · Wizzed Arcade</title>
<style>
:root{
  --bg:#0f0f1a; --accent:#ff4fd8; --soft:rgba(255,79,216,.4);
  --panel:#1a0c18; --line:#5a1f52; --text:#ffe6fb; --dim:#c07fb4;
  --cap:#ffd23f; --capsoft:rgba(255,210,63,.45);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Courier New', ui-monospace, monospace;
  overflow-x:hidden; padding:8px 12px 48px;
}
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:linear-gradient(rgba(255,79,216,.035) 1px,transparent 1px),
             linear-gradient(90deg,rgba(255,79,216,.035) 1px,transparent 1px);
  background-size:28px 28px;
}
a.back{
  position:fixed; top:10px; left:12px; z-index:60;
  color:var(--dim); text-decoration:none; font-size:12px; letter-spacing:1px;
  border:1px solid var(--line); padding:3px 8px; background:rgba(15,15,26,.9);
}
a.back:hover{ color:var(--accent); border-color:var(--accent); text-shadow:0 0 8px var(--accent); }
header{ text-align:center; padding:6px 8px 2px; position:relative; z-index:1; }
h1{
  display:inline-block; font-size:clamp(17px,3vw,24px); letter-spacing:5px; color:var(--accent);
  text-shadow:0 0 6px var(--accent), 0 0 26px var(--soft);
}
header .sub{ font-size:10px; color:var(--dim); letter-spacing:2px; margin-top:2px; }
main{ max-width:980px; margin:8px auto 0; position:relative; z-index:1; display:flex; flex-direction:column; gap:12px; }
#top{ display:flex; flex-wrap:wrap; gap:12px; align-items:stretch; }
.panel{
  background:var(--panel); border:2px solid var(--line);
  box-shadow:0 0 22px rgba(255,79,216,.10), inset 0 1px 0 rgba(255,255,255,.04);
  padding:12px 14px;
}
#rosterPanel{ flex:1 1 260px; min-width:250px; display:flex; flex-direction:column; gap:9px; }
h2.sec{ font-size:10px; letter-spacing:3px; color:var(--dim); margin-bottom:2px; }
h2.sec b{ color:var(--accent); font-weight:normal; text-shadow:0 0 6px var(--soft); }
#roster{
  width:100%; min-height:190px; resize:vertical; font-family:inherit; font-size:13px; line-height:1.5;
  color:var(--text); background:#0a0610; border:2px solid var(--line); padding:9px 10px;
  outline:none; box-shadow:inset 0 2px 10px rgba(0,0,0,.6);
}
#roster:focus{ border-color:var(--accent); box-shadow:inset 0 2px 10px rgba(0,0,0,.6), 0 0 12px var(--soft); }
#count{ font-size:11px; color:var(--dim); letter-spacing:1px; }
#count b{ color:var(--accent); }
#opts{ flex:1 1 260px; min-width:250px; display:flex; flex-direction:column; gap:12px; }
.field{ display:flex; flex-direction:column; gap:5px; }
.field > label{ font-size:9px; letter-spacing:1.5px; color:var(--dim); }
.seg{ display:flex; flex-wrap:wrap; gap:4px; }
.seg button{
  font-family:inherit; font-size:13px; font-weight:bold; color:var(--dim);
  background:#0a0610; border:2px solid var(--line); padding:7px 0; cursor:pointer; flex:1 1 0; min-width:34px;
}
.seg button.on{ color:var(--bg); background:var(--accent); border-color:var(--accent); box-shadow:0 0 12px var(--soft); text-shadow:none; }
.toggle{ display:flex; align-items:center; gap:9px; cursor:pointer; font-size:12px; letter-spacing:.5px; color:var(--text); }
.toggle input{ position:absolute; opacity:0; pointer-events:none; }
.tk{ width:40px; height:22px; border:2px solid var(--line); background:#0a0610; position:relative; flex:0 0 auto; transition:.2s; }
.tk::after{ content:''; position:absolute; top:2px; left:2px; width:14px; height:14px; background:var(--dim); transition:.2s; }
.toggle input:checked + .tk{ border-color:var(--accent); box-shadow:0 0 10px var(--soft); }
.toggle input:checked + .tk::after{ left:20px; background:var(--accent); box-shadow:0 0 8px var(--soft); }
.toggle input:focus-visible + .tk{ outline:2px solid var(--accent); outline-offset:2px; }
#shuffleBtn{
  font-family:inherit; font-size:16px; font-weight:bold; letter-spacing:3px; color:var(--bg);
  background:var(--accent); border:none; padding:13px; cursor:pointer; margin-top:auto;
  box-shadow:0 0 22px var(--soft); text-shadow:none;
}
#shuffleBtn:hover{ filter:brightness(1.12); }
#shuffleBtn:active{ transform:translateY(1px); }
#shuffleBtn:disabled{ opacity:.4; cursor:not-allowed; box-shadow:none; }
#meta{ display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
#shuffleLbl{ font-size:11px; color:var(--dim); letter-spacing:1px; }
#shuffleLbl b{ color:var(--accent); text-shadow:0 0 6px var(--soft); }
#miniBtns{ display:flex; gap:6px; }
#miniBtns button{
  font-family:inherit; font-size:10px; letter-spacing:1px; color:var(--accent);
  background:#0a0610; border:2px solid var(--line); padding:6px 11px; cursor:pointer;
}
#miniBtns button:hover{ border-color:var(--accent); box-shadow:0 0 10px var(--soft); }
#miniBtns button.copied{ color:var(--cap); border-color:var(--cap); }
#teams{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; }
.team{
  border:2px solid var(--line); background:#0a0610; padding:0 0 8px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03); min-height:80px;
  --tc:var(--accent);
}
.team .th{
  padding:8px 10px; font-size:12px; font-weight:bold; letter-spacing:1px; color:var(--bg);
  background:var(--tc); text-shadow:none; display:flex; justify-content:space-between; align-items:center;
}
.team .th .sz{ font-size:10px; opacity:.8; }
.team ul{ list-style:none; padding:6px 8px 0; display:flex; flex-direction:column; gap:5px; }
.team li{
  font-size:13px; letter-spacing:.5px; color:var(--text); padding:5px 8px;
  border:1px solid rgba(255,255,255,.06); background:rgba(255,255,255,.02);
  opacity:0; transform:translate(var(--fx,0),var(--fy,-24px)) scale(.7);
  animation:fly .5s cubic-bezier(.2,1.3,.5,1) forwards;
}
.team li.cap{ border-color:var(--cap); color:var(--cap); box-shadow:0 0 10px var(--capsoft); background:rgba(255,210,63,.06); }
.team li .badge{ font-size:9px; letter-spacing:1px; color:var(--cap); margin-left:6px; }
@keyframes fly{ to{ opacity:1; transform:translate(0,0) scale(1); } }
.empty{ padding:22px 10px; text-align:center; color:var(--dim); font-size:12px; letter-spacing:1px; }
.note{ font-size:10px; color:var(--dim); letter-spacing:1px; text-align:center; margin-top:2px; opacity:.8; }
</style>
</head>
<body>
<a class="back" href="../index.html">← Arcade</a>
<header>
  <h1>TEAM PICKER</h1>
  <div class="sub">FAIR SPLITS · CAPTAINS · FUN NAMES · ANIMATED SHUFFLE</div>
</header>
<main>
  <div id="top">
    <section class="panel" id="rosterPanel">
      <h2 class="sec">ROSTER — <b>ONE NAME PER LINE</b></h2>
      <textarea id="roster" spellcheck="false" autocomplete="off"></textarea>
      <div id="count"></div>
    </section>
    <section class="panel" id="opts">
      <div class="field">
        <label>NUMBER OF TEAMS</label>
        <div class="seg" id="teamSeg"></div>
      </div>
      <label class="toggle"><input type="checkbox" id="optCaptains"><span class="tk"></span>CAPTAINS MODE (highlight first pick)</label>
      <label class="toggle"><input type="checkbox" id="optNames" checked><span class="tk"></span>FUN TEAM NAMES</label>
      <button id="shuffleBtn">⚡ SHUFFLE</button>
    </section>
  </div>

  <section class="panel">
    <div id="meta">
      <div id="shuffleLbl"></div>
      <div id="miniBtns">
        <button id="copyBtn">COPY TEXT</button>
        <button id="reshuffleBtn">RE-SHUFFLE</button>
      </div>
    </div>
    <div id="teams"></div>
    <div class="note">Runs entirely in your browser · roster is saved locally on this device.</div>
  </section>
</main>
<script>
(function(){
'use strict';
var LS_KEY='wizzed-team-picker';
var $=function(id){ return document.getElementById(id); };

var DEMO=['Alex','Bailey','Casey','Dana','Eli','Fatima','Gabe','Harper','Ivy','Jordan','Kai','Luna','Mateo','Nadia','Omar','Priya'];
var ADJ=['Neon','Cyber','Turbo','Cosmic','Electric','Savage','Mega','Glitch','Radical','Quantum','Atomic','Velvet','Blazing','Frostbite','Rogue','Hyper'];
var NOUN=['Narwhals','Cheetahs','Toucans','Vipers','Raptors','Pandas','Dragons','Foxes','Wombats','Otters','Falcons','Krakens','Yetis','Gators','Mantas','Bison'];
var COLORS=['#ff4fd8','#19e3ff','#5dff9e','#ffd23f','#ff8a3d','#a97bff','#ff5d73','#3dd6ff'];

var state={ roster:DEMO.join('\n'), teams:4, captains:false, names:true };
try{
  var raw=localStorage.getItem(LS_KEY);
  if(raw){ var s=JSON.parse(raw); if(s&&typeof s==='object'){
    if(typeof s.roster==='string') state.roster=s.roster;
    if(s.teams>=2&&s.teams<=8) state.teams=s.teams|0;
    state.captains=!!s.captains; state.names=s.names!==false;
  }}
}catch(e){}
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){} }

$('roster').value=state.roster;
$('optCaptains').checked=state.captains;
$('optNames').checked=state.names;

/* team-count segmented control */
var seg=$('teamSeg');
for(var n=2;n<=8;n++){
  var b=document.createElement('button'); b.textContent=n; b.setAttribute('data-n',n);
  seg.appendChild(b);
}
function paintSeg(){ [].forEach.call(seg.children,function(b){ b.classList.toggle('on', +b.getAttribute('data-n')===state.teams); }); }
seg.addEventListener('click',function(e){
  var b=e.target.closest('button'); if(!b) return;
  state.teams=+b.getAttribute('data-n'); paintSeg(); save(); shuffle();
});
paintSeg();

function names(){
  return $('roster').value.split('\n').map(function(s){ return s.trim(); }).filter(function(s){ return s.length>0; });
}
function updateCount(){
  var arr=names(), t=state.teams;
  var per=arr.length? Math.floor(arr.length/t) : 0;
  var extra=arr.length? arr.length%t : 0;
  var sizeStr = extra===0 ? (per+' each') : (per+'–'+(per+1)+' each');
  $('count').innerHTML='<b>'+arr.length+'</b> players → '+t+' teams ('+ (arr.length? sizeStr : '—') +')';
  $('shuffleBtn').disabled=arr.length<t;
  if(arr.length<t && arr.length>0){ $('count').innerHTML+=' · need ≥'+t+' names'; }
}

/* seeded PRNG so re-shuffles differ + history avoids exact repeats */
var seed=(Math.random()*1e9)|0;
function rng(){ seed=(seed*1664525+1013904223)&0x7fffffff; return seed/0x7fffffff; }
function shuffleArr(a){
  a=a.slice();
  for(var i=a.length-1;i>0;i--){ var j=(rng()*(i+1))|0; var t=a[i]; a[i]=a[j]; a[j]=t; }
  return a;
}
var shuffleNum=0;
var lastSig='';

function makeTeamNames(t){
  if(!state.names){ var g=[]; for(var i=0;i<t;i++) g.push('Team '+(i+1)); return g; }
  var adj=shuffleArr(ADJ), noun=shuffleArr(NOUN), out=[];
  for(var i=0;i<t;i++) out.push(adj[i%adj.length]+' '+noun[i%noun.length]);
  return out;
}

var current=null; // {teamNames, teams:[[names]]}
function computeSplit(){
  var arr=names(), t=state.teams;
  if(arr.length<t) return null;
  var shuffled, tn, sig, tries=0;
  do{
    shuffled=shuffleArr(arr);
    tn=makeTeamNames(t);
    var teams=[]; for(var i=0;i<t;i++) teams.push([]);
    shuffled.forEach(function(nm,i){ teams[i%t].push(nm); }); // round-robin => balanced
    sig=teams.map(function(g){ return g.join(','); }).join('|');
    tries++;
    if(sig!==lastSig || tries>6){ lastSig=sig; return {teamNames:tn, teams:teams}; }
  } while(true);
}

function render(animate){
  var wrap=$('teams');
  if(!current){
    wrap.innerHTML='<div class="empty">Add at least '+state.teams+' names, then hit SHUFFLE.</div>';
    $('shuffleLbl').textContent='';
    return;
  }
  wrap.innerHTML='';
  var total=current.teams.reduce(function(a,g){ return a+g.length; },0);
  current.teams.forEach(function(group,ti){
    var d=document.createElement('div'); d.className='team';
    d.style.setProperty('--tc', COLORS[ti%COLORS.length]);
    var head='<div class="th"><span>'+esc(current.teamNames[ti])+'</span><span class="sz">'+group.length+'</span></div>';
    var lis=group.map(function(nm,pi){
      var cap=state.captains&&pi===0;
      var delay=animate?((ti*70)+(pi*70)):0;
      var fx=animate?((rng()*160-80)|0)+'px':'0';
      var fy=animate?(-30-((rng()*40)|0))+'px':'0';
      return '<li class="'+(cap?'cap':'')+'" style="animation-delay:'+delay+'ms;--fx:'+fx+';--fy:'+fy+'">'+
        (cap?'👑 ':'')+esc(nm)+(cap?'<span class="badge">CAPTAIN</span>':'')+'</li>';
    }).join('');
    d.innerHTML=head+'<ul>'+lis+'</ul>';
    wrap.appendChild(d);
  });
  $('shuffleLbl').innerHTML='Shuffle <b>#'+shuffleNum+'</b> · '+total+' players in '+current.teams.length+' teams';
}

function shuffle(){
  updateCount();
  var split=computeSplit();
  if(!split){ current=null; render(false); return; }
  current=split; shuffleNum++;
  render(true);
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toText(){
  if(!current) return '';
  return current.teams.map(function(g,ti){
    var lines=g.map(function(nm,pi){ return (state.captains&&pi===0?'(C) ':'    ')+nm; });
    return current.teamNames[ti]+' ('+g.length+')\n'+lines.join('\n');
  }).join('\n\n');
}

$('copyBtn').addEventListener('click',function(){
  var txt=toText(); if(!txt) return;
  var done=function(){ var b=$('copyBtn'); b.classList.add('copied'); b.textContent='COPIED ✓';
    setTimeout(function(){ b.classList.remove('copied'); b.textContent='COPY TEXT'; },1400); };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done,function(){ fallbackCopy(txt); done(); });
  } else { fallbackCopy(txt); done(); }
});
function fallbackCopy(txt){
  var ta=document.createElement('textarea'); ta.value=txt;
  ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta);
  ta.select(); try{ document.execCommand('copy'); }catch(e){} document.body.removeChild(ta);
}

$('shuffleBtn').addEventListener('click',shuffle);
$('reshuffleBtn').addEventListener('click',shuffle);
$('roster').addEventListener('input',function(){ state.roster=$('roster').value; updateCount(); save(); });
$('optCaptains').addEventListener('change',function(){ state.captains=$('optCaptains').checked; save(); if(current) render(false); });
$('optNames').addEventListener('change',function(){ state.names=$('optNames').checked; save(); shuffle(); });

updateCount();
shuffle();
})();
</script>
</body>
</html>
