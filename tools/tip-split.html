<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tip &amp; Split · Wizzed Arcade</title>
<style>
:root{
  --bg:#0f0f1a; --accent:#ffd54a; --soft:rgba(255,213,74,.45);
  --panel:#1c1a14; --line:#4e452b; --text:#fff8e6; --dim:#b3a87f;
  --green:#3ddc84;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Courier New', ui-monospace, monospace;
  overflow-x:hidden; padding:8px 12px 40px;
}
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:linear-gradient(rgba(255,213,74,.035) 1px,transparent 1px),
             linear-gradient(90deg,rgba(255,213,74,.035) 1px,transparent 1px);
  background-size:28px 28px;
}
a.back{
  position:fixed; top:10px; left:12px; z-index:60;
  color:var(--dim); text-decoration:none; font-size:12px; letter-spacing:1px;
  border:1px solid var(--line); padding:3px 8px; background:rgba(15,15,26,.9);
}
a.back:hover{ color:var(--accent); border-color:var(--accent); text-shadow:0 0 8px var(--accent); }
header{ text-align:center; padding:6px 8px 2px; position:relative; z-index:1; }
h1{
  display:inline-block; font-size:clamp(17px,3vw,24px); letter-spacing:5px; color:var(--accent);
  text-shadow:0 0 6px var(--accent), 0 0 26px var(--soft);
}
header .sub{ font-size:10px; color:var(--dim); letter-spacing:2px; margin-top:2px; }
main{
  max-width:820px; margin:8px auto 0; position:relative; z-index:1;
  display:flex; flex-wrap:wrap; gap:14px; align-items:stretch; justify-content:center;
}
.panel{
  background:var(--panel); border:2px solid var(--line);
  box-shadow:0 0 22px rgba(255,213,74,.10), inset 0 1px 0 rgba(255,255,255,.05);
  padding:14px;
}
#controls{ flex:1 1 320px; min-width:280px; display:flex; flex-direction:column; gap:13px; }
.field label{ font-size:10px; letter-spacing:2px; color:var(--dim); display:block; margin-bottom:5px; }
#bill{
  width:100%; font-family:inherit; font-size:24px; font-weight:bold;
  color:var(--accent); background:#0a0c16; border:2px solid var(--line);
  padding:9px 12px; text-align:right; outline:none;
  text-shadow:0 0 8px var(--soft);
  box-shadow:inset 0 2px 8px rgba(0,0,0,.6);
}
#bill:focus{ border-color:var(--accent); box-shadow:inset 0 2px 8px rgba(0,0,0,.6), 0 0 12px var(--soft); }
#bill.bad{ color:#ff6b6b; text-shadow:none; }
#tipRow{ display:flex; align-items:center; gap:10px; }
#tipPct{
  font-size:19px; font-weight:bold; color:var(--accent); min-width:62px; text-align:right;
  text-shadow:0 0 8px var(--soft);
}
input[type=range]{
  -webkit-appearance:none; appearance:none; flex:1; height:8px; outline:none; cursor:pointer;
  background:linear-gradient(90deg,var(--accent) var(--fill,60%),#2a2716 var(--fill,60%));
  border:1px solid var(--line);
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none; appearance:none; width:20px; height:20px;
  background:var(--accent); border:2px solid #0a0c16;
  box-shadow:0 0 12px var(--soft); cursor:pointer;
}
input[type=range]::-moz-range-thumb{
  width:18px; height:18px; border-radius:0;
  background:var(--accent); border:2px solid #0a0c16;
  box-shadow:0 0 12px var(--soft); cursor:pointer;
}
#presets{ display:flex; gap:6px; flex-wrap:wrap; }
#presets button{
  flex:1 1 auto; font-family:inherit; font-size:10.5px; letter-spacing:1px; cursor:pointer;
  color:var(--dim); background:#0a0c16; border:2px solid var(--line); padding:6px 4px;
}
#presets button:hover{ border-color:var(--accent); color:var(--text); }
#presets button.on{
  color:#1a1400; background:var(--accent); border-color:var(--accent); font-weight:bold;
  box-shadow:0 0 12px var(--soft);
}
#party{ display:flex; align-items:center; gap:10px; }
#party button{
  font-family:inherit; font-size:20px; font-weight:bold; cursor:pointer; line-height:1;
  color:var(--accent); background:#0a0c16; border:2px solid var(--line);
  width:42px; height:42px; box-shadow:0 3px 0 #05060c;
}
#party button:hover{ border-color:var(--accent); }
#party button:active{ transform:translateY(2px); box-shadow:0 1px 0 #05060c; }
#partyN{ font-size:24px; font-weight:bold; color:var(--accent); min-width:70px; text-align:center; text-shadow:0 0 8px var(--soft); }
#partyN small{ display:block; font-size:9px; color:var(--dim); letter-spacing:2px; font-weight:normal; }
#modes{ display:flex; gap:0; border:2px solid var(--line); }
#modes button{
  flex:1; font-family:inherit; font-size:9.5px; letter-spacing:1px; cursor:pointer;
  color:var(--dim); background:#0a0c16; border:0; padding:8px 2px;
}
#modes button.on{ color:#1a1400; background:var(--accent); font-weight:bold; box-shadow:0 0 12px var(--soft); }
#results{ flex:1 1 300px; min-width:270px; display:flex; flex-direction:column; gap:10px; }
.line{ display:flex; justify-content:space-between; align-items:baseline; gap:8px; font-size:13px; color:var(--dim); letter-spacing:1px; }
.line .v{ font-size:17px; color:var(--text); font-weight:bold; }
#perLine{
  border:2px solid var(--accent); background:#0a0c16; padding:12px; text-align:center;
  box-shadow:0 0 18px rgba(255,213,74,.25), inset 0 0 20px rgba(255,213,74,.05);
}
#perLine .lbl{ font-size:10px; letter-spacing:3px; color:var(--dim); }
#perVal{
  font-size:clamp(28px,5vw,38px); font-weight:bold; color:var(--accent);
  text-shadow:0 0 10px var(--soft), 0 0 34px var(--soft); line-height:1.15;
}
#diffLine{ font-size:11px; color:var(--green); letter-spacing:1px; text-align:center; min-height:14px; text-shadow:0 0 6px rgba(61,220,132,.4); }
#effLine{ font-size:11px; color:var(--dim); letter-spacing:1px; text-align:center; }
hr.dash{ border:0; border-top:1px dashed var(--line); }
</style>
</head>
<body>
<a class="back" href="../index.html">← Arcade</a>
<header>
  <h1>TIP &amp; SPLIT</h1>
  <div class="sub">SLIDE THE TIP · SPLIT THE DAMAGE · ROUND IT NICE</div>
</header>
<main>
  <section class="panel" id="controls">
    <div class="field">
      <label for="bill">BILL AMOUNT ($)</label>
      <input id="bill" type="text" inputmode="decimal" value="84.50" autocomplete="off" spellcheck="false">
    </div>
    <div class="field">
      <label for="tip">TIP</label>
      <div id="tipRow">
        <input id="tip" type="range" min="0" max="30" step="1" value="18">
        <span id="tipPct">18%</span>
      </div>
    </div>
    <div id="presets">
      <button type="button" data-tip="10">OK · 10</button>
      <button type="button" data-tip="15">GOOD · 15</button>
      <button type="button" data-tip="20">GREAT · 20</button>
      <button type="button" data-tip="25">WOW · 25</button>
    </div>
    <div class="field">
      <label>PARTY SIZE</label>
      <div id="party">
        <button type="button" id="minus" aria-label="fewer people">−</button>
        <span id="partyN">4<small>PEOPLE</small></span>
        <button type="button" id="plus" aria-label="more people">+</button>
      </div>
    </div>
    <div class="field">
      <label>PER-PERSON ROUNDING</label>
      <div id="modes">
        <button type="button" data-mode="exact" class="on">EXACT</button>
        <button type="button" data-mode="up">ROUND UP /PERSON</button>
        <button type="button" data-mode="total">ROUND TOTAL</button>
      </div>
    </div>
  </section>
  <section class="panel" id="results">
    <div class="line"><span>BILL</span><span class="v" id="rBill">—</span></div>
    <div class="line"><span>TIP <span id="rTipPct"></span></span><span class="v" id="rTip">—</span></div>
    <hr class="dash">
    <div class="line"><span>TOTAL</span><span class="v" id="rTotal">—</span></div>
    <div class="line"><span>TIP / PERSON</span><span class="v" id="rTipPer">—</span></div>
    <div id="perLine">
      <div class="lbl">EACH PERSON PAYS</div>
      <div id="perVal">—</div>
    </div>
    <div id="diffLine"></div>
    <div id="effLine"></div>
  </section>
</main>
<script>
(function(){
'use strict';
var LS_KEY='wizzed-tip-split';
var $=function(id){ return document.getElementById(id); };
var billEl=$('bill'), tipEl=$('tip');

var state={ bill:'84.50', tip:18, n:4, mode:'exact' };
try{
  var raw=localStorage.getItem(LS_KEY);
  if(raw){
    var s=JSON.parse(raw);
    if(s && typeof s==='object'){
      if(typeof s.bill==='string') state.bill=s.bill;
      if(isFinite(s.tip)) state.tip=Math.max(0,Math.min(30,Math.round(s.tip)));
      if(isFinite(s.n)) state.n=Math.max(1,Math.min(99,Math.round(s.n)));
      if(s.mode==='up'||s.mode==='total'||s.mode==='exact') state.mode=s.mode;
    }
  }
}catch(e){}
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){} }

function money(x){
  if(!isFinite(x)) return '—';
  var neg=x<0; x=Math.abs(x);
  var s=x.toFixed(2);
  var parts=s.split('.');
  parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');
  return (neg?'-$':'$')+parts[0]+'.'+parts[1];
}
function cents(x){ return Math.round((x+Number.EPSILON)*100)/100; }

function render(){
  var c=billEl.value.trim().replace(/[,$\s]/g,'');
  var bill=(c===''||c==='.')?NaN:Number(c);
  var bad=!isFinite(bill)||bill<0;
  billEl.classList.toggle('bad',bad);

  tipEl.value=String(state.tip);
  $('tipPct').textContent=state.tip+'%';
  tipEl.style.setProperty('--fill',(state.tip/30*100)+'%');
  Array.prototype.forEach.call(document.querySelectorAll('#presets button'),function(b){
    b.classList.toggle('on', Number(b.getAttribute('data-tip'))===state.tip);
  });
  $('partyN').innerHTML=state.n+'<small>'+(state.n===1?'PERSON':'PEOPLE')+'</small>';
  Array.prototype.forEach.call(document.querySelectorAll('#modes button'),function(b){
    b.classList.toggle('on', b.getAttribute('data-mode')===state.mode);
  });

  if(bad){
    ['rBill','rTip','rTotal','rTipPer','perVal'].forEach(function(id){ $(id).textContent='—'; });
    $('diffLine').textContent=''; $('effLine').textContent=''; $('rTipPct').textContent='';
    return;
  }
  var tip=cents(bill*state.tip/100);
  var total=cents(bill+tip);
  var n=state.n;
  var exactPer=total/n;
  var per, paidTotal, diff;
  if(state.mode==='up'){
    per=Math.ceil(exactPer - 1e-9);          /* round up to whole dollar per person */
    paidTotal=cents(per*n);
    diff=cents(paidTotal-total);
  }else if(state.mode==='total'){
    paidTotal=Math.ceil(total - 1e-9);        /* round total up to whole dollar */
    per=paidTotal/n;
    diff=cents(paidTotal-total);
  }else{
    per=exactPer; paidTotal=total; diff=0;
  }
  $('rBill').textContent=money(bill);
  $('rTipPct').textContent='('+state.tip+'%)';
  $('rTip').textContent=money(tip);
  $('rTotal').textContent=money(paidTotal);
  $('rTipPer').textContent=money((paidTotal-bill)/n);
  $('perVal').textContent=money(per);
  if(diff>0.004){
    $('diffLine').textContent='+'+money(diff).slice(0)+' extra vs exact — goes to the tip';
  }else{
    $('diffLine').textContent=state.mode==='exact'?'':'already a clean number — nothing extra';
  }
  var eff=bill>0?((paidTotal-bill)/bill*100):0;
  $('effLine').textContent='effective tip: '+eff.toFixed(1)+'%  ·  exact share was '+money(exactPer);
}

billEl.addEventListener('input',function(){ state.bill=billEl.value; render(); save(); });
tipEl.addEventListener('input',function(){ state.tip=Number(tipEl.value); render(); save(); });
Array.prototype.forEach.call(document.querySelectorAll('#presets button'),function(b){
  b.addEventListener('click',function(){
    state.tip=Number(b.getAttribute('data-tip')); render(); save();
  });
});
$('minus').addEventListener('click',function(){ if(state.n>1){ state.n--; render(); save(); } });
$('plus').addEventListener('click',function(){ if(state.n<99){ state.n++; render(); save(); } });
Array.prototype.forEach.call(document.querySelectorAll('#modes button'),function(b){
  b.addEventListener('click',function(){
    state.mode=b.getAttribute('data-mode'); render(); save();
  });
});

billEl.value=state.bill;
render();
})();
</script>
</body>
</html>
