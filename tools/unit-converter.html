<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Converter · Wizzed Arcade</title>
<style>
:root{
  --bg:#0f0f1a; --accent:#00e5ff; --soft:rgba(0,229,255,.45);
  --panel:#141626; --line:#2b2f4e; --text:#e6f6ff; --dim:#7f93b8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Courier New', ui-monospace, monospace;
  overflow-x:hidden; padding:8px 12px 40px;
}
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:linear-gradient(rgba(0,229,255,.035) 1px,transparent 1px),
             linear-gradient(90deg,rgba(0,229,255,.035) 1px,transparent 1px);
  background-size:28px 28px;
}
a.back{
  position:fixed; top:10px; left:12px; z-index:60;
  color:var(--dim); text-decoration:none; font-size:12px; letter-spacing:1px;
  border:1px solid var(--line); padding:3px 8px; background:rgba(15,15,26,.9);
}
a.back:hover{ color:var(--accent); border-color:var(--accent); text-shadow:0 0 8px var(--accent); }
header{ text-align:center; padding:6px 8px 2px; position:relative; z-index:1; }
h1{
  display:inline-block; font-size:clamp(17px,3vw,24px); letter-spacing:5px; color:var(--accent);
  text-shadow:0 0 6px var(--accent), 0 0 26px var(--soft);
}
header .sub{ font-size:10px; color:var(--dim); letter-spacing:2px; margin-top:2px; }
main{ max-width:820px; margin:8px auto 0; position:relative; z-index:1; }
#tabs{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-bottom:10px; }
.tab{
  font-family:inherit; font-size:11px; letter-spacing:1px; cursor:pointer;
  color:var(--dim); background:var(--panel); border:2px solid var(--line);
  padding:5px 10px; text-transform:uppercase;
}
.tab:hover{ color:var(--text); border-color:var(--accent); }
.tab.on{
  color:#031418; background:var(--accent); border-color:var(--accent); font-weight:bold;
  box-shadow:0 0 14px var(--soft);
}
.panel{
  background:var(--panel); border:2px solid var(--line);
  box-shadow:0 0 22px rgba(0,229,255,.10), inset 0 1px 0 rgba(255,255,255,.05);
  padding:14px;
}
#conv{ display:flex; gap:10px; align-items:stretch; justify-content:center; flex-wrap:wrap; }
.side{ flex:1 1 260px; min-width:220px; display:flex; flex-direction:column; gap:8px; }
.side label{ font-size:10px; letter-spacing:2px; color:var(--dim); }
.side input{
  width:100%; font-family:inherit; font-size:clamp(20px,4vw,26px); font-weight:bold;
  color:var(--accent); background:#0a0c16; border:2px solid var(--line);
  padding:10px 12px; text-align:right; outline:none;
  text-shadow:0 0 8px var(--soft);
  box-shadow:inset 0 2px 8px rgba(0,0,0,.6);
}
.side input:focus{ border-color:var(--accent); box-shadow:inset 0 2px 8px rgba(0,0,0,.6), 0 0 12px var(--soft); }
.side input.bad{ color:#ff6b6b; text-shadow:0 0 8px rgba(255,80,80,.5); }
.side select{
  width:100%; font-family:inherit; font-size:14px; color:var(--text);
  background:#0a0c16; border:2px solid var(--line); padding:7px 8px; outline:none; cursor:pointer;
}
.side select:focus{ border-color:var(--accent); }
#swap{
  align-self:center; font-family:inherit; font-size:20px; cursor:pointer;
  color:var(--accent); background:#0a0c16; border:2px solid var(--line);
  width:46px; height:46px; line-height:1; flex:0 0 auto;
  box-shadow:0 3px 0 #05060c;
}
#swap:hover{ border-color:var(--accent); box-shadow:0 3px 0 #05060c, 0 0 14px var(--soft); }
#swap:active{ transform:translateY(2px); box-shadow:0 1px 0 #05060c; }
#formula{
  text-align:center; font-size:12px; color:var(--dim); letter-spacing:1px;
  margin:10px 0 8px; min-height:15px;
}
#formula b{ color:var(--accent); font-weight:normal; text-shadow:0 0 6px var(--soft); }
#chips{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-bottom:12px; }
.chip{
  font-family:inherit; font-size:11px; cursor:pointer; letter-spacing:1px;
  color:var(--text); background:transparent; border:1px solid var(--line);
  padding:4px 9px; border-radius:999px;
}
.chip:hover{ border-color:var(--accent); color:var(--accent); }
.chip.on{ border-color:var(--accent); color:var(--accent); box-shadow:0 0 10px rgba(0,229,255,.25); }
#allWrap h2{ font-size:11px; letter-spacing:3px; color:var(--dim); margin-bottom:10px; }
#allWrap h2 span{ color:var(--accent); text-shadow:0 0 6px var(--soft); }
#allGrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:8px; }
.cell{
  background:#0a0c16; border:1px solid var(--line); padding:7px 10px;
  display:flex; justify-content:space-between; align-items:baseline; gap:8px; overflow:hidden;
}
.cell .u{ font-size:10px; color:var(--dim); letter-spacing:1px; white-space:nowrap; }
.cell .v{ font-size:13px; color:var(--accent); text-shadow:0 0 5px var(--soft); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
@media (max-width:560px){
  #conv{ flex-direction:column; }
  #swap{ transform:rotate(90deg); }
  #swap:active{ transform:rotate(90deg) translateX(2px); }
}
</style>
</head>
<body>
<a class="back" href="../index.html">← Arcade</a>
<header>
  <h1>UNIT CONVERTER</h1>
  <div class="sub">7 CATEGORIES · 6 SIGNIFICANT DIGITS · LIVE BOTH WAYS</div>
</header>
<main>
  <nav id="tabs"></nav>
  <section class="panel" id="conv">
    <div class="side">
      <label for="valA">FROM</label>
      <input id="valA" type="text" inputmode="decimal" autocomplete="off" spellcheck="false">
      <select id="unitA" aria-label="from unit"></select>
    </div>
    <button id="swap" title="Swap units" aria-label="Swap units">⇄</button>
    <div class="side">
      <label for="valB">TO</label>
      <input id="valB" type="text" inputmode="decimal" autocomplete="off" spellcheck="false">
      <select id="unitB" aria-label="to unit"></select>
    </div>
  </section>
  <div id="formula"></div>
  <div id="chips"></div>
  <section class="panel" id="allWrap">
    <h2>VALUE IN <span>ALL UNITS</span></h2>
    <div id="allGrid"></div>
  </section>
</main>
<script>
(function(){
'use strict';
var LS_KEY='wizzed-unit-converter';

var CATS={
  Length:{
    units:{mm:0.001, cm:0.01, m:1, km:1000, 'in':0.0254, ft:0.3048, yd:0.9144, mi:1609.344, nmi:1852},
    chips:[['km','mi'],['mi','km'],['ft','m'],['in','cm'],['yd','m'],['nmi','km']],
    def:['km','mi','100']
  },
  Weight:{
    units:{mg:1e-6, g:0.001, kg:1, t:1000, oz:0.028349523125, lb:0.45359237, st:6.35029318, 'US ton':907.18474},
    chips:[['lb','kg'],['kg','lb'],['oz','g'],['st','kg'],['t','lb']],
    def:['kg','lb','75']
  },
  Temperature:{
    temp:true,
    units:{'°C':1,'°F':1,'K':1},
    chips:[['°F','°C'],['°C','°F'],['°C','K'],['K','°C']],
    def:['°C','°F','20']
  },
  Volume:{
    units:{mL:0.001, L:1, 'm³':1000, tsp:0.00492892159375, tbsp:0.01478676478125, 'fl oz':0.0295735295625, cup:0.2365882365, pt:0.473176473, qt:0.946352946, 'gal (US)':3.785411784, 'gal (UK)':4.54609},
    chips:[['gal (US)','L'],['L','gal (US)'],['cup','mL'],['fl oz','mL'],['pt','L']],
    def:['L','gal (US)','10']
  },
  Speed:{
    units:{'m/s':1, 'km/h':1/3.6, mph:0.44704, knot:1852/3600, 'ft/s':0.3048},
    chips:[['mph','km/h'],['km/h','mph'],['knot','km/h'],['m/s','mph']],
    def:['km/h','mph','100']
  },
  Area:{
    units:{'mm²':1e-6, 'cm²':1e-4, 'm²':1, ha:1e4, 'km²':1e6, 'in²':0.00064516, 'ft²':0.09290304, 'yd²':0.83612736, acre:4046.8564224, 'mi²':2589988.110336},
    chips:[['acre','m²'],['ha','acre'],['ft²','m²'],['km²','mi²'],['m²','ft²']],
    def:['m²','ft²','50']
  },
  Data:{
    units:{bit:0.125, B:1, kB:1e3, MB:1e6, GB:1e9, TB:1e12, KiB:1024, MiB:1048576, GiB:1073741824, TiB:1099511627776},
    chips:[['GB','GiB'],['MB','MiB'],['GiB','GB'],['TB','GB'],['MiB','kB']],
    def:['GB','GiB','1']
  }
};
var CAT_NAMES=Object.keys(CATS);

var state={cat:'Length', per:{}};
try{
  var raw=localStorage.getItem(LS_KEY);
  if(raw){
    var s=JSON.parse(raw);
    if(s && CATS[s.cat]) state.cat=s.cat;
    if(s && typeof s.per==='object' && s.per) state.per=s.per;
  }
}catch(e){}

function catState(cat){
  var C=CATS[cat];
  var st=state.per[cat];
  if(!st || !(st.a in C.units) || !(st.b in C.units)){
    st={a:C.def[0], b:C.def[1], v:C.def[2], side:'A'};
    state.per[cat]=st;
  }
  return st;
}
function save(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){}
}

/* --- math --- */
function toC(v,u){ if(u==='°F') return (v-32)*5/9; if(u==='K') return v-273.15; return v; }
function fromC(c,u){ if(u==='°F') return c*9/5+32; if(u==='K') return c+273.15; return c; }
function convert(v,from,to,cat){
  var C=CATS[cat];
  if(C.temp) return fromC(toC(v,from),to);
  return v*C.units[from]/C.units[to];
}
function fmt(x){
  if(typeof x!=='number' || !isFinite(x)) return '—';
  if(x===0) return '0';
  var v=Number(x.toPrecision(6));
  var s=String(v);
  if(s.indexOf('e')!==-1) return s;
  var parts=s.split('.');
  var neg=parts[0].charAt(0)==='-';
  var ip=neg?parts[0].slice(1):parts[0];
  ip=ip.replace(/\B(?=(\d{3})+(?!\d))/g,',');
  return (neg?'-':'')+ip+(parts[1]?'.'+parts[1]:'');
}
function parseNum(str){
  var c=String(str).trim().replace(/[,\s_]/g,'');
  if(!c || c==='-' || c==='.' || c==='-.') return NaN;
  var n=Number(c);
  return isFinite(n)?n:NaN;
}

/* --- dom --- */
var $=function(id){ return document.getElementById(id); };
var tabsEl=$('tabs'), valA=$('valA'), valB=$('valB'), unitA=$('unitA'), unitB=$('unitB'),
    formulaEl=$('formula'), chipsEl=$('chips'), allGrid=$('allGrid');

CAT_NAMES.forEach(function(name){
  var b=document.createElement('button');
  b.type='button'; b.className='tab'; b.textContent=name;
  b.addEventListener('click',function(){ state.cat=name; buildCategory(); save(); });
  tabsEl.appendChild(b);
});

function fillSelect(sel,cat,chosen){
  sel.innerHTML='';
  Object.keys(CATS[cat].units).forEach(function(u){
    var o=document.createElement('option');
    o.value=u; o.textContent=u;
    if(u===chosen) o.selected=true;
    sel.appendChild(o);
  });
}

function buildCategory(){
  var cat=state.cat, st=catState(cat);
  Array.prototype.forEach.call(tabsEl.children,function(t){
    t.classList.toggle('on', t.textContent===cat);
  });
  fillSelect(unitA,cat,st.a);
  fillSelect(unitB,cat,st.b);
  chipsEl.innerHTML='';
  CATS[cat].chips.forEach(function(pair){
    var b=document.createElement('button');
    b.type='button'; b.className='chip';
    b.textContent=pair[0]+' → '+pair[1];
    b.addEventListener('click',function(){
      st.a=pair[0]; st.b=pair[1];
      unitA.value=st.a; unitB.value=st.b;
      recompute(); save();
    });
    chipsEl.appendChild(b);
  });
  if(st.side==='B'){ valB.value=st.v; } else { valA.value=st.v; }
  recompute();
}

function recompute(){
  var cat=state.cat, st=catState(cat);
  var srcInput = st.side==='B' ? valB : valA;
  var dstInput = st.side==='B' ? valA : valB;
  var from = st.side==='B' ? st.b : st.a;
  var to   = st.side==='B' ? st.a : st.b;
  var v=parseNum(srcInput.value);
  if(isNaN(v)){
    srcInput.classList.add('bad');
    dstInput.value='';
    formulaEl.textContent='enter a number…';
    allGrid.innerHTML='';
    return;
  }
  srcInput.classList.remove('bad');
  valA.classList.remove('bad'); valB.classList.remove('bad');
  var out=convert(v,from,to,cat);
  dstInput.value=fmt(out);
  st.v=srcInput.value;

  var leftVal = st.side==='B' ? out : v;   /* value in unit st.a */
  if(CATS[cat].temp){
    formulaEl.innerHTML='<b>'+fmt(leftVal)+' '+esc(st.a)+'</b> = <b>'+fmt(convert(leftVal,st.a,st.b,cat))+' '+esc(st.b)+'</b>';
  }else{
    formulaEl.innerHTML='1 '+esc(st.a)+' = <b>'+fmt(convert(1,st.a,st.b,cat))+' '+esc(st.b)+'</b> &nbsp;·&nbsp; 1 '+esc(st.b)+' = <b>'+fmt(convert(1,st.b,st.a,cat))+' '+esc(st.a)+'</b>';
  }
  Array.prototype.forEach.call(chipsEl.children,function(c){
    c.classList.toggle('on', c.textContent===st.a+' → '+st.b);
  });
  /* all-units grid, based on the FROM side value */
  allGrid.innerHTML='';
  Object.keys(CATS[cat].units).forEach(function(u){
    var cell=document.createElement('div');
    cell.className='cell';
    var val=convert(leftVal,st.a,u,cat);
    cell.innerHTML='<span class="v">'+fmt(val)+'</span><span class="u">'+esc(u)+'</span>';
    allGrid.appendChild(cell);
  });
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

valA.addEventListener('input',function(){ catState(state.cat).side='A'; recompute(); save(); });
valB.addEventListener('input',function(){ catState(state.cat).side='B'; recompute(); save(); });
unitA.addEventListener('change',function(){ catState(state.cat).a=unitA.value; recompute(); save(); });
unitB.addEventListener('change',function(){ catState(state.cat).b=unitB.value; recompute(); save(); });
$('swap').addEventListener('click',function(){
  var st=catState(state.cat);
  var tmp=st.a; st.a=st.b; st.b=tmp;
  unitA.value=st.a; unitB.value=st.b;
  /* carry the destination value over so the number follows the swap */
  var srcInput = st.side==='B' ? valB : valA;
  var dstInput = st.side==='B' ? valA : valB;
  var moved=dstInput.value;
  if(moved!=='') srcInput.value=moved;
  recompute(); save();
});

buildCategory();
})();
</script>
</body>
</html>
